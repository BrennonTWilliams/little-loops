repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: ll-verify-decisions
        name: Validate .ll/decisions.yaml
        language: system
        entry: ll-verify-decisions
        files: ^\.ll/decisions(\.yaml|\.d/.*\.json)$
        pass_filenames: false
