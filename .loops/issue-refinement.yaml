paradigm: fsm
name: issue-refinement
description: |
  Progressively refine all active issues to ensure complete coverage.
  For each incomplete issue (starting from highest ID), runs all missing
  refinement commands, scores with confidence-check, and iterates with
  refine-issue until both confidence scores meet configured thresholds.
  Repeats until all active issues are fully refined.
initial: evaluate
states:
  evaluate:
    action: "ll-issues refine-status"
    action_type: shell
    evaluate:
      type: llm_structured
      prompt: |
        Examine this ll-issues refine-status table output.
        Return verdict "success" ONLY if every issue row satisfies ALL of the following:
          1. All boolean columns (format, verify, map) show ✓ (not — em-dash).
             Note: map column is dynamic — if it is absent from the table entirely,
             treat it as incomplete (not yet run for any issue).
          2. Both the ready (readiness score) and confidence (outcome confidence) columns
             show integer values (not —) that meet or exceed their configured thresholds.
        Return "failure" if any issue still has — in a format, verify, or map column, or if any issue
        has unscored or below-threshold ready/confidence values.
        Return "partial" if the output is ambiguous or truncated.
    on_success: done
    on_failure: fix
    on_error: fix
  fix:
    action_type: prompt
    action: |
      Run `ll-issues refine-status` to see the current refinement state of all
      active issues. Then read `.claude/ll-config.json` and note the
      readiness_threshold and outcome_threshold values from
      commands.confidence_gate.

      Find the highest Issue ID that still needs refinement work, where:
      - Any boolean column shows — (em-dash) for format or verify
      - OR the map column is absent from the table entirely, or shows —
      - OR the ready (confidence_score) column shows — or is below readiness_threshold
      - OR the confidence (outcome_confidence) column shows — or is below outcome_threshold

      For that issue, execute the following steps in sequence:

      Step A — Complete all missing refinement commands. For each command below, check
      whether it has been run for this issue (column present and showing ✓). If not, run it:
      - format not done (column shows — or absent): /ll:format-issue [ISSUE_ID] --auto
      - verify not done (column shows — or absent): /ll:verify-issues [ISSUE_ID] --auto
      - map not done (column shows — or absent): /ll:map-dependencies [ISSUE_ID] --auto

      Step B — Score if unscored:
      - If ready or confidence shows — (not yet scored): /ll:confidence-check [ISSUE_ID] --auto

      Step C — Refine until scores meet thresholds (maximum 5 refinements):
      - While (ready < readiness_threshold OR confidence < outcome_threshold):
        1. /ll:refine-issue [ISSUE_ID] --auto
        2. /ll:confidence-check [ISSUE_ID] --auto
        3. Check updated scores; stop if both thresholds met or 5 refinements reached
    next: evaluate
  done:
    terminal: true
max_iterations: 100
on_handoff: spawn
