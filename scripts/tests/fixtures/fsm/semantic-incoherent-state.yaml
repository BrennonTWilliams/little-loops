name: semantic-incoherent-state
description: "Run the test suite and fix failing tests"
initial: fix_tests
states:
  fix_tests:
    action: "Read the failing test output and update the source code to make the tests pass"
    action_type: prompt
    on_yes: check_done
    on_no: fix_tests
    on_error: done
  check_done:
    action: "Run the full test suite and report all failures in detail, including stack traces and assertion messages for every test that does not pass"
    action_type: shell
    on_yes: done
    on_no: fix_tests
    on_error: done
  done:
    terminal: true
