name: harness-optimize
category: optimization
description: |
  Score-gated hill-climbing on harness artifacts (skills, commands, CLAUDE.md).
  Each iteration proposes an edit to a declared target file set, runs a benchmark
  via lib/benchmark.yaml, accepts the change if score rises (or meets target),
  and reverts otherwise. Commits accepted mutations to the current branch.
  Trajectory persists to .ll/runs/harness-optimize/<run-id>/states/<state>/trajectory.jsonl.
initial: init_run
max_iterations: 30
timeout: 7200
on_handoff: spawn
import:
  - lib/benchmark.yaml
  - lib/common.yaml

context:
  targets: ""         # required — space-separated file paths, e.g. "skills/foo/SKILL.md"
  tasks_dir: ""       # required — path to Harbor task directory
  scorer: ""          # required — scorer command, e.g. "./scripts/score.sh"
  target_score: 1.0   # early-stop threshold; 1.0 means "never early-stop"
  max_iterations: 30  # hard budget ceiling

states:
  init_run:
    action_type: shell
    action: |
      TRAJ=".ll/runs/harness-optimize-$(date +%s)/states/whole-file/trajectory.jsonl"
      mkdir -p "$(dirname "$TRAJ")"
      echo "$TRAJ"
    capture: traj_path
    next: load_directive

  load_directive:
    action_type: shell
    action: |
      # Write state queue when loop YAML targets[].states[] is non-empty
      LOOP_YAML="${context.targets}"
      if [ -f "$LOOP_YAML" ]; then
        python3 -c "import yaml,json; data=yaml.safe_load(open('$LOOP_YAML')); states=[s for t in data.get('targets',[]) for s in t.get('states',[])]; open('${context.run_dir}/harness-optimize-state-queue.txt','w').write(''.join(json.dumps({'name':s['name'],'examples_file':s.get('examples_file','')})+'\n' for s in states)) if states else None" 2>/dev/null || true
      fi
      # Branch trajectory find path by current STATE_NAME (set by dequeue_state)
      STATE_NAME=$(cat ${context.run_dir}/harness-optimize-state-name.txt 2>/dev/null || echo "")
      if [ -n "$STATE_NAME" ]; then
        TRAJ_PATH="*/states/$${STATE_NAME}/*"
      else
        TRAJ_PATH="*/states/whole-file/*"
      fi
      TRAJ_FILES=$(find ${context.run_dir} -name "trajectory.jsonl" -path "$TRAJ_PATH" 2>/dev/null)
      if [ -n "$TRAJ_FILES" ]; then
        BEST=$(echo "$TRAJ_FILES" | xargs cat 2>/dev/null | jq -r 'select(.accepted==true) | .commit_sha' | tail -1)
        [ -n "$BEST" ] && git checkout "$BEST" -- ${context.targets}
      fi
      PROG=.ll/program.md
      if [ -f "$PROG" ]; then
        awk 'BEGIN{s=0} /^## [Dd]irective/{s=1;next} s && /^## /{exit} s{print}' "$PROG" | sed '/^[[:space:]]*$/d'
      fi
      # Route to check_queue (state-mode) or baseline_score (whole-file)
      if [ -s ${context.run_dir}/harness-optimize-state-queue.txt ]; then
        exit 0
      else
        exit 1
      fi
    capture: directive
    evaluate:
      type: exit_code
    on_yes: check_queue
    on_no: baseline_score

  check_queue:
    action_type: shell
    action: |
      if [ ! -s ${context.run_dir}/harness-optimize-state-queue.txt ]; then
        exit 1
      fi
    evaluate:
      type: exit_code
    on_yes: dequeue_state
    on_no: done

  dequeue_state:
    action_type: shell
    action: |
      ENTRY=$(head -1 ${context.run_dir}/harness-optimize-state-queue.txt)
      tail -n +2 ${context.run_dir}/harness-optimize-state-queue.txt \
        > ${context.run_dir}/harness-optimize-state-queue.tmp
      mv ${context.run_dir}/harness-optimize-state-queue.tmp \
        ${context.run_dir}/harness-optimize-state-queue.txt
      STATE_NAME=$(echo "$ENTRY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d['name'])")
      EXAMPLES_FILE=$(echo "$ENTRY" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('examples_file',''))")
      printf '%s' "$STATE_NAME" > ${context.run_dir}/harness-optimize-state-name.txt
      printf '%s' "$EXAMPLES_FILE" > ${context.run_dir}/harness-optimize-examples-file.txt
      echo "$STATE_NAME"
    capture: state_name
    next: baseline_score

  baseline_score:
    fragment: run_benchmark
    action: "${context.scorer} ${context.tasks_dir}"
    capture: baseline
    on_yes: init_prev
    on_no: done
    on_error: done

  init_prev:
    action_type: shell
    action: "echo '${captured.baseline.output}' | tail -1 | tr -d '[:space:]'"
    capture: prev_score
    next: propose

  propose:
    action_type: prompt
    timeout: 300
    action: |
      Optimization directive: ${captured.directive.output}

      Target files available: ${context.targets}
      Baseline score: ${captured.baseline.output}
      Last benchmark output: ${captured.benchmark_score.output}

      State-mode target: ${captured.state_name.output}

      If state-mode target (above) is non-empty:
        Read the target loop YAML (${context.targets}) and extract the `action:` block
        for state "${captured.state_name.output}". For additional context, read the
        examples file at ${context.run_dir}/harness-optimize-examples-file.txt if it exists.
        Propose a targeted edit to that action block to raise the benchmark score.
        Output ONLY the revised action block text — no YAML keys, no fences, no preamble.

      If state-mode target is empty:
        Pick ONE file from the target list to improve this iteration.
        Read it, then propose ONE targeted edit to raise the benchmark score.
        Output the complete revised file contents only —
        no preamble, no explanation, no markdown fences.
    capture: candidate
    on_blocked: done
    next: apply

  apply:
    action_type: prompt
    timeout: 120
    action: |
      Apply the following proposed change.

      State-mode target state: ${captured.state_name.output}
      Target file: ${context.targets}

      Proposed change:
      ${captured.candidate.output}

      If state-mode target (above) is non-empty:
        1. Write the proposed action text to:
           ${context.run_dir}/harness-optimize-candidate-action.txt
        2. Apply it using the yaml_state_editor:
           python3 -c "
      from little_loops.loops.yaml_state_editor import replace_action
      from pathlib import Path
      action = Path('${context.run_dir}/harness-optimize-candidate-action.txt').read_text()
      replace_action(Path('${context.targets}'), '${captured.state_name.output}', action)
      "

      If state-mode target is empty:
        Write the following revised contents to the file you proposed editing.
        Replace the entire file contents exactly — no preamble, no explanation.

      Confirm the change has been applied.
    next: score

  score:
    fragment: run_benchmark
    action: "${context.scorer} ${context.tasks_dir}"
    capture: benchmark_score
    on_yes: gate
    on_no: revert_and_log
    on_error: revert_and_log

  gate:
    fragment: convergence_gate
    action: |
      echo "${captured.benchmark_score.output}" | tail -1 | tr -d '[:space:]'
    evaluate:
      target: "${context.target_score}"
      tolerance: 0.02
      previous: "${captured.prev_score.output}"
    route:
      target: commit_and_log
      progress: commit_and_log
      stall: revert_and_log
      error: revert_and_log

  commit_and_log:
    action_type: shell
    action: |
      git add ${context.targets}
      git commit -m "harness-optimize: iter ${state.iteration}, score ${captured.benchmark_score.output}"
      git rev-parse HEAD
    capture: last_commit
    next: write_trajectory_accepted

  revert_and_log:
    action_type: shell
    action: "git restore ${context.targets}"
    next: write_trajectory_rejected

  write_trajectory_accepted:
    action_type: shell
    action: |
      STATE_NAME=$(cat ${context.run_dir}/harness-optimize-state-name.txt 2>/dev/null || echo "")
      if [ -n "$STATE_NAME" ]; then
        TRAJ="${context.run_dir}/states/$${STATE_NAME}/trajectory.jsonl"
        mkdir -p "$(dirname "$TRAJ")"
      else
        TRAJ="${captured.traj_path.output}"
      fi
      echo '{"iter":${state.iteration},"score":${captured.benchmark_score.output},"accepted":true,"commit_sha":"${captured.last_commit.output}"}' \
        >> "$TRAJ"
      if [ -n "$STATE_NAME" ]; then
        exit 0
      else
        exit 1
      fi
    evaluate:
      type: exit_code
    on_yes: check_queue
    on_no: capture_prev

  write_trajectory_rejected:
    action_type: shell
    action: |
      STATE_NAME=$(cat ${context.run_dir}/harness-optimize-state-name.txt 2>/dev/null || echo "")
      if [ -n "$STATE_NAME" ]; then
        TRAJ="${context.run_dir}/states/$${STATE_NAME}/trajectory.jsonl"
        mkdir -p "$(dirname "$TRAJ")"
      else
        TRAJ="${captured.traj_path.output}"
      fi
      echo '{"iter":${state.iteration},"score":${captured.benchmark_score.output},"accepted":false,"commit_sha":""}' \
        >> "$TRAJ"
      if [ -n "$STATE_NAME" ]; then
        exit 0
      else
        exit 1
      fi
    evaluate:
      type: exit_code
    on_yes: check_queue
    on_no: done

  capture_prev:
    action_type: shell
    action: "echo '${captured.benchmark_score.output}' | tail -1 | tr -d '[:space:]'"
    capture: prev_score
    next: propose

  done:
    terminal: true
