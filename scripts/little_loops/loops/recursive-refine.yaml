name: "recursive-refine"
category: issue-management
description: |
  Refine one or more issues to readiness, recursively processing child issues
  produced by issue-size-review decomposition. Accepts a single issue ID or a
  comma-separated list. For each issue, delegates refine → wire →
  confidence-check to the refine-to-ready-issue sub-loop. When thresholds are
  not met and issue-size-review creates child issues, each child is prepended
  to the queue (depth-first) and refined before the next sibling. Continues
  until every issue in the full tree passes thresholds or is skipped.

  When order=next-action the loop drives the whole active backlog using
  ll-issues next-action value-ranking instead of a seeded queue. When
  no_recursion=true child detection and size-review are skipped (flat
  one-pass-per-issue mode, used by the issue-refinement alias).

  Usage:
    ll-loop run recursive-refine "ISSUE_ID"
    ll-loop run recursive-refine "ID1,ID2,ID3"
    ll-loop run recursive-refine --context order=next-action commit_every=5 no_recursion=true
initial: parse_input
max_steps: 500
timeout: 28800
on_handoff: spawn
artifact_versioning: true
parameters:
  input:
    type: string
    required: false
    default: ""
    description: Issue ID(s) to refine (comma-separated). Required when order=queue.
context:
  readiness_threshold: 90   # canonical: commands.confidence_gate.readiness_threshold in ll-config.json
  outcome_threshold: 75     # canonical: commands.confidence_gate.outcome_threshold in ll-config.json
  max_refine_count: 5       # canonical: commands.max_refine_count in ll-config.json
  max_depth: 3              # canonical: commands.recursive_refine.max_depth in ll-config.json
  tree_summary: true        # set to false to suppress the decomposition tree in the done summary
  order: queue              # 'queue' (seeded input) or 'next-action' (value-ranked backlog)
  commit_every: 0           # commit every N completed refinements; 0 = disabled
  no_recursion: false       # true = skip child detection / size-review (flat one-pass alias mode)
import:
  - lib/common.yaml

states:
  parse_input:
    # Validate that input is provided (queue mode), split comma-separated IDs into a
    # newline-delimited queue file, and initialise per-run tracking files.
    # In order=next-action mode input is not required; skip queue setup entirely.
    action: |
      ORDER="${context.order:default=queue}"
      mkdir -p "${context.run_dir}"
      _init_common() {
        printf '' > ${context.run_dir}/recursive-refine-passed.txt
        printf '' > ${context.run_dir}/recursive-refine-skipped.txt
        printf '' > ${context.run_dir}/recursive-refine-visited.txt
        printf '' > ${context.run_dir}/recursive-refine-attempts.txt
        printf '' > ${context.run_dir}/recursive-refine-skipped-budget.txt
        printf '' > ${context.run_dir}/recursive-refine-skipped-decomposed.txt
        printf '' > ${context.run_dir}/recursive-refine-skipped-deadend.txt
        printf '' > ${context.run_dir}/recursive-refine-skipped-decision.txt
        printf '' > ${context.run_dir}/recursive-refine-skipped-missing-artifacts.txt
        printf '' > ${context.run_dir}/recursive-refine-wire-attempts.txt
        printf '' > ${context.run_dir}/recursive-refine-decomposition.tsv
        printf '0' > ${context.run_dir}/recursive-refine-dequeued-count.txt
        printf '0' > ${context.run_dir}/recursive-refine-commit-count.txt
      }
      if [ "$ORDER" = "next-action" ]; then
        _init_common
        > ${context.run_dir}/recursive-refine-skipped-depth.txt
        COMMIT_EVERY="${context.commit_every:default=0}"
        NO_RECURSION="${context.no_recursion:default=false}"
        echo "Starting next-action mode: commit_every=$${COMMIT_EVERY}, no_recursion=$${NO_RECURSION}"
      else
        if [ -z "${context.input}" ]; then
          echo "ERROR: input is required when order=queue. Usage: ll-loop run recursive-refine \"ID1,ID2\""
          exit 1
        fi
        _init_common
        echo "${context.input}" | tr ',' '\n' \
          | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
          | grep -v '^[[:space:]]*$' \
          | sort -u \
          > ${context.run_dir}/recursive-refine-queue.txt
        cp ${context.run_dir}/recursive-refine-queue.txt \
          ${context.run_dir}/recursive-refine-original-queue.txt
        while IFS= read -r id; do echo "$id 0"; done \
          < ${context.run_dir}/recursive-refine-queue.txt \
          > ${context.run_dir}/recursive-refine-depth-map.txt
        > ${context.run_dir}/recursive-refine-skipped-depth.txt
        COUNT=$(wc -l < ${context.run_dir}/recursive-refine-queue.txt | tr -d ' ')
        printf '%s' "$COUNT" > ${context.run_dir}/recursive-refine-total-enqueued.txt
        echo "Queued $COUNT issue(s) for recursive refinement"
      fi
    fragment: shell_exit
    on_yes: dequeue_next
    on_no: diagnose
    on_error: diagnose

  dequeue_next:
    # Pop the head of the queue and advance the file (order=queue), or call
    # ll-issues next-action to get the highest-value backlog issue (order=next-action).
    # Captures the issue ID as 'input' so context_passthrough forwards it to
    # the refine-to-ready-issue sub-loop as context.input.
    # Exits 1 (→ aggregate_decomposition) when the queue/backlog is empty.
    action: |
      ORDER="${context.order:default=queue}"
      DEQUEUED=$(cat ${context.run_dir}/recursive-refine-dequeued-count.txt 2>/dev/null || echo 0)
      PASSED=$(grep -c '[^[:space:]]' ${context.run_dir}/recursive-refine-passed.txt 2>/dev/null || echo 0)
      SKIPPED=$(grep -c '[^[:space:]]' ${context.run_dir}/recursive-refine-skipped.txt 2>/dev/null || echo 0)
      if [ "$ORDER" = "next-action" ]; then
        SKIP=$(cat ${context.run_dir}/recursive-refine-visited.txt 2>/dev/null | tr '\n' ',' | sed 's/,$//')
        RESULT=$(ll-issues next-action --skip "$SKIP" 2>/dev/null)
        NEXT_EXIT=$?
        CURRENT=$(echo "$RESULT" | awk 'NR==1{printf $2}')
        if [ $NEXT_EXIT -eq 0 ] || [ -z "$CURRENT" ]; then
          exit 1  # ALL_DONE → aggregate_decomposition
        fi
        echo "$CURRENT" >> ${context.run_dir}/recursive-refine-visited.txt
        printf '0' > ${context.run_dir}/recursive-refine-current-depth.txt
        DEQUEUED=$((DEQUEUED + 1))
        printf '%s' "$DEQUEUED" > ${context.run_dir}/recursive-refine-dequeued-count.txt
        printf '[next-action #%s] → %s | passed: %d | skipped: %d\n' \
          "$DEQUEUED" "$CURRENT" "$PASSED" "$SKIPPED" >&2
        echo "$CURRENT"
      else
        if [ ! -s ${context.run_dir}/recursive-refine-queue.txt ]; then
          exit 1
        fi
        CURRENT=$(head -1 ${context.run_dir}/recursive-refine-queue.txt)
        tail -n +2 ${context.run_dir}/recursive-refine-queue.txt \
          > ${context.run_dir}/recursive-refine-queue.tmp
        mv ${context.run_dir}/recursive-refine-queue.tmp \
          ${context.run_dir}/recursive-refine-queue.txt
        echo "$CURRENT" >> ${context.run_dir}/recursive-refine-visited.txt
        DEPTH=$(grep "^$CURRENT " ${context.run_dir}/recursive-refine-depth-map.txt 2>/dev/null | awk '{print $2}')
        printf '%s' "$${DEPTH:-0}" > ${context.run_dir}/recursive-refine-current-depth.txt
        DEQUEUED=$((DEQUEUED + 1))
        printf '%s' "$DEQUEUED" > ${context.run_dir}/recursive-refine-dequeued-count.txt
        TOTAL=$(cat ${context.run_dir}/recursive-refine-total-enqueued.txt 2>/dev/null || echo '?')
        QUEUED=$(grep -c '[^[:space:]]' ${context.run_dir}/recursive-refine-queue.txt 2>/dev/null || echo 0)
        DEPTH_STR=$${DEPTH:+" (depth: $DEPTH)"}
        printf '[%s/%s] → %s%s | passed: %d | queued: %d | skipped: %d\n' \
          "$DEQUEUED" "$TOTAL" "$CURRENT" "$DEPTH_STR" "$PASSED" "$QUEUED" "$SKIPPED" >&2
        echo "$CURRENT"
      fi
    fragment: shell_exit  # queue_pop fragment not used — see ENH-1875 for exception rationale
    capture: input
    on_yes: check_attempt_budget
    on_no: aggregate_decomposition
    on_error: done

  check_attempt_budget:
    # Gate: skip this issue if it has consumed its per-issue refinement budget.
    # Reads max_refine_count from ll-config.json (commands.max_refine_count) with
    # context.max_refine_count as fallback. Budget-exceeded IDs are written to both
    # the budget-specific file and the shared skipped file so outer-loop callers
    # (auto-refine-and-implement, sprint-refine-and-implement) accumulate them correctly.
    action: |
      python3 << 'PYEOF'
      import json, sys
      from pathlib import Path
      issue_id = '${captured.input.output}'
      cfg = {}
      p = Path('.ll/ll-config.json')
      if p.exists():
          try:
              cfg = json.loads(p.read_text()).get('commands', {})
          except Exception:
              pass
      cap = cfg.get('max_refine_count', ${context.max_refine_count})
      attempts_file = '${context.run_dir}/recursive-refine-attempts.txt'
      try:
          lines = Path(attempts_file).read_text().splitlines()
      except FileNotFoundError:
          lines = []
      count = sum(1 for ln in lines if ln.strip() == issue_id)
      if count >= cap:
          with open('${context.run_dir}/recursive-refine-skipped-budget.txt', 'a') as f:
              f.write(issue_id + '\n')
          with open('${context.run_dir}/recursive-refine-skipped.txt', 'a') as f:
              f.write(issue_id + '\n')
          sys.exit(1)
      with open(attempts_file, 'a') as f:
          f.write(issue_id + '\n')
      sys.exit(0)
      PYEOF
    fragment: shell_exit
    on_yes: capture_baseline
    on_no: dequeue_next
    on_error: dequeue_next

  capture_baseline:
    # Snapshot all active issue IDs before running the refine sub-loop so we
    # can detect newly-created child issues afterward (via detect_children and
    # enqueue_or_skip). The snapshot is refreshed in size_review_snap before
    # an explicit size-review run. Clear the broke-down flag so each issue
    # iteration starts clean.
    action: |
      rm -f ${context.run_dir}/refine-broke-down
      ll-issues list --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " > ${context.run_dir}/recursive-refine-pre-ids.txt
    action_type: shell
    next: run_refine
    on_error: run_refine

  run_refine:
    # Delegate format → refine → wire → confidence-check to refine-to-ready-issue.
    # context_passthrough passes captured.input as context.input to the sub-loop.
    # on_success = sub-loop reached 'done' (confidence pass OR breakdown_issue path).
    # on_failure = sub-loop reached 'failed' (true error condition; breakdown now occurs in sub-loop).
    # Failure/error routes to gate_recursion so no_recursion=true can short-circuit child detection.
    fragment: with_rate_limit_handling
    loop: refine-to-ready-issue
    context_passthrough: true
    on_success: check_passed
    on_failure: gate_recursion
    on_error: gate_recursion
    on_rate_limit_exhausted: dequeue_next

  check_passed:
    # Verify confidence and outcome scores meet project thresholds.
    # Even on sub-loop success the issue may not have met thresholds —
    # refine-to-ready-issue can exit via breakdown_issue → done rather than a
    # genuine confidence pass. Records the issue in passed.txt when thresholds met.
    # Routes to maybe_commit on pass, gate_recursion on fail (gate_recursion decides
    # whether to skip directly or proceed to child detection based on no_recursion).
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      issue_id = '${captured.input.output}'

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', issue_id, '--json'],
          capture_output=True, text=True
      )
      try:
          d = json.loads(r.stdout)
      except Exception:
          sys.exit(1)

      passed = (int(d.get('confidence') or 0) >= readiness
                and int(d.get('outcome') or 0) >= outcome)
      if passed:
          with open('${context.run_dir}/recursive-refine-passed.txt', 'a') as f:
              f.write(issue_id + '\n')
      sys.exit(0 if passed else 1)
      PYEOF
    fragment: shell_exit
    on_yes: maybe_commit
    on_no: gate_recursion
    on_error: gate_recursion

  gate_recursion:
    # Short-circuit child detection when no_recursion=true (flat alias mode).
    # In no_recursion mode the issue is added to the skip list and routed to
    # maybe_commit (preserving commit cadence). Otherwise routes to detect_children
    # for the normal recursive decomposition path.
    action: |
      NO_RECURSION="${context.no_recursion:default=false}"
      if [ "$NO_RECURSION" = "true" ]; then
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
        exit 0
      fi
      exit 1
    fragment: shell_exit
    on_yes: maybe_commit
    on_no: detect_children
    on_error: detect_children

  maybe_commit:
    # Increment the completion counter and run /ll:commit every commit_every
    # completions (both pass and no-recursion-skip paths converge here).
    # When commit_every=0 (default) this is a no-op pass-through to dequeue_next.
    action: |
      COMMIT_EVERY="${context.commit_every:default=0}"
      if [ "$COMMIT_EVERY" = "0" ]; then
        echo "SKIP"
        exit 0
      fi
      FILE="${context.run_dir}/recursive-refine-commit-count.txt"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      if [ $((N % COMMIT_EVERY)) -eq 0 ]; then echo "COMMIT"; else echo "SKIP"; fi
    action_type: shell
    evaluate:
      type: output_contains
      pattern: "COMMIT"
    on_yes: commit_periodic
    on_no: dequeue_next
    on_error: dequeue_next

  commit_periodic:
    # Periodic commit triggered by maybe_commit when the commit_every threshold is hit.
    action: /ll:commit
    action_type: slash_command
    next: dequeue_next
    on_error: dequeue_next

  detect_children:
    # Diff current issue IDs against the pre-refinement baseline to find any
    # child issues created during the sub-loop (e.g., via its breakdown_issue state).
    # Writes discovered child IDs to a temp file for use by enqueue_children.
    # Exits 0 (on_yes → enqueue_children) if children found;
    # exits 1 (on_no → size_review_snap) if none were found.
    action: |
      ll-issues list --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " | sort > ${context.run_dir}/recursive-refine-post-ids.txt

      comm -13 ${context.run_dir}/recursive-refine-pre-ids.txt \
               ${context.run_dir}/recursive-refine-post-ids.txt \
               > ${context.run_dir}/recursive-refine-diff-ids.txt

      PARENT_ID="${captured.input.output}"
      while IFS= read -r child_id; do
        child_file=$(ll-issues path "$child_id" 2>/dev/null)
        if [ -n "$child_file" ] && grep -q "Decomposed from $PARENT_ID" "$child_file"; then
          echo "$child_id"
        fi
      done < ${context.run_dir}/recursive-refine-diff-ids.txt \
        > ${context.run_dir}/recursive-refine-new-children.txt

      if [ -s ${context.run_dir}/recursive-refine-new-children.txt ]; then
        cat ${context.run_dir}/recursive-refine-new-children.txt
        exit 0
      else
        exit 1
      fi
    fragment: shell_exit
    on_yes: enqueue_children
    on_no: size_review_snap
    on_error: size_review_snap

  enqueue_children:
    # Prepend newly-detected child issues to the front of the queue (depth-first),
    # so children are refined before the next sibling in the original list.
    # Records the parent as skipped since it was decomposed, not refined to ready.
    action: |
      python3 << 'PYEOF'
      from pathlib import Path
      import sys
      run_dir = '${context.run_dir}'
      visited = set()
      for f in ['recursive-refine-visited.txt', 'recursive-refine-passed.txt']:
          p = Path(f'{run_dir}/{f}')
          if p.exists():
              visited.update(ln.strip() for ln in p.read_text().splitlines() if ln.strip())
      queue_p = Path(f'{run_dir}/recursive-refine-queue.txt')
      if queue_p.exists():
          visited.update(ln.strip() for ln in queue_p.read_text().splitlines() if ln.strip())
      candidates_p = Path(f'{run_dir}/recursive-refine-new-children.txt')
      candidates = []
      if candidates_p.exists():
          candidates = [ln.strip() for ln in candidates_p.read_text().splitlines() if ln.strip()]
      for cid in candidates:
          if cid in visited:
              print(f'WARN: refusing to re-enqueue {cid} (already visited / passed)', file=sys.stderr)
      survivors = [cid for cid in candidates if cid not in visited]
      candidates_p.write_text(''.join(f'{c}\n' for c in survivors))
      PYEOF
      CHILDREN=$(cat ${context.run_dir}/recursive-refine-new-children.txt)
      EXISTING=$(cat ${context.run_dir}/recursive-refine-queue.txt 2>/dev/null || true)
      { echo "$CHILDREN"; echo "$EXISTING"; } \
        | grep -v '^[[:space:]]*$' \
        > ${context.run_dir}/recursive-refine-queue.txt
      PARENT_DEPTH=$(cat ${context.run_dir}/recursive-refine-current-depth.txt 2>/dev/null || echo 0)
      while IFS= read -r child; do
        echo "$child $((PARENT_DEPTH + 1))" >> ${context.run_dir}/recursive-refine-depth-map.txt
      done < ${context.run_dir}/recursive-refine-new-children.txt
      CHILD_IDS=$(cat ${context.run_dir}/recursive-refine-new-children.txt | tr '\n' ',' | sed 's/,$//')
      printf '%s\t%s\t%s\t%s\n' "${captured.input.output}" "$CHILD_IDS" "sub-loop" \
        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ${context.run_dir}/recursive-refine-decomposition.tsv
      echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
      echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped-decomposed.txt
      PARENT_FILE=$(ll-issues path "${captured.input.output}" 2>/dev/null)
      if [ -n "$PARENT_FILE" ]; then
        mkdir -p .issues/completed
        git mv "$PARENT_FILE" .issues/completed/ 2>/dev/null \
          || mv "$PARENT_FILE" .issues/completed/
      fi
      CHILD_COUNT=$(wc -l < ${context.run_dir}/recursive-refine-new-children.txt | tr -d ' ')
      PREV_TOTAL=$(cat ${context.run_dir}/recursive-refine-total-enqueued.txt 2>/dev/null || echo 0)
      printf '%s' "$((PREV_TOTAL + CHILD_COUNT))" > ${context.run_dir}/recursive-refine-total-enqueued.txt
      echo "Parent ${captured.input.output} decomposed; enqueued $CHILD_COUNT child issue(s)"
      PEEK_COUNT=5
      QUEUE_LINES=$(grep -c '[^[:space:]]' ${context.run_dir}/recursive-refine-queue.txt 2>/dev/null || echo 0)
      if [ "$QUEUE_LINES" -gt 0 ]; then
        PEEK=$(head -"$PEEK_COUNT" ${context.run_dir}/recursive-refine-queue.txt | tr '\n' ',' | sed 's/,$//')
        if [ "$QUEUE_LINES" -gt "$PEEK_COUNT" ]; then
          REMAINING=$((QUEUE_LINES - PEEK_COUNT))
          printf '  Next up: %s [+%d more]\n' "$PEEK" "$REMAINING" >&2
        else
          printf '  Next up: %s\n' "$PEEK" >&2
        fi
      fi
    action_type: shell
    next: dequeue_next
    on_error: dequeue_next

  size_review_snap:
    # Update pre-ids to the current state (captured in detect_children's post-ids)
    # so the enqueue_or_skip diff reflects only what the explicit size-review creates,
    # not children already created by the sub-loop.
    action: |
      if [ -f ${context.run_dir}/recursive-refine-post-ids.txt ]; then
        cp ${context.run_dir}/recursive-refine-post-ids.txt \
           ${context.run_dir}/recursive-refine-pre-ids.txt
      fi
    action_type: shell
    next: check_broke_down
    on_error: check_broke_down

  check_broke_down:
    # Guard: shortcut to enqueue_or_skip ONLY when breakdown_issue ran inside
    # the sub-loop AND it actually produced child issues (detected and written
    # to recursive-refine-new-children.txt by detect_children). If the flag is
    # set but no children exist (BUG-1183: /ll:issue-size-review --auto
    # returned only analysis, no files), fall through to recheck_scores →
    # run_size_review so the loop gets its own chance to decompose. Preserves
    # the BUG-1079 "no double size-review" invariant because flag=1 AND
    # children exist still shortcuts past run_size_review.
    action: |
      FLAG=$(cat ${context.run_dir}/refine-broke-down 2>/dev/null || echo 0)
      if [ "$FLAG" = "1" ] && [ -s ${context.run_dir}/recursive-refine-new-children.txt ]; then
        echo 1
      else
        echo 0
      fi
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: recheck_scores    # 0 → flag unset OR no children → proceed normally
    on_no: enqueue_or_skip    # 1 → flag set AND children exist → skip
    on_error: recheck_scores

  recheck_scores:
    # Gate before size-review: if the issue already meets thresholds, skip size-review.
    # Scores can pass even when the sub-loop failed/errored (e.g., max-iterations hit
    # while the issue was already ready). Mirrors check_passed logic exactly.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      issue_id = '${captured.input.output}'

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', issue_id, '--json'],
          capture_output=True, text=True
      )
      try:
          d = json.loads(r.stdout)
      except Exception:
          sys.exit(1)

      passed = (int(d.get('confidence') or 0) >= readiness
                and int(d.get('outcome') or 0) >= outcome)
      if passed:
          with open('${context.run_dir}/recursive-refine-passed.txt', 'a') as f:
              f.write(issue_id + '\n')
      sys.exit(0 if passed else 1)
      PYEOF
    fragment: shell_exit
    on_yes: dequeue_next
    on_no: check_depth
    on_error: check_depth

  check_depth:
    # Gate: skip size-review if this issue has reached the per-subtree depth cap.
    # Reads MAX_DEPTH from ll-config.json (commands.recursive_refine.max_depth) with
    # context.max_depth as fallback. Depth-capped IDs are written to both the
    # depth-specific file and the shared skipped file so outer-loop callers
    # (auto-refine-and-implement, sprint-refine-and-implement) accumulate them correctly.
    action: |
      MAX_DEPTH=$(python3 << 'PYEOF'
      import json
      from pathlib import Path
      p = Path('.ll/ll-config.json')
      cfg = {}
      if p.exists():
          try:
              cfg = json.loads(p.read_text())
          except Exception:
              pass
      print(cfg.get('commands', {}).get('recursive_refine', {}).get('max_depth', ${context.max_depth}))
      PYEOF
      )
      [ -z "$MAX_DEPTH" ] && MAX_DEPTH=${context.max_depth}
      CURRENT_DEPTH=$(cat ${context.run_dir}/recursive-refine-current-depth.txt 2>/dev/null || echo 0)
      if [ "$CURRENT_DEPTH" -ge "$MAX_DEPTH" ]; then
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped-depth.txt
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
        echo 1
      else
        echo 0
      fi
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: check_decision_needed
    on_no: dequeue_next
    on_error: check_decision_needed

  check_decision_needed:
    # Gate: skip size-review if the issue has decision_needed: true — a competing
    # option must be resolved via /ll:decide-issue before sizing makes sense.
    action: |
      ISSUE_FILE=$(ll-issues path "${captured.input.output}" 2>/dev/null)
      if [ -n "$ISSUE_FILE" ] && grep -q "decision_needed: true" "$ISSUE_FILE"; then
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped-decision.txt
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
        exit 1
      fi
      exit 0
    fragment: shell_exit
    on_yes: check_missing_artifacts
    on_no: dequeue_next
    on_error: check_missing_artifacts

  check_missing_artifacts:
    # Gate before size-review: if missing_artifacts=true the low outcome score is
    # caused by absent files/unwired components, not scope. recursive-refine has no
    # wire capability, so skip and let the caller handle repair externally.
    # Mirrors check_decision_needed above and refine-to-ready-issue:check_missing_artifacts.
    action: "ll-issues check-flag ${captured.input.output} missing_artifacts"
    fragment: shell_exit
    on_yes: check_wire_budget
    on_no: run_size_review
    on_error: run_size_review

  check_wire_budget:
    # Allow one wire attempt per issue. If already attempted, fall through to skip.
    # Mirrors check_attempt_budget pattern; guards against infinite wire → refine cycles.
    action: |
      python3 << 'PYEOF'
      import sys
      from pathlib import Path
      issue_id = '${captured.input.output}'
      attempts_file = Path('${context.run_dir}/recursive-refine-wire-attempts.txt')
      lines = attempts_file.read_text().splitlines() if attempts_file.exists() else []
      if issue_id in {ln.strip() for ln in lines if ln.strip()}:
          sys.exit(1)
      with open(attempts_file, 'a') as f:
          f.write(issue_id + '\n')
      sys.exit(0)
      PYEOF
    fragment: shell_exit
    on_yes: run_wire_for_artifacts
    on_no: skip_missing_artifacts
    on_error: skip_missing_artifacts

  run_wire_for_artifacts:
    # Wire repair for missing_artifacts issues. Routes back to capture_baseline so
    # the full sub-loop (refine + wire + confidence-check) re-evaluates with fresh
    # wiring. On second failure check_wire_budget will skip rather than loop again.
    fragment: with_rate_limit_handling
    action: "/ll:wire-issue ${captured.input.output} --auto"
    action_type: slash_command
    next: capture_baseline
    on_error: capture_baseline
    on_rate_limit_exhausted: skip_missing_artifacts

  skip_missing_artifacts:
    action: |
      echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped-missing-artifacts.txt
      echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
      echo "Skipped: ${captured.input.output} (missing_artifacts — wire repair attempted but unresolved)"
    action_type: shell
    next: dequeue_next
    on_error: dequeue_next

  run_size_review:
    # Explicitly run issue-size-review when the sub-loop did not decompose the issue.
    # If this creates child issues, enqueue_or_skip will detect and enqueue them.
    fragment: with_throttle
    action: "/ll:issue-size-review ${captured.input.output} --auto"
    action_type: slash_command
    next: enqueue_or_skip
    on_error: enqueue_or_skip
    on_throttle_hard: enqueue_or_skip

  enqueue_or_skip:
    # After explicit size-review: diff IDs against the pre-size-review baseline.
    # If children found: prepend to queue depth-first; mark parent as skipped.
    # If none: mark parent as skipped (no further decomposition is possible).
    action: |
      ll-issues list --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " | sort > ${context.run_dir}/recursive-refine-post-ids.txt

      comm -13 ${context.run_dir}/recursive-refine-pre-ids.txt \
               ${context.run_dir}/recursive-refine-post-ids.txt \
               > ${context.run_dir}/recursive-refine-diff-ids.txt

      PARENT_ID="${captured.input.output}"
      while IFS= read -r child_id; do
        child_file=$(ll-issues path "$child_id" 2>/dev/null)
        if [ -n "$child_file" ] && grep -q "Decomposed from $PARENT_ID" "$child_file"; then
          echo "$child_id"
        fi
      done < ${context.run_dir}/recursive-refine-diff-ids.txt \
        > ${context.run_dir}/recursive-refine-new-children.txt

      python3 << 'PYEOF'
      from pathlib import Path
      import sys
      run_dir = '${context.run_dir}'
      visited = set()
      for f in ['recursive-refine-visited.txt', 'recursive-refine-passed.txt']:
          p = Path(f'{run_dir}/{f}')
          if p.exists():
              visited.update(ln.strip() for ln in p.read_text().splitlines() if ln.strip())
      queue_p = Path(f'{run_dir}/recursive-refine-queue.txt')
      if queue_p.exists():
          visited.update(ln.strip() for ln in queue_p.read_text().splitlines() if ln.strip())
      candidates_p = Path(f'{run_dir}/recursive-refine-new-children.txt')
      candidates = []
      if candidates_p.exists():
          candidates = [ln.strip() for ln in candidates_p.read_text().splitlines() if ln.strip()]
      for cid in candidates:
          if cid in visited:
              print(f'WARN: refusing to re-enqueue {cid} (already visited / passed)', file=sys.stderr)
      survivors = [cid for cid in candidates if cid not in visited]
      candidates_p.write_text(''.join(f'{c}\n' for c in survivors))
      if len(candidates) > 0 and len(survivors) == 0:
          with open('${context.run_dir}/recursive-refine-skipped-cycle.txt', 'a') as cf:
              cf.write('${captured.input.output}\n')
      PYEOF

      if [ -s ${context.run_dir}/recursive-refine-new-children.txt ]; then
        CHILDREN=$(cat ${context.run_dir}/recursive-refine-new-children.txt)
        EXISTING=$(cat ${context.run_dir}/recursive-refine-queue.txt 2>/dev/null || true)
        { echo "$CHILDREN"; echo "$EXISTING"; } \
          | grep -v '^[[:space:]]*$' \
          > ${context.run_dir}/recursive-refine-queue.txt
        PARENT_DEPTH=$(cat ${context.run_dir}/recursive-refine-current-depth.txt 2>/dev/null || echo 0)
        while IFS= read -r child; do
          echo "$child $((PARENT_DEPTH + 1))" >> ${context.run_dir}/recursive-refine-depth-map.txt
        done < ${context.run_dir}/recursive-refine-new-children.txt
        CHILD_IDS=$(cat ${context.run_dir}/recursive-refine-new-children.txt | tr '\n' ',' | sed 's/,$//')
        printf '%s\t%s\t%s\t%s\n' "${captured.input.output}" "$CHILD_IDS" "size-review" \
          "$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> ${context.run_dir}/recursive-refine-decomposition.tsv
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped-decomposed.txt
        PARENT_FILE=$(ll-issues path "${captured.input.output}" 2>/dev/null)
        if [ -n "$PARENT_FILE" ]; then
          mkdir -p .issues/completed
          git mv "$PARENT_FILE" .issues/completed/ 2>/dev/null \
            || mv "$PARENT_FILE" .issues/completed/
        fi
        CHILD_COUNT=$(wc -l < ${context.run_dir}/recursive-refine-new-children.txt | tr -d ' ')
        PREV_TOTAL=$(cat ${context.run_dir}/recursive-refine-total-enqueued.txt 2>/dev/null || echo 0)
        printf '%s' "$((PREV_TOTAL + CHILD_COUNT))" > ${context.run_dir}/recursive-refine-total-enqueued.txt
        echo "Parent ${captured.input.output} decomposed by size-review; enqueued $CHILD_COUNT child issue(s)"
        PEEK_COUNT=5
        QUEUE_LINES=$(grep -c '[^[:space:]]' ${context.run_dir}/recursive-refine-queue.txt 2>/dev/null || echo 0)
        if [ "$QUEUE_LINES" -gt 0 ]; then
          PEEK=$(head -"$PEEK_COUNT" ${context.run_dir}/recursive-refine-queue.txt | tr '\n' ',' | sed 's/,$//')
          if [ "$QUEUE_LINES" -gt "$PEEK_COUNT" ]; then
            REMAINING=$((QUEUE_LINES - PEEK_COUNT))
            printf '  Next up: %s [+%d more]\n' "$PEEK" "$REMAINING" >&2
          else
            printf '  Next up: %s\n' "$PEEK" >&2
          fi
        fi
      else
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped.txt
        echo "${captured.input.output}" >> ${context.run_dir}/recursive-refine-skipped-deadend.txt
        echo "Skipped: ${captured.input.output} (no further decomposition possible)"
      fi
    action_type: shell
    next: dequeue_next
    on_error: dequeue_next

  aggregate_decomposition:
    # Cross-reference decomposition.tsv against passed.txt and emit a rollup block.
    # Runs after the queue is exhausted (dequeue_next on_no) and before done.
    action: |
      if [ ! -s ${context.run_dir}/recursive-refine-decomposition.tsv ]; then
        exit 0
      fi
      python3 << 'PYEOF'
      from pathlib import Path

      def read_ids(path):
          try:
              return [ln.strip() for ln in Path(path).read_text().splitlines() if ln.strip()]
          except FileNotFoundError:
              return []

      passed = set(read_ids('${context.run_dir}/recursive-refine-passed.txt'))

      rows = []
      try:
          for line in Path('${context.run_dir}/recursive-refine-decomposition.tsv').read_text().splitlines():
              parts = line.strip().split('\t')
              if len(parts) >= 2:
                  parent_id = parts[0]
                  child_ids = [c for c in parts[1].split(',') if c]
                  rows.append((parent_id, child_ids))
      except FileNotFoundError:
          import sys; sys.exit(0)

      if not rows:
          import sys; sys.exit(0)

      print(f'\nDecomposed ({len(rows)}):')
      for parent_id, child_ids in rows:
          passed_children = [c for c in child_ids if c in passed]
          other_children = [c for c in child_ids if c not in passed]
          status_parts = []
          if passed_children:
              status_parts.append(f'{len(passed_children)} passed')
          if other_children:
              status_parts.append(f'{len(other_children)} not passed')
          status = f' ({", ".join(status_parts)})' if status_parts else ''
          child_list = ', '.join(child_ids)
          print(f'  {parent_id} → [{child_list}]{status}')
      PYEOF
    action_type: shell
    next: done
    on_error: done

  done:
    # Emit a structured summary of passed and skipped issues for this run.
    action: |
      PASSED_IDS=$(cat ${context.run_dir}/recursive-refine-passed.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      DECOMPOSED_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-decomposed.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      DEADEND_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-deadend.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      DEPTH_SKIPPED_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-depth.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      CYCLE_SKIPPED_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-cycle.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      BUDGET_SKIPPED_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-budget.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      DECISION_SKIPPED_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-decision.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      MISSING_ARTIFACTS_IDS=$(cat ${context.run_dir}/recursive-refine-skipped-missing-artifacts.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)

      PASSED_COUNT=$(echo "$PASSED_IDS" | grep -c '[^[:space:]]' || echo 0)
      DECOMPOSED_COUNT=$(echo "$DECOMPOSED_IDS" | grep -c '[^[:space:]]' || echo 0)
      DEADEND_COUNT=$(echo "$DEADEND_IDS" | grep -c '[^[:space:]]' || echo 0)
      DEPTH_COUNT=$(echo "$DEPTH_SKIPPED_IDS" | grep -c '[^[:space:]]' || echo 0)
      CYCLE_COUNT=$(echo "$CYCLE_SKIPPED_IDS" | grep -c '[^[:space:]]' || echo 0)
      BUDGET_COUNT=$(echo "$BUDGET_SKIPPED_IDS" | grep -c '[^[:space:]]' || echo 0)
      DECISION_COUNT=$(echo "$DECISION_SKIPPED_IDS" | grep -c '[^[:space:]]' || echo 0)
      MISSING_ARTIFACTS_COUNT=$(echo "$MISSING_ARTIFACTS_IDS" | grep -c '[^[:space:]]' || echo 0)

      PASSED_LIST=$(echo "$PASSED_IDS" | tr '\n' ',' | sed 's/,$//')
      DECOMPOSED_LIST=$(echo "$DECOMPOSED_IDS" | tr '\n' ',' | sed 's/,$//')
      DEADEND_LIST=$(echo "$DEADEND_IDS" | tr '\n' ',' | sed 's/,$//')
      DEPTH_LIST=$(echo "$DEPTH_SKIPPED_IDS" | tr '\n' ',' | sed 's/,$//')
      CYCLE_LIST=$(echo "$CYCLE_SKIPPED_IDS" | tr '\n' ',' | sed 's/,$//')
      BUDGET_LIST=$(echo "$BUDGET_SKIPPED_IDS" | tr '\n' ',' | sed 's/,$//')
      DECISION_LIST=$(echo "$DECISION_SKIPPED_IDS" | tr '\n' ',' | sed 's/,$//')
      MISSING_ARTIFACTS_LIST=$(echo "$MISSING_ARTIFACTS_IDS" | tr '\n' ',' | sed 's/,$//')

      printf '\n=== Recursive Refine Summary ===\n\n'
      printf 'Passed           (%d): %s\n' "$PASSED_COUNT"             "$${PASSED_LIST:-none}"
      printf 'Decomposed       (%d): %s\n' "$DECOMPOSED_COUNT"         "$${DECOMPOSED_LIST:-none}"
      printf 'Dead-ends        (%d): %s\n' "$DEADEND_COUNT"            "$${DEADEND_LIST:-none}"
      printf 'Depth-cap        (%d): %s\n' "$DEPTH_COUNT"              "$${DEPTH_LIST:-none}"
      printf 'Cycle            (%d): %s\n' "$CYCLE_COUNT"              "$${CYCLE_LIST:-none}"
      printf 'Budget           (%d): %s\n' "$BUDGET_COUNT"             "$${BUDGET_LIST:-none}"
      printf 'Decision         (%d): %s\n' "$DECISION_COUNT"           "$${DECISION_LIST:-none}"
      printf 'Missing-artifacts(%d): %s\n' "$MISSING_ARTIFACTS_COUNT"  "$${MISSING_ARTIFACTS_LIST:-none}"
      if [ "${context.tree_summary}" != "false" ]; then
        python3 << 'PYEOF'
      import subprocess, sys, json, os, re
      from pathlib import Path

      def read_ids(path):
          try:
              return [ln.strip() for ln in Path(path).read_text().splitlines() if ln.strip()]
          except FileNotFoundError:
              return []

      roots = read_ids('${context.run_dir}/recursive-refine-original-queue.txt')
      if not roots:
          sys.exit(0)

      passed = set(read_ids('${context.run_dir}/recursive-refine-passed.txt'))
      skipped = set(read_ids('${context.run_dir}/recursive-refine-skipped.txt'))
      depth_skipped = set(read_ids('${context.run_dir}/recursive-refine-skipped-depth.txt'))
      cycle_skipped = set(read_ids('${context.run_dir}/recursive-refine-skipped-cycle.txt'))
      budget_skipped = set(read_ids('${context.run_dir}/recursive-refine-skipped-budget.txt'))
      decision_skipped = set(read_ids('${context.run_dir}/recursive-refine-skipped-decision.txt'))
      all_ids = passed | skipped

      def build_parent_map():
          parent_to_children = {}
          for iid in all_ids:
              r = subprocess.run(
                  ['grep', '-rl', f'parent: {iid}', '.issues/'],
                  capture_output=True, text=True
              )
              children = []
              for f in r.stdout.splitlines():
                  m = re.search(r'(BUG|FEAT|ENH|EPIC)-(\d+)', os.path.basename(f))
                  if m:
                      children.append(f'{m.group(1)}-{m.group(2)}')
              if children:
                  parent_to_children[iid] = children
          return parent_to_children

      parent_to_children = build_parent_map()

      def get_scores(iid):
          try:
              r = subprocess.run(
                  ['ll-issues', 'show', iid, '--json'],
                  capture_output=True, text=True
              )
              d = json.loads(r.stdout)
              return int(d.get('confidence') or 0), int(d.get('outcome') or 0)
          except Exception:
              return 0, 0

      def get_skip_reason(iid):
          if iid in depth_skipped:
              return 'depth-cap'
          if iid in cycle_skipped:
              return 'cycle'
          if iid in budget_skipped:
              return 'budget'
          if iid in decision_skipped:
              return 'decision-needed'
          return 'refinement'

      lines = []

      def render(iid, prefix, is_last):
          connector = '└── ' if is_last else '├── '
          children = parent_to_children.get(iid, [])
          if children:
              lines.append(f'{prefix}{connector}{iid} [decomposed]')
              child_prefix = prefix + ('    ' if is_last else '│   ')
              for j, child in enumerate(children):
                  render(child, child_prefix, j == len(children) - 1)
          elif iid in passed:
              conf, outcome = get_scores(iid)
              lines.append(f'{prefix}{connector}{iid} (passed, conf={conf}, outcome={outcome})')
          else:
              reason = get_skip_reason(iid)
              lines.append(f'{prefix}{connector}{iid} (skipped: {reason})')

      for root in roots:
          children = parent_to_children.get(root, [])
          if children:
              lines.append(f'{root} [decomposed]')
              for j, child in enumerate(children):
                  render(child, '  ', j == len(children) - 1)
          elif root in passed:
              conf, outcome = get_scores(root)
              lines.append(f'{root} (passed, conf={conf}, outcome={outcome})')
          else:
              reason = get_skip_reason(root)
              lines.append(f'{root} (skipped: {reason})')

      if lines:
          print('\n=== Decomposition Tree ===')
          for line in lines:
              print(line)
      PYEOF
      fi
      printf '\n'
    action_type: shell
    terminal: true

  diagnose:
    action_type: prompt
    action: |
      The recursive-refine loop has terminated with an unrecoverable failure.

      Diagnose what happened:
      - If ${env.PWD}/${context.run_dir}/recursive-refine-queue.txt exists, report its contents (remaining issues).
      - If ${env.PWD}/${context.run_dir}/recursive-refine-visited.txt exists, report how many issues were processed.
      - If failure was in parse_input, report whether the input issue list was empty or malformed.
      - Identify the most likely failure cause.

      Write a one-paragraph diagnostic summary the operator can use to re-run with corrected input.
    next: failed

  failed:
    terminal: true
