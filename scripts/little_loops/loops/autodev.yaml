name: "autodev"
category: issue-management
description: |
  Targeted refine-and-implement for a specific set of issues. Accepts a single
  issue ID or a comma-separated list. Interleaves refinement and implementation:
  refines one issue; on threshold pass, implements it immediately via
  `ll-auto --only`; on decomposition into children, prepends children to the
  queue depth-first and refines them before the next sibling. First
  implementation runs as soon as the first leaf passes refinement.

  Unlike auto-refine-and-implement, this loop does not poll the backlog and
  does not maintain a skip list — the input set is finite and fixed.

  Usage:
    ll-loop run autodev "ISSUE_ID"
    ll-loop run autodev "ID1,ID2,ID3"
initial: init
max_steps: 500
timeout: 28800
on_handoff: spawn
scope:
  - "${context.run_dir}"
# BUG-2526: serialize loop-name conflicts at the lock layer so two concurrent
# `ll-loop run autodev` instances do not both shell out to `ll-auto --only`
# on the main working tree (corrupts .auto-manage-state.json and git state).
singleton: true
context:
  readiness_threshold: 90   # canonical: commands.confidence_gate.readiness_threshold in ll-config.json
  outcome_threshold: 75     # canonical: commands.confidence_gate.outcome_threshold in ll-config.json
  # Learning-gate skip knob: parity with `ll-auto --skip-learning-gate`. Threaded
  # into implement_current's inner `ll-auto --only` via the SKIP_FLAG. Default
  # empty = the ENH-2319 gate stays active (config-gated by learning_tests.enabled).
  # Passed down from auto-refine-and-implement via with: so the sprint path honors it too.
  #   ll-loop run autodev <ids> --context skip_learning_gate=1
  skip_learning_gate: ""
import:
  - lib/common.yaml

states:
  init:
    # Validate input, reset autodev tmp files, and seed the unified queue from
    # the comma-separated context.input. The same ${context.run_dir}/autodev-queue.txt
    # serves both refinement and implementation throughout — there is no
    # separate impl queue.
    action: |
      if [ -z "${context.input}" ]; then
        echo "ERROR: input is required. Usage: ll-loop run autodev \"ID1,ID2\""
        exit 1
      fi
      mkdir -p .loops/tmp
      printf '' > ${context.run_dir}/autodev-passed.txt
      printf '' > ${context.run_dir}/autodev-skipped.txt
      printf '' > ${context.run_dir}/autodev-gate-blocked.txt
      rm -f ${context.run_dir}/autodev-broke-down
      rm -f ${context.run_dir}/autodev-inflight
      echo "${context.input}" | tr ',' '\n' \
        | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
        | grep -v '^[[:space:]]*$' \
        > ${context.run_dir}/autodev-queue.txt
      COUNT=$(wc -l < ${context.run_dir}/autodev-queue.txt | tr -d ' ')
      echo "Queued $COUNT issue(s) for autodev"
    fragment: shell_exit
    on_yes: dequeue_next
    on_no: done
    on_error: done

  dequeue_next:
    # Pop the head of the unified queue; snapshot current active issue IDs as
    # the per-iteration baseline for child detection; clear the broke-down
    # handshake flags so each iteration starts clean. Captures the ID as
    # 'input' so context_passthrough forwards it to refine-to-ready-issue as
    # context.input. Exits 1 (→ done) when the queue is empty.
    action: |
      if [ ! -s ${context.run_dir}/autodev-queue.txt ]; then
        exit 1
      fi
      CURRENT=$(head -1 ${context.run_dir}/autodev-queue.txt)
      tail -n +2 ${context.run_dir}/autodev-queue.txt > ${context.run_dir}/autodev-queue.tmp
      mv ${context.run_dir}/autodev-queue.tmp ${context.run_dir}/autodev-queue.txt

      # BUG-1226: record the in-flight issue so `done` can surface it if the
      # loop terminates before this issue reaches a clean resolution
      # (enqueue_or_skip / enqueue_children / next dequeue_next overwrite).
      printf '%s' "$CURRENT" > ${context.run_dir}/autodev-inflight

      rm -f ${context.run_dir}/refine-broke-down ${context.run_dir}/autodev-broke-down
      rm -f ${context.run_dir}/autodev-decide-ran
      rm -f ${context.run_dir}/autodev-decide-options-deposited
      (ll-issues list --json | python3 -c "
      import json, sys
      try:
          issues = json.load(sys.stdin)
          for i in sorted(i['id'] for i in issues):
              print(i)
      except Exception:
          pass
      " > ${context.run_dir}/autodev-pre-ids.txt) || true

      echo "$CURRENT"
    fragment: queue_pop
    capture: input
    on_yes: check_decision_at_dequeue
    on_no: done
    on_error: done

  check_decision_at_dequeue:
    # BUG-2513: route decision_needed:true issues to run_decide on first dequeue,
    # BEFORE refine_current runs. Decouples the decision gate from the sub-loop's
    # on_success / on_failure / on_error / on_no / on_rate_limit_exhausted outcome.
    # dequeue_next clears autodev-decide-ran and autodev-decide-options-deposited
    # on every dequeue, so this gate enters clean. The existing
    # check_decision_after_refine gate still catches flags added during refinement
    # (defense in depth) on the post-refine path.
    action: "ll-issues check-flag ${captured.input.output} decision_needed"
    fragment: shell_exit
    on_yes: run_decide
    on_no: refine_current
    on_error: refine_current

  refine_current:
    # Delegate format → refine → wire → confidence-check for a single issue to
    # refine-to-ready-issue. context_passthrough forwards captured.input as
    # context.input to the sub-loop. on_success = sub-loop reached 'done' (true
    # confidence pass OR breakdown_issue path). on_failure = sub-loop reached
    # 'failed' terminal (e.g. diagnose → failed) — route to skip_inflight so
    # the issue is recorded as skipped and the queue advances without passing an
    # unrefined issue to implement_current. on_error (signal/crash) takes the
    # same skip path. on_no (queue empty / sub-loop never started) drains normally.
    fragment: with_rate_limit_handling
    loop: refine-to-ready-issue
    context_passthrough: true
    on_success: copy_broke_down
    on_failure: skip_inflight
    on_error: skip_inflight
    on_no: dequeue_next
    on_rate_limit_exhausted: dequeue_next

  skip_inflight:
    # ENH-1679: record the in-flight issue as skipped and clear the inflight
    # sentinel so `done` does not surface a stale warning. Reached when
    # refine-to-ready-issue exits via its `failed` terminal or the executor
    # receives a signal/crash (on_error). Mirrors the skip_and_continue pattern
    # in auto-refine-and-implement.yaml.
    # ENH-2404: two-space-delimited "ID  REASON" (matches rn-implement.yaml
    # mark_deferred), so finalize can distinguish failure reasons.
    action: |
      echo "${captured.input.output}  refine_failed" >> ${context.run_dir}/autodev-skipped.txt
      rm -f ${context.run_dir}/autodev-inflight
    fragment: queue_track
    action_type: shell
    next: dequeue_next
    on_error: dequeue_next

  copy_broke_down:
    # Handshake: refine-to-ready-issue writes ${context.run_dir}/refine-broke-down
    # (0 at resolve_issue start, 1 at write_broke_down) via context_passthrough.
    # Copy it into autodev's namespace so the rest of the state machine reads
    # autodev-* temp files consistently.
    action: |
      if [ -f ${context.run_dir}/refine-broke-down ]; then
        cp ${context.run_dir}/refine-broke-down ${context.run_dir}/autodev-broke-down
      else
        printf '0' > ${context.run_dir}/autodev-broke-down
      fi
    action_type: shell
    next: check_decision_after_refine
    on_error: check_decision_after_refine

  check_decision_after_refine:
    # Check decision_needed immediately after confidence-check (via sub-loop)
    # completes. Runs /ll:decide-issue before score thresholds are evaluated,
    # so an unresolved design decision is resolved on the direct post-refine path.
    action: "ll-issues check-flag ${captured.input.output} decision_needed"
    fragment: shell_exit
    on_yes: run_decide
    on_no: check_passed
    on_error: check_passed

  check_passed:
    # Verify confidence and outcome scores meet project thresholds. Even on
    # sub-loop success the issue may not have met thresholds —
    # refine-to-ready-issue can exit via breakdown_issue → done rather than a
    # genuine confidence pass. Records passing issues in autodev-passed.txt
    # and routes to implement_current to interleave implementation.
    action: |
      ll-issues check-readiness ${captured.input.output} \
        --readiness ${context.readiness_threshold} \
        --outcome ${context.outcome_threshold} \
        && echo "${captured.input.output}" >> ${context.run_dir}/autodev-passed.txt
    fragment: shell_exit
    on_yes: implement_current
    on_no: triage_outcome_failure
    on_error: detect_children

  decide_current:
    # Check if the issue requires a decision before implementation. Reads
    # decision_needed from ll-issues show --json; if true, runs /ll:decide-issue
    # to resolve competing options before handing off to ll-auto.
    # ENH-1415: when re-entered after size-review (recheck_after_size_review →
    # on_yes), short-circuit straight to implement_current if decide already
    # ran in this iteration. The flag is cleared per-issue at dequeue_next.
    action: |
      if [ -f ${context.run_dir}/autodev-decide-ran ]; then
        exit 1
      fi
      ll-issues check-flag ${captured.input.output} decision_needed
    fragment: shell_exit
    on_yes: check_decision_decidable
    on_no: implement_current

  check_decision_decidable:
    # ENH-2443 parity insertion (Implementation Step #7): same rn-remediate gate —
    # decide_current's decision_needed:true may have zero enumerable options in
    # ## Proposed Solution, in which case run_decide silently leaves the flag
    # unchanged and the issue never converges. ll-issues check-decidable is the
    # deterministic (non-LLM) companion to /ll:decide-issue --validate-only.
    # Marker-bounded: once deposit_options has run once this iteration, skip
    # re-validation and go straight to run_decide (bounds the detour to one retry).
    action: |
      if [ -f ${context.run_dir}/autodev-decide-options-deposited ]; then
        exit 0
      fi
      ll-issues check-decidable ${captured.input.output}
    fragment: shell_exit
    on_yes: run_decide
    on_no: deposit_options
    on_error: run_decide

  deposit_options:
    # Bounded retry: refine --auto may deposit Option A/B/C blocks that
    # run_decide can then score. Write-once marker prevents infinite loops if
    # refine also can't deposit options — falls through to run_decide with no
    # enumerable options; the existing decision_needed gate remains the safety net.
    fragment: with_rate_limit_handling
    action_type: slash_command
    action: "/ll:refine-issue ${captured.input.output} --auto"
    on_yes: record_options_deposited
    on_no: run_decide
    on_partial: record_options_deposited
    on_error: run_decide
    on_rate_limit_exhausted: done

  record_options_deposited:
    # Marker ensures the deposit_options detour runs at most once per issue
    # per iteration (cleared at dequeue_next, mirroring autodev-decide-ran).
    action_type: shell
    action: |
      printf '1' > ${context.run_dir}/autodev-decide-options-deposited
    next: check_decision_decidable

  run_decide:
    # Run /ll:decide-issue to select a winning implementation option and clear
    # the decision_needed flag. Routes to rerun_confidence_after_decide so the
    # outcome score is recomputed against the resolved decision before
    # thresholds are checked. run_decide is reachable from both score-passing
    # and score-failing paths.
    fragment: with_rate_limit_handling
    action: "/ll:decide-issue ${captured.input.output} --auto"
    action_type: slash_command
    next: mark_decide_ran
    on_error: recheck_after_decide
    on_rate_limit_exhausted: done

  mark_decide_ran:
    # ENH-1415: record that decide has already run for the current issue so
    # decide_current short-circuits if size-review routes back via
    # recheck_after_size_review → on_yes: decide_current. The flag is cleared
    # per-issue at dequeue_next.
    action: |
      printf '1' > ${context.run_dir}/autodev-decide-ran
    action_type: shell
    next: rerun_confidence_after_decide
    on_error: rerun_confidence_after_decide

  rerun_confidence_after_decide:
    # After /ll:decide-issue resolves open design questions, the Ambiguity
    # dimension of outcome confidence (and sometimes Simplicity) changes
    # materially — but the scores in frontmatter still hold the stale
    # pre-decision values. Re-run confidence-check so recheck_after_decide
    # evaluates fresh scores. Without this, an issue whose only blocker was
    # an unresolved decision can never recover from outcome <75 even though
    # decide-issue resolved the very ambiguity that caused the failure.
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${captured.input.output}"
    action_type: slash_command
    next: recheck_after_decide
    on_error: recheck_after_decide
    on_rate_limit_exhausted: done

  recheck_after_decide:
    # Re-validate readiness/outcome scores after rerun_confidence_after_decide
    # so that implementation only proceeds when thresholds are met. Mirrors
    # check_passed logic. ENH-1415: on failure, route to snap_and_size_review
    # rather than dropping the issue. After decide runs, the only outcome
    # dimensions that can still drag the score below threshold are Complexity
    # and Change Surface — both decomposable. The decide-ran flag set by
    # mark_decide_ran prevents re-entering decide if size-review routes back.
    action: |
      ll-issues check-readiness ${captured.input.output} \
        --readiness ${context.readiness_threshold} \
        --outcome ${context.outcome_threshold} \
        && echo "${captured.input.output}" >> ${context.run_dir}/autodev-passed.txt
    fragment: shell_exit
    on_yes: implement_current
    on_no: snap_and_size_review
    on_error: snap_and_size_review

  snap_and_size_review:
    # ENH-1415: snapshot current issue IDs as the new pre-ids baseline before
    # handing off to run_size_review, so enqueue_or_skip's diff reflects only
    # the children created by this explicit size-review (mirrors
    # size_review_snap on the no-decide path). Reached when recheck_after_decide
    # still fails outcome after decide has run.
    action: |
      ll-issues list --json | python3 -c "
      import json, sys
      try:
          issues = json.load(sys.stdin)
          for i in sorted(i['id'] for i in issues):
              print(i)
      except Exception:
          pass
      " > ${context.run_dir}/autodev-pre-ids.txt
    action_type: shell
    next: run_size_review
    on_error: run_size_review

  run_wire:
    # Run /ll:wire-issue to resolve absent files or unwired integration points
    # identified by the missing_artifacts flag. Chains to run_refine so that
    # codebase context is filled in even when wiring alone is insufficient.
    fragment: with_rate_limit_handling
    action: "/ll:wire-issue ${captured.input.output} --auto"
    action_type: slash_command
    next: run_refine
    on_error: run_refine
    on_rate_limit_exhausted: done

  run_refine:
    # Run /ll:refine-issue to fill in missing codebase context when wiring alone
    # is insufficient. on_error falls through to rerun_confidence_after_wire safely.
    # ENH-2247 (mirrors rn-remediate refine_followup): this is a post-wire repair
    # pass — run_wire just edited the issue's integration points, so use additive
    # --gap-analysis (never removes content, does not consume refine budget) rather
    # than the destructive --full-rewrite, which could bulldoze the wiring changes
    # this branch exists to apply.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${captured.input.output} --auto --gap-analysis"
    action_type: slash_command
    next: rerun_confidence_after_wire
    on_error: rerun_confidence_after_wire
    on_rate_limit_exhausted: done

  rerun_confidence_after_wire:
    # After run_wire → run_refine repairs a wiring gap, frontmatter scores still hold
    # pre-repair values. Re-run confidence-check so enqueue_or_skip /
    # recheck_after_size_review evaluate fresh scores — mirrors
    # rerun_confidence_after_decide (BUG-1491).
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${captured.input.output}"
    action_type: slash_command
    next: enqueue_or_skip
    on_error: enqueue_or_skip
    on_rate_limit_exhausted: done

  implement_current:
    # Interleaved implementation: as soon as a leaf passes refinement, run
    # ll-auto --only against it. Exit 0 (on_yes) → dequeue_next for next
    # queued issue. Exit non-zero → check_impl_auth to detect auth failures
    # before deciding whether to drain the queue or abort.
    fragment: shell_exit
    capture: ll_auto_output
    action: |
      # BUG-1870: re-queue any stale inflight issue left by a prior context handoff.
      # On resume, init is bypassed so autodev-inflight may hold an issue that was
      # dequeued-but-not-yet-implemented when the previous session was interrupted.
      # The $INFLIGHT != $CURRENT guard makes this a no-op on normal (non-resumed) runs.
      INFLIGHT=$(cat "${context.run_dir}/autodev-inflight" 2>/dev/null | tr -d '[:space:]')
      CURRENT="${captured.input.output}"
      if [ -n "$INFLIGHT" ] && [ "$INFLIGHT" != "$CURRENT" ]; then
        INFLIGHT_FILE=$(ll-issues path "$INFLIGHT" 2>/dev/null)
        STATUS="open"
        if [ -n "$INFLIGHT_FILE" ]; then
          STATUS=$(grep '^status:' "$INFLIGHT_FILE" | awk '{print $2}' | tr -d "'\"" 2>/dev/null || echo "open")
        fi
        if [ "$STATUS" != "done" ] && [ "$STATUS" != "cancelled" ]; then
          { echo "$INFLIGHT"; cat "${context.run_dir}/autodev-queue.txt" 2>/dev/null; } \
            > "${context.run_dir}/autodev-queue.tmp" \
            && mv "${context.run_dir}/autodev-queue.tmp" "${context.run_dir}/autodev-queue.txt"
        fi
      fi
      # Learning-gate skip parity: append --skip-learning-gate when the caller set
      # the skip_learning_gate context (mirrors `ll-auto --skip-learning-gate`).
      SKIP_FLAG=""
      if [ -n "${context.skip_learning_gate}" ]; then
        SKIP_FLAG="--skip-learning-gate"
      fi
      ll-auto --only "$CURRENT" $SKIP_FLAG
    action_type: shell
    on_yes: dequeue_next
    on_no: check_learning_gate
    on_error: check_learning_gate

  check_learning_gate:
    # Learning-gate consistency: a gate block (ENH-2319, marker LEARNING_GATE_BLOCKED
    # printed by process_issue_inplace) exits 1 from `ll-auto --only`, which would
    # otherwise be laundered into a generic implementation failure / auth check.
    # Detect it FIRST and record it distinctly so the run summary can tell a
    # gate block (remedy: /ll:explore-api) from a real failure. on_no falls through
    # to the auth check (mirrors rn-remediate's ordering for cross-loop parity).
    fragment: ll_auto_learning_gate_check
    on_yes: mark_gate_blocked
    on_no: check_impl_auth

  mark_gate_blocked:
    # Record the gate-blocked issue distinctly and advance the queue. The issue is
    # left in place (not skipped-as-failed) so it re-surfaces once its external-API
    # deps are proven via /ll:explore-api. Clears the inflight sentinel so `done`
    # does not warn about it.
    action: |
      echo "${captured.input.output}" >> ${context.run_dir}/autodev-gate-blocked.txt
      rm -f ${context.run_dir}/autodev-inflight
      echo "[LEARNING_GATE_BLOCKED] ${captured.input.output} — unproven external-API deps; prove with /ll:explore-api then re-run"
    action_type: shell
    next: dequeue_next
    on_error: dequeue_next

  check_impl_auth:
    # ENH-2353: gate between ll-auto failure and queue drain. Auth failures abort
    # the queue (abort_env_not_ready); genuine implementation failures continue
    # draining (dequeue_next) so other issues still get a chance.
    fragment: ll_auto_auth_check
    on_yes: abort_env_not_ready
    on_no: dequeue_next

  abort_env_not_ready:
    # ENH-2353: abort the autodev queue on auth misconfiguration.
    action_type: shell
    action: |
      echo "Aborting: host auth not configured — set the host credential or run the host login, then re-run"
    next: done

  detect_children:
    # Diff current issue IDs against the pre-refinement baseline to find any
    # child issues created during the sub-loop (e.g., via its breakdown_issue
    # state). Writes discovered child IDs to a temp file for use by
    # enqueue_children. Exits 0 (→ enqueue_children) if children found;
    # exits 1 (→ size_review_snap) if none were found.
    action: |
      ll-issues list --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " | sort > ${context.run_dir}/autodev-post-ids.txt

      comm -13 ${context.run_dir}/autodev-pre-ids.txt \
               ${context.run_dir}/autodev-post-ids.txt \
               > ${context.run_dir}/autodev-diff-ids.txt

      PARENT_ID="${captured.input.output}"
      while IFS= read -r child_id; do
        child_file=$(ll-issues path "$child_id" 2>/dev/null)
        if [ -n "$child_file" ] && grep -q "Decomposed from $PARENT_ID" "$child_file"; then
          echo "$child_id"
        fi
      done < ${context.run_dir}/autodev-diff-ids.txt \
        > ${context.run_dir}/autodev-new-children.txt

      if [ -s ${context.run_dir}/autodev-new-children.txt ]; then
        cat ${context.run_dir}/autodev-new-children.txt
        exit 0
      else
        exit 1
      fi
    fragment: shell_exit
    on_yes: enqueue_children
    on_no: size_review_snap
    on_error: size_review_snap

  enqueue_children:
    # Prepend newly-detected child issues to the front of the unified queue
    # (depth-first), so children are refined AND implemented before the next
    # sibling in the original list. Records the parent as skipped (it was
    # decomposed, not refined to ready) and moves the parent file to
    # .issues/completed/ to mirror recursive-refine's cleanup discipline.
    # ENH-2404: two-space-delimited "ID  REASON" — decomposed is a success
    # outcome, distinct from a refinement/readiness failure.
    action: |
      CHILDREN=$(cat ${context.run_dir}/autodev-new-children.txt)
      EXISTING=$(cat ${context.run_dir}/autodev-queue.txt 2>/dev/null || true)
      { echo "$CHILDREN"; echo "$EXISTING"; } \
        | grep -v '^[[:space:]]*$' \
        > ${context.run_dir}/autodev-queue.txt
      echo "${captured.input.output}  decomposed" >> ${context.run_dir}/autodev-skipped.txt
      PARENT_FILE=$(ll-issues path "${captured.input.output}" 2>/dev/null)
      if [ -n "$PARENT_FILE" ]; then
        mkdir -p .issues/completed
        git mv "$PARENT_FILE" .issues/completed/ 2>/dev/null \
          || mv "$PARENT_FILE" .issues/completed/
      fi
      CHILD_COUNT=$(wc -l < ${context.run_dir}/autodev-new-children.txt | tr -d ' ')
      echo "Parent ${captured.input.output} decomposed; enqueued $CHILD_COUNT child issue(s)"
      # BUG-1226: parent is resolved (decomposed); clear the in-flight flag
      # so `done` does not warn about it.
      rm -f ${context.run_dir}/autodev-inflight
    action_type: shell
    next: dequeue_next
    on_error: dequeue_next

  size_review_snap:
    # Update pre-ids to the current state (captured in detect_children's
    # post-ids) so the enqueue_or_skip diff reflects only what the explicit
    # size-review creates, not children already created by the sub-loop.
    action: |
      if [ -f ${context.run_dir}/autodev-post-ids.txt ]; then
        cp ${context.run_dir}/autodev-post-ids.txt \
           ${context.run_dir}/autodev-pre-ids.txt
      fi
    action_type: shell
    next: check_broke_down
    on_error: check_broke_down

  check_broke_down:
    # Guard: shortcut to enqueue_or_skip ONLY when breakdown_issue ran inside
    # the sub-loop AND it actually produced child issues (detected and written
    # to autodev-new-children.txt by detect_children). If the flag is set but
    # no children exist (BUG-1183: /ll:issue-size-review --auto returned only
    # analysis, no files), fall through to recheck_scores → run_size_review so
    # the outer loop gets its own chance to decompose. This preserves the
    # BUG-1079 "no double size-review" invariant because flag=1 AND children
    # exist still shortcuts past run_size_review.
    action: |
      FLAG=$(cat ${context.run_dir}/autodev-broke-down 2>/dev/null || echo 0)
      if [ "$FLAG" = "1" ] && [ -s ${context.run_dir}/autodev-new-children.txt ]; then
        echo 1
      else
        echo 0
      fi
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: recheck_scores    # 0 → flag unset OR no children → proceed normally
    on_no: enqueue_or_skip    # 1 → flag set AND children exist → skip
    on_error: recheck_scores

  recheck_scores:
    # Gate before size-review: if the issue already meets thresholds, skip
    # size-review. Scores can pass even when the sub-loop failed/errored (e.g.,
    # max-iterations hit while the issue was already ready). Mirrors
    # check_passed logic exactly; on pass, interleave implementation.
    action: |
      ll-issues check-readiness ${captured.input.output} \
        --readiness ${context.readiness_threshold} \
        --outcome ${context.outcome_threshold} \
        && echo "${captured.input.output}" >> ${context.run_dir}/autodev-passed.txt
    fragment: shell_exit
    on_yes: decide_current
    on_no: check_decision_before_size_review
    on_error: check_decision_before_size_review

  check_decision_before_size_review:
    # Defense-in-depth for the pre-size-review path. Reachable only from
    # recheck_scores.on_no / recheck_scores.on_error (autodev.yaml:557-558)
    # when decision_needed was added during refine (e.g., a future decide
    # hook). The upstream check_decision_at_dequeue (BUG-2513) catches
    # every pre-refine decision_needed:true issue. Mirrors the
    # check_decision_after_refine defense-in-depth precedent. Originally
    # added by BUG-1277; on_error closes the latent dead-end BUG-2519.
    action: "ll-issues check-flag ${captured.input.output} decision_needed"
    fragment: shell_exit
    on_yes: run_decide
    on_no: run_size_review
    on_error: run_size_review

  triage_outcome_failure:
    # Diagnose why outcome_confidence failed before routing to size-review.
    # decision_needed=true (authoritative flag) OR low score_ambiguity (≤10,
    # proxy) routes to run_decide. Otherwise → check_missing_artifacts to test
    # for absent files/wiring gaps before falling through to size-review.
    # on_error falls back to detect_children safely.
    action: |
      ll-issues show ${captured.input.output} --json | python3 -c "
      import json, sys
      d = json.load(sys.stdin)
      sys.exit(0 if (int(d.get('score_ambiguity') or 25) <= 10 or d.get('decision_needed') == 'true') else 1)"
    fragment: shell_exit
    on_yes: run_decide
    on_no: check_missing_artifacts
    on_error: detect_children

  check_missing_artifacts:
    # Gate before size-review: if missing_artifacts=true, route to run_wire so
    # absent files and unwired components are resolved before decomposition is
    # attempted. Mirrors check_decision_before_size_review logic; on_no falls
    # through to detect_children (size-review path).
    action: "ll-issues check-flag ${captured.input.output} missing_artifacts"
    fragment: shell_exit
    on_yes: run_wire
    on_no: detect_children

  run_size_review:
    # Explicitly run issue-size-review when the sub-loop did not decompose the
    # issue. If this creates child issues, enqueue_or_skip will detect and
    # enqueue them. on_rate_limit_exhausted skips this issue and moves to the
    # next queued one rather than masquerading as a clean "no decomposition"
    # outcome (which enqueue_or_skip would otherwise report).
    fragment: with_rate_limit_handling
    action: "/ll:issue-size-review ${captured.input.output} --auto"
    action_type: slash_command
    next: enqueue_or_skip
    on_error: enqueue_or_skip
    on_rate_limit_exhausted: dequeue_next

  enqueue_or_skip:
    # After explicit size-review: diff IDs against the pre-size-review
    # baseline. If children found: prepend to queue depth-first; mark parent
    # as skipped; move parent to .issues/completed/. If none: route to
    # recheck_after_size_review so a score check can decide whether to
    # implement or skip (BUG-1230).
    # ENH-2404: two-space-delimited "ID  REASON" — decomposed is a success
    # outcome, distinct from a refinement/readiness failure.
    action: |
      ll-issues list --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " | sort > ${context.run_dir}/autodev-post-ids.txt

      comm -13 ${context.run_dir}/autodev-pre-ids.txt \
               ${context.run_dir}/autodev-post-ids.txt \
               > ${context.run_dir}/autodev-diff-ids.txt

      PARENT_ID="${captured.input.output}"
      while IFS= read -r child_id; do
        child_file=$(ll-issues path "$child_id" 2>/dev/null)
        if [ -n "$child_file" ] && grep -q "Decomposed from $PARENT_ID" "$child_file"; then
          echo "$child_id"
        fi
      done < ${context.run_dir}/autodev-diff-ids.txt \
        > ${context.run_dir}/autodev-new-children.txt

      if [ -s ${context.run_dir}/autodev-new-children.txt ]; then
        CHILDREN=$(cat ${context.run_dir}/autodev-new-children.txt)
        EXISTING=$(cat ${context.run_dir}/autodev-queue.txt 2>/dev/null || true)
        { echo "$CHILDREN"; echo "$EXISTING"; } \
          | grep -v '^[[:space:]]*$' \
          > ${context.run_dir}/autodev-queue.txt
        echo "${captured.input.output}  decomposed" >> ${context.run_dir}/autodev-skipped.txt
        PARENT_FILE=$(ll-issues path "${captured.input.output}" 2>/dev/null)
        if [ -n "$PARENT_FILE" ]; then
          mkdir -p .issues/completed
          git mv "$PARENT_FILE" .issues/completed/ 2>/dev/null \
            || mv "$PARENT_FILE" .issues/completed/
        fi
        CHILD_COUNT=$(wc -l < ${context.run_dir}/autodev-new-children.txt | tr -d ' ')
        echo "Parent ${captured.input.output} decomposed by size-review; enqueued $CHILD_COUNT child issue(s)"
        # BUG-1226: parent resolved by decomposition; clear in-flight flag.
        rm -f ${context.run_dir}/autodev-inflight
        exit 0
      else
        # No children: let recheck_after_size_review decide whether to implement or skip.
        exit 1
      fi
    fragment: shell_exit
    on_yes: dequeue_next
    on_no: recheck_after_size_review
    on_error: dequeue_next

  recheck_after_size_review:
    # BUG-1230: size-review declined to decompose the issue (leaf-sized or
    # effort genuinely small). Perform a final score check before deciding to
    # skip. Mirrors recheck_scores exactly; on pass routes to implement_current
    # so ready leaf issues are not silently dropped.
    # ENH-2404: two-space-delimited "ID  REASON" on the skip path — the
    # issue stayed below threshold after size-review declined to split it.
    action: |
      if ll-issues check-readiness ${captured.input.output} \
          --readiness ${context.readiness_threshold} \
          --outcome ${context.outcome_threshold}; then
        echo "${captured.input.output}" >> ${context.run_dir}/autodev-passed.txt
      else
        echo "${captured.input.output}  low_readiness" >> ${context.run_dir}/autodev-skipped.txt
        rm -f ${context.run_dir}/autodev-inflight
        exit 1
      fi
    fragment: shell_exit
    on_yes: decide_current
    on_no: dequeue_next
    on_error: dequeue_next

  done:
    # Emit a structured summary of passed and skipped issues for this run.
    # BUG-1226: also surface any still-in-flight issue recorded by dequeue_next,
    # so if the loop reaches `done` with a stale autodev-inflight (e.g. the
    # executor flushed copy_broke_down but the wall-clock timeout fired before
    # resolution completed), the user knows which issue needs re-queueing.
    action: |
      PASSED_IDS=$(cat ${context.run_dir}/autodev-passed.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      SKIPPED_IDS=$(cat ${context.run_dir}/autodev-skipped.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)
      GATE_BLOCKED_IDS=$(cat ${context.run_dir}/autodev-gate-blocked.txt 2>/dev/null \
        | grep -v '^[[:space:]]*$' | sort -u || true)

      PASSED_COUNT=$(echo "$PASSED_IDS" | grep -c '[^[:space:]]' || echo 0)
      SKIPPED_COUNT=$(echo "$SKIPPED_IDS" | grep -c '[^[:space:]]' || echo 0)
      GATE_BLOCKED_COUNT=$(echo "$GATE_BLOCKED_IDS" | grep -c '[^[:space:]]' || echo 0)

      PASSED_LIST=$(echo "$PASSED_IDS" | tr '\n' ',' | sed 's/,$//')
      SKIPPED_LIST=$(echo "$SKIPPED_IDS" | tr '\n' ',' | sed 's/,$//')
      GATE_BLOCKED_LIST=$(echo "$GATE_BLOCKED_IDS" | tr '\n' ',' | sed 's/,$//')

      INFLIGHT=$(cat ${context.run_dir}/autodev-inflight 2>/dev/null | tr -d '[:space:]' || true)

      printf '\n=== Autodev Summary ===\n\n'
      printf 'Passed       (%d): %s\n' "$PASSED_COUNT" "$${PASSED_LIST:-none}"
      printf 'Skipped      (%d): %s\n' "$SKIPPED_COUNT" "$${SKIPPED_LIST:-none}"
      if [ "$GATE_BLOCKED_COUNT" -gt 0 ]; then
        printf 'Gate-blocked (%d): %s  (prove deps with /ll:explore-api, then re-run)\n' "$GATE_BLOCKED_COUNT" "$GATE_BLOCKED_LIST"
      fi
      if [ -n "$INFLIGHT" ]; then
        printf 'WARNING: in-flight issue not resolved: %s (re-queue to retry)\n' "$INFLIGHT"
      fi
      printf '\n'
    action_type: shell
    terminal: true
