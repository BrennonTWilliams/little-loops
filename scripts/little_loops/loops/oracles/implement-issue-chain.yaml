name: implement-issue-chain
visibility: internal
description: |
  Oracle sub-loop that drains a recursive-refine passed-issues queue: reads
  recursive-refine-passed.txt, populates a caller-prefixed impl-queue, pops
  each issue, gates it through go-no-go, and runs ll-auto --only. Used by
  auto-refine-and-implement and sprint-refine-and-implement (ENH-1874).

initial: get_passed_issues
on_handoff: spawn

parameters:
  caller_prefix:
    type: string
    required: true
    description: "Prefix for queue/skip files, e.g. 'auto-refine-and-implement'"

import:
  - lib/common.yaml

states:
  get_passed_issues:
    action: |
      SKIP_FILE="${context.run_dir}/${context.caller_prefix}-skipped.txt"
      PROCESSED_FILE="${context.run_dir}/${context.caller_prefix}-processed.txt"
      IMPL_QUEUE="${context.run_dir}/${context.caller_prefix}-impl-queue.txt"

      # Genuine refinement-skips are recorded as skips: they count toward the
      # verdict's SKIP total AND dedup the caller's get_next_issue.
      if [ -s ${context.run_dir}/recursive-refine-skipped.txt ]; then
        grep -v '^[[:space:]]*$' ${context.run_dir}/recursive-refine-skipped.txt >> "$SKIP_FILE"
      fi

      PASSED=""
      if [ -s ${context.run_dir}/recursive-refine-passed.txt ]; then
        PASSED=$(grep -v '^[[:space:]]*$' ${context.run_dir}/recursive-refine-passed.txt)
      fi

      if [ -n "$PASSED" ]; then
        # BUG-2374: passed issues proceed to implementation. Record them in the
        # dedup-ONLY processed file (consulted by get_next_issue) so they are not
        # re-selected, WITHOUT polluting the skipped verdict counter that
        # auto-refine-and-implement.finalize reads. Writing them to SKIP_FILE
        # forced verdict=partial on every otherwise-successful run.
        echo "$PASSED" >> "$PROCESSED_FILE"
        echo "$PASSED" > "$IMPL_QUEUE"
        exit 0
      else
        printf '' > "$IMPL_QUEUE"
        exit 1
      fi
    fragment: shell_exit
    on_yes: implement_next
    on_no: done
    on_error: done

  implement_next:
    action: |
      IMPL_QUEUE="${context.run_dir}/${context.caller_prefix}-impl-queue.txt"
      if [ ! -s "$IMPL_QUEUE" ]; then
        exit 1
      fi
      CURRENT=$(head -1 "$IMPL_QUEUE")
      tail -n +2 "$IMPL_QUEUE" > "$IMPL_QUEUE.tmp"
      mv "$IMPL_QUEUE.tmp" "$IMPL_QUEUE"
      echo "$CURRENT"
    fragment: shell_exit
    capture: impl_id
    on_yes: go_no_go
    on_no: done
    on_error: done

  go_no_go:
    fragment: shell_exit
    action: "ll-action invoke go-no-go --args \"${captured.impl_id.output} --check --auto\""
    on_yes: implement_issue
    on_no: record_rejected
    on_error: implement_issue

  record_rejected:
    # ENH-2385: a passed issue that go-no-go rejects must NOT vanish silently
    # (the previous on_no: implement_next dropped it with no record). Record it to
    # the caller's skip ledger (parked-with-reason) so it is deduped by
    # get_next_issue and counted in the verdict, then drain the rest of the queue.
    action: |
      echo "go-no-go rejected ${captured.impl_id.output} — recording as skipped"
      echo "${captured.impl_id.output}" >> ${context.run_dir}/${context.caller_prefix}-skipped.txt
      echo "${captured.impl_id.output}" >> ${context.run_dir}/${context.caller_prefix}-skipped-gonogo.txt
    action_type: shell
    next: implement_next

  implement_issue:
    fragment: with_rate_limit_handling
    action: |
      ISSUE="${captured.impl_id.output}"
      # ENH-2385: the implemented ledger means VERIFIED CLOSED — the issue file
      # actually reached .issues/completed/. ll-auto exit 0 is NOT proof of
      # closure (it can exit 0 with a plan awaiting approval, or refuse to mark
      # complete), so verify completed/ membership AFTER ll-auto. The parent's
      # finalize uses a completed/ ground-truth diff for the authoritative count;
      # this ledger is the per-issue closure signal.
      #
      # The action re-exits with ll-auto's real exit code: the
      # with_rate_limit_handling fragment's 429 detection requires exit_code != 0
      # (executor.py), so swallowing it (e.g. `if ll-auto; then`) would silently
      # disable multi-hour rate-limit resilience on the implement step.
      IMPL_LEDGER="${context.run_dir}/${context.caller_prefix}-implemented.txt"
      if ls .issues/completed/*$${ISSUE}* 2>/dev/null | grep -q .; then
        echo "Issue $${ISSUE} already completed, skipping ll-auto"
        echo "$${ISSUE}" >> "$${IMPL_LEDGER}"
        exit 0
      fi
      ll-auto --only $${ISSUE}
      RC=$?
      if ls .issues/completed/*$${ISSUE}* 2>/dev/null | grep -q .; then
        echo "Closed $${ISSUE}"
        echo "$${ISSUE}" >> "$${IMPL_LEDGER}"
      else
        echo "WARN: ll-auto ran on $${ISSUE} but it did not reach completed/"
      fi
      exit $${RC}
    action_type: shell
    on_rate_limit_exhausted: done
    next: implement_next

  done:
    terminal: true
