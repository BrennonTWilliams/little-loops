name: generator-evaluator
visibility: internal
description: |
  Oracle sub-loop for iterative artifact generation with visual evaluation. Loops
  generate → evaluate (Playwright screenshot) → snapshot (per-iteration artifact
  versioning) → score (LLM rubric) until ALL_PASS or max_iterations. Returns done
  on success; parent routes on_yes to its next state.
  Used by html-website-generator, html-anything, hitl-md, p5js-sketch-generator, and
  svg-image-generator thin wrappers (ENH-1869).

initial: generate
on_handoff: spawn
timeout: 7200
max_steps: 20
artifact_versioning: true

parameters:
  run_dir:
    type: string
    required: true
    description: Directory path for generated artifacts (relative runner-injected path or absolute path)
  generate_prompt:
    type: string
    required: true
    description: Full prompt to use in the generate state LLM call including where to write output
  rubric:
    type: string
    required: false
    description: Rubric criteria for scoring the generated artifact as markdown text
  pass_threshold:
    type: number
    required: false
    description: Minimum rubric score threshold to accept (default 6)
  artifact_path:
    type: string
    required: false
    description: Artifact filename relative to run_dir for screenshot capture (default index.html)

import:
  - lib/harness.yaml
  - lib/common.yaml

context:
  pass_threshold: 6
  rubric: ""
  artifact_path: "index.html"

states:
  generate:
    action_type: prompt
    action: |
      ${context.generate_prompt}
    # Generation hands off UNCONDITIONALLY to evaluate. The real quality gate is
    # the downstream evaluate (Playwright screenshot) → score (rubric) cycle,
    # which judges the rendered artifact. Routing only on_yes here would gate
    # generation on the default LLM judge's read of the agent's *narration*:
    # a later pass that describes its fixes ("here's what I changed") instead of
    # asserting them earns a `partial`/`no` verdict, which has no route → the
    # sub-loop dead-ends and the parent treats it as `failed`. Mapping yes/no/
    # partial all to evaluate removes that nondeterministic dead-end while
    # keeping on_error: failed for genuine action crashes. See ENH-1907 / the
    # site-generator-20260603T191934 failure.
    on_yes: evaluate
    on_no: evaluate
    on_partial: evaluate
    on_error: failed

  evaluate:
    fragment: playwright_screenshot
    action: |
      case "${context.run_dir}" in
        /*) ABS_DIR="${context.run_dir}" ;;
        *) ABS_DIR="$(pwd)/${context.run_dir}" ;;
      esac
      playwright screenshot --full-page "file://$${ABS_DIR}/${context.artifact_path}" "$${ABS_DIR}/screenshot.png" 2>&1 && echo "CAPTURED"
    on_yes: snapshot
    on_no: snapshot
    on_error: snapshot

  snapshot:
    description: |
      Per-iteration artifact versioning — copies the current artifact and screenshot
      into an iter-N/ subdirectory within the run directory. Iteration counter is
      tracked via .iter_counter file. Runs unconditionally (next: score).
    action_type: shell
    action: |
      RUN_DIR="${context.run_dir}"
      COUNTER=$(cat "$RUN_DIR/.iter_counter" 2>/dev/null || echo 0)
      COUNTER=$((COUNTER + 1))
      echo "$COUNTER" > "$RUN_DIR/.iter_counter"
      mkdir -p "$RUN_DIR/iter-$COUNTER"
      cp "$RUN_DIR/${context.artifact_path}" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true
      cp "$RUN_DIR/screenshot.png" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true
    next: score

  score:
    # Scoped numeric-scoring override (ENH-2428, Option B): keeps the shared
    # ll_rubric_score fragment's binary ALL_PASS/NEEDS_WORK evaluator (via
    # output_contains) but overrides the prompt to ALSO emit a numeric per-round
    # aggregate on the final line (SCORE: <0-10>) and captures the output so the
    # downstream record_score state can persist it to the per-run score history.
    # This mirrors the rubric_score/rubric_parse_scores capture/parse pattern in
    # lib/rubric-router.yaml as a LOCAL override here — NOT by editing the
    # shared lib/harness.yaml ll_rubric_score fragment (which stays test-locked
    # for its 6 other consumers). Precedent: the local evaluate: override in
    # generator-evaluator-cli.yaml.
    fragment: ll_rubric_score
    with:
      run_dir: "${context.run_dir}"
      rubric: "${context.rubric}"
      pass_threshold: "${context.pass_threshold}"
    action: |
      Review the generated artifact in ${param.run_dir} against the rubric below.

      ${param.rubric}

      Pass threshold: ${param.pass_threshold}/10 per criterion.
      Score EACH criterion on a 0-10 scale. If every criterion meets or exceeds
      the threshold, output ALL_PASS on its own line. Otherwise output NEEDS_WORK
      and describe the specific improvements required.

      On the FINAL line, output the mean of your per-criterion scores as a single
      number in the form: SCORE: <number 0-10>
    capture: score_output
    on_yes: done
    on_no: record_score
    on_error: generate

  record_score:
    # HARNESS (ENH-2428): parse the mean rubric SCORE emitted by the score state
    # and append it to the per-run .score_history file (one score per line) so
    # the score_stall evaluator can detect a scored-output plateau. Per-run
    # isolation (MR-3): writes under ${context.run_dir}/, never bare .loops/tmp/.
    # Runs unconditionally (next: check_stall).
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import re
      output = """${captured.score_output.output}"""
      m = re.search(r'SCORE:\s*([0-9]+(?:\.[0-9]+)?)', output)
      score = m.group(1) if m else "0"
      with open("${context.run_dir}/.score_history", "a") as f:
          f.write(score + "\n")
      print(f"recorded score={score}")
      PYEOF
    next: check_stall

  check_stall:
    # HARNESS (ENH-2428): score-plateau guard (primary stall axis). If the rubric
    # score has not improved by more than epsilon for max_stall consecutive refine
    # cycles, the plateau is detected early and the loop routes to done (accept
    # best-so-far) rather than burning the remaining iteration budget. This
    # replaces byte-diff as the primary signal because index.html can keep growing
    # byte-for-byte while the visible/scored output plateaus (the
    # html-website-generator-20260701T105614 failure mode). diff_stall is retained
    # as a cheap secondary/OR condition (check_diff_stall). on_yes = score still
    # improving → fall through to the diff-stall check; on_no = plateaued → done.
    # on_error = no/short history yet → keep going (route to diff-stall check).
    fragment: score_stall_gate
    action: echo "score stall check"
    action_type: shell
    evaluate:
      max_stall: 2
    on_yes: check_diff_stall
    on_no: done
    on_error: check_diff_stall

  check_diff_stall:
    # HARNESS: Secondary diff-stall guard (OR condition, per ENH-2428 Scope
    # Boundaries — diff_stall is retained, not removed). If the model has produced
    # no file changes for max_stall consecutive refine cycles, route to done.
    # on_yes = new changes observed → continue generating; on_no = byte plateau →
    # done. on_error = git unavailable → don't block the loop, continue generating.
    fragment: diff_stall_gate
    action: echo "diff stall check"
    action_type: shell
    evaluate:
      max_stall: 3
    on_yes: generate
    on_no: done
    on_error: generate

  done:
    terminal: true

  failed:
    terminal: true
