name: generative-art
category: harness
input_key: description
required_inputs: ["description"]
# The sketch file is the single deliverable; latest-wins overwrite is intentional.
artifact_versioning_ok: true
description: |
  Generator-evaluator harness for creative coding generative art sketches.
  Accepts a natural language sketch description via loop_input and iteratively
  generates and refines a single self-contained HTML file embedding a generative
  art sketch (p5.js by default; pixi-generative-art overrides framework-specific
  states for PixiJS). Unlike the html-website-generator, the evaluator captures
  multiple frames at deterministic frameCounts so motion itself can be judged.
  Implements the GAN-style architecture from Anthropic's harness design article.
  Use ll-loop run generative-art, or the named variants p5js-sketch-generator /
  pixi-generative-art which inherit this loop and override framework-specific states.
initial: init
max_steps: 20
on_handoff: spawn
timeout: 7200

# HARNESS: Context variables control quality threshold and frame sampling.
context:
  description: ""             # populated from loop_input via input_key: description
  framework: p5js             # generative framework; pixi-generative-art overrides to pixi
  pass_threshold: 6           # minimum score per criterion (1-10) to pass
  sample_frames: "0,90,240"   # comma-separated frameCounts to screenshot
  design_tokens_context: ""   # runner-injected; resolved semantic token values or empty

import:
  - lib/common.yaml

states:

  init:
    # HARNESS: Setup phase — captures the runner-injected run_dir as an absolute path
    # so all subsequent states write to the same isolated per-run directory.
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: plan

  plan:
    # HARNESS: Planner phase — expands the one-line description into a sketch brief.
    # This mirrors the "generator receives a spec" role from the harness design article.
    # The brief captures the generative concept, palette, and motion behavior so the
    # generator has strong direction on the first iteration. Motion behavior is the
    # discriminator from the HTML/SVG variants: a sketch must be designed to evolve.
    action_type: prompt
    action: |
      Write a sketch brief to ${captured.run_dir.output}/brief.md for the following p5.js sketch:
      "${context.description}"

      The brief must include:
      - **Generative concept**: the specific rule or system being explored — flow field,
        recursive subdivision, agent-based simulation, signed-distance composition,
        cellular automaton, particle accumulation, etc. Name the mechanism precisely;
        the more specific the rule, the more identity the sketch has.
      - **Visual palette**: 3–6 hex colors, background color, stroke weights, blend modes
        (additive, multiply, screen, etc.). Be specific.
      - **Motion behavior**: how the sketch evolves frame-to-frame. What does frame 0
        look like vs frame 90 vs frame 240? Does it accumulate, decay, loop, drift,
        bloom, collapse? Motion is the discriminator — a static composition is failure.
      - **Unique creative angle**: what makes this sketch distinctive? Avoid clichés.
      - **Anti-patterns to avoid**: vanilla Perlin flow fields with rainbow HSL cycling,
        default-example bouncing shapes, unmodified Daniel-Shiffman-tutorial output,
        tiny canvases on white backgrounds, frame-by-frame jitter that simulates motion
        without actual evolution

      Be specific and opinionated. The generator will use this brief as its primary reference.
    next: generate

  generate:
    # HARNESS: Generator phase — creates or refines a single self-contained HTML file
    # that embeds a p5.js sketch. On the first pass it uses only the brief; on
    # subsequent iterations it also addresses the evaluator's critique.
    #
    # Two p5-specific rules differ from the HTML harness:
    # 1. p5.js itself is loaded from CDN. Inlining ~800KB of minified library text
    #    is impractical; everything ELSE (the sketch, any helpers, all CSS) stays
    #    inline so the file renders correctly under file://.
    # 2. Deterministic seeding is required (randomSeed/noiseSeed in setup, all
    #    animation driven by frameCount). Without this, screenshots taken at
    #    "frame 90" would differ run-to-run and the critique would chase noise.
    action_type: prompt
    action: |
      Read ${captured.run_dir.output}/brief.md for the sketch brief.

      A previous iteration may have written ${captured.run_dir.output}/critique.md. If
      that file exists, read it and address every issue in its "Issues to Address"
      section specifically and completely. If it does not exist, proceed silently —
      do not narrate the check.

      ${context.design_tokens_context}

      Write a single self-contained HTML file to ${captured.run_dir.output}/index.html that:
      - Loads p5.js via CDN in the <head>:
          <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
        (This is the only external resource permitted. All other code stays inline.)
      - Embeds the entire sketch in an inline <script> block in the <body> — no
        external sketch.js. Use p5.js GLOBAL MODE (top-level `function setup()` and
        `function draw()`, not instance mode), so `frameCount` is exposed on
        `window.frameCount` for the screenshot harness to poll.
      - Calls `createCanvas(1200, 800)` (or larger) inside `setup()` — desktop-sized,
        not the p5.js default 100×100.
      - Calls `randomSeed(SEED)` and `noiseSeed(SEED)` ONCE in `setup()` with a
        constant integer seed. Drive all motion from `frameCount`, never from
        `Date.now()` or un-seeded `random()` calls inside `draw()`. The screenshot
        harness calls `noLoop()` before each `page.screenshot()` and `loop()`
        after, pinning the capture to the exact frame. Both functions are p5.js
        globals exposed by global-mode sketches — do not override or shadow them.
      - Implements the generative concept from the brief — no canned p5 examples,
        no unmodified flow-field tutorial code.
      - If design tokens are provided above, use their semantic names and resolved
        values for the palette; do not invent new color values outside the token palette.
      - Achieves a distinctive, museum-quality aesthetic — avoid AI-slop patterns
        (vanilla Perlin gradients, rainbow HSL cycling for its own sake, default
        bouncing shapes, anything that looks like a screenshot of a tutorial).
      - If critique exists, resolves every specific issue before introducing new ideas.
    next: evaluate

  evaluate:
    # HARNESS: Multi-frame screenshot gate. Unlike a static page, an animated sketch
    # needs more than one frame for the evaluator to judge motion. We loop over the
    # frame indices in context.sample_frames, using Playwright's JS API
    # `page.waitForFunction` once per frame so each PNG corresponds to a known
    # frameCount. (The `playwright screenshot` CLI lacks --wait-for-function, so we
    # invoke the JS API directly via `node -e`.) Deterministic seeding in the
    # generate state is what makes this reproducible across iterations.
    #
    # NODE_PATH points node at the global npm modules so `require('@playwright/test')`
    # resolves without a local install.
    #
    # Routes match html-website-generator: on_yes → score, on_no → generate (retry
    # transient render issues with fresh HTML), on_error → failed (missing/broken
    # Playwright bails cleanly instead of spinning until max_iterations).
    action_type: shell
    action: |
      NODE_PATH="$(npm root -g)" node -e "
      const { chromium } = require('@playwright/test');
      const frames = '${context.sample_frames}'.split(',').map(s => s.trim());
      const url = 'file://${captured.run_dir.output}/index.html';
      (async () => {
        const browser = await chromium.launch();
        const page = await browser.newPage({ viewport: { width: 1280, height: 900 } });
        await page.goto(url);
        for (const f of frames) {
          await page.waitForFunction(([n]) => window.frameCount >= Number(n), [f], { timeout: 30000 });
          await page.evaluate(() => noLoop());
          await page.screenshot({ path: '${captured.run_dir.output}/frame_' + f + '.png' });
          await page.evaluate(() => loop());
        }
        await browser.close();
        console.log('CAPTURED');
      })().catch(e => { console.error('SCREENSHOT_FAIL:', e.message); process.exit(1); });
      "
    evaluate:
      type: output_contains
      pattern: "CAPTURED"
    on_yes: score
    on_no: generate
    on_error: failed

  score:
    # HARNESS: Evaluator phase — LLM judges the captured frame strip against four
    # sketch-specific criteria and writes structured critique for the generator's
    # next iteration. The criteria diverge from html-website-generator: motion_quality
    # replaces functionality because the artifact is time-based, and visual_impact
    # replaces design_quality because sketches don't have layout to evaluate.
    # Uses output_contains: "ALL_PASS" for routing — simple and robust vs JSON parsing.
    # The PNGs produced by the evaluate state are read as multimodal image inputs.
    action_type: prompt
    action: |
      Read the frame strip captured by the evaluate state. The filenames correspond
      to the frameCounts in ${context.sample_frames}:
        ${captured.run_dir.output}/frame_0.png   — sketch at first draw
        ${captured.run_dir.output}/frame_90.png  — sketch ~1.5 seconds in
        ${captured.run_dir.output}/frame_240.png — sketch ~4 seconds in
      Also read ${captured.run_dir.output}/brief.md to recall the sketch intent and
      ${captured.run_dir.output}/index.html if you need to inspect the generative rule.

      Score the sketch on each criterion from 1 to 10 and write the evaluation to
      ${captured.run_dir.output}/critique.md using this exact format:

      ```
      # Evaluation

      visual_impact: N/10 — [explanation: composition, palette, density across the
        frames. Does the sketch hold the eye? Strong color and form combination
        creates a distinct mood. Penalize: muddy palettes, empty canvases, default
        p5 styling, anything that looks unfinished.]
      originality: N/10 — [explanation: evidence of a specific generative idea vs
        tutorial output? Best sketches are museum-quality. Penalize: vanilla Perlin
        flow fields, rainbow HSL cycling without purpose, default p5 examples,
        unmodified Shiffman-tutorial aesthetics, anything that could be the first
        Google result for "p5.js sketch".]
      motion_quality: N/10 — [explanation: does the sketch meaningfully EVOLVE
        between frame 0, frame 90, and frame 240? Static (same composition at all
        three) is failure. Jittery without direction is failure. Look for
        accumulation, decay, drift, growth, collapse — visible time-based change.
        If frames 0/90/240 look interchangeable, score ≤3.]
      craft: N/10 — [explanation: technical execution — blend modes, sub-pixel
        rendering, edge handling, color harmony, layer composition, stroke weights,
        intentional use of negative space.]

      ## Issues to Address
      [Specific, actionable critique for the generator. List each problem concisely
       so the generator can address it directly on the next pass. If all scores meet
       threshold, write "No issues — all criteria pass."]
      ```

      After writing the file, evaluate the scores:
      - visual_impact weight:   2× (threshold ${context.pass_threshold})
      - originality weight:     2× (threshold ${context.pass_threshold})
      - motion_quality weight:  1× (threshold ${context.pass_threshold})
      - craft weight:           1× (threshold ${context.pass_threshold})

      If ALL four individual scores are >= ${context.pass_threshold}, output exactly: ALL_PASS
      Otherwise output: ITERATE
    evaluate:
      type: output_contains
      pattern: "ALL_PASS"
    on_yes: done
    on_no: check_stall
    on_error: failed

  check_stall:
    # HARNESS: Diff-stall guard — if the model has produced no file changes for
    # max_stall consecutive refine cycles, the plateau is detected early and the
    # loop routes to done (accept best-so-far) rather than burning the remaining
    # iteration budget. on_yes = new changes observed; on_no = plateaued.
    # on_error = git unavailable — don't block the loop, continue generating.
    fragment: diff_stall_gate
    action: echo "stall check"
    action_type: shell
    evaluate:
      max_stall: 3
    on_yes: generate
    on_no: done
    on_error: generate

  done:
    # HARNESS: Success terminal — reached when all criteria pass or max_iterations
    # exhausted. The final sketch is at ${captured.run_dir.output}/index.html and
    # can be opened directly in a browser. The frame strip and critique remain in
    # the run dir for reference.
    action_type: prompt
    action: |
      The p5.js sketch generation loop has completed successfully.

      Final output files:
      - ${captured.run_dir.output}/index.html   — the generated sketch (open in a browser)
      - ${captured.run_dir.output}/brief.md     — the sketch planning brief
      - ${captured.run_dir.output}/critique.md  — the final evaluation scores and notes
      - ${captured.run_dir.output}/frame_*.png  — the last captured frame strip

      Report these paths to the user and confirm the sketch is ready.
    terminal: true

  failed:
    # HARNESS: Failure terminal — reached when the screenshot tool or LLM judge errors
    # out. Signals an explicit failure (vs. silent max_iterations exhaustion) so the
    # outer loop / log reader can distinguish "loop bailed cleanly" from "loop is still
    # iterating". The last artifacts (brief.md, any partial index.html, the last
    # critique.md if one was written, and any frame_*.png already captured) remain
    # in ${captured.run_dir.output} for inspection.
    terminal: true
