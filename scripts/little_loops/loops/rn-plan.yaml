name: rn-plan
category: planning
input_key: task
required_inputs: ["task"]
description: |
  Recursive planning loop with self-scoring rubric. Accepts a natural language
  task description, generates a structured plan and 8-dimension scoring rubric,
  then iteratively researches and refines the plan until all rubric dimensions
  reach VERY-HIGH or max_iterations is exhausted. Run as:
  ll-loop run rn-plan "your task description"
initial: init
max_steps: 50
timeout: 7200
import:
  - lib/common.yaml

context:
  task: ""           # populated from positional CLI arg via input_key: task
  # Externalized planning prompt — shared contract with rn-plan-apo, whose
  # apply_gradient state overwrites this file. Default must stay in sync with
  # rn-plan-apo.yaml's plan_prompt_file context entry (BUG-2417).
  plan_prompt_file: .ll/prompts/rn-plan-planning.md

states:

  init:
    # Setup phase — create per-run plan files in the runner-injected run_dir.
    # Captures the absolute path so all subsequent states can write to it.
    # Also seeds plan_prompt_file with the default planning guidance on first
    # run so rn-plan-apo's apply_gradient has a real file to optimize and
    # subsequent runs consume the optimized text (BUG-2417).
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      : > "$DIR/plan.md"
      : > "$DIR/plan-rubric.md"
      : > "$DIR/research.md"
      PROMPT_FILE="${context.plan_prompt_file}"
      if [ ! -f "$PROMPT_FILE" ]; then
        mkdir -p "$(dirname "$PROMPT_FILE")"
        cat > "$PROMPT_FILE" <<'PLANNING_PROMPT_EOF'
      # rn-plan Planning Guidance

      Follow this guidance when writing the initial plan outline:

      - State the goal and desired outcome explicitly.
      - Decompose the task into major phases sized to its actual complexity —
        neither over- nor under-engineered (calibrated depth).
      - Keep subtasks distinct: never restate the same work under two phases.
      - Assign every piece of referenced work to a concrete subtask so the
        plan has no coverage gaps.
      - List known risks, dependencies, and open questions requiring research.
      PLANNING_PROMPT_EOF
      fi
      case "$DIR" in
        /*) echo "$DIR" ;;
        *) echo "$(pwd)/$DIR" ;;
      esac
    capture: run_dir
    next: load_planning_prompt

  load_planning_prompt:
    # Reads the current planning prompt so generate_rubric consumes the exact
    # text rn-plan-apo's apply_gradient writes — closing the optimizer's
    # measure→propose→apply→re-measure spine (BUG-2417). Re-read on every run,
    # so an applied gradient takes effect on the next run_planner iteration.
    action_type: shell
    action: |
      cat "${context.plan_prompt_file}"
    capture: planning_prompt
    next: generate_rubric

  generate_rubric:
    # Rubric generation — analyzes the task and writes the 8-dimension evaluation
    # rubric to plan-rubric.md. Also writes an initial outline to plan.md so the
    # score state has a non-empty document to evaluate on the first pass.
    # The planning guidance below is interpolated from plan_prompt_file (via the
    # load_planning_prompt capture), so rn-plan-apo's optimized prompt is what
    # actually drives the outline (BUG-2417).
    action_type: prompt
    action: |
      Your task is to set up the planning workspace for this task:
      "${context.task}"

      Planning guidance (maintained at ${context.plan_prompt_file} and tuned by
      the rn-plan-apo optimizer — follow it when writing the outline):

      ${captured.planning_prompt.output}

      Step 1: Write an initial high-level plan outline to ${captured.run_dir.output}/plan.md.
      The outline should identify:
      - The goal and desired outcome
      - Major phases or components (bullet list is fine at this stage)
      - Known risks or dependencies
      - Open questions that require research

      Step 2: Write the scoring rubric to ${captured.run_dir.output}/plan-rubric.md using
      exactly this format:

      ```
      # Planning Rubric

      task: "${context.task}"

      ## Dimensions

      breadth: LOW
      # Does the plan cover all relevant concerns, stakeholders, and edge cases?

      depth: LOW
      # Are sub-steps sufficiently detailed and granular to be actionable without further clarification?

      complexity: LOW
      # Is the plan's complexity calibrated to the task — neither over- nor under-engineered?

      clarity: LOW
      # Is language unambiguous, specific, and free of vague directives like "handle X" or "ensure Y"?

      consistency: LOW
      # Are steps non-contradictory? Are no concerns addressed twice with conflicting advice?

      logic_strategy: LOW
      # Does the ordering and approach make sense? Is the strategy sound for this specific task?

      feasibility: LOW
      # Are the steps achievable given realistic constraints (time, resources, skills, access)?

      testability: LOW
      # Does the plan define clear success criteria and verification steps for each phase?

      risk_mitigation: LOW
      # Are key risks identified with concrete contingencies or mitigation strategies?

      ## Aggregate

      score: 1.00/4.00
      verdict: ITERATE
      ```

      Start all dimensions at LOW (score 1/4) since the plan is in its initial state.
      Update the aggregate score = mean of all dimension scores.
      Write ITERATE as the verdict (the score state will update this each iteration).
    next: check_substrate

  # ENH-2098: feasibility gate — validates proposed plan actions against execution-environment
  # constraints before committing to the research/iteration cycle. Routes infeasible findings
  # back to generate_rubric so the planner can revise before any research is run.
  check_substrate:
    action_type: shell
    action: |
      cat "${captured.run_dir.output}/plan.md"
    capture: plan_for_substrate
    evaluate:
      type: llm_structured
      source: "${captured.plan_for_substrate.output}"
      prompt: >
        Enumerate the target execution environment's known constraints:
        shell command availability, MCP tool access, file write permissions, token budget.
        Validate each proposed action in the plan against these constraints.
        Answer YES if every action is feasible in the target environment.
        Otherwise NO, listing each infeasible action and the constraint it violates.
    on_yes: research_iteration
    on_no: generate_rubric
    on_partial: generate_rubric

  research_iteration:
    # Delegates the classify → research → synthesize chain to the shared oracle.
    # On success (oracle reaches done), proceed to score. The oracle handles all
    # routing between file/web research and synthesis internally.
    loop: oracles/plan-research-iteration
    with:
      run_dir: "${captured.run_dir.output}"
    on_success: score
    on_failure: diagnose
    on_error: diagnose

  score:
    fragment: plan_rubric_score
    on_yes: done
    on_no: research_iteration
    on_error: diagnose

  done:
    # Terminal — reached when all 8 rubric dimensions score VERY-HIGH or max_iterations
    # is exhausted. Reports the final output file locations.
    action_type: prompt
    action: |
      The rn-plan recursive planning loop has completed.

      Final output files:
      - ${captured.run_dir.output}/plan.md          — the refined task plan (primary output)
      - ${captured.run_dir.output}/plan-rubric.md   — the final rubric scores
      - ${captured.run_dir.output}/research.md      — accumulated research findings

      Read ${captured.run_dir.output}/plan-rubric.md and report the final dimension scores
      and aggregate verdict to the user. Confirm the plan is ready for implementation.
    terminal: true

  diagnose:
    fragment: loop_failure_diagnose
    with:
      loop_name: rn-plan
      extra_bullets: |
        - If ${captured.run_dir.output}/plan.md exists, note how far the plan was developed.
        - Note: the most likely cause is an LLM error in the score state.

  failed:
    # Error terminal — reached when the score state encounters an unrecoverable error.
    # Provides a distinct failure signal separate from a max_iterations timeout.
    terminal: true
