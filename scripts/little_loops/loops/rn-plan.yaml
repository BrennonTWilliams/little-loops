name: rn-plan
category: planning
input_key: task
required_inputs: ["task"]
description: |
  Recursive planning loop with self-scoring rubric. Accepts a natural language
  task description, generates a structured plan and 8-dimension scoring rubric,
  then iteratively researches and refines the plan until all rubric dimensions
  reach VERY-HIGH or max_iterations is exhausted. Run as:
  ll-loop run rn-plan "your task description"
initial: init
max_iterations: 50
timeout: 7200
import:
  - lib/common.yaml

context:
  task: ""           # populated from positional CLI arg via input_key: task

states:

  init:
    # Setup phase — create per-run plan files in the runner-injected run_dir.
    # Captures the absolute path so all subsequent states can write to it.
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      : > "$DIR/plan.md"
      : > "$DIR/plan-rubric.md"
      : > "$DIR/research.md"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: generate_rubric

  generate_rubric:
    # Rubric generation — analyzes the task and writes the 8-dimension evaluation
    # rubric to plan-rubric.md. Also writes an initial outline to plan.md so the
    # score state has a non-empty document to evaluate on the first pass.
    action_type: prompt
    action: |
      Your task is to set up the planning workspace for this task:
      "${context.task}"

      Step 1: Write an initial high-level plan outline to ${captured.run_dir.output}/plan.md.
      The outline should identify:
      - The goal and desired outcome
      - Major phases or components (bullet list is fine at this stage)
      - Known risks or dependencies
      - Open questions that require research

      Step 2: Write the scoring rubric to ${captured.run_dir.output}/plan-rubric.md using
      exactly this format:

      ```
      # Planning Rubric

      task: "${context.task}"

      ## Dimensions

      breadth: LOW
      # Does the plan cover all relevant concerns, stakeholders, and edge cases?

      depth: LOW
      # Are sub-steps sufficiently detailed and granular to be actionable without further clarification?

      complexity: LOW
      # Is the plan's complexity calibrated to the task — neither over- nor under-engineered?

      clarity: LOW
      # Is language unambiguous, specific, and free of vague directives like "handle X" or "ensure Y"?

      consistency: LOW
      # Are steps non-contradictory? Are no concerns addressed twice with conflicting advice?

      logic_strategy: LOW
      # Does the ordering and approach make sense? Is the strategy sound for this specific task?

      feasibility: LOW
      # Are the steps achievable given realistic constraints (time, resources, skills, access)?

      testability: LOW
      # Does the plan define clear success criteria and verification steps for each phase?

      risk_mitigation: LOW
      # Are key risks identified with concrete contingencies or mitigation strategies?

      ## Aggregate

      score: 1.00/4.00
      verdict: ITERATE
      ```

      Start all dimensions at LOW (score 1/4) since the plan is in its initial state.
      Update the aggregate score = mean of all dimension scores.
      Write ITERATE as the verdict (the score state will update this each iteration).
    next: research_iteration

  research_iteration:
    # Delegates the classify → research → synthesize chain to the shared oracle.
    # On success (oracle reaches done), proceed to score. The oracle handles all
    # routing between file/web research and synthesis internally.
    loop: oracles/plan-research-iteration
    with:
      run_dir: "${captured.run_dir.output}"
    on_success: score
    on_failure: diagnose
    on_error: diagnose

  score:
    fragment: plan_rubric_score
    on_yes: done
    on_no: research_iteration
    on_error: diagnose

  done:
    # Terminal — reached when all 8 rubric dimensions score VERY-HIGH or max_iterations
    # is exhausted. Reports the final output file locations.
    action_type: prompt
    action: |
      The rn-plan recursive planning loop has completed.

      Final output files:
      - ${captured.run_dir.output}/plan.md          — the refined task plan (primary output)
      - ${captured.run_dir.output}/plan-rubric.md   — the final rubric scores
      - ${captured.run_dir.output}/research.md      — accumulated research findings

      Read ${captured.run_dir.output}/plan-rubric.md and report the final dimension scores
      and aggregate verdict to the user. Confirm the plan is ready for implementation.
    terminal: true

  diagnose:
    fragment: loop_failure_diagnose
    with:
      loop_name: rn-plan
      extra_bullets: |
        - If ${captured.run_dir.output}/plan.md exists, note how far the plan was developed.
        - Note: the most likely cause is an LLM error in the score state.

  failed:
    # Error terminal — reached when the score state encounters an unrecoverable error.
    # Provides a distinct failure signal separate from a max_iterations timeout.
    terminal: true
