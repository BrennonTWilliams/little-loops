name: hitl-md
category: harness
labels: [hitl, markdown, html, interactive]
input_key: input
description: |
  Human-in-the-loop single-document review harness — reads a markdown file (or raw text) and
  decomposes it into grammar-preserving, saliency-modulated segments using the GP-TSM algorithm
  implemented as LLM-in-prompt segmentation (no external ML dependencies). Generates a single
  self-contained interactive HTML page that renders the document with its natural reading flow
  (headings, paragraphs, lists, code blocks rendered normally) and overlays saliency as inline
  color highlighting plus on-demand popover affordances (delete / insert-before / insert-after /
  inline-edit / flag-for-AI). Includes a "Copy AI prompt" sticky control for flagged segments
  and a "Copy updated markdown" control for reconstructing the revised document. Iteratively
  screenshots and scores the artifact until it passes a 6-criterion rubric (document readability,
  inline highlighting, affordance overlay, keyboard reachability, inline constraint, markdown
  reconstruction). On success, the final HTML is copied to ./hitl-md-review.html in the loop's
  invocation directory so it's discoverable without digging into .loops/tmp/.

  GP-TSM integration: implemented as LLM-in-prompt segmentation — the segment state instructs
  the model to apply grammar-preserving boundary detection (sentence/clause level) and assign
  saliency scores and color codes by content type. No PyPI/subprocess dependencies required.

  Note: the evaluate state's on_error routes to generate (not score), following the
  svg-image-generator pattern. This is a deliberate divergence from the LOOPS_GUIDE.md design
  rule ("never back to generate") at line 897 — Playwright failures here indicate the HTML itself
  may be malformed, so regenerating is preferable to scoring a broken page. Only on_error takes
  this route; on_yes and on_no both route to score for normal LLM-only fallback behavior.
initial: init
max_iterations: 20
timeout: 7200

# HARNESS: Context variables for input.
# input is populated from the CLI positional arg via input_key: input.
# The token is resolved as a file path (if it exists on disk) or treated as raw markdown text.
context:
  input: ""              # file path or raw markdown text; populated via input_key
  design_tokens_context: ""   # runner-injected; resolved semantic token values or empty

states:

  init:
    # HARNESS: Setup phase — captures the runner-injected run_dir as an absolute path
    # so all subsequent states write to the same isolated per-run directory.
    # Using $(pwd) ensures the captured path is valid for file:// URIs.
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: segment

  segment:
    # HITL-MD: Segmentation phase — resolves the input token (file path or raw text)
    # and decomposes the document into grammar-preserving saliency-modulated segments
    # using the GP-TSM algorithm inline as LLM instructions. Writes segments.json
    # containing the ordered segment list so generate can render the interactive page.
    action_type: prompt
    action: |
      You are decomposing a markdown document into segments for human review.

      Input token: "${context.input}"

      Step 1 — Resolve the input:
      - If the token looks like a file path and the file exists on disk, read the file and use its contents as the document.
      - Otherwise treat the literal token string as the raw markdown content to segment.

      Step 2 — Apply GP-TSM segmentation (Grammar-Preserving Text Saliency Modulation):
      Decompose the document into grammar-preserving segments at sentence or clause boundaries.
      Preserve all structural elements (headings, list items, code blocks, blockquotes) as
      atomic segments — never split a heading, list bullet, or code block across segments.
      For prose paragraphs, split at sentence boundaries; for long sentences, at major clause
      boundaries (before "which", "that", "because", "however", "therefore", etc.).

      For each segment, assign:
      - type: one of "heading", "bullet", "code", "blockquote", "prose", "separator"
      - saliency_score: a float 0.0–1.0 reflecting importance/novelty for review
        (headings: 0.9, code blocks: 0.85, key decisions/requirements: 0.8–0.95,
         supporting detail: 0.4–0.6, boilerplate/filler: 0.1–0.3)
      - color: a hex color from this accessible palette based on type and saliency:
        - heading: "#1a56db" (blue)
        - bullet (saliency ≥ 0.7): "#0e9f6e" (green)
        - bullet (saliency < 0.7): "#6b7280" (gray)
        - code: "#9333ea" (purple)
        - blockquote: "#d97706" (amber)
        - prose (saliency ≥ 0.8): "#dc2626" (red — high importance)
        - prose (saliency 0.5–0.8): "#b45309" (brown — medium importance)
        - prose (saliency < 0.5): "#6b7280" (gray — low importance)
        - separator: "#e5e7eb" (light gray)
      - original_text: the raw text of this segment as it appears in the document
      - markdown_source: the markdown source (may equal original_text for prose; for
        headings includes the # prefix, for bullets includes the - or * marker, etc.)
      - channels: an object with four orthogonal saliency dimensions, each independently
        scored, so the review surface can support representational shifts (Klein's
        Data/Frame Theory) and trust calibration (Steyvers et al. 2024):
        - importance: float 0.0–1.0, mirrors saliency_score (default: equal to saliency_score)
        - anomaly: float 0.0–1.0, how much this segment contradicts earlier content or
          stated expectations (default: 0.0 if no contradiction is evident)
        - claim_type: one of "factual", "assumption", "reasoning", "action_item",
          "definition", "rhetorical" — classifies the rhetorical role of the segment
        - confidence: float 0.0–1.0, how certain the segment's claim is — calibrate
          *down* for hedged language ("might", "could", "likely"), unverified specifics,
          or speculative reasoning; calibrate *up* for definitional/structural content
      - length_normalized: boolean — true when the segment's character length exceeds
        the document median segment length. The renderer uses this to display a subtle
        length-normalized credibility marker, disrupting the fluency-as-credibility bias
        documented in Steyvers et al. 2024 (longer explanations earn unwarranted trust).

      Compute the document median segment length first (sort segment character lengths,
      pick the middle value), then set length_normalized=true on every segment whose
      length exceeds that median.

      Step 3 — Write the ordered segment list to ${captured.run_dir.output}/segments.json
      using this exact JSON structure:

      ```json
      {
        "segments": [
          {
            "id": "s001",
            "type": "heading",
            "saliency_score": 0.9,
            "color": "#1a56db",
            "original_text": "# Introduction",
            "markdown_source": "# Introduction",
            "channels": {
              "importance": 0.9,
              "anomaly": 0.0,
              "claim_type": "definition",
              "confidence": 1.0
            },
            "length_normalized": false
          },
          ...
        ],
        "total_segments": N,
        "document_source": "file path used, or 'raw text'",
        "median_segment_length": M
      }
      ```

      Segment IDs must be zero-padded three-digit strings (s001, s002, ...) matching the order
      in the document. IDs must be stable — they are the primary key for reconstruction.

      IMPORTANT: Every character of the original document must appear in exactly one segment's
      markdown_source field. The concatenation of all markdown_source values must reproduce the
      original document exactly (modulo trailing whitespace on each segment). This is required
      for the "Copy updated markdown" affordance to be lossless.
    next: generate

  generate:
    # HITL-MD: Generator phase — reads segments.json (and any prior critique.md) and produces
    # a single self-contained HTML review page. The page must render the document with its
    # natural reading flow (headings as headings, paragraphs as paragraphs, lists as lists)
    # and overlay saliency/affordances via inline highlighting + on-demand popovers — NOT as
    # a vertical stack of bordered segment blocks. All CSS/JS inline; file:// must work.
    action_type: prompt
    action: |
      Read ${captured.run_dir.output}/segments.json for the ordered segment list.

      If ${captured.run_dir.output}/critique.md exists, read it and address all issues listed
      in the "Issues to Address" section specifically and completely before writing the new page.

      ${context.design_tokens_context}

      Write a single self-contained HTML file to ${captured.run_dir.output}/index.html that:
      - Embeds ALL CSS and JavaScript inline (no external dependencies, no CDN links, no <link> tags)
      - Renders correctly under a file:// URL without an HTTP server
      - Has a clean header showing the document source and total segment count
      - Includes a sticky "Copy AI prompt (N flagged)" button at the top and a prominent
        "Copy updated markdown" button at the bottom

      Core design rule: the document must read as a normal rendered markdown document. Do NOT
      render each segment as its own bordered block, do NOT show segment ID labels in the body,
      and do NOT fade unselected segments. Saliency and affordances are applied as inline
      highlights and overlays only.

      **Document rendering (natural markdown flow):**
      - Render heading segments as <h1>...<h6> (matching the # count in markdown_source).
      - Render prose segments inside <p> paragraphs. Consecutive prose segments that belonged
        to the same paragraph in the source should be wrapped together in one <p>.
      - Render bullet segments inside <ul>/<ol>/<li> in the appropriate list nesting; preserve
        the original bullet markers and indentation.
      - Render code segments inside <pre><code> with a monospace font and a distinct code
        background.
      - Render blockquote segments inside <blockquote>.
      - Render separator segments as <hr> (or as the blank-line break they represent).
      - Use a clean system font stack, generous line-height (~1.6), comfortable max-width
        (~720px) centered on the page, light page background (#f9fafb).

      **Inline segment markers:**
      - Wrap each segment with class="seg" plus data-id="sNNN", data-color, data-saliency,
        and data-type attributes:
        - For prose, wrap with an inline <span class="seg" data-id="s001" ...>...</span>
          inside the paragraph. NEVER wrap a prose span in a <div> — keep it inline so the
          paragraph flow is preserved.
        - For block-level segments (heading, list item, code, blockquote, separator), apply
          class="seg" + data-attributes directly to the block element itself
          (e.g., <h2 class="seg" data-id="s003" ...>, <li class="seg" ...>).
      - Every segment must be reachable as a single .seg DOM node — the JS uses
        document.querySelectorAll('.seg') to enumerate segments in order.

      **Saliency as inline highlight (NOT block borders):**
      - Apply a subtle background tint derived from the segment's data-color at ~12–15% alpha
        directly on the .seg element. For inline prose spans, use background-color with
        rounded corners (border-radius: 3px) and small horizontal padding (padding: 0 2px).
        For block elements, apply the same low-alpha background-color to the block.
      - Do NOT add left borders, do NOT add per-segment padding/margin that creates a stacked
        block appearance. The visual delta from an un-highlighted document should be color
        wash only.
      - Higher-saliency colors will naturally read as "hotter" — don't crank up alpha to
        compensate. Stay at ~12–15% so prose remains readable.

      **Segment IDs in the gutter / tooltip, NOT in the body:**
      - Do not render segment IDs inline with the text.
      - On hover, show the segment ID via a CSS-only tooltip (e.g., title attribute, or
        a ::after pseudo-element revealed on :hover).
      - Optionally, when a segment is selected, render a tiny gray segment-ID label
        (position: absolute) in the left or right page margin opposite the segment.

      **Selection (subtle, not disruptive):**
      - Tab / Shift+Tab and arrow keys (Up/Down) move selection through segments in document
        order. Mouse click on a segment selects it. Escape clears selection.
      - The selected segment gets a thin outline (e.g., 1px solid currentColor at 50% alpha)
        or a slightly darker tint of its own color. Do NOT fade other segments. The entire
        document must remain readable at all times.
      - Scroll the selected segment into view smoothly (scrollIntoView with block: 'center').

      **Affordances as on-demand popover (NOT a permanent toolbar):**
      - The five edit controls live inside a single small popover element (position: absolute
        or fixed) that is hidden by default. When a segment is selected, position the popover
        near the segment (anchored to the segment's bounding rect, above or below it depending
        on viewport space) and reveal it.
      - The popover overlays the document — it MUST NOT push surrounding content or reflow
        text. Achieve this with position: absolute/fixed + a high z-index.
      - Only one popover is visible at a time. Pressing Escape, clicking outside the popover
        and outside the segment, or selecting a different segment dismisses the popover.
      - The popover contains exactly five icon buttons, in this order, each keyboard-focusable:
        - 🗑 Delete — toggles a "deleted" state on the segment (strikethrough + low opacity
          inline) and a small "Restore" link appears next to the deleted span/block.
        - ↑+ Insert before — reveals a small inline textarea immediately before the segment
          (still inside the natural flow position) where the user types new content.
        - +↓ Insert after — reveals a small inline textarea immediately after the segment.
        - ✏ Edit — toggles contenteditable="true" on the segment's text content for in-place
          editing. (For block-level segments, edit the block's text; for prose spans, edit
          the span's text.)
        - 🚩 Flag for AI — toggles a flagged state on the segment (small inline 🚩 glyph
          and/or a colored underline visible at a glance).
      - Provide accessible labels (aria-label / title) on every button.

      **Flagged-state inline marker:**
      - Flagged segments must be visible at a glance without entering the popover. Show a
        small 🚩 glyph next to the segment (inline, low-impact) and/or apply a colored
        underline (text-decoration: underline; text-decoration-color: <flag color>).

      **Deleted / edited / inserted segments stay inline:**
      - Deleted segments: render with text-decoration: line-through and opacity ~0.35 on the
        original .seg node. Place a small "↺ Restore" link immediately adjacent (still
        inline). Do NOT remove the DOM node — the markdown-reconstruction logic skips them
        based on a JS-side `deleted` flag.
      - Edited segments: contenteditable="true" toggled on the .seg node. No layout shift.
      - Inserted segments: when the user submits the insert textarea, render the new content
        as a new inline node positioned immediately before/after the source segment. Choose
        the element type to match context (a new <p> for prose, a new <li> for list-item
        insertion, etc.).

      **Copy AI prompt (sticky top button):**
      - Label: "Copy AI prompt (N flagged)" — N updates live as flags toggle. Initially
        N=0 and the button is greyed out / disabled.
      - When clicked, copy this snippet to the clipboard:
        ```
        Please revise the following sections of the document. Each section is marked with its
        segment ID for reference:

        [s003] <segment text>

        [s007] <segment text>

        [s012] <segment text>

        Focus your edits on improving clarity, accuracy, and completeness for these specific spans.
        ```

      **Copy updated markdown (prominent bottom button):**
      - When clicked, reconstruct the markdown document from the live segment list:
        - Skip segments marked deleted.
        - For inserted segments: use the text entered in the insert textarea (rendered with
          appropriate markdown for context — `\n\n` separator for prose, `- ` prefix for
          list-item insertion, etc.).
        - For edited segments: use the current text content of the (contenteditable) .seg
          node.
        - For unmodified segments: use the original markdown_source from segments.json.
        - Concatenate in document order and copy to clipboard.

      **Design constraints:**
      - System font stack only (no external fonts, no @import).
      - All CSS inline in <style>, all JS inline in <script>.
      - No external src= or href= references to anything off-disk.
      - Mobile-responsive, desktop-first.

      ---

      **Sensemaking layer (ENH-1770):** the six features below operationalize
      Pirolli & Card's foraging-loop, Klein's Data/Frame Theory, Russell et al.'s
      Cost Structure of Sensemaking, the HCEye dynamic-appearance finding, the
      Keyhole Effect, and the LLM Fallacy / fluency-as-credibility research
      (Steyvers et al. 2024, Kim et al. 2026). Each feature is an independently
      toggleable module within the same single-file HTML. All visible styles must
      source colors, spacing, motion, typography, and radii from the design token
      CSS custom properties exposed via `${context.design_tokens_context}`
      (e.g., `var(--color-action-primary)`, `var(--space-3)`,
      `var(--motion-duration-medium)`, `var(--radius-sm)`). If a needed semantic
      token is missing from the active profile, declare a single fallback CSS
      custom property at `:root` (e.g., `--hitl-stage-duration: 240ms`) and
      reference it via `var()` — never embed raw hex / px / rem literals inside
      feature CSS.

      **Feature 1 — Staged dynamic highlighting (HCEye / Das et al. 2024):**
      - Do NOT paint every `.seg` background on load. Reveal highlights in waves.
      - Tier 1 (immediate): the top 3–5 segments by `data-channel-importance`
        receive their saliency tint on `DOMContentLoaded`.
      - Tier 2+ (deferred): every other highlighted segment starts with its
        background-color transparent and fades in when it intersects the viewport.
      - Implement with `IntersectionObserver` on `.seg` elements. When a tier-2+
        segment intersects, add a `seg--revealed` class and the CSS transition
        animates `background-color` from transparent to the resolved tint.
      - Transition uses `var(--motion-duration-medium, --hitl-stage-duration)` and
        `var(--motion-easing-standard, --hitl-stage-easing)` — never a hardcoded
        `200ms ease`.

      **Feature 2 — Adaptive highlight-density slider (Yang et al. 2025):**
      - Render a fixed toolbar at the top of the page (alongside or below the
        existing "Copy AI prompt" control) containing an `<input type="range">`
        labelled "Density".
      - Range maps to a saliency threshold (e.g., 0.0 → "All", 0.5 → "Top 25%",
        0.8 → "Top 10%"). Default the slider to a sparse position (Top 10–25%).
      - On `input`, recompute which `.seg` elements receive the highlight tint:
        those with `data-channel-importance >= threshold` get the tint class;
        others have their tint suppressed (text remains fully readable).
      - Slider track, thumb, focus ring, toolbar surface, label typography, and
        spacing all use semantic tokens — `var(--color-surface-primary)`,
        `var(--color-border-subtle)`, `var(--color-action-primary)`,
        `var(--space-2)`, `var(--space-3)`, `var(--font-size-sm)`,
        `var(--font-family-ui)`. No raw colors, no raw px.

      **Feature 3 — Multi-channel saliency (Klein Data/Frame Theory):**
      - Each `.seg` element must carry `data-channel-importance`,
        `data-channel-anomaly`, `data-channel-confidence`, and `data-claim-type`
        attributes populated from the `channels` object in segments.json.
      - The toolbar exposes four channel toggle controls (importance, anomaly,
        claim_type, confidence). The active channel determines which color
        mapping is applied to all `.seg` backgrounds.
      - Each channel maps to a distinct semantic color custom property —
        `var(--color-channel-importance)`, `var(--color-channel-anomaly)`,
        `var(--color-channel-confidence)`, plus a claim-type palette
        (e.g., factual → `var(--color-claim-factual)`, assumption →
        `var(--color-claim-assumption)`, etc.). If the token profile lacks these,
        derive them at `:root` from neutral and action tokens; do NOT embed hex
        literals inline.
      - Toggling a channel re-applies the tint via a CSS class swap — pure
        DOM manipulation, no segment re-rendering.

      **Feature 4 — Schema-switching toolbar (Russell et al. 1993):**
      - The toolbar exposes "View" toggle buttons that re-group the displayed
        content by different schemas: "By document order" (default), "By saliency
        tier", "By claim type", "By anomaly score".
      - Schema-switching re-orders `.seg` elements in the DOM (move them between
        wrapper sections) — it does NOT re-fetch or re-generate. Group dividers
        between sections use `var(--color-border-subtle)` and `var(--space-4)`
        separation; group headings use `var(--font-size-sm)` /
        `var(--color-text-secondary)`.
      - Active toggle: `var(--color-action-primary)` against
        `var(--color-surface-raised)`. Inactive: `var(--color-text-secondary)`.
      - Returning to "By document order" must restore the original DOM order
        bit-for-bit so the "Copy updated markdown" reconstruction stays lossless.

      **Feature 5 — Minimap + spatial State Rail (Reddy, Keyhole Effect 2025):**
      - Render a fixed-position `<canvas>` on the right edge of the page (width
        from spacing scale, e.g., `var(--space-6)`) showing the full document as
        proportional colored blocks — one block per segment, height proportional
        to its character count.
      - Block fill colors mirror the active channel's palette (read at draw-time
        via `getComputedStyle(document.documentElement).getPropertyValue(...)`
        so theme switches take effect on next redraw without reload).
      - A viewport-position indicator overlays the minimap, updated on `scroll`
        via `IntersectionObserver` or `requestAnimationFrame`. Indicator color is
        `var(--color-action-primary)` at reduced alpha (via `color-mix()` or a
        pre-resolved `--color-viewport-overlay` token).
      - Visit-heatmap: track which segments have entered the viewport in
        `localStorage` (key `hitl-md:visits:${documentHash}`). Re-draw the
        minimap with a neutral-scale intensity ramp (`var(--color-neutral-100)` →
        `var(--color-neutral-400)`) reflecting visit counts.
      - Click on the minimap navigates the main viewport (smooth `scrollIntoView`
        of the corresponding `.seg`).

      **Feature 6 — Calibrated friction for trust calibration (Kim et al. 2026,
      Steyvers et al. 2024):**
      - Confidence badges are rendered as small DOM nodes positioned *before*
        each segment's content (DOM order: badge first, then segment text). The
        badge displays the confidence tier and maps to semantic status tokens:
        high (≥0.75) → `var(--color-status-success)`,
        mid (0.4–0.75) → `var(--color-status-warning)`,
        low (<0.4) → `var(--color-status-danger)`.
      - Click-to-reveal gate: segments where `data-saliency >= 0.7` AND
        `data-channel-confidence < 0.5` start with their body text hidden
        behind a "Review this claim" button styled with
        `var(--color-action-primary)` (hover: `var(--color-action-primary-hover)`).
        The confidence badge remains visible alongside the gate button. Clicking
        the button reveals the body.
      - Length-normalized credibility marker: when `data-length-normalized="true"`,
        render a subtle ruler icon next to the confidence badge using
        `var(--color-text-muted)`. The icon signals "this segment is longer than
        median — adjust your fluency-driven credibility expectation downward".
      - A "Trust calibration" toggle in the toolbar gates the friction-heavy
        interventions: the toggle defaults to *passive* mode (badge-before-content
        and length markers only — no click-to-reveal gate). Switching to *active*
        mode enables the click-to-reveal gate for high-saliency low-confidence
        segments.
      - Badge padding, gated-segment outline, and the ruler icon all use
        `var(--space-1)` / `var(--space-2)`, `var(--radius-sm)`,
        `var(--border-width-strong)`. This is the highest-stakes wiring —
        friction interventions that look ad-hoc undermine the calibration signal.

      **Cross-feature requirements:**
      - All six features live in the same single self-contained HTML; each is a
        separate JS/CSS module. A bug in the minimap must not break highlighting,
        a broken density slider must not affect schema-switching.
      - The original behavior (static single-channel highlighting on
        document_readability / inline_highlighting) remains intact — the new
        features layer on top via toolbar toggles. The default initial render
        must still satisfy the original 6 rubric criteria.
      - All toolbar controls are keyboard-focusable with visible focus rings
        derived from `var(--color-focus-ring)` (fallback: outline using
        `var(--color-action-primary)` at higher contrast).

      All interactive behavior must work under file:// with no server.
    next: evaluate

  evaluate:
    # HARNESS: Screenshot gate — Playwright CLI captures the rendered file:// page.
    # Self-contained HTML (all CSS/JS inline) renders correctly under file:// without
    # an HTTP server. Routes to score on success or Playwright-unavailable failure;
    # routes back to generate on error — a deliberate divergence from the standard
    # LOOPS_GUIDE.md routing rule (see top-level description for rationale).
    action_type: shell
    action: |
      playwright screenshot "file://${captured.run_dir.output}/index.html" "${captured.run_dir.output}/screenshot.png" 2>&1 && echo "CAPTURED"
    evaluate:
      type: output_contains
      pattern: "CAPTURED"
    on_yes: score
    on_no: score
    on_error: generate

  score:
    # HARNESS: Evaluator phase — LLM judges the screenshot against a 6-criterion rubric
    # tailored to HITL single-document review ergonomics (document_readability,
    # inline_highlighting, affordance_overlay, keyboard_reachability, inline_constraint,
    # markdown_reconstruction). Per-criterion thresholds prevent strong visual design from
    # masking a broken keyboard affordance or failed reconstruction.
    # Gates via output_contains: "ALL_PASS"; routes to generate on fail, failed on LLM error.
    action_type: prompt
    action: |
      If ${captured.run_dir.output}/screenshot.png exists, read it to view the rendered review page.
      Otherwise read ${captured.run_dir.output}/index.html directly to evaluate the HTML source.
      Also read ${captured.run_dir.output}/segments.json to recall what segments should be present.

      Score the review page on each criterion from 1 to 10 and write the evaluation to
      ${captured.run_dir.output}/critique.md using this exact format:

      ```
      # Evaluation

      document_readability: N/10 — [explanation: does the page read as a normally-flowing
        markdown document — headings as headings, paragraphs as paragraphs, lists as lists,
        code blocks as code blocks? It MUST NOT look like a vertical stack of separately
        bordered/padded segment blocks. Segment ID labels must NOT appear inline in the body.
        Unselected segments must NOT be faded to low opacity. Score 10 if the document
        rendering is indistinguishable from a plain markdown render except for inline color
        highlights; deduct heavily for any block-stack or per-segment container styling that
        breaks reading flow.]
      inline_highlighting: N/10 — [explanation: is saliency conveyed via inline color
        highlights (low-alpha background tints on inline <span class="seg"> wrappers for
        prose; same low-alpha background applied directly to block elements for headings/
        list-items/code/blockquotes)? No left-border-block pattern. Higher-saliency segments
        should be perceptibly distinct from lower-saliency ones without being garish. Tints
        must stay subtle enough that the text remains readable.]
      affordance_overlay: N/10 — [explanation: are the five edit controls (delete,
        insert-before, insert-after, edit, flag) delivered as a single click/focus-triggered
        popover that overlays the document without reflowing surrounding content? Hidden by
        default; only one popover visible at a time; dismissible by Escape, outside-click,
        or selecting another segment. Is the "Copy AI prompt (N flagged)" sticky top button
        visible with a live-updating flag count? Is "Copy updated markdown" prominent at the
        bottom? Are flagged segments visible at a glance via an inline 🚩 glyph or colored
        underline?]
      keyboard_reachability: N/10 — [explanation: can all five popover affordances be reached
        and activated via keyboard alone? Does Tab/Shift+Tab and arrow navigation cycle
        through segments? Is the currently selected segment scrolled into view? Is Escape
        functional for both dismissing popovers and clearing selection? Would a keyboard-only
        user be able to flag, edit, delete, and insert without a mouse?]
      inline_constraint: N/10 — [explanation: does the page render correctly under file://?
        All CSS/JS must be inline. No external src= or href= references. A broken-resource
        icon or any CDN/external reference is a constraint violation. Score 10 for fully
        self-contained; deduct 3 for each external reference found.]
      markdown_reconstruction: N/10 — [explanation: for a smoke test, mentally trace a simple
        scenario: delete one segment, edit one segment, insert one new segment. Would the
        "Copy updated markdown" reconstruction produce well-formed markdown? Does segments.json
        include all markdown_source fields needed for lossless reconstruction? Are IDs stable
        and sequential?]
      staged_highlighting: N/10 — [explanation: are highlights revealed in waves rather than
        painted all at once on load? Look for IntersectionObserver usage on .seg elements,
        a tier-1 immediate reveal of the top 3–5 importance segments, and a CSS transition
        on background-color/opacity for the deferred tier. The transition must reference a
        motion design token (var(--motion-duration-…) or a documented :root fallback) — NOT
        a hardcoded duration. Mark FAIL_STAGED if all highlights appear on load with no
        observer-driven reveal, or if the duration is a raw literal.]
      density_control: N/10 — [explanation: is there a visible <input type="range"> density
        slider in the toolbar that filters highlighted segments by saliency threshold? It
        must default to a sparse position (Top 10–25%) so the first impression is uncluttered.
        Slider styles (track, thumb, focus ring, labels) must source from semantic tokens —
        any raw hex/px in the slider region is a deduction.]
      multi_channel_saliency: N/10 — [explanation: does each .seg carry
        data-channel-importance, data-channel-anomaly, data-channel-confidence, and
        data-claim-type attributes? Are there four channel toggle controls in the toolbar
        (importance, anomaly, claim_type, confidence) that swap the active tint palette?
        Channel colors must come from CSS custom properties (var(--color-channel-…)),
        not hardcoded fills.]
      schema_switching: N/10 — [explanation: does the toolbar expose schema-switching view
        toggles (By document order / By saliency tier / By claim type / By anomaly score)
        that re-group .seg elements via DOM manipulation? Returning to "By document order"
        must restore the original DOM order so the markdown reconstruction stays lossless.
        Active/inactive toggle states must use action-primary and text-secondary tokens.]
      minimap_state_rail: N/10 — [explanation: is there a fixed-position <canvas>-based
        minimap on the right edge of the page showing the document as proportional colored
        blocks with a viewport-position indicator? Does it use localStorage for visit-heatmap
        persistence? Does it support click-to-navigate to a segment? Canvas fills must be
        read from CSS custom properties at draw-time (getComputedStyle/getPropertyValue) so
        theme switches take effect on redraw — embedded hex literals in fillStyle are a
        deduction.]
      trust_calibration: N/10 — [explanation: are confidence badges rendered *before* segment
        body text (DOM order: badge first, content second) so the calibration signal is read
        before fluency biases judgment? Does a "Trust calibration" toolbar toggle gate the
        click-to-reveal behavior on high-saliency low-confidence segments
        (data-saliency >= 0.7 AND data-channel-confidence < 0.5)? Do segments with
        data-length-normalized="true" display a subtle length-normalized credibility marker
        (e.g., a ruler icon)? Badge colors must map to status tokens (success / warning /
        danger), not hardcoded greens / yellows / reds.]
      design_token_consistency: N/10 — [explanation: scan the rendered <style> block and
        inline style attributes for raw hex colors (e.g., #[0-9a-f]{3,8}), raw px/rem values
        outside :root declarations, and inline style="color:…" literals. Confirm each new
        ENH-1770 feature (staged highlighting, density slider, multi-channel rendering,
        schema-switching toolbar, minimap, calibrated friction) sources colors, spacing,
        typography, motion, and radii from var(--…) custom properties. Small concessions
        allowed (1px borders, transparent fallbacks, single :root token fallbacks) but no
        net-new hardcoded colors. Threshold 8 is intentionally strict because this criterion
        guards against the LLM regressing to literal values under prompt drift.]

      ## Issues to Address
      [Specific, actionable critique for the generator. List each problem concisely so the
       generator can address it on the next pass. If all scores meet their thresholds, write
       "No issues — all criteria pass."]
      ```

      Thresholds (evaluate each criterion independently — do NOT average):
      - document_readability: 8
      - inline_highlighting: 7
      - affordance_overlay: 7
      - keyboard_reachability: 7
      - inline_constraint: 8
      - markdown_reconstruction: 7
      - staged_highlighting: 7
      - density_control: 7
      - multi_channel_saliency: 7
      - schema_switching: 7
      - minimap_state_rail: 7
      - trust_calibration: 8
      - design_token_consistency: 8

      Per-criterion annotations in your output (e.g., "staged_highlighting: 7/10 — needs work")
      must use lowercase descriptive text — do NOT emit a bare "PASS" or "FAIL" token, as the
      compound gate token below is matched by output_contains and a bare token collision would
      trigger a false pass.

      If ALL thirteen criterion scores meet their individual thresholds, output exactly: ALL_PASS
      Otherwise output: ITERATE
    evaluate:
      type: output_contains
      pattern: "ALL_PASS"
    on_yes: finalize
    on_no: generate
    on_error: failed

  finalize:
    # HARNESS: Final-copy step — promotes the working index.html out of the
    # timestamped build directory into ./hitl-md-review.html in the loop's
    # invocation cwd, so the reviewable artifact is discoverable at the top
    # level of the directory the user ran the loop from. Best-effort: on
    # error we still route to done so the user gets the build-artifact paths.
    action_type: shell
    action: |
      cp "${captured.run_dir.output}/index.html" "./hitl-md-review.html" && echo "FINALIZED"
    evaluate:
      type: output_contains
      pattern: "FINALIZED"
    on_yes: done
    on_no: done
    on_error: done

  done:
    # HARNESS: Terminal state — reached when all criteria pass or max_iterations exhausted.
    # Reports all output file paths and explains how to use the interactive review page.
    # The primary artifact is ./hitl-md-review.html in the invocation cwd; build
    # artifacts under ${captured.run_dir.output}/ are kept for reference/debugging.
    action_type: prompt
    action: |
      The hitl-md loop has completed successfully.

      Primary artifact (open this in your browser):
      - ./hitl-md-review.html  — the interactive review page, copied to the directory the loop was run from

      Build artifacts (kept for reference):
      - ${captured.run_dir.output}/index.html     — the original interactive review page
      - ${captured.run_dir.output}/segments.json  — the GP-TSM segment list with saliency scores and colors
      - ${captured.run_dir.output}/critique.md    — final evaluation scores and notes
      - ${captured.run_dir.output}/screenshot.png — the last Playwright-captured render (omitted if Playwright unavailable)

      To complete the review:
      1. Open ./hitl-md-review.html in your browser (file:// URL works — no server needed).
      2. The document renders with its natural reading flow — headings, paragraphs, lists, and
         code blocks all in their usual shape. Saliency is shown as inline color highlighting,
         not as separated blocks. Click a highlighted span (or Tab/arrow-key to it) to reveal
         a popover with the five edit affordances anchored to that segment.
      3. Use the popover icon buttons on the selected segment to:
         - 🗑 Delete segments that are stale or irrelevant
         - ↑+ / +↓ Insert new content before or after a segment
         - ✏ Edit a segment inline (in place)
         - 🚩 Flag segments where you want the AI to revise or expand
         Press Escape (or click outside the popover) to dismiss it.
      4. When you have flagged one or more segments, click "Copy AI prompt" at the top of the page.
         Paste the copied prompt into your coding agent chat for targeted AI revision of those spans.
      5. After all edits and AI-assisted revisions, click "Copy updated markdown" at the bottom
         to reconstruct the full document from the live segment list. Paste it back over your source file.

      Round trip: a single focused review pass with preserved segment-level context.
    terminal: true

  failed:
    # HARNESS: Explicit failure terminal — reached when an unrecoverable error occurs
    # (e.g. LLM failure in the score state). Provides a clear signal distinct from a
    # max_iterations timeout, making failure mode visible in ll-loop history.
    action_type: prompt
    action: |
      The hitl-md loop has terminated with an unrecoverable error.

      Diagnose what failed:
      - If ${captured.run_dir.output}/critique.md exists, read it and summarize the last evaluation scores.
      - If ${captured.run_dir.output}/segments.json exists, report the total_segments count and document_source.
      - Identify the most likely failure cause (most commonly: LLM error in the score state, or
        malformed segments.json preventing the generate state from producing valid HTML).

      Write a one-paragraph diagnostic summary so the operator can diagnose and re-run.
    terminal: true
