name: deep-research-arxiv
from: deep-research
category: research
visibility: internal
input_key: topic
required_inputs: ["topic"]
description: |
  Arxiv-constrained variant of deep-research (FEAT-1540/FEAT-1673). Inherits the
  full research FSM from deep-research and overrides context.source_filter and
  context.academic_mode to constrain all queries to site:arxiv.org, enable
  recency scoring, arxiv ID dedup, and BibTeX output. Invoke directly:
  ll-loop run deep-research-arxiv "your research topic"

context:
  source_filter: "site:arxiv.org"
  academic_mode: true
