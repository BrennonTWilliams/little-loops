name: svg-image-generator
category: harness
input_key: description
required_inputs: ["description"]
description: |
  Generator-evaluator harness for SVG icon and illustration creation.
  Accepts a natural language description via loop_input and iteratively
  generates and refines a self-contained SVG using Playwright CLI screenshot
  evaluation. Implements the GAN-style architecture from Anthropic's harness
  design article, adapted for SVG's simpler self-contained structure —
  no HTTP server required, no external dependencies, direct file:// rendering.
  Thin wrapper over oracles/generator-evaluator (ENH-1869).
initial: init
max_iterations: 20
timeout: 7200

# HARNESS: Context variables control quality threshold.
context:
  description: ""             # populated from loop_input via input_key: description
  pass_threshold: 6           # minimum score per criterion (1-10) to pass
  design_tokens_context: ""   # runner-injected; resolved semantic token values or empty

states:

  init:
    # HARNESS: Setup phase — captures the runner-injected run_dir as an absolute path
    # so all subsequent states write to the same isolated per-run directory.
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: plan

  plan:
    # HARNESS: Planner phase — expands the one-line description into a visual brief.
    # This mirrors the "generator receives a spec" role from the harness design article.
    # The brief captures shape language, color palette, and creative intent so the
    # generator has strong direction on the first iteration.
    action_type: prompt
    action: |
      Write a visual brief to ${captured.run_dir.output}/brief.md for the following SVG:
      "${context.description}"

      The brief must include:
      - **Shape language**: primary geometric vocabulary (angular vs. organic, line weight,
        stroke vs. fill, symmetry or deliberate asymmetry)
      - **Color palette**: specific hex values (2–4 colors max), rationale for each choice
      - **Mood and intended use**: what emotion does it convey? At what sizes will it be used?
        (e.g. 16px favicon, 64px app icon, 256px illustration)
      - **Unique creative angle**: what makes this image distinctive? Avoid clip-art defaults.
      - **Anti-patterns to avoid**: overly complex paths that muddy at small sizes, default
        gradients, generic stock-icon shapes, excessive detail that disappears at icon scale

      Be specific and opinionated. The generator will use this brief as its primary reference.
    next: run_gen_eval

  run_gen_eval:
    # HARNESS: Thin-wrapper delegation — runs generate → evaluate (Playwright screenshot) →
    # score (LLM rubric) inside oracles/generator-evaluator until ALL_PASS or max_iterations.
    # Routes to done on success; failed on error or exhausted retries (ENH-1869).
    loop: oracles/generator-evaluator
    with:
      run_dir: "${captured.run_dir.output}"
      artifact_path: "image.svg"
      generate_prompt: |
        Read ${captured.run_dir.output}/brief.md for the visual brief.

        If ${captured.run_dir.output}/critique.md exists, read it and address all issues
        listed in the "Issues to Address" section specifically and completely.

        ${context.design_tokens_context}

        Write a single self-contained SVG file to ${captured.run_dir.output}/image.svg that:
        - Implements the shape language and color palette from the brief
        - If design tokens are provided above, use their semantic color values; do not
          invent new colors outside the token palette
        - Has a proper viewBox attribute (e.g. viewBox="0 0 800 800") so it scales correctly
        - Contains no external dependencies: no <image href="...">, no external fonts,
          no xlink:href pointing to remote resources — everything embedded or drawn with paths
        - Uses clean, intentional paths with consistent stroke weights and deliberate proportions
        - Achieves a distinctive aesthetic — avoid generic clip-art silhouettes and default
          geometric shapes with no creative angle
        - If critique exists, resolves every specific issue before introducing new ideas
        - STRICT SIZE LIMIT: Keep the SVG under 250 lines. Prefer <circle>, <path>, and
          <text> elements over verbose repeated markup. Use <g> with transform for repeated
          elements. Abbreviate or omit individual tool labels if needed to stay under the limit —
          ring labels ("Core Context", "Gateway", "Offloaded Ecosystem") are sufficient;
          individual tool names are optional. Conciseness is a hard requirement.
      rubric: |
        Read the screenshot at ${captured.run_dir.output}/screenshot.png to view the generated SVG.
        Also read ${captured.run_dir.output}/brief.md to recall the visual intent.

        Score the SVG on each criterion from 1 to 10 and write the evaluation to
        ${captured.run_dir.output}/critique.md using this exact format:

        ```
        # Evaluation

        visual_clarity: N/10 — [explanation: is the concept immediately readable with no
          ambiguity? At icon scale, can you tell what it is in under 2 seconds?]
        originality: N/10 — [explanation: evidence of custom creative decisions?
          Best designs avoid generic clip-art shapes and stock icon conventions.
          Penalize: default silhouettes, unmodified geometric primitives, AI-slop fill patterns.]
        craft: N/10 — [explanation: clean paths, consistent stroke weights, proper proportions,
          deliberate use of negative space, color harmony.]
        scalability: N/10 — [explanation: does the level of detail hold up at icon scale?
          Complex paths that collapse below 32px should be penalized.]

        ## Issues to Address
        [Specific, actionable critique for the generator. List each problem concisely
         so the generator can address it directly on the next pass. If all scores meet
         threshold, write "No issues — all criteria pass."]
        ```

        After writing the file, evaluate the scores:
        - visual_clarity weight: 2x (threshold 6)
        - originality weight: 2x (threshold 6)
        - craft weight: 1x (threshold 6)
        - scalability weight: 1x (threshold 6)

        If ALL four individual scores are >= 6, output exactly: ALL_PASS
        Otherwise output: ITERATE
      pass_threshold: 6
    on_yes: vision_gate
    on_no: diagnose
    on_error: diagnose

  vision_gate:
    # HARNESS: Optional external-vision evaluator (VISION_* env wiring).
    # Decouples aesthetic scoring from the host LLM's self-grade — the same
    # anti-self-certification motive as in html-website-generator, applied to SVG.
    # An independent vision model scores the screenshot against the svg rubric criteria;
    # failing criteria are appended to critique.md so the next generator-evaluator pass
    # addresses them directly. A per-run round cap (.vision_rounds) bounds ping-pong.
    #
    # GRACEFUL DEGRADATION: no-op pass when VISION_* vars are absent. API/parse errors
    # also pass — never block a functionally-sound artifact on an optional gate.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      case "$$RUN_DIR" in
        /*) ABS_DIR="$$RUN_DIR" ;;
        *) ABS_DIR="$$(pwd)/$$RUN_DIR" ;;
      esac
      if [ -f .env ]; then set -a; . ./.env; set +a; fi
      if [ -z "$${VISION_BASE_URL:-}" ] || [ -z "$${VISION_MODEL:-}" ] || [ -z "$${VISION_API_KEY:-}" ]; then
        echo "VISION_PASS: skipped (VISION_* env not configured)"; exit 0
      fi
      if [ ! -f "$$ABS_DIR/screenshot.png" ]; then
        echo "VISION_PASS: skipped (no screenshot.png)"; exit 0
      fi
      export ABS_DIR
      python3 <<'PY'
      import os, re, sys, json, base64, urllib.request
      abs_dir = os.environ["ABS_DIR"]
      shot = os.path.join(abs_dir, "screenshot.png")
      rc_file = os.path.join(abs_dir, ".vision_rounds")
      crit = os.path.join(abs_dir, "critique.md")
      ROUND_CAP = 3
      try:
          rc = int(open(rc_file).read().strip())
      except Exception:
          rc = 0
      if rc >= ROUND_CAP:
          print("VISION_PASS: round cap (%d) reached, accepting" % ROUND_CAP); sys.exit(0)
      try:
          with open(shot, "rb") as f:
              b64 = base64.b64encode(f.read()).decode()
      except Exception as e:
          print("VISION_PASS: screenshot unreadable (%s)" % e); sys.exit(0)
      base = os.environ["VISION_BASE_URL"].rstrip("/")
      endpoint = base if base.endswith("completions") else base + "/chat/completions"
      rubric = (
          "You are a strict, impartial design critic. Study the attached "
          "screenshot of a generated SVG and score it 1-10 on each:\n"
          "- visual_clarity: is the concept immediately readable with no ambiguity? "
          "At icon scale, can you tell what it is in under 2 seconds?\n"
          "- originality: evidence of custom creative decisions? "
          "Penalize: default silhouettes, unmodified geometric primitives, AI-slop fill patterns.\n"
          "- craft: clean paths, consistent stroke weights, proper proportions, "
          "deliberate use of negative space, color harmony.\n"
          "- scalability: does the level of detail hold up at icon scale? "
          "Complex paths that collapse below 32px should be penalized.\n"
          "Threshold: every criterion must be >= 6.\n"
          'Reply with ONE JSON object only, no prose: {"scores": '
          '{"visual_clarity": N, "originality": N, "craft": N, '
          '"scalability": N}, "issues": ["specific actionable fix", ...]}'
      )
      payload = {
          "model": os.environ["VISION_MODEL"],
          "temperature": 0.2,
          "max_tokens": 900,
          "messages": [{"role": "user", "content": [
              {"type": "text", "text": rubric},
              {"type": "image_url", "image_url": {"url": "data:image/png;base64," + b64}},
          ]}],
      }
      req = urllib.request.Request(
          endpoint, data=json.dumps(payload).encode(),
          headers={"Authorization": "Bearer " + os.environ["VISION_API_KEY"],
                   "Content-Type": "application/json"})
      try:
          with urllib.request.urlopen(req, timeout=120) as r:
              content = json.load(r)["choices"][0]["message"]["content"]
      except Exception as e:
          print("VISION_PASS: vision API error (%s), not blocking" % e); sys.exit(0)
      m = re.search(r"\{.*\}", content, re.S)
      try:
          data = json.loads(m.group(0)) if m else {}
          scores = data.get("scores", {}) or {}
          issues = data.get("issues", []) or []
      except Exception:
          print("VISION_PASS: unparseable vision verdict, not blocking"); sys.exit(0)
      failing = {k: v for k, v in scores.items()
                 if isinstance(v, (int, float)) and v < 6}
      print("VISION scores: " + json.dumps(scores))
      if not failing:
          print("VISION_PASS"); sys.exit(0)
      open(rc_file, "w").write(str(rc + 1))
      lines = ["", "## Issues to Address (external vision critique, round %d)" % (rc + 1)]
      for k, v in failing.items():
          lines.append("- %s scored %s/10 (below threshold 6)" % (k, v))
      for i in issues:
          lines.append("- %s" % i)
      with open(crit, "a") as f:
          f.write("\n".join(lines) + "\n")
      print("VISION_FAIL: %d criteria below threshold" % len(failing))
      PY
    evaluate:
      type: output_contains
      pattern: "VISION_PASS"
    on_yes: done
    on_no: run_gen_eval
    on_error: done

  done:
    # HARNESS: Terminal state — reached when all criteria pass or max_iterations exhausted.
    # Reports the final output file locations before ending.
    action_type: prompt
    action: |
      The SVG generation loop has completed successfully.

      Final output files:
      - ${captured.run_dir.output}/image.svg   — the generated SVG (primary output)
      - ${captured.run_dir.output}/brief.md    — the visual planning brief
      - ${captured.run_dir.output}/critique.md — the final evaluation scores and notes
      - ${captured.run_dir.output}/screenshot.png — the last Playwright-captured render

      Report these paths to the user and confirm the SVG is ready.
    terminal: true

  diagnose:
    action_type: prompt
    action: |
      The svg-image-generator loop has terminated with an unrecoverable failure.

      Diagnose what happened:
      - If ${captured.run_dir.output}/critique.md exists, read it and summarize the last evaluation scores.
      - Note whether ${captured.run_dir.output}/image.svg exists as a partial output.
      - Identify the most likely failure cause (most commonly: LLM error in the score state).

      Write a one-paragraph diagnostic summary the operator can use to re-run or adjust the image brief.
    next: failed

  failed:
    # HARNESS: Explicit failure terminal — reached when an unrecoverable error occurs
    # (e.g. LLM failure in score state). Provides a clear signal distinct from a
    # max_iterations timeout, making failure mode visible in ll-loop history.
    terminal: true
