name: deep-research
category: research
input_key: topic
description: |
  Iterative web research synthesis loop. Accepts a research topic or question,
  generates search queries, performs web searches, evaluates sources, identifies
  coverage gaps, and iterates until coverage is sufficient. Produces a structured
  Markdown report with citations. Run as:
  ll-loop run deep-research "your research topic"
initial: init
max_iterations: 30
timeout: 3600

context:
  topic: ""            # populated from positional CLI arg via input_key: topic
  output_dir: ".loops/research"
  depth: 3             # minimum search rounds before accepting convergence
  coverage_threshold_pct: 85  # target coverage percentage (used in score_coverage prompt)

states:

  init:
    # Setup phase — derive a slug from the topic, create a run directory, and
    # initialize empty research artifact files. Captures the absolute run-dir path
    # so all subsequent states can write to the same isolated location.
    action_type: shell
    action: |
      SLUG=$(echo "${context.topic}" | tr '[:upper:]' '[:lower:]' | tr -cs 'a-z0-9' '-' | sed 's/-\+/-/g; s/^-//; s/-$//')
      SLUG="$${SLUG:-deep-research-run}"
      DIR="${context.output_dir}/$SLUG"
      mkdir -p "$DIR"
      : > "$DIR/report.md"
      : > "$DIR/knowledge-base.md"
      : > "$DIR/coverage.md"
      : > "$DIR/query-log.md"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: generate_queries

  generate_queries:
    # Query generation — analyzes the topic and writes the initial set of search
    # queries to query-log.md. Frames the topic into 3–5 distinct facets that
    # together provide comprehensive coverage of the research question.
    action_type: prompt
    action: |
      Your task is to generate an initial set of search queries for this research topic:
      "${context.topic}"

      Analyze the topic and identify 3–5 distinct facets that together would provide
      comprehensive coverage of the research question. For each facet, write a targeted
      search query designed to surface high-quality sources.

      Append the queries to ${captured.run_dir.output}/query-log.md using exactly this format:

      ```
      ## Iteration 1 — Initial Queries

      **Research Topic**: ${context.topic}

      **Facets and Queries**:
      1. [Facet name]: [search query]
      2. [Facet name]: [search query]
      3. [Facet name]: [search query]
      ```

      Also initialize ${captured.run_dir.output}/coverage.md with the facet list:

      ```
      # Coverage Tracker

      **Topic**: ${context.topic}
      **Target Coverage**: ${context.coverage_threshold_pct}%

      ## Facets
      1. [Facet name] — score: 0/5
      2. [Facet name] — score: 0/5
      3. [Facet name] — score: 0/5
      ```
    next: search_web

  search_web:
    # Web research — uses WebSearch and WebFetch tools to gather information on the
    # queries from the latest iteration block in query-log.md. Appends findings to
    # knowledge-base.md with inline source URLs for later deduplication.
    action_type: prompt
    action: |
      Read ${captured.run_dir.output}/query-log.md and find the most recent iteration block
      (the last "## Iteration N" section).

      Use the WebSearch and WebFetch tools to research each query in that block:
      1. Issue 2–3 WebSearch calls per query
      2. Follow the most relevant results with WebFetch to extract detailed content
      3. Focus on authoritative sources: academic papers, official documentation,
         expert blog posts, and primary sources

      Append your findings to ${captured.run_dir.output}/knowledge-base.md using this format:

      ```
      ## Iteration N Findings

      ### [Facet name]
      [Key findings, claims, and relevant details]
      [Source: <url>]

      [Additional findings as needed]
      [Source: <url>]
      ```

      Include at least one [Source: <url>] marker per facet covered.
    next: evaluate_sources

  evaluate_sources:
    # Source evaluation — reviews newly added findings in knowledge-base.md, scores
    # each source for relevance and credibility, deduplicates citations, and prunes
    # low-quality or redundant entries before coverage scoring.
    action_type: prompt
    action: |
      Read ${captured.run_dir.output}/knowledge-base.md and review the most recent
      iteration's findings.

      For each source cited (each [Source: <url>] entry):
      1. Score relevance (1–5): does this source directly address the research topic?
      2. Score credibility (1–5): is this an authoritative or peer-reviewed source?
      3. Flag any duplicate URLs (same URL cited multiple times across iterations)

      Update the most recent iteration block in ${captured.run_dir.output}/knowledge-base.md:
      - Append a relevance and credibility score annotation after each [Source: <url>] line:
        [Source: <url>] (relevance: N/5, credibility: N/5)
      - Remove or mark [DUPLICATE] any citations already present in earlier iterations
      - Remove or mark [LOW-QUALITY] any entries with relevance < 2 AND credibility < 2

      Do not prune entries from earlier iterations — only annotate the most recent block.
    next: score_coverage

  score_coverage:
    # Coverage scoring — reads knowledge-base.md and coverage.md to score how well
    # the accumulated research addresses each facet of the topic. Updates coverage.md
    # with new scores and emits a convergence sentinel when coverage is sufficient.
    # Convergence is embedded here — no separate routing state needed (Option A pattern).
    action_type: prompt
    action: |
      Read both files:
      - ${captured.run_dir.output}/knowledge-base.md — accumulated research findings
      - ${captured.run_dir.output}/coverage.md — current facet scores

      Evaluate how thoroughly the knowledge base covers each facet using a 1–5 scale:
      - 1 (Minimal): topic mentioned but no substantive information
      - 2 (Basic): surface-level coverage, major gaps remain
      - 3 (Moderate): good coverage of core aspects, some gaps
      - 4 (Good): comprehensive coverage with only minor gaps
      - 5 (Excellent): thorough, authoritative coverage with strong sourcing

      Update ${captured.run_dir.output}/coverage.md — rewrite the ## Facets section with
      the new scores and add a ## Summary section:

      ```
      ## Summary

      Iteration: [N]
      Facet scores: [score1]/5, [score2]/5, [score3]/5, ...
      Average coverage: [X.X]/5 ([YY]%)
      Depth target: ${context.depth} rounds minimum
      ```

      Convergence rules:
      - Coverage is SUFFICIENT if: average facet score >= 4.0 AND current iteration >= ${context.depth}
      - Otherwise: more research is needed

      After updating coverage.md:
      - If coverage is SUFFICIENT, output exactly: COVERAGE_SUFFICIENT
      - Otherwise output: NEED_MORE
    evaluate:
      type: output_contains
      pattern: "COVERAGE_SUFFICIENT"
    on_yes: synthesize
    on_no: plan_next
    on_error: synthesize

  plan_next:
    # Next-round planning — reads the coverage gaps identified by score_coverage and
    # generates targeted follow-up queries for the next search iteration. Appends a
    # new iteration block to query-log.md and loops back to search_web.
    action_type: prompt
    action: |
      Read both files:
      - ${captured.run_dir.output}/coverage.md — current facet scores and gaps
      - ${captured.run_dir.output}/query-log.md — all queries issued so far

      Identify the facets with the lowest coverage scores. For each under-covered facet
      (score < 4), generate 2–3 targeted follow-up queries that:
      1. Address the specific gaps identified in coverage.md
      2. Do NOT duplicate queries already listed in query-log.md
      3. Target different angles: look for counter-arguments, edge cases, or deeper
         technical detail than the initial round

      Also identify 1–2 cross-cutting queries that might surface connections between facets.

      Append the new queries to ${captured.run_dir.output}/query-log.md using exactly this format:

      ```
      ## Iteration [N+1] — Gap-Filling Queries

      **Coverage gaps addressed**:
      - [Facet name] (score: N/5): [what is missing]

      **Queries**:
      1. [Facet name]: [follow-up query]
      2. [Facet name]: [follow-up query]
      3. Cross-cutting: [query spanning multiple facets]
      ```
    next: search_web

  synthesize:
    # Synthesis — consolidates knowledge-base.md into a structured Markdown research
    # report. Deduplicates source citations, organizes findings by facet, and writes
    # a final report.md with executive summary, key findings, source table, coverage
    # gaps, and conclusion.
    action_type: prompt
    action: |
      Read all research artifacts:
      - ${captured.run_dir.output}/knowledge-base.md — all accumulated findings
      - ${captured.run_dir.output}/coverage.md — final facet scores
      - ${captured.run_dir.output}/query-log.md — all queries issued

      Write a structured research report to ${captured.run_dir.output}/report.md:

      ```markdown
      # Research Report: ${context.topic}

      **Generated by**: deep-research loop
      **Research depth**: [N iterations, M queries issued]

      ## Executive Summary

      [2–3 paragraph synthesis of the most important findings. Directly answer the
      research question based on the evidence gathered. Note where evidence is strong
      vs. limited.]

      ## Key Findings

      ### [Facet 1 Name]
      [Substantive findings with inline citations. Use [1], [2], ... notation referencing
      the source table below.]

      ### [Facet 2 Name]
      [Findings with citations...]

      [Continue for each facet covered]

      ## Coverage Gaps

      [List facets or sub-questions that remain under-researched after all iterations.
      Note what additional research would be needed to address them.]

      ## Sources

      | # | URL | Relevance | Credibility | Facet |
      |---|-----|-----------|-------------|-------|
      | 1 | [url] | N/5 | N/5 | [facet name] |
      | 2 | [url] | N/5 | N/5 | [facet name] |

      [Deduplicate: each unique URL appears once. Exclude LOW-QUALITY and DUPLICATE entries.]

      ## Conclusion

      [1–2 paragraph conclusion synthesizing the overall answer to the research question,
      noting confidence level based on source quality and coverage depth.]
      ```

      After writing report.md, output the absolute path to the report:
      ${captured.run_dir.output}/report.md
    next: done

  done:
    # Terminal — reached when coverage is sufficient or max_iterations is exhausted.
    # Reports the final output file locations so the user can access the research report.
    action_type: prompt
    action: |
      The deep-research loop has completed.

      Final output files:
      - ${captured.run_dir.output}/report.md          — the research report (primary output)
      - ${captured.run_dir.output}/knowledge-base.md  — accumulated source findings
      - ${captured.run_dir.output}/coverage.md        — final facet coverage scores
      - ${captured.run_dir.output}/query-log.md       — all search queries issued

      Read ${captured.run_dir.output}/coverage.md and report the final facet scores
      and average coverage to the user. Confirm the research report is ready for review.
    terminal: true
