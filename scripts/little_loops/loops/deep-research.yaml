name: deep-research
category: research
input_key: topic
required_inputs: ["topic"]
description: |
  Iterative web research synthesis loop. Accepts a research topic or question,
  generates search queries, performs web searches, evaluates sources, identifies
  coverage gaps, and iterates until coverage is sufficient. Produces a structured
  Markdown report with citations. Delegates the inner research FSM chain to the
  oracles/research-coverage oracle (ENH-1876). Run as:
  ll-loop run deep-research "your research topic"
initial: init
max_iterations: 30
timeout: 3600

context:
  topic: ""            # populated from positional CLI arg via input_key: topic
  depth: 3             # minimum search rounds before accepting convergence
  coverage_threshold_pct: 85  # target coverage percentage (used in score_coverage prompt)
  source_filter: ""    # constrain searches (e.g. "site:arxiv.org"); empty = web-wide
  academic_mode: false # enable recency scoring, arxiv dedup, and BibTeX output

states:

  init:
    # Setup phase — create per-run artifact files in the runner-injected run_dir.
    # Captures the absolute path so all subsequent states can write to it.
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      : > "$DIR/report.md"
      : > "$DIR/knowledge-base.md"
      : > "$DIR/coverage.md"
      : > "$DIR/query-log.md"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: run_research

  run_research:
    # Delegates the full research FSM chain (generate_queries → search_web →
    # evaluate_sources → score_coverage → [plan_next →]* synthesize → done)
    # to the research-coverage oracle with standard web research parameters.
    loop: oracles/research-coverage
    with:
      run_dir: "${captured.run_dir.output}"
      topic: "${context.topic}"
      source_filter: "${context.source_filter}"
      academic_mode: "${context.academic_mode}"
    on_success: done
    on_failure: failed
    on_error: failed

  done:
    terminal: true

  failed:
    terminal: true
