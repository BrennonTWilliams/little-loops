name: rn-remediate
visibility: internal
category: planning
description: |
  Sub-loop for the iterative deepening remediation cycle (diagnose → remediate →
  re_assess → check_convergence) extracted from rn-implement. Accepts an issue ID
  via parameters and runs the remediation loop until PASS, budget exhaustion,
  or STALLED. Terminates with done (issue implemented) or failed (escalate to
  parent for decomposition).

  Run standalone as: ll-loop run rn-remediate "<issue-id>"

  Invoked by parent rn-implement via:
    loop: rn-remediate
    with:
      issue_id: "${captured.input.output}"
      readiness_threshold: "${context.readiness_threshold}"
      outcome_threshold: "${context.outcome_threshold}"
      max_remediation_passes: "${context.max_remediation_passes}"
    on_yes: dequeue_next
    on_no: run_decomposition
initial: assess
max_iterations: 100
timeout: 14400
on_handoff: spawn
import:
  - lib/common.yaml
meta_self_eval_ok: false
shared_state_ok: false
partial_route_ok: true

parameters:
  issue_id:
    type: string
    required: true
    description: "Issue ID to remediate (passed from parent's captured.input.output)"
  readiness_threshold:
    type: integer
    required: false
    description: "Confidence score threshold for readiness gate (default: 85)"
  outcome_threshold:
    type: integer
    required: false
    description: "Outcome confidence threshold (default: 75)"
  max_remediation_passes:
    type: integer
    required: false
    description: "Max remediation iterations before escalation to decomposition (default: 3)"
  run_dir:
    type: path
    required: true
    description: "Parent loop's run directory for score snapshots and counter coupling"

context:
  readiness_threshold: 85
  outcome_threshold: 75
  max_remediation_passes: 3
  # BUG-2007 Defect 2: diagnose routing thresholds, overridable so callers can
  # tune routing to match their score targets. Defaults preserve the prior
  # hardcoded literals so existing callers stay backward-compatible.
  diagnose_ambiguity_threshold: 15
  diagnose_complexity_threshold: 15
  diagnose_change_surface_threshold: 15
  diagnose_confidence_floor: 50

states:
  # =========================================================================
  # Phase 1: Assessment Bridge — Confidence Check & Gate Chain
  # =========================================================================

  assess:
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${context.issue_id} --auto"
    action_type: slash_command
    on_success: verify_scores_persisted
    on_partial: verify_scores_persisted
    on_no: refine
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  verify_scores_persisted:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      CONFIDENCE=$(grep '^confidence_score:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      if [ -z "$CONFIDENCE" ] || [ -z "$OUTCOME" ]; then
        echo "ERROR: confidence_score or outcome_confidence missing for $ID"
        exit 1
      fi
      # Write pre-scores
      ll-issues show "$ID" --json > "${context.run_dir}/pre_scores_$${ID}.json" 2>/dev/null
      echo "Scores persisted for $ID: confidence=$CONFIDENCE, outcome=$OUTCOME"
    evaluate:
      type: exit_code
    on_yes: check_readiness
    on_no: emit_scores_missing
    on_error: emit_scores_missing

  check_readiness:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      # Use the loop-context thresholds so the readiness gate agrees with
      # diagnose / check_convergence under overridden thresholds (ENH-1977 Fix 2).
      ll-issues check-readiness "$ID" \
        --readiness "${context.readiness_threshold}" \
        --outcome "${context.outcome_threshold}"
    on_yes: check_complexity_pre_implement
    on_no: check_outcome
    on_error: check_outcome

  check_complexity_pre_implement:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      COMPLEXITY=$(jq -r '.score_complexity // 0' "$PRE" 2>/dev/null || echo 0)
      THRESHOLD="${context.diagnose_complexity_threshold}"
      [ "$COMPLEXITY" -ge "$THRESHOLD" ] && exit 0 || exit 1
    on_yes: refine
    on_no: check_wire_pre_implement
    on_error: check_wire_pre_implement

  check_wire_pre_implement:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      CHANGE_SURFACE=$(jq -r '.score_change_surface // 0' "$PRE" 2>/dev/null || echo 0)
      [ "$CHANGE_SURFACE" -eq 0 ] && exit 0 || exit 1
    on_yes: wire
    on_no: implement
    on_error: implement

  check_outcome:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}' | tr -d "'\"")
      THRESHOLD="${context.outcome_threshold}"
      if [ -n "$OUTCOME" ] && [ "$OUTCOME" -ge "$THRESHOLD" ]; then
        exit 0
      else
        exit 1
      fi
    # BUG-2007 Defect 4: route on_yes directly to refine, not diagnose. When
    # check_readiness fails the joint gate but check_outcome passes outcome-only,
    # the deficiency is confidence_score. diagnose's first rule (IMPLEMENT) needs
    # both thresholds — already found false by check_readiness — so the
    # diagnose → route_d_implement branch is dead from here. refine targets the
    # confidence gap directly. check_wire_needed_outcome gates wire first when the
    # integration map is absent (score_change_surface == 0).
    on_yes: check_wire_needed_outcome
    on_no: check_decision_needed
    on_error: check_decision_needed

  check_wire_needed_outcome:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      CHANGE_SURFACE=$(jq -r '.score_change_surface // 0' "$PRE" 2>/dev/null || echo 0)
      [ "$CHANGE_SURFACE" -eq 0 ] && exit 0 || exit 1
    on_yes: wire
    on_no: refine
    on_error: refine

  check_decision_needed:
    fragment: shell_exit
    action: "ll-issues check-flag ${context.issue_id} decision_needed"
    on_yes: decide
    on_no: diagnose
    on_error: diagnose

  # =========================================================================
  # Phase 2: Dimensional Diagnosis & Token Routing
  # =========================================================================

  diagnose:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      READINESS_THRESHOLD="${context.readiness_threshold}"
      OUTCOME_THRESHOLD="${context.outcome_threshold}"

      # Fetch scores via ll-issues show --json
      SCORES_JSON=$(ll-issues show "$ID" --json 2>/dev/null)
      if [ -z "$SCORES_JSON" ]; then
        # BUG-2003 AC5: an unresolved ID must surface as an explicit failure, not
        # silently route to DECOMPOSE (which masks a resolution miss as a real
        # routing decision). Exit non-zero -> on_error: emit_implement_failed.
        echo "ERROR: ll-issues show --json returned empty for $ID (unresolved issue ID)"
        exit 1
      fi

      # Parse scores (use JSON keys: confidence, outcome, not frontmatter names)
      CONFIDENCE=$(echo "$SCORES_JSON" | jq -r '.confidence // 0' 2>/dev/null)
      OUTCOME=$(echo "$SCORES_JSON" | jq -r '.outcome // 0' 2>/dev/null)
      COMPLEXITY=$(echo "$SCORES_JSON" | jq -r '.score_complexity // 0' 2>/dev/null)
      AMBIGUITY=$(echo "$SCORES_JSON" | jq -r '.score_ambiguity // 0' 2>/dev/null)
      CHANGE_SURFACE=$(echo "$SCORES_JSON" | jq -r '.score_change_surface // 0' 2>/dev/null)
      DECISION_NEEDED=$(echo "$SCORES_JSON" | jq -r '.decision_needed // "false"' 2>/dev/null)
      MISSING_ARTIFACTS=$(echo "$SCORES_JSON" | jq -r '.missing_artifacts // "false"' 2>/dev/null)

      # Log scores for diagnostics
      printf '{"id":"%s","confidence":%s,"outcome":%s,"complexity":%s,"ambiguity":%s,"change_surface":%s,"decision_needed":"%s","missing_artifacts":"%s"}\n' \
        "$ID" "$CONFIDENCE" "$OUTCOME" "$COMPLEXITY" "$AMBIGUITY" "$CHANGE_SURFACE" "$DECISION_NEEDED" "$MISSING_ARTIFACTS" \
        > "$RUN_DIR/diagnosis_$${ID}.json"

      # Priority-ordered routing (first match wins)
      if [ "$CONFIDENCE" -ge "$READINESS_THRESHOLD" ] && [ "$OUTCOME" -ge "$OUTCOME_THRESHOLD" ]; then
        echo "IMPLEMENT"
      elif [ "$DECISION_NEEDED" = "true" ]; then
        echo "DECIDE"
      elif [ "$MISSING_ARTIFACTS" = "true" ]; then
        echo "WIRE"
      elif [ "$AMBIGUITY" -ge "${context.diagnose_ambiguity_threshold}" ] \
          && [ "$CHANGE_SURFACE" -eq 0 ]; then
        # No integration map exists → wiring can fill the ambiguity gap
        echo "WIRE"
      elif [ "$AMBIGUITY" -ge "${context.diagnose_ambiguity_threshold}" ]; then
        # Integration map exists → residual ambiguity is decision-driven; refine to resolve
        echo "REFINE"
      elif [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ] \
          && [ "$CHANGE_SURFACE" -eq 0 ]; then
        # High complexity + no integration map → wire before refining
        echo "WIRE"
      elif [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ] || [ "$CONFIDENCE" -lt "${context.diagnose_confidence_floor}" ]; then
        echo "REFINE"
      elif [ "$CHANGE_SURFACE" -ge "${context.diagnose_change_surface_threshold}" ]; then
        echo "DECOMPOSE"
      else
        echo "REFINE"
      fi
    capture: diagnosis
    next: route_d_implement
    on_error: emit_implement_failed

  route_d_implement:
    evaluate:
      type: output_contains
      source: "${captured.diagnosis.output}"
      pattern: "IMPLEMENT"
    on_yes: implement
    on_no: route_d_decide
    on_error: emit_implement_failed

  route_d_decide:
    evaluate:
      type: output_contains
      source: "${captured.diagnosis.output}"
      pattern: "DECIDE"
    on_yes: decide
    on_no: route_d_wire
    on_error: emit_implement_failed

  route_d_wire:
    evaluate:
      type: output_contains
      source: "${captured.diagnosis.output}"
      pattern: "WIRE"
    on_yes: wire
    on_no: route_d_refine
    on_error: emit_implement_failed

  route_d_refine:
    evaluate:
      type: output_contains
      source: "${captured.diagnosis.output}"
      pattern: "REFINE"
    on_yes: refine
    on_no: emit_needs_decompose
    on_error: emit_implement_failed

  # =========================================================================
  # Phase 3: Remediation Actions
  # =========================================================================

  implement:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      ll-auto --only "$ID" 2>&1
      # Failure recording is owned by the parent's record_failure state
      # (driven by the IMPLEMENT_FAILED outcome token) to avoid double-counting.
      exit $?
    on_yes: emit_implemented
    on_no: emit_implement_failed
    on_error: emit_implement_failed

  decide:
    fragment: with_rate_limit_handling
    action: "/ll:decide-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_success: re_assess
    on_error: re_assess
    on_rate_limit_exhausted: rate_limit_diagnostic

  wire:
    fragment: with_rate_limit_handling
    action: "/ll:wire-issue ${context.issue_id} --auto"
    action_type: slash_command
    # BUG-2007 Defect 1: route to re_assess on success, not unconditionally to
    # refine. If wiring alone resolves the condition, re_assess → check_convergence
    # routes back to refine/diagnose only if ambiguity/artifacts remain — avoiding
    # a wasted --full-rewrite pass that could overwrite valid wiring changes.
    # on_error still falls back to refine: a wiring failure warrants a rewrite.
    on_success: re_assess
    on_error: refine
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine:
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto --full-rewrite"
    action_type: slash_command
    on_success: re_assess
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  # =========================================================================
  # Phase 4: Re-Assessment & Convergence
  # =========================================================================

  re_assess:
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${context.issue_id} --auto"
    action_type: slash_command
    on_success: verify_re_assess_scores
    on_partial: verify_re_assess_scores
    on_no: refine
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  verify_re_assess_scores:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      CONFIDENCE=$(grep '^confidence_score:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      if [ -z "$CONFIDENCE" ] || [ -z "$OUTCOME" ]; then
        echo "ERROR: confidence_score or outcome_confidence missing for $ID after re_assess"
        exit 1
      fi
      # Write post-scores
      ll-issues show "$ID" --json > "${context.run_dir}/post_scores_$${ID}.json" 2>/dev/null
      echo "Post-scores persisted for $ID: confidence=$CONFIDENCE, outcome=$OUTCOME"
    evaluate:
      type: exit_code
    on_yes: check_convergence
    on_no: emit_scores_missing
    on_error: emit_scores_missing

  check_convergence:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      READINESS_THRESHOLD="${context.readiness_threshold}"
      OUTCOME_THRESHOLD="${context.outcome_threshold}"

      PRE="$${RUN_DIR}/pre_scores_$${ID}.json"
      POST="$${RUN_DIR}/post_scores_$${ID}.json"

      if [ ! -f "$PRE" ]; then
        echo "ERROR: Pre-scores file not found: $PRE"
        echo "CONVERGED_STALLED"
        exit 0
      fi
      if [ ! -f "$POST" ]; then
        echo "ERROR: Post-scores file not found: $POST"
        echo "CONVERGED_STALLED"
        exit 0
      fi

      # Parse pre/post scores (use JSON keys: confidence, outcome)
      PRE_CONFIDENCE=$(jq -r '.confidence // 0' "$PRE" 2>/dev/null)
      PRE_OUTCOME=$(jq -r '.outcome // 0' "$PRE" 2>/dev/null)
      PRE_COMPLEXITY=$(jq -r '.score_complexity // 0' "$PRE" 2>/dev/null)
      PRE_AMBIGUITY=$(jq -r '.score_ambiguity // 0' "$PRE" 2>/dev/null)

      POST_CONFIDENCE=$(jq -r '.confidence // 0' "$POST" 2>/dev/null)
      POST_OUTCOME=$(jq -r '.outcome // 0' "$POST" 2>/dev/null)
      POST_COMPLEXITY=$(jq -r '.score_complexity // 0' "$POST" 2>/dev/null)
      POST_AMBIGUITY=$(jq -r '.score_ambiguity // 0' "$POST" 2>/dev/null)

      # Compute deltas
      DELTA_CONFIDENCE=$((POST_CONFIDENCE - PRE_CONFIDENCE))
      DELTA_OUTCOME=$((POST_OUTCOME - PRE_OUTCOME))
      # For complexity/ambiguity, improvement means score went DOWN, so invert delta
      DELTA_COMPLEXITY=$((PRE_COMPLEXITY - POST_COMPLEXITY))
      DELTA_AMBIGUITY=$((PRE_AMBIGUITY - POST_AMBIGUITY))

      # Total improvement: sum of all deltas (positive = improved)
      TOTAL_DELTA=$((DELTA_CONFIDENCE + DELTA_OUTCOME + DELTA_COMPLEXITY + DELTA_AMBIGUITY))

      # Increment remediation counter
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      REM_COUNT=$((REM_COUNT + 1))
      echo "$REM_COUNT" > "$REM_COUNTER_FILE"

      # Log convergence data
      printf '{"id":"%s","pre_confidence":%s,"post_confidence":%s,"pre_outcome":%s,"post_outcome":%s,"delta_confidence":%s,"delta_outcome":%s,"delta_complexity":%s,"delta_ambiguity":%s,"total_delta":%s}\n' \
        "$ID" "$PRE_CONFIDENCE" "$POST_CONFIDENCE" "$PRE_OUTCOME" "$POST_OUTCOME" \
        "$DELTA_CONFIDENCE" "$DELTA_OUTCOME" "$DELTA_COMPLEXITY" "$DELTA_AMBIGUITY" "$TOTAL_DELTA" \
        > "$RUN_DIR/convergence_$${ID}.json"

      # BUG-2007 Defect 3: refresh the pre-scores baseline with this pass's
      # post-scores so the NEXT pass measures pass-over-pass delta rather than
      # cumulative session delta. Without this, a plateaued issue keeps a large
      # accumulated TOTAL_DELTA and never emits CONVERGED_STALLED.
      cp "$POST" "$PRE"

      # Convergence rules (first match wins)
      if [ "$POST_CONFIDENCE" -ge "$READINESS_THRESHOLD" ] && [ "$POST_OUTCOME" -ge "$OUTCOME_THRESHOLD" ]; then
        echo "CONVERGED_PASS"
      elif [ "$TOTAL_DELTA" -le 0 ]; then
        # Distinguish: stalled because unresolvable decision vs genuinely too large
        POST_DECISION=$(jq -r '.decision_needed // "false"' "$POST" 2>/dev/null)
        if [ "$POST_DECISION" = "true" ]; then
          echo "NEEDS_MANUAL_REVIEW"
        else
          echo "CONVERGED_STALLED"
        fi
      else
        echo "CONVERGED_IMPROVED"
      fi
    capture: convergence_result
    next: route_conv_pass
    on_error: route_conv_pass

  route_conv_pass:
    evaluate:
      type: output_contains
      source: "${captured.convergence_result.output}"
      pattern: "CONVERGED_PASS"
    on_yes: implement
    on_no: route_conv_improved
    on_error: emit_implement_failed

  route_conv_improved:
    evaluate:
      type: output_contains
      source: "${captured.convergence_result.output}"
      pattern: "CONVERGED_IMPROVED"
    on_yes: check_remediation_budget
    on_no: route_conv_manual_review
    on_error: emit_implement_failed

  route_conv_manual_review:
    evaluate:
      type: output_contains
      source: "${captured.convergence_result.output}"
      pattern: "NEEDS_MANUAL_REVIEW"
    on_yes: emit_needs_manual_review
    # ENH-2107: CONVERGED_STALLED routes to check_remediation_budget instead of
    # directly to emit_stalled_needs_decompose, giving the loop a budget-gated
    # retry (same as CONVERGED_IMPROVED). Only after passes are exhausted does
    # check_remediation_budget escalate to emit_stalled_needs_decompose.
    # on_error stays on plain emit_needs_decompose — a pattern-match error is
    # not evidence of a stall.
    on_no: check_remediation_budget
    on_error: emit_needs_decompose

  check_remediation_budget:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      MAX_PASSES="${context.max_remediation_passes}"
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      echo "$REM_COUNT"
    evaluate:
      type: output_numeric
      operator: lt
      target: "${context.max_remediation_passes}"
    on_yes: diagnose
    # BUG-2006: remediation budget exhausted is stall-adjacent — the automated
    # moves ran out without convergence. Emit the stall token so the parent
    # defers rather than silently skipping.
    on_no: emit_stalled_needs_decompose
    on_error: emit_implement_failed

  # =========================================================================
  # Outcome-Token Emitters (ENH-1977 Fix 1 — parent↔sub-loop classification)
  # =========================================================================
  # Each terminal path writes exactly one outcome token to the shared run_dir so
  # the parent's classify_remediation can route deterministically rather than
  # collapsing every non-done terminal into "decompose". Tokens:
  #   IMPLEMENTED | NEEDS_DECOMPOSE | NEEDS_MANUAL_REVIEW | IMPLEMENT_FAILED | SCORES_MISSING | RATE_LIMITED

  emit_implemented:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      echo "IMPLEMENTED" > "${context.run_dir}/subloop_outcome_$ID.txt"
      ALREADY_COUNTED=$(grep -cxF "$ID" "${context.run_dir}/counted.txt" 2>/dev/null || echo 0)
      if [ "$ALREADY_COUNTED" -eq 0 ]; then
        COUNT=$(cat "${context.run_dir}/implemented_count.txt" 2>/dev/null || echo 0)
        echo $((COUNT + 1)) > "${context.run_dir}/implemented_count.txt"
        echo "$ID" >> "${context.run_dir}/counted.txt"
      fi
    next: done

  emit_needs_decompose:
    action_type: shell
    action: |
      echo "NEEDS_DECOMPOSE" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_stalled_needs_decompose:
    # BUG-2006: stall-origin variant of NEEDS_DECOMPOSE. Reached only from the
    # convergence-stall and budget-exhausted paths (NOT diagnose-DECOMPOSE). The
    # token is a superstring of NEEDS_DECOMPOSE, so the parent's route_rem_decompose
    # (substring match) still triggers a decomposition attempt; the parent's
    # route_dec_stalled_origin disambiguates after NO_CHILDREN to defer rather than
    # skip.
    action_type: shell
    action: |
      echo "STALLED_NEEDS_DECOMPOSE" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_needs_manual_review:
    action_type: shell
    action: |
      echo "MANUAL_REVIEW_NEEDED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_implement_failed:
    action_type: shell
    action: |
      echo "IMPLEMENT_FAILED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_scores_missing:
    action_type: shell
    action: |
      echo "SCORES_MISSING" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  # =========================================================================
  # Diagnostic State
  # =========================================================================

  rate_limit_diagnostic:
    # Writes RATE_LIMITED to subloop_outcome and routes to failed (ENH-1977 GAP A).
    # Parent's rate_limits.txt record is owned by the parent to avoid double counting.
    fragment: subloop_rate_limit_diagnostic
    with:
      operation: remediation

  # =========================================================================
  # Terminal States
  # =========================================================================

  done:
    terminal: true

  failed:
    terminal: true
