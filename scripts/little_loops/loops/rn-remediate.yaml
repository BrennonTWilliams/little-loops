name: rn-remediate
visibility: internal
category: planning
description: |
  Sub-loop for the iterative deepening remediation cycle (diagnose → remediate →
  re_assess → check_convergence) extracted from rn-implement. Accepts an issue ID
  via parameters and runs the remediation loop until PASS, budget exhaustion,
  or STALLED. Terminates with done (issue implemented) or failed (escalate to
  parent for decomposition).

  Run standalone as: ll-loop run rn-remediate "<issue-id>"

  Invoked by parent rn-implement via:
    loop: rn-remediate
    with:
      issue_id: "${captured.input.output}"
      readiness_threshold: "${context.readiness_threshold}"
      outcome_threshold: "${context.outcome_threshold}"
      max_remediation_passes: "${context.max_remediation_passes}"
    on_yes: dequeue_next
    on_no: run_decomposition
initial: ensure_formatted
max_steps: 100
timeout: 14400
on_handoff: spawn
import:
  - lib/common.yaml
meta_self_eval_ok: false
shared_state_ok: false

parameters:
  issue_id:
    type: string
    required: true
    description: "Issue ID to remediate (passed from parent's captured.input.output)"
  readiness_threshold:
    type: integer
    required: false
    description: "Confidence score threshold for readiness gate (default: 85)"
  outcome_threshold:
    type: integer
    required: false
    description: "Outcome confidence threshold (default: 75)"
  max_remediation_passes:
    type: integer
    required: false
    description: "Max remediation iterations before escalation to decomposition (default: 3)"
  run_dir:
    type: path
    required: true
    description: "Parent loop's run directory for score snapshots and counter coupling"
  skip_learning_gate:
    type: string
    required: false
    description: "Non-empty bypasses the ENH-2319 learning gate in the inner ll-auto --only (parity with ll-auto --skip-learning-gate)"

context:
  readiness_threshold: 85
  outcome_threshold: 75
  max_remediation_passes: 3
  # BUG-2007 Defect 2: diagnose routing thresholds, overridable so callers can
  # tune routing to match their score targets. Defaults preserve the prior
  # hardcoded literals so existing callers stay backward-compatible.
  diagnose_ambiguity_threshold: 15
  diagnose_complexity_threshold: 15
  diagnose_change_surface_threshold: 15
  diagnose_confidence_floor: 50
  # Marker-gate enforcement: require an above-minimal-complexity issue to be
  # refined AND wired at least once before implement. Set false to restore the
  # single-dimension short-circuit behavior. Overridable by the parent via with:.
  require_refine_and_wire: true
  # Learning-gate skip knob: parity with `ll-auto --skip-learning-gate`. When
  # non-empty, the inner `ll-auto --only` is invoked with --skip-learning-gate so
  # the ENH-2319 gate is bypassed for this issue. Threaded from the parent
  # (rn-implement) via with:. Default empty = gate active (config-gated).
  skip_learning_gate: ""
  # FEAT-2552: min_pass_rate threshold for the code-run-gate oracle's
  # pass_rate evaluator. Strict 1.0 = every test must pass for IMPLEMENTED.
  # Overridable by the parent via with: binding (rn-implement). Mirrors
  # max_remediation_passes (line 60) as a per-loop default that callers can
  # tune; the oracle's own default is 0.95, but F2b pins 1.0 here so a
  # deliberately broken implementation cannot earn IMPLEMENTED (the
  # dominant robustness hole in the greenfield family).
  min_pass_rate: 1.0

states:
  # =========================================================================
  # Phase 0: Format Guard — ensure required template sections exist before
  # assessment. confidence-check (assess) scores the issue's content; a
  # malformed issue (missing required sections) yields unreliable scores that
  # then mis-route the diagnose → remediate chain. This is the loop's entry
  # point so both the orchestrated (rn-implement → run_remediation) and
  # standalone (`ll-loop run rn-remediate "<id>"`) paths are guarded.
  # =========================================================================

  ensure_formatted:
    # Deterministic structural linter (ENH-2426): catches missing, renamed
    # (deprecated-with-canonical-replacement), empty, and boilerplate-but-present
    # sections — not just missing headers. Cheap (no LLM) — only when a gap is
    # found do we pay for the /ll:format-issue slash command. Fail-open: an
    # unresolved template / unreadable issue -> ll-issues format-check reports
    # no gaps (exit 0) so a tooling glitch never blocks remediation.
    action_type: shell
    action: |
      ID="${context.issue_id}"
      ll-issues format-check "$ID"
    evaluate:
      type: exit_code
    on_yes: assess
    on_no: format_issue
    on_error: format_issue   # fail-toward-formatting, then assess

  format_issue:
    # Conditional repair: only reached when ensure_formatted found a gap.
    # Routes unconditionally to assess (never back to the gate) so this adds at
    # most ONE format pass — bounded, no oscillation. Fail-open on every non-yes
    # verdict: a formatting failure should not dead-end the loop; assess →
    # diagnose still catches residual content deficiencies.
    # Rate-limit budget is deliberately trimmed to near-immediate fall-through
    # (short retry tier + one ~1s long-wait rung) rather than the fragment's 6h
    # default: this is a cheap, optional, fail-open pass, not worth a multi-hour
    # 429 wait (BUG-2433).
    fragment: with_rate_limit_handling
    action: "/ll:format-issue ${context.issue_id} --auto"
    action_type: slash_command
    rate_limit_max_wait_seconds: 1
    rate_limit_long_wait_ladder: [1]
    on_yes: assess
    on_no: assess
    on_partial: assess
    on_error: assess
    on_rate_limit_exhausted: assess

  # =========================================================================
  # Phase 1: Assessment Bridge — Confidence Check & Gate Chain
  # =========================================================================

  assess:
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${context.issue_id} --auto"
    action_type: slash_command
    on_success: verify_scores_persisted
    on_partial: verify_scores_persisted
    on_no: refine_first
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  verify_scores_persisted:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      CONFIDENCE=$(grep '^confidence_score:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      if [ -z "$CONFIDENCE" ] || [ -z "$OUTCOME" ]; then
        echo "ERROR: confidence_score or outcome_confidence missing for $ID"
        exit 1
      fi
      # Write pre-scores
      ll-issues show "$ID" --json > "${context.run_dir}/pre_scores_$${ID}.json" 2>/dev/null
      # Marker-gate: snapshot a STABLE complexity band ONCE. pre_scores_<ID>.json
      # is overwritten every pass by check_convergence (cp POST PRE), so the band
      # must be captured here — the only point with the genuine pre-remediation
      # score — into a file the gate can read without it mutating mid-run.
      COMPLEXITY=$(jq -r '.score_complexity // 0' "${context.run_dir}/pre_scores_$${ID}.json" 2>/dev/null || echo 0)
      if [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ]; then
        echo "ABOVE_MINIMAL" > "${context.run_dir}/complexity_band_$${ID}.txt"
      else
        echo "MINIMAL" > "${context.run_dir}/complexity_band_$${ID}.txt"
      fi
      echo "Scores persisted for $ID: confidence=$CONFIDENCE, outcome=$OUTCOME"
    evaluate:
      type: exit_code
    on_yes: check_readiness
    on_no: emit_scores_missing
    on_error: emit_scores_missing

  check_readiness:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      # Use the loop-context thresholds so the readiness gate agrees with
      # diagnose / check_convergence under overridden thresholds (ENH-1977 Fix 2).
      ll-issues check-readiness "$ID" \
        --readiness "${context.readiness_threshold}" \
        --outcome "${context.outcome_threshold}"
    on_yes: check_complexity_pre_implement
    on_no: check_outcome
    on_error: check_outcome

  check_complexity_pre_implement:
    # ENH-2223: issue already passed check_readiness (confidence >= 85, outcome >= 75).
    # High complexity here does NOT imply content deficiency — route to the wire check
    # the same as low-complexity issues. gate_implement enforces a refine+wire pass for
    # above-minimal issues; --full-rewrite is not warranted for an already-ready issue.
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      COMPLEXITY=$(jq -r '.score_complexity // 0' "$PRE" 2>/dev/null || echo 0)
      THRESHOLD="${context.diagnose_complexity_threshold}"
      [ "$COMPLEXITY" -ge "$THRESHOLD" ] && exit 0 || exit 1
    on_yes: check_wire_pre_implement
    on_no: check_wire_pre_implement
    on_error: check_wire_pre_implement

  check_wire_pre_implement:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      CHANGE_SURFACE=$(jq -r '.score_change_surface // 0' "$PRE" 2>/dev/null || echo 0)
      [ "$CHANGE_SURFACE" -eq 0 ] && exit 0 || exit 1
    on_yes: wire
    on_no: gate_implement   # BUG-2306: change_surface > 0 must enforce ENH-2163 gate
    on_error: implement

  check_outcome:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}' | tr -d "'\"")
      THRESHOLD="${context.outcome_threshold}"
      if [ -n "$OUTCOME" ] && [ "$OUTCOME" -ge "$THRESHOLD" ]; then
        exit 0
      else
        exit 1
      fi
    # BUG-2007 Defect 4: route on_yes directly to refine, not diagnose. When
    # check_readiness fails the joint gate but check_outcome passes outcome-only,
    # the deficiency is confidence_score. diagnose's first rule (IMPLEMENT) needs
    # both thresholds — already found false by check_readiness — so the
    # diagnose → route_d_implement branch is dead from here. refine targets the
    # confidence gap directly. check_wire_needed_outcome gates wire first when the
    # integration map is absent (score_change_surface == 0).
    on_yes: check_wire_needed_outcome
    on_no: check_decision_needed
    on_error: check_decision_needed

  check_wire_needed_outcome:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      CHANGE_SURFACE=$(jq -r '.score_change_surface // 0' "$PRE" 2>/dev/null || echo 0)
      [ "$CHANGE_SURFACE" -eq 0 ] && exit 0 || exit 1
    on_yes: wire
    # ENH-2247: confidence-gap path (outcome already >= threshold, integration map
    # present) is a score-threshold trigger, not a content diagnosis — route to the
    # lighter refine_first (--auto) rather than the destructive --full-rewrite.
    on_no: refine_first
    on_error: refine_first

  check_decision_needed:
    fragment: shell_exit
    action: "ll-issues check-flag ${context.issue_id} decision_needed"
    on_yes: check_decision_decidable
    on_no: diagnose
    on_error: diagnose

  check_decision_decidable:
    # ENH-2443: validate before decide. Catches issues with decision_needed: true
    # but no enumerable options in ## Proposed Solution. Without this gate,
    # decide's silent pass-through on no options lets check_convergence escalate
    # to NEEDS_MANUAL_REVIEW even when the underlying case is "deposit options
    # first and try again". Mirrors check_decision_needed_post's failure philosophy
    # (fail-open: a validation-tooling error still routes to decide).
    # ll-issues check-decidable is the deterministic (non-LLM) companion to
    # /ll:decide-issue --validate-only — same Patterns 1-4 counting logic, callable
    # from a shell state (mirrors ensure_formatted -> ll-issues format-check).
    # Marker-bounded: once deposit_options has run once for this issue, skip
    # re-validation and go straight to decide (bounds the detour to one retry).
    # ENH-2446: chain check-open-questions first — coverage-aware probe that
    # catches the mixed case (resolved options + free-form open questions). The
    # check-decidable fallback keeps the ENH-2443 behavior for issues that lack
    # even one option block. Fail-open on_error: decide is preserved.
    fragment: shell_exit
    action: |
      if [ -f "${context.run_dir}/decide_options_deposited_${context.issue_id}.txt" ]; then
        exit 0
      fi
      ll-issues check-open-questions "${context.issue_id}" || \
        ll-issues check-decidable "${context.issue_id}"
    on_yes: decide
    on_no: deposit_options
    on_error: decide

  deposit_options:
    # Bounded retry: refine --auto may deposit Option A/B/C blocks that decide can
    # then score. Write-once marker (mirrors refined_<ID>/wired_<ID>) prevents
    # infinite loops if refine also can't deposit options — falls through to decide
    # with no enumerable options; check_convergence then escalates to
    # MANUAL_REVIEW_NEEDED/MANUAL_REVIEW_RECOMMENDED with the diagnostic now visible.
    fragment: with_rate_limit_handling
    action_type: slash_command
    action: "/ll:refine-issue ${context.issue_id} --auto"
    on_yes: record_options_deposited
    on_no: decide
    on_partial: record_options_deposited
    on_error: decide
    on_rate_limit_exhausted: rate_limit_diagnostic

  record_options_deposited:
    # Marker ensures the deposit_options detour runs at most once per issue —
    # subsequent cycles of check_convergence -> check_decision_decidable skip
    # deposit_options and fall through to decide (which will properly escalate
    # to NEEDS_MANUAL_REVIEW after one cycle).
    action_type: shell
    action: |
      echo "1" > "${context.run_dir}/decide_options_deposited_${context.issue_id}.txt"
    next: check_open_question_progress

  # ENH-2446: progress-gated deposit_options re-fire. The write-once marker above
  # is the "tried at least once" anchor (preserved for MANUAL_REVIEW_RECOMMENDED
  # semantics); this state lets deposit_options run more than once when it is
  # *demonstrably still making progress* — i.e. the open-question count keeps
  # strictly decreasing. The open_question_stall evaluator (max_stall: 2, mirrors
  # score_stall) is self-bounding: once the count plateaus for two consecutive
  # rounds, on_no routes to decide (let NEEDS_MANUAL_REVIEW fire) so the loop
  # cannot infinite-loop on a stuck issue. The outer check_remediation_budget
  # cap (max_remediation_passes: 3) bounds total iterations.
  check_open_question_progress:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      HISTORY_FILE="$${RUN_DIR}/.open_questions_$${ID}.history"

      # Snapshot the current unresolved-question count from the deterministic probe
      # (same probe ll-issues check-open-questions uses, but in-process via
      # python instead of a subprocess for shell-state efficiency).
      COUNT=$(python3 -c "
      from little_loops.cli.issues.show import _resolve_issue_id
      from little_loops.config import BRConfig
      from little_loops.issue_parser import (
          count_open_questions_in_sections,
          count_unresolved_options,
      )
      cfg = BRConfig('.')
      path = _resolve_issue_id(cfg, '$ID')
      if path is None:
          print(0)
      else:
          c = path.read_text()
          print(count_unresolved_options(c) + count_open_questions_in_sections(c))
      " 2>/dev/null || echo 0)

      echo "$${COUNT}"
      echo "$${COUNT}" >> "$${HISTORY_FILE}"
    fragment: open_question_stall_gate
    on_yes: check_decision_decidable
    on_no: decide
    on_error: decide

  # =========================================================================
  # Phase 2: Dimensional Diagnosis & Token Routing
  # =========================================================================

  diagnose:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      READINESS_THRESHOLD="${context.readiness_threshold}"
      OUTCOME_THRESHOLD="${context.outcome_threshold}"

      # Fetch scores via ll-issues show --json
      SCORES_JSON=$(ll-issues show "$ID" --json 2>/dev/null)
      if [ -z "$SCORES_JSON" ]; then
        # BUG-2003 AC5: an unresolved ID must surface as an explicit failure, not
        # silently route to DECOMPOSE (which masks a resolution miss as a real
        # routing decision). Exit non-zero -> on_error: emit_implement_failed.
        echo "ERROR: ll-issues show --json returned empty for $ID (unresolved issue ID)"
        exit 1
      fi

      # Parse scores (use JSON keys: confidence, outcome, not frontmatter names)
      CONFIDENCE=$(echo "$SCORES_JSON" | jq -r '.confidence // 0' 2>/dev/null)
      OUTCOME=$(echo "$SCORES_JSON" | jq -r '.outcome // 0' 2>/dev/null)
      COMPLEXITY=$(echo "$SCORES_JSON" | jq -r '.score_complexity // 0' 2>/dev/null)
      AMBIGUITY=$(echo "$SCORES_JSON" | jq -r '.score_ambiguity // 0' 2>/dev/null)
      CHANGE_SURFACE=$(echo "$SCORES_JSON" | jq -r '.score_change_surface // 0' 2>/dev/null)
      DECISION_NEEDED=$(echo "$SCORES_JSON" | jq -r '.decision_needed // "false"' 2>/dev/null)
      MISSING_ARTIFACTS=$(echo "$SCORES_JSON" | jq -r '.missing_artifacts // "false"' 2>/dev/null)

      # Log scores for diagnostics
      printf '{"id":"%s","confidence":%s,"outcome":%s,"complexity":%s,"ambiguity":%s,"change_surface":%s,"decision_needed":"%s","missing_artifacts":"%s"}\n' \
        "$ID" "$CONFIDENCE" "$OUTCOME" "$COMPLEXITY" "$AMBIGUITY" "$CHANGE_SURFACE" "$DECISION_NEEDED" "$MISSING_ARTIFACTS" \
        > "$RUN_DIR/diagnosis_$${ID}.json"

      # Priority-ordered routing (first match wins)
      if [ "$CONFIDENCE" -ge "$READINESS_THRESHOLD" ] && [ "$OUTCOME" -ge "$OUTCOME_THRESHOLD" ]; then
        echo "IMPLEMENT"
      elif [ "$DECISION_NEEDED" = "true" ]; then
        echo "DECIDE"
      elif [ "$MISSING_ARTIFACTS" = "true" ]; then
        echo "WIRE"
      elif [ "$AMBIGUITY" -ge "${context.diagnose_ambiguity_threshold}" ] \
          && [ "$CHANGE_SURFACE" -eq 0 ]; then
        # No integration map exists → wiring can fill the ambiguity gap
        echo "WIRE"
      elif [ "$AMBIGUITY" -ge "${context.diagnose_ambiguity_threshold}" ]; then
        # Integration map exists → residual ambiguity is decision-driven; refine to resolve
        echo "REFINE"
      elif [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ] \
          && [ "$CHANGE_SURFACE" -eq 0 ]; then
        # High complexity + no integration map → wire before refining
        echo "WIRE"
      elif [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ] || [ "$CONFIDENCE" -lt "${context.diagnose_confidence_floor}" ] || [ "$OUTCOME" -lt "${context.outcome_threshold}" ]; then
        echo "REFINE"
      elif [ "$CHANGE_SURFACE" -ge "${context.diagnose_change_surface_threshold}" ]; then
        echo "DECOMPOSE"
      else
        # ENH-2223: residual minor gaps that don't match any dimensional rule get a
        # lighter refine (--auto, no --full-rewrite) rather than the destructive default.
        echo "REFINE_LIGHT"
      fi
    evaluate:
      type: classify
    route:
      IMPLEMENT:    gate_implement
      DECIDE:       decide
      WIRE:         wire
      REFINE:       refine
      REFINE_LIGHT: refine_light
      DECOMPOSE:    emit_needs_decompose
      _:            emit_implement_failed
      _error:       emit_implement_failed

  # =========================================================================
  # Phase 3: Remediation Actions
  # =========================================================================

  gate_implement:
    # Marker-gate choke point in front of implement. Before ll-auto runs, ensure
    # an above-minimal-complexity issue has been BOTH refined and wired at least
    # once. Minimal issues — and any caller that set require_refine_and_wire
    # false — pass straight through. Markers are write-once, so this adds at most
    # one refine + one wire detour, then IMPLEMENT (bounded, no unbounded loop).
    # Fail-open: any gate error implements rather than blocking processing.
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      if [ "${context.require_refine_and_wire}" != "true" ]; then
        echo "IMPLEMENT"
      else
        BAND=$(cat "$RUN_DIR/complexity_band_$${ID}.txt" 2>/dev/null || echo "MINIMAL")
        if [ "$BAND" != "ABOVE_MINIMAL" ]; then
          echo "IMPLEMENT"
        elif [ ! -f "$RUN_DIR/refined_$${ID}.txt" ]; then
          echo "NEED_REFINE"
        elif [ ! -f "$RUN_DIR/wired_$${ID}.txt" ]; then
          echo "NEED_WIRE"
        else
          echo "IMPLEMENT"
        fi
      fi
    capture: gate_decision
    next: route_gate_refine
    on_error: implement

  route_gate_refine:
    evaluate:
      type: output_contains
      source: "${captured.gate_decision.output}"
      pattern: "NEED_REFINE"
    on_yes: refine_first
    on_no: route_gate_wire
    on_error: implement

  route_gate_wire:
    evaluate:
      type: output_contains
      source: "${captured.gate_decision.output}"
      pattern: "NEED_WIRE"
    on_yes: wire
    on_no: implement
    on_error: implement

  implement:
    action_type: shell
    capture: ll_auto_output
    action: |
      ID="${context.issue_id}"
      # Learning-gate skip parity: append --skip-learning-gate when the caller set
      # the skip_learning_gate context (mirrors `ll-auto --skip-learning-gate`).
      SKIP_FLAG=""
      if [ -n "${context.skip_learning_gate}" ]; then
        SKIP_FLAG="--skip-learning-gate"
      fi
      ll-auto --only "$ID" $SKIP_FLAG 2>&1
      # Failure recording is owned by the parent's record_failure state
      # (driven by the IMPLEMENT_FAILED outcome token) to avoid double-counting.
      exit $?
    # FEAT-2552: implement success no longer routes directly to
    # emit_implemented. The code-run-gate oracle (FEAT-2551) is the new
    # arbiter of IMPLEMENTED — a passing gate routes to emit_implemented,
    # a failing gate routes to record_gate_failure (which increments the
    # remediation counter and writes GATE_FAILED to the sidecar), a gate
    # child crash routes to record_gate_error (GATE_FAILED_INFRA).
    on_yes: run_code_gate
    on_no: check_learning_gate
    on_error: check_learning_gate

  run_code_gate:
    # FEAT-2552: sub-loop delegation to the code-run-gate oracle
    # (oracles/code-run-gate.yaml, FEAT-2551). Mirrors the `run_remediation`
    # pattern at `rn-implement.yaml:695-718` — `loop: <sub>` + `with:`
    # bindings + `on_success` / `on_failure` / `on_error` shape.
    #
    # The oracle runs the project's build / test / typecheck / lint /
    # service_health command matrix and writes its verdict
    # (GATE_PASS / GATE_FAILED / GATE_SKIP) to
    # `${run_dir}/subloop_outcome_<ID>.txt`. The executor maps GATE_PASS
    # and GATE_SKIP to `done` (on_success) and GATE_FAILED to `failed`
    # (on_failure). An infrastructure crash / context-resolution failure
    # (on_error) is disambiguated from gate code-quality failure per
    # ENH-2005 (mirrors `record_sub_loop_crash` precedent).
    loop: oracles/code-run-gate
    with:
      issue_id: "${context.issue_id}"
      run_dir: "${context.run_dir}"
      min_pass_rate: "${context.min_pass_rate}"
    on_success: emit_implemented
    on_failure: record_gate_failure
    on_error: record_gate_error

  record_gate_failure:
    # FEAT-2552: gate child reached its `failed` terminal (GATE_FAILED).
    # Write the GATE_FAILED token to the sidecar so the parent's
    # classify_remediation picks it up via the route_rem_* chain, and
    # increment the same `remediation_count_<ID>.txt` counter that
    # `check_remediation_budget` enforces — so a gate failure consumes
    # a budget slot without needing a parallel counter. Route back to
    # `implement` for one more remediation pass (cheap, one extra
    # `ll-auto` call); the budget check on the next convergence cycle
    # terminates via `emit_stalled_needs_decompose` if
    # `max_remediation_passes` is exhausted (the "lazy" budget pattern
    # noted in FEAT-2552's Additional Findings).
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      # Write the outcome token — parent's classify_remediation reads this
      # via output_contains in the route_rem_* chain.
      echo "GATE_FAILED" > "$${RUN_DIR}/subloop_outcome_$${ID}.txt"
      # Increment the budget counter so the next convergence cycle
      # terminates via check_remediation_budget's on_no route when the
      # budget is exhausted.
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      echo $((REM_COUNT + 1)) > "$REM_COUNTER_FILE"
      echo "[GATE_FAILED] $${ID} — code-run-gate reported a non-skip failure (build/test/typecheck/lint/health)"
    next: implement

  record_gate_error:
    # FEAT-2552 / ENH-2005 mirror: gate child crashed / timed out /
    # context-resolution-failed BEFORE writing its outcome token.
    # Distinct from record_gate_failure — the GATE_FAILED_INFRA tag
    # lets the parent (and report) tally gate infrastructure failures
    # separately from gate code-quality failures. A gate child crash is
    # an infrastructure failure (not retryable code quality), so route
    # straight to emit_implement_failed rather than back to implement
    # (where the same crash would recur).
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      # Write the distinct infra-failure token — parent's classify_remediation
      # falls through to record_failure (IMPLEMENT_FAILED) via route_rem_*
      # chain; the GATE_FAILED_INFRA tag appears in failures.txt so the
      # report's per-tag counter can distinguish it from a clean
      # IMPLEMENT_FAILED.
      echo "GATE_FAILED_INFRA" > "$${RUN_DIR}/subloop_outcome_$${ID}.txt"
      echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $${ID} GATE_FAILED_INFRA" >> "$${RUN_DIR}/failures.txt"
      echo "[GATE_FAILED_INFRA] $${ID} — code-run-gate child crashed/timeout/context error (distinct from code-quality failure)"
    next: emit_implement_failed

  check_learning_gate:
    # Learning-gate consistency: a gate block (ENH-2319, marker LEARNING_GATE_BLOCKED
    # printed by process_issue_inplace) exits 1 from `ll-auto --only`, which would
    # otherwise be laundered into IMPLEMENT_FAILED. Detect it FIRST so the parent
    # can report it distinctly (mirrors the ENV_NOT_READY split, ENH-2353). on_no
    # falls through to the auth check, then the generic failure path.
    #
    # ENH-2406 safety net: rn-implement's check_learning_ready gate now catches
    # registered learning_tests_required targets BEFORE this issue ever reaches
    # run_remediation, so in practice this state only fires for callers that bypass
    # rn-implement, or for a target that became unproven/stale between the
    # pre-dequeue check and this inner `ll-auto --only` call. Routing here is
    # unchanged — it remains the defense-in-depth path, not the primary catch.
    fragment: ll_auto_learning_gate_check
    on_yes: emit_learning_gate_blocked
    on_no: check_impl_auth

  check_impl_auth:
    # ENH-2353: gate between implement failure and emit_implement_failed.
    # Greps captured ll-auto output for auth signatures; routes auth failures
    # to emit_env_not_ready (ENV_NOT_READY → parent aborts queue) rather than
    # mislabeling them as IMPLEMENT_FAILED.
    fragment: ll_auto_auth_check
    on_yes: emit_env_not_ready
    on_no: emit_implement_failed

  decide:
    fragment: with_rate_limit_handling
    action: "/ll:decide-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: re_assess
    on_no: emit_needs_manual_review
    on_partial: re_assess
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  wire:
    fragment: with_rate_limit_handling
    action: "/ll:wire-issue ${context.issue_id} --auto"
    action_type: slash_command
    # BUG-2007 Defect 1: route to re_assess on success, not unconditionally to
    # refine. If wiring alone resolves the condition, re_assess → check_convergence
    # routes back to refine/diagnose only if ambiguity/artifacts remain — avoiding
    # a wasted --full-rewrite pass that could overwrite valid wiring changes.
    # ENH-2247: on_no falls back to refine_first (--auto), not the destructive
    # refine (--full-rewrite): a wiring failure is an integration-map problem, not
    # an issue-prose-content problem, so a full rewrite is not warranted.
    # Marker-gate: route success through mark_wired (which sets the wired marker
    # then continues to re_assess) so the pre-implement gate can confirm a wire
    # ran. BUG-2007 intent is preserved — success still reaches re_assess, never
    # unconditionally bounces back to refine.
    # on_partial: mark_wired — partial wire still marks; re_assess → check_convergence decides sufficiency.
    on_yes: mark_wired
    on_no: refine_first
    on_partial: mark_wired
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine:
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto --full-rewrite"
    action_type: slash_command
    # Marker-gate: route success through mark_refined (sets the refined marker
    # then continues to re_assess). BUG-2007 intent preserved — still re_assess.
    # on_partial: mark_refined — partial refine still marks; re_assess evaluates sufficiency.
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine_light:
    # ENH-2223: lighter refine for residual minor gaps (diagnose catch-all). Uses
    # --auto without --full-rewrite so existing well-specified content is not destroyed.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine_first:
    # ENH-2247: lighter refine for first-pass / policy-gate / wire-failure /
    # confidence-gap paths (assess on_no, gate_implement NEED_REFINE, wire on_no,
    # check_wire_needed_outcome on_no/on_error). --auto only (no --full-rewrite) so
    # partially-correct content is patched, not bulldozed. Only diagnose → REFINE
    # (a confirmed dimensional/content diagnosis) retains the destructive refine.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine_followup:
    # ENH-2247: additive-only refine for re_assess on_no — a full-rewrite pass
    # already ran this cycle, so patch remaining gaps (--auto --gap-analysis)
    # instead of re-bulldozing the first pass's improvements.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto --gap-analysis"
    action_type: slash_command
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  mark_refined:
    # Marker-gate: record that >=1 refine pass ran for this issue. Write-once
    # (monotonic) so the pre-implement gate requires at most one refine detour.
    # BUG-2222: route via check_decision_needed_post so refinement adding
    # decision_needed:true triggers /ll:decide-issue automatically.
    action_type: shell
    action: |
      echo "1" > "${context.run_dir}/refined_${context.issue_id}.txt"
    next: check_decision_needed_post

  mark_wired:
    # Marker-gate: record that >=1 wire pass ran for this issue. Write-once
    # (monotonic) so the pre-implement gate requires at most one wire detour.
    # BUG-2222: route via check_decision_needed_post so wiring adding
    # decision_needed:true triggers /ll:decide-issue automatically.
    action_type: shell
    action: |
      echo "1" > "${context.run_dir}/wired_${context.issue_id}.txt"
    next: check_decision_needed_post

  check_decision_needed_post:
    # Post-refinement/wire gate: if the action just set decision_needed: true,
    # route to /ll:decide-issue before the redundant confidence check.
    # BUG-2222: /ll:refine-issue may deposit multiple solution options which
    # sets decision_needed: true; without this gate the subloop runs another
    # confidence check then blocks for manual review instead.
    fragment: shell_exit
    action: "ll-issues check-flag ${context.issue_id} decision_needed"
    on_yes: decide
    on_no: re_assess
    on_error: re_assess

  # =========================================================================
  # Phase 4: Re-Assessment & Convergence
  # =========================================================================

  re_assess:
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${context.issue_id} --auto"
    action_type: slash_command
    on_success: verify_re_assess_scores
    on_partial: verify_re_assess_scores
    # ENH-2247: a full-rewrite pass already ran this cycle; the follow-up should
    # patch remaining gaps additively (refine_followup, --auto --gap-analysis)
    # rather than bulldoze the first pass's improvements with another --full-rewrite.
    on_no: refine_followup
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  verify_re_assess_scores:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      CONFIDENCE=$(grep '^confidence_score:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      if [ -z "$CONFIDENCE" ] || [ -z "$OUTCOME" ]; then
        echo "ERROR: confidence_score or outcome_confidence missing for $ID after re_assess"
        exit 1
      fi
      # Write post-scores
      ll-issues show "$ID" --json > "${context.run_dir}/post_scores_$${ID}.json" 2>/dev/null
      echo "Post-scores persisted for $ID: confidence=$CONFIDENCE, outcome=$OUTCOME"
    evaluate:
      type: exit_code
    on_yes: check_convergence
    on_no: emit_scores_missing
    on_error: emit_scores_missing

  check_convergence:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      READINESS_THRESHOLD="${context.readiness_threshold}"
      OUTCOME_THRESHOLD="${context.outcome_threshold}"

      PRE="$${RUN_DIR}/pre_scores_$${ID}.json"
      POST="$${RUN_DIR}/post_scores_$${ID}.json"

      if [ ! -f "$PRE" ]; then
        echo "ERROR: Pre-scores file not found: $PRE"
        echo "CONVERGED_STALLED"
        exit 0
      fi
      if [ ! -f "$POST" ]; then
        echo "ERROR: Post-scores file not found: $POST"
        echo "CONVERGED_STALLED"
        exit 0
      fi

      # Parse pre/post scores (use JSON keys: confidence, outcome)
      PRE_CONFIDENCE=$(jq -r '.confidence // 0' "$PRE" 2>/dev/null)
      PRE_OUTCOME=$(jq -r '.outcome // 0' "$PRE" 2>/dev/null)
      PRE_COMPLEXITY=$(jq -r '.score_complexity // 0' "$PRE" 2>/dev/null)
      PRE_AMBIGUITY=$(jq -r '.score_ambiguity // 0' "$PRE" 2>/dev/null)

      POST_CONFIDENCE=$(jq -r '.confidence // 0' "$POST" 2>/dev/null)
      POST_OUTCOME=$(jq -r '.outcome // 0' "$POST" 2>/dev/null)
      POST_COMPLEXITY=$(jq -r '.score_complexity // 0' "$POST" 2>/dev/null)
      POST_AMBIGUITY=$(jq -r '.score_ambiguity // 0' "$POST" 2>/dev/null)

      # Compute deltas
      DELTA_CONFIDENCE=$((POST_CONFIDENCE - PRE_CONFIDENCE))
      DELTA_OUTCOME=$((POST_OUTCOME - PRE_OUTCOME))
      # For complexity/ambiguity, improvement means score went DOWN, so invert delta
      DELTA_COMPLEXITY=$((PRE_COMPLEXITY - POST_COMPLEXITY))
      DELTA_AMBIGUITY=$((PRE_AMBIGUITY - POST_AMBIGUITY))

      # Total improvement: sum of all deltas (positive = improved)
      TOTAL_DELTA=$((DELTA_CONFIDENCE + DELTA_OUTCOME + DELTA_COMPLEXITY + DELTA_AMBIGUITY))

      # Increment remediation counter
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      REM_COUNT=$((REM_COUNT + 1))
      echo "$REM_COUNT" > "$REM_COUNTER_FILE"

      # Log convergence data
      printf '{"id":"%s","pre_confidence":%s,"post_confidence":%s,"pre_outcome":%s,"post_outcome":%s,"delta_confidence":%s,"delta_outcome":%s,"delta_complexity":%s,"delta_ambiguity":%s,"total_delta":%s}\n' \
        "$ID" "$PRE_CONFIDENCE" "$POST_CONFIDENCE" "$PRE_OUTCOME" "$POST_OUTCOME" \
        "$DELTA_CONFIDENCE" "$DELTA_OUTCOME" "$DELTA_COMPLEXITY" "$DELTA_AMBIGUITY" "$TOTAL_DELTA" \
        > "$RUN_DIR/convergence_$${ID}.json"

      # BUG-2007 Defect 3: refresh the pre-scores baseline with this pass's
      # post-scores so the NEXT pass measures pass-over-pass delta rather than
      # cumulative session delta. Without this, a plateaued issue keeps a large
      # accumulated TOTAL_DELTA and never emits CONVERGED_STALLED.
      cp "$POST" "$PRE"

      # Convergence rules (first match wins)
      if [ "$POST_CONFIDENCE" -ge "$READINESS_THRESHOLD" ] && [ "$POST_OUTCOME" -ge "$OUTCOME_THRESHOLD" ]; then
        # BUG-2193: guard the pass path; a decision blocks implementation even when
        # scores meet thresholds — mirror the stall-branch check from BUG-1985.
        POST_DECISION=$(jq -r '.decision_needed // "false"' "$POST" 2>/dev/null)
        if [ "$POST_DECISION" = "true" ]; then
          echo "NEEDS_MANUAL_REVIEW"
        else
          echo "CONVERGED_PASS"
        fi
      elif [ "$TOTAL_DELTA" -le 0 ]; then
        # Distinguish: stalled because unresolvable decision vs genuinely too large
        POST_DECISION=$(jq -r '.decision_needed // "false"' "$POST" 2>/dev/null)
        if [ "$POST_DECISION" = "true" ]; then
          echo "NEEDS_MANUAL_REVIEW"
        else
          echo "CONVERGED_STALLED"
        fi
      else
        echo "CONVERGED_IMPROVED"
      fi
    evaluate:
      type: classify
    route:
      # Marker-gate: a PASS can follow a single refine OR wire OR decide,
      # so route through gate_implement to force the missing one for
      # above-minimal issues.
      CONVERGED_PASS:      gate_implement
      # ENH-2107: IMPROVED and STALLED both get a budget-gated retry before
      # escalating to emit_stalled_needs_decompose.
      CONVERGED_IMPROVED:  check_remediation_budget
      NEEDS_MANUAL_REVIEW: emit_needs_manual_review
      CONVERGED_STALLED:   check_remediation_budget
      # unmatched token: treat as a retry (safe fallback)
      _:                   check_remediation_budget
      # shell non-zero exit: fail-open, same as original on_error: route_conv_pass
      _error:              gate_implement

  check_remediation_budget:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      MAX_PASSES="${context.max_remediation_passes}"
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      echo "$REM_COUNT"
    evaluate:
      type: output_numeric
      operator: lt
      target: "${context.max_remediation_passes}"
    on_yes: diagnose
    # BUG-2006: remediation budget exhausted is stall-adjacent — the automated
    # moves ran out without convergence. Emit the stall token so the parent
    # defers rather than silently skipping.
    on_no: emit_stalled_needs_decompose
    on_error: emit_implement_failed

  # =========================================================================
  # Outcome-Token Emitters (ENH-1977 Fix 1 — parent↔sub-loop classification)
  # =========================================================================
  # Each terminal path writes exactly one outcome token to the shared run_dir so
  # the parent's classify_remediation can route deterministically rather than
  # collapsing every non-done terminal into "decompose". Tokens:
  #   IMPLEMENTED | NEEDS_DECOMPOSE | NEEDS_MANUAL_REVIEW | IMPLEMENT_FAILED | SCORES_MISSING | RATE_LIMITED | ENV_NOT_READY | LEARNING_GATE_BLOCKED | GATE_FAILED | GATE_FAILED_INFRA | GATE_SKIP
  #
  # FEAT-2552: GATE_FAILED is written by record_gate_failure (gate child
  # reached its `failed` terminal — code quality issue). GATE_FAILED_INFRA
  # is written by record_gate_error (gate child crashed/timed out — distinct
  # from code quality, ENH-2005 mirror). GATE_SKIP is written by the oracle
  # directly when all commands are null/empty (docs-only no-op pass) and is
  # treated identically to GATE_PASS by run_code_gate's on_success route.

  emit_implemented:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      echo "IMPLEMENTED" > "${context.run_dir}/subloop_outcome_$ID.txt"
      if ! grep -qxF "$ID" "${context.run_dir}/counted.txt" 2>/dev/null; then
        COUNT=$(cat "${context.run_dir}/implemented_count.txt" 2>/dev/null || echo 0)
        echo $((COUNT + 1)) > "${context.run_dir}/implemented_count.txt"
        echo "$ID" >> "${context.run_dir}/counted.txt"
      fi
    next: done

  emit_needs_decompose:
    action_type: shell
    action: |
      echo "NEEDS_DECOMPOSE" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_stalled_needs_decompose:
    # BUG-2006: stall-origin variant of NEEDS_DECOMPOSE. Reached only from the
    # convergence-stall and budget-exhausted paths (NOT diagnose-DECOMPOSE). The
    # token is a superstring of NEEDS_DECOMPOSE, so the parent's route_rem_decompose
    # (substring match) still triggers a decomposition attempt; the parent's
    # route_dec_stalled_origin disambiguates after NO_CHILDREN to defer rather than
    # skip.
    action_type: shell
    action: |
      echo "STALLED_NEEDS_DECOMPOSE" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_needs_manual_review:
    # ENH-2443: distinguish "already tried deposit_options and still nothing to
    # decide" (MANUAL_REVIEW_RECOMMENDED) from a genuine human-required decision
    # (MANUAL_REVIEW_NEEDED). Sink for both decide.on_no and check_convergence's
    # NEEDS_MANUAL_REVIEW route, so the marker check covers both paths.
    #
    # ENH-2530: additionally write manual_review_handoff_<ID>.md under
    # ${context.run_dir}/ — a per-issue diagnostic that captures the specific
    # reason (outcome vs threshold, convergence delta, remediation pass count),
    # verbatim decision_context frontmatter when present (fallback to a generic
    # sentence otherwise), and a recommended next action branched on the
    # decide_options_deposited marker. Token write above is byte-preserved —
    # the parent's longest-prefix-first routing chain at rn-implement.yaml
    # depends on MANUAL_REVIEW_RECOMMENDED / MANUAL_REVIEW_NEEDED exactly.
    # Heredoc uses quoted delimiter to prevent shell expansion of dynamic
    # markdown contents (mirrors cua-agent-desktop.yaml quoted-heredoc pattern).
    action_type: shell
    action: |
      if [ -f "${context.run_dir}/decide_options_deposited_${context.issue_id}.txt" ]; then
        echo "MANUAL_REVIEW_RECOMMENDED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
      else
        echo "MANUAL_REVIEW_NEEDED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
      fi

      python3 << 'PYEOF'
      import json
      import os
      import re
      import sys
      from pathlib import Path

      RUN_DIR = "${context.run_dir}"
      ISSUE_ID = "${context.issue_id}"

      def _read_json(name):
          try:
              with open(os.path.join(RUN_DIR, name)) as f:
                  return json.load(f)
          except Exception:
              return None

      def _read_int(name):
          try:
              with open(os.path.join(RUN_DIR, name)) as f:
                  return (f.read().strip() or "0")
          except Exception:
              return "0"

      def _score(d, *keys):
          if not isinstance(d, dict):
              return "?"
          for k in keys:
              if k in d and d[k] is not None:
                  return d[k]
          return "?"

      pre_scores = _read_json(f"pre_scores_{ISSUE_ID}.json") or {}
      post_scores = _read_json(f"post_scores_{ISSUE_ID}.json") or {}
      convergence = _read_json(f"convergence_{ISSUE_ID}.json")
      counter = _read_int(f"remediation_count_{ISSUE_ID}.txt")

      try:
          import yaml as _yaml

          def _parse_yaml(text):
              return _yaml.safe_load(text) or {}
      except ImportError:
          def _parse_yaml(text):
              result = {}
              for line in text.splitlines():
                  m = re.match(r'^([\w-]+):\s*(.*)', line)
                  if m:
                      result[m.group(1)] = m.group(2).strip()
              return result

      issue_path = None
      for d in (".issues/bugs", ".issues/features", ".issues/enhancements", ".issues/epics"):
          dp = Path(d)
          if not dp.exists():
              continue
          for p in dp.glob("*.md"):
              m = re.match(r'P\d-([A-Z]+-\d+)-', p.name)
              if m and m.group(1) == ISSUE_ID:
                  issue_path = p
                  break
          if issue_path:
              break

      title = ISSUE_ID
      decision_context = None
      if issue_path:
          try:
              content = issue_path.read_text()
              m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              fm = _parse_yaml(m.group(1)) if m else {}
              if isinstance(fm, dict):
                  title = str(fm.get("title") or ISSUE_ID)
                  raw_ctx = fm.get("decision_context")
                  if raw_ctx:
                      decision_context = str(raw_ctx).strip()
          except Exception:
              pass

      marker_path = os.path.join(RUN_DIR, f"decide_options_deposited_{ISSUE_ID}.txt")
      recommended = os.path.exists(marker_path)
      token = "MANUAL_REVIEW_RECOMMENDED" if recommended else "MANUAL_REVIEW_NEEDED"
      if recommended:
          next_action = f"/ll:refine-issue {ISSUE_ID}  # manual: --auto already exhausted"
      else:
          next_action = f"/ll:refine-issue {ISSUE_ID} --auto"

      pre_conf = _score(pre_scores, "confidence", "confidence_score")
      pre_outcome = _score(pre_scores, "outcome", "outcome_confidence")
      post_conf = _score(post_scores, "confidence", "confidence_score")
      post_outcome = _score(post_scores, "outcome", "outcome_confidence")
      complexity = _score(post_scores, "score_complexity") or _score(pre_scores, "score_complexity")
      ambiguity = _score(post_scores, "score_ambiguity") or _score(pre_scores, "score_ambiguity")

      if isinstance(convergence, dict):
          conv_block = (
              f"total_delta={convergence.get('total_delta', '?')} "
              f"(Δconfidence={convergence.get('delta_confidence', '?')}, "
              f"Δoutcome={convergence.get('delta_outcome', '?')}, pass-over-pass)"
          )
      else:
          conv_block = "(convergence data unavailable)"

      decision_text = decision_context or (
          "Issue requires human decision; see convergence data and "
          "issue frontmatter for context"
      )

      body = (
          f"# Manual Review Handoff: {ISSUE_ID}\n\n"
          f"- **Issue**: {title}\n"
          f"- **Token**: {token}\n"
          f"- **Reason**: outcome_confidence={post_outcome} (post-scores); "
          f"remediation pass {counter}\n"
          f"- **Convergence delta**: {conv_block}\n"
          f"- **Decision needed**: {decision_text}\n"
          f"- **Recommended next action**: {next_action}\n\n"
          f"## Diagnostic Data\n"
          f"- Pre-scores: confidence={pre_conf}, outcome={pre_outcome}\n"
          f"- Post-scores: confidence={post_conf}, outcome={post_outcome}\n"
          f"- Complexity band: {complexity} (ambiguity={ambiguity})\n"
      )

      try:
          handoff_path = os.path.join(RUN_DIR, f"manual_review_handoff_{ISSUE_ID}.md")
          Path(handoff_path).write_text(body)
          print("HANDOFF_WRITTEN")
      except Exception as exc:
          print(f"HANDOFF_FAILED:{type(exc).__name__}")
      PYEOF
    next: failed

  emit_implement_failed:
    action_type: shell
    action: |
      echo "IMPLEMENT_FAILED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_env_not_ready:
    # ENH-2353: auth-failure fast-fail. Writes ENV_NOT_READY sidecar so the parent's
    # route_rem_env_not_ready can abort the queue instead of continuing to dequeue.
    action_type: shell
    action: |
      echo "ENV_NOT_READY" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
      echo "Aborting: host auth not configured — set the host credential or run the host login, then re-run"
    next: failed

  emit_scores_missing:
    action_type: shell
    action: |
      echo "SCORES_MISSING" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_learning_gate_blocked:
    # Learning-gate consistency: the inner `ll-auto --only` blocked this issue on
    # unproven external-API deps (ENH-2319). Write a distinct token so the parent's
    # route_rem_learning_gate records it separately from a genuine IMPLEMENT_FAILED
    # and surfaces the explore-api remedy to the operator.
    action_type: shell
    action: |
      echo "LEARNING_GATE_BLOCKED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
      echo "Learning gate blocked ${context.issue_id}: prove external-API deps with /ll:explore-api, then re-run"
    next: failed

  # =========================================================================
  # Diagnostic State
  # =========================================================================

  rate_limit_diagnostic:
    # Writes RATE_LIMITED to subloop_outcome and routes to failed (ENH-1977 GAP A).
    # Parent's rate_limits.txt record is owned by the parent to avoid double counting.
    fragment: subloop_rate_limit_diagnostic
    with:
      operation: remediation

  # =========================================================================
  # Terminal States
  # =========================================================================

  done:
    terminal: true

  failed:
    terminal: true
