name: rn-remediate
visibility: internal
category: planning
description: |
  Sub-loop for the iterative deepening remediation cycle (diagnose → remediate →
  re_assess → check_convergence) extracted from rn-implement. Accepts an issue ID
  via parameters and runs the remediation loop until PASS, budget exhaustion,
  or STALLED. Terminates with done (issue implemented) or failed (escalate to
  parent for decomposition).

  Run standalone as: ll-loop run rn-remediate "<issue-id>"

  Invoked by parent rn-implement via:
    loop: rn-remediate
    with:
      issue_id: "${captured.input.output}"
      readiness_threshold: "${context.readiness_threshold}"
      outcome_threshold: "${context.outcome_threshold}"
      max_remediation_passes: "${context.max_remediation_passes}"
    on_yes: dequeue_next
    on_no: run_decomposition
initial: ensure_formatted
max_steps: 100
timeout: 14400
on_handoff: spawn
import:
  - lib/common.yaml
meta_self_eval_ok: false
shared_state_ok: false

parameters:
  issue_id:
    type: string
    required: true
    description: "Issue ID to remediate (passed from parent's captured.input.output)"
  readiness_threshold:
    type: integer
    required: false
    description: "Confidence score threshold for readiness gate (default: 85)"
  outcome_threshold:
    type: integer
    required: false
    description: "Outcome confidence threshold (default: 75)"
  max_remediation_passes:
    type: integer
    required: false
    description: "Max remediation iterations before escalation to decomposition (default: 3)"
  run_dir:
    type: path
    required: true
    description: "Parent loop's run directory for score snapshots and counter coupling"

context:
  readiness_threshold: 85
  outcome_threshold: 75
  max_remediation_passes: 3
  # BUG-2007 Defect 2: diagnose routing thresholds, overridable so callers can
  # tune routing to match their score targets. Defaults preserve the prior
  # hardcoded literals so existing callers stay backward-compatible.
  diagnose_ambiguity_threshold: 15
  diagnose_complexity_threshold: 15
  diagnose_change_surface_threshold: 15
  diagnose_confidence_floor: 50
  # Marker-gate enforcement: require an above-minimal-complexity issue to be
  # refined AND wired at least once before implement. Set false to restore the
  # single-dimension short-circuit behavior. Overridable by the parent via with:.
  require_refine_and_wire: true

states:
  # =========================================================================
  # Phase 0: Format Guard — ensure required template sections exist before
  # assessment. confidence-check (assess) scores the issue's content; a
  # malformed issue (missing required sections) yields unreliable scores that
  # then mis-route the diagnose → remediate chain. This is the loop's entry
  # point so both the orchestrated (rn-implement → run_remediation) and
  # standalone (`ll-loop run rn-remediate "<id>"`) paths are guarded.
  # =========================================================================

  ensure_formatted:
    # Deterministic fast-path: are all REQUIRED template sections present?
    # Cheap (no LLM) — only when a required section header is missing do we pay
    # for the /ll:format-issue slash command. Note: this catches MISSING headers
    # only, not renamed/empty/boilerplate sections; those slip through to assess.
    # If malformed-but-not-missing issues later skew scores, swap this gate body
    # for a `/ll:format-issue --check` slash_command pre-pass.
    #
    # Heredoc gotcha (mirrors select_next): a `python3 << EOF` heredoc OWNS stdin,
    # so the template JSON is passed via the SECTIONS_JSON env var, never piped.
    # Fail-open: unresolved template / parse error -> treat as formatted (exit 0)
    # so a tooling glitch never blocks remediation.
    action_type: shell
    action: |
      ID="${context.issue_id}"
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      TYPE=$(echo "$ID" | grep -oE '^(BUG|FEAT|ENH|EPIC)' | tr 'A-Z' 'a-z')
      SECTIONS_JSON=$(ll-issues sections "$TYPE" 2>/dev/null)
      export ISSUE_FILE SECTIONS_JSON
      MISSING=$(python3 << 'PYEOF'
      import json, os, sys
      raw = os.environ.get("SECTIONS_JSON", "")
      if not raw:
          sys.exit(0)  # no template -> fail-open (treat as formatted)
      try:
          d = json.loads(raw)
      except Exception:
          sys.exit(0)  # unparseable template -> fail-open
      required = []
      # common_sections: dict keyed by title, value has `required: true`
      for title, meta in (d.get("common_sections") or {}).items():
          if isinstance(meta, dict) and meta.get("required") is True:
              required.append(title)
      # type_sections: dict keyed by title, value has `level: required`
      for title, meta in (d.get("type_sections") or {}).items():
          if isinstance(meta, dict) and meta.get("level") == "required":
              required.append(title)
      try:
          body = open(os.environ["ISSUE_FILE"]).read()
      except Exception:
          sys.exit(0)  # unreadable issue -> fail-open
      missing = [t for t in required if ("## " + t) not in body]
      if missing:
          print("; ".join(missing))
      PYEOF
      )
      if [ -z "$MISSING" ]; then
        echo "Formatted: all required sections present for $ID"
        exit 0
      else
        echo "Needs formatting — missing required sections for $ID: $MISSING"
        exit 1
      fi
    evaluate:
      type: exit_code
    on_yes: assess
    on_no: format_issue
    on_error: format_issue   # fail-toward-formatting, then assess

  format_issue:
    # Conditional repair: only reached when ensure_formatted found a gap.
    # Routes unconditionally to assess (never back to the gate) so this adds at
    # most ONE format pass — bounded, no oscillation. Fail-open on every non-yes
    # verdict: a formatting failure should not dead-end the loop; assess →
    # diagnose still catches residual content deficiencies.
    fragment: with_rate_limit_handling
    action: "/ll:format-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: assess
    on_no: assess
    on_partial: assess
    on_error: assess
    on_rate_limit_exhausted: rate_limit_diagnostic

  # =========================================================================
  # Phase 1: Assessment Bridge — Confidence Check & Gate Chain
  # =========================================================================

  assess:
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${context.issue_id} --auto"
    action_type: slash_command
    on_success: verify_scores_persisted
    on_partial: verify_scores_persisted
    on_no: refine_first
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  verify_scores_persisted:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      CONFIDENCE=$(grep '^confidence_score:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      if [ -z "$CONFIDENCE" ] || [ -z "$OUTCOME" ]; then
        echo "ERROR: confidence_score or outcome_confidence missing for $ID"
        exit 1
      fi
      # Write pre-scores
      ll-issues show "$ID" --json > "${context.run_dir}/pre_scores_$${ID}.json" 2>/dev/null
      # Marker-gate: snapshot a STABLE complexity band ONCE. pre_scores_<ID>.json
      # is overwritten every pass by check_convergence (cp POST PRE), so the band
      # must be captured here — the only point with the genuine pre-remediation
      # score — into a file the gate can read without it mutating mid-run.
      COMPLEXITY=$(jq -r '.score_complexity // 0' "${context.run_dir}/pre_scores_$${ID}.json" 2>/dev/null || echo 0)
      if [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ]; then
        echo "ABOVE_MINIMAL" > "${context.run_dir}/complexity_band_$${ID}.txt"
      else
        echo "MINIMAL" > "${context.run_dir}/complexity_band_$${ID}.txt"
      fi
      echo "Scores persisted for $ID: confidence=$CONFIDENCE, outcome=$OUTCOME"
    evaluate:
      type: exit_code
    on_yes: check_readiness
    on_no: emit_scores_missing
    on_error: emit_scores_missing

  check_readiness:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      # Use the loop-context thresholds so the readiness gate agrees with
      # diagnose / check_convergence under overridden thresholds (ENH-1977 Fix 2).
      ll-issues check-readiness "$ID" \
        --readiness "${context.readiness_threshold}" \
        --outcome "${context.outcome_threshold}"
    on_yes: check_complexity_pre_implement
    on_no: check_outcome
    on_error: check_outcome

  check_complexity_pre_implement:
    # ENH-2223: issue already passed check_readiness (confidence >= 85, outcome >= 75).
    # High complexity here does NOT imply content deficiency — route to the wire check
    # the same as low-complexity issues. gate_implement enforces a refine+wire pass for
    # above-minimal issues; --full-rewrite is not warranted for an already-ready issue.
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      COMPLEXITY=$(jq -r '.score_complexity // 0' "$PRE" 2>/dev/null || echo 0)
      THRESHOLD="${context.diagnose_complexity_threshold}"
      [ "$COMPLEXITY" -ge "$THRESHOLD" ] && exit 0 || exit 1
    on_yes: check_wire_pre_implement
    on_no: check_wire_pre_implement
    on_error: check_wire_pre_implement

  check_wire_pre_implement:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      CHANGE_SURFACE=$(jq -r '.score_change_surface // 0' "$PRE" 2>/dev/null || echo 0)
      [ "$CHANGE_SURFACE" -eq 0 ] && exit 0 || exit 1
    on_yes: wire
    on_no: gate_implement   # BUG-2306: change_surface > 0 must enforce ENH-2163 gate
    on_error: implement

  check_outcome:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}' | tr -d "'\"")
      THRESHOLD="${context.outcome_threshold}"
      if [ -n "$OUTCOME" ] && [ "$OUTCOME" -ge "$THRESHOLD" ]; then
        exit 0
      else
        exit 1
      fi
    # BUG-2007 Defect 4: route on_yes directly to refine, not diagnose. When
    # check_readiness fails the joint gate but check_outcome passes outcome-only,
    # the deficiency is confidence_score. diagnose's first rule (IMPLEMENT) needs
    # both thresholds — already found false by check_readiness — so the
    # diagnose → route_d_implement branch is dead from here. refine targets the
    # confidence gap directly. check_wire_needed_outcome gates wire first when the
    # integration map is absent (score_change_surface == 0).
    on_yes: check_wire_needed_outcome
    on_no: check_decision_needed
    on_error: check_decision_needed

  check_wire_needed_outcome:
    fragment: shell_exit
    action: |
      PRE="${context.run_dir}/pre_scores_${context.issue_id}.json"
      CHANGE_SURFACE=$(jq -r '.score_change_surface // 0' "$PRE" 2>/dev/null || echo 0)
      [ "$CHANGE_SURFACE" -eq 0 ] && exit 0 || exit 1
    on_yes: wire
    # ENH-2247: confidence-gap path (outcome already >= threshold, integration map
    # present) is a score-threshold trigger, not a content diagnosis — route to the
    # lighter refine_first (--auto) rather than the destructive --full-rewrite.
    on_no: refine_first
    on_error: refine_first

  check_decision_needed:
    fragment: shell_exit
    action: "ll-issues check-flag ${context.issue_id} decision_needed"
    on_yes: decide
    on_no: diagnose
    on_error: diagnose

  # =========================================================================
  # Phase 2: Dimensional Diagnosis & Token Routing
  # =========================================================================

  diagnose:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      READINESS_THRESHOLD="${context.readiness_threshold}"
      OUTCOME_THRESHOLD="${context.outcome_threshold}"

      # Fetch scores via ll-issues show --json
      SCORES_JSON=$(ll-issues show "$ID" --json 2>/dev/null)
      if [ -z "$SCORES_JSON" ]; then
        # BUG-2003 AC5: an unresolved ID must surface as an explicit failure, not
        # silently route to DECOMPOSE (which masks a resolution miss as a real
        # routing decision). Exit non-zero -> on_error: emit_implement_failed.
        echo "ERROR: ll-issues show --json returned empty for $ID (unresolved issue ID)"
        exit 1
      fi

      # Parse scores (use JSON keys: confidence, outcome, not frontmatter names)
      CONFIDENCE=$(echo "$SCORES_JSON" | jq -r '.confidence // 0' 2>/dev/null)
      OUTCOME=$(echo "$SCORES_JSON" | jq -r '.outcome // 0' 2>/dev/null)
      COMPLEXITY=$(echo "$SCORES_JSON" | jq -r '.score_complexity // 0' 2>/dev/null)
      AMBIGUITY=$(echo "$SCORES_JSON" | jq -r '.score_ambiguity // 0' 2>/dev/null)
      CHANGE_SURFACE=$(echo "$SCORES_JSON" | jq -r '.score_change_surface // 0' 2>/dev/null)
      DECISION_NEEDED=$(echo "$SCORES_JSON" | jq -r '.decision_needed // "false"' 2>/dev/null)
      MISSING_ARTIFACTS=$(echo "$SCORES_JSON" | jq -r '.missing_artifacts // "false"' 2>/dev/null)

      # Log scores for diagnostics
      printf '{"id":"%s","confidence":%s,"outcome":%s,"complexity":%s,"ambiguity":%s,"change_surface":%s,"decision_needed":"%s","missing_artifacts":"%s"}\n' \
        "$ID" "$CONFIDENCE" "$OUTCOME" "$COMPLEXITY" "$AMBIGUITY" "$CHANGE_SURFACE" "$DECISION_NEEDED" "$MISSING_ARTIFACTS" \
        > "$RUN_DIR/diagnosis_$${ID}.json"

      # Priority-ordered routing (first match wins)
      if [ "$CONFIDENCE" -ge "$READINESS_THRESHOLD" ] && [ "$OUTCOME" -ge "$OUTCOME_THRESHOLD" ]; then
        echo "IMPLEMENT"
      elif [ "$DECISION_NEEDED" = "true" ]; then
        echo "DECIDE"
      elif [ "$MISSING_ARTIFACTS" = "true" ]; then
        echo "WIRE"
      elif [ "$AMBIGUITY" -ge "${context.diagnose_ambiguity_threshold}" ] \
          && [ "$CHANGE_SURFACE" -eq 0 ]; then
        # No integration map exists → wiring can fill the ambiguity gap
        echo "WIRE"
      elif [ "$AMBIGUITY" -ge "${context.diagnose_ambiguity_threshold}" ]; then
        # Integration map exists → residual ambiguity is decision-driven; refine to resolve
        echo "REFINE"
      elif [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ] \
          && [ "$CHANGE_SURFACE" -eq 0 ]; then
        # High complexity + no integration map → wire before refining
        echo "WIRE"
      elif [ "$COMPLEXITY" -ge "${context.diagnose_complexity_threshold}" ] || [ "$CONFIDENCE" -lt "${context.diagnose_confidence_floor}" ] || [ "$OUTCOME" -lt "${context.outcome_threshold}" ]; then
        echo "REFINE"
      elif [ "$CHANGE_SURFACE" -ge "${context.diagnose_change_surface_threshold}" ]; then
        echo "DECOMPOSE"
      else
        # ENH-2223: residual minor gaps that don't match any dimensional rule get a
        # lighter refine (--auto, no --full-rewrite) rather than the destructive default.
        echo "REFINE_LIGHT"
      fi
    evaluate:
      type: classify
    route:
      IMPLEMENT:    gate_implement
      DECIDE:       decide
      WIRE:         wire
      REFINE:       refine
      REFINE_LIGHT: refine_light
      DECOMPOSE:    emit_needs_decompose
      _:            emit_implement_failed
      _error:       emit_implement_failed

  # =========================================================================
  # Phase 3: Remediation Actions
  # =========================================================================

  gate_implement:
    # Marker-gate choke point in front of implement. Before ll-auto runs, ensure
    # an above-minimal-complexity issue has been BOTH refined and wired at least
    # once. Minimal issues — and any caller that set require_refine_and_wire
    # false — pass straight through. Markers are write-once, so this adds at most
    # one refine + one wire detour, then IMPLEMENT (bounded, no unbounded loop).
    # Fail-open: any gate error implements rather than blocking processing.
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      if [ "${context.require_refine_and_wire}" != "true" ]; then
        echo "IMPLEMENT"
      else
        BAND=$(cat "$RUN_DIR/complexity_band_$${ID}.txt" 2>/dev/null || echo "MINIMAL")
        if [ "$BAND" != "ABOVE_MINIMAL" ]; then
          echo "IMPLEMENT"
        elif [ ! -f "$RUN_DIR/refined_$${ID}.txt" ]; then
          echo "NEED_REFINE"
        elif [ ! -f "$RUN_DIR/wired_$${ID}.txt" ]; then
          echo "NEED_WIRE"
        else
          echo "IMPLEMENT"
        fi
      fi
    capture: gate_decision
    next: route_gate_refine
    on_error: implement

  route_gate_refine:
    evaluate:
      type: output_contains
      source: "${captured.gate_decision.output}"
      pattern: "NEED_REFINE"
    on_yes: refine_first
    on_no: route_gate_wire
    on_error: implement

  route_gate_wire:
    evaluate:
      type: output_contains
      source: "${captured.gate_decision.output}"
      pattern: "NEED_WIRE"
    on_yes: wire
    on_no: implement
    on_error: implement

  implement:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      ll-auto --only "$ID" 2>&1
      # Failure recording is owned by the parent's record_failure state
      # (driven by the IMPLEMENT_FAILED outcome token) to avoid double-counting.
      exit $?
    on_yes: emit_implemented
    on_no: emit_implement_failed
    on_error: emit_implement_failed

  decide:
    fragment: with_rate_limit_handling
    action: "/ll:decide-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: re_assess
    on_no: emit_needs_manual_review
    on_partial: re_assess
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  wire:
    fragment: with_rate_limit_handling
    action: "/ll:wire-issue ${context.issue_id} --auto"
    action_type: slash_command
    # BUG-2007 Defect 1: route to re_assess on success, not unconditionally to
    # refine. If wiring alone resolves the condition, re_assess → check_convergence
    # routes back to refine/diagnose only if ambiguity/artifacts remain — avoiding
    # a wasted --full-rewrite pass that could overwrite valid wiring changes.
    # ENH-2247: on_no falls back to refine_first (--auto), not the destructive
    # refine (--full-rewrite): a wiring failure is an integration-map problem, not
    # an issue-prose-content problem, so a full rewrite is not warranted.
    # Marker-gate: route success through mark_wired (which sets the wired marker
    # then continues to re_assess) so the pre-implement gate can confirm a wire
    # ran. BUG-2007 intent is preserved — success still reaches re_assess, never
    # unconditionally bounces back to refine.
    # on_partial: mark_wired — partial wire still marks; re_assess → check_convergence decides sufficiency.
    on_yes: mark_wired
    on_no: refine_first
    on_partial: mark_wired
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine:
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto --full-rewrite"
    action_type: slash_command
    # Marker-gate: route success through mark_refined (sets the refined marker
    # then continues to re_assess). BUG-2007 intent preserved — still re_assess.
    # on_partial: mark_refined — partial refine still marks; re_assess evaluates sufficiency.
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine_light:
    # ENH-2223: lighter refine for residual minor gaps (diagnose catch-all). Uses
    # --auto without --full-rewrite so existing well-specified content is not destroyed.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine_first:
    # ENH-2247: lighter refine for first-pass / policy-gate / wire-failure /
    # confidence-gap paths (assess on_no, gate_implement NEED_REFINE, wire on_no,
    # check_wire_needed_outcome on_no/on_error). --auto only (no --full-rewrite) so
    # partially-correct content is patched, not bulldozed. Only diagnose → REFINE
    # (a confirmed dimensional/content diagnosis) retains the destructive refine.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto"
    action_type: slash_command
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  refine_followup:
    # ENH-2247: additive-only refine for re_assess on_no — a full-rewrite pass
    # already ran this cycle, so patch remaining gaps (--auto --gap-analysis)
    # instead of re-bulldozing the first pass's improvements.
    fragment: with_rate_limit_handling
    action: "/ll:refine-issue ${context.issue_id} --auto --gap-analysis"
    action_type: slash_command
    on_yes: mark_refined
    on_no: emit_implement_failed
    on_partial: mark_refined
    on_rate_limit_exhausted: rate_limit_diagnostic

  mark_refined:
    # Marker-gate: record that >=1 refine pass ran for this issue. Write-once
    # (monotonic) so the pre-implement gate requires at most one refine detour.
    # BUG-2222: route via check_decision_needed_post so refinement adding
    # decision_needed:true triggers /ll:decide-issue automatically.
    action_type: shell
    action: |
      echo "1" > "${context.run_dir}/refined_${context.issue_id}.txt"
    next: check_decision_needed_post

  mark_wired:
    # Marker-gate: record that >=1 wire pass ran for this issue. Write-once
    # (monotonic) so the pre-implement gate requires at most one wire detour.
    # BUG-2222: route via check_decision_needed_post so wiring adding
    # decision_needed:true triggers /ll:decide-issue automatically.
    action_type: shell
    action: |
      echo "1" > "${context.run_dir}/wired_${context.issue_id}.txt"
    next: check_decision_needed_post

  check_decision_needed_post:
    # Post-refinement/wire gate: if the action just set decision_needed: true,
    # route to /ll:decide-issue before the redundant confidence check.
    # BUG-2222: /ll:refine-issue may deposit multiple solution options which
    # sets decision_needed: true; without this gate the subloop runs another
    # confidence check then blocks for manual review instead.
    fragment: shell_exit
    action: "ll-issues check-flag ${context.issue_id} decision_needed"
    on_yes: decide
    on_no: re_assess
    on_error: re_assess

  # =========================================================================
  # Phase 4: Re-Assessment & Convergence
  # =========================================================================

  re_assess:
    fragment: with_rate_limit_handling
    action: "/ll:confidence-check ${context.issue_id} --auto"
    action_type: slash_command
    on_success: verify_re_assess_scores
    on_partial: verify_re_assess_scores
    # ENH-2247: a full-rewrite pass already ran this cycle; the follow-up should
    # patch remaining gaps additively (refine_followup, --auto --gap-analysis)
    # rather than bulldoze the first pass's improvements with another --full-rewrite.
    on_no: refine_followup
    on_error: emit_implement_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  verify_re_assess_scores:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      # BUG-2003: resolve via the shared (type-prefix-tolerant) resolver so a stale
      # type prefix or a file with no priority prefix still locates the issue.
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      if [ -z "$ISSUE_FILE" ]; then
        echo "ERROR: Issue file not found for $ID"
        exit 1
      fi
      CONFIDENCE=$(grep '^confidence_score:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      OUTCOME=$(grep '^outcome_confidence:' "$ISSUE_FILE" | head -1 | awk '{print $2}')
      if [ -z "$CONFIDENCE" ] || [ -z "$OUTCOME" ]; then
        echo "ERROR: confidence_score or outcome_confidence missing for $ID after re_assess"
        exit 1
      fi
      # Write post-scores
      ll-issues show "$ID" --json > "${context.run_dir}/post_scores_$${ID}.json" 2>/dev/null
      echo "Post-scores persisted for $ID: confidence=$CONFIDENCE, outcome=$OUTCOME"
    evaluate:
      type: exit_code
    on_yes: check_convergence
    on_no: emit_scores_missing
    on_error: emit_scores_missing

  check_convergence:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      READINESS_THRESHOLD="${context.readiness_threshold}"
      OUTCOME_THRESHOLD="${context.outcome_threshold}"

      PRE="$${RUN_DIR}/pre_scores_$${ID}.json"
      POST="$${RUN_DIR}/post_scores_$${ID}.json"

      if [ ! -f "$PRE" ]; then
        echo "ERROR: Pre-scores file not found: $PRE"
        echo "CONVERGED_STALLED"
        exit 0
      fi
      if [ ! -f "$POST" ]; then
        echo "ERROR: Post-scores file not found: $POST"
        echo "CONVERGED_STALLED"
        exit 0
      fi

      # Parse pre/post scores (use JSON keys: confidence, outcome)
      PRE_CONFIDENCE=$(jq -r '.confidence // 0' "$PRE" 2>/dev/null)
      PRE_OUTCOME=$(jq -r '.outcome // 0' "$PRE" 2>/dev/null)
      PRE_COMPLEXITY=$(jq -r '.score_complexity // 0' "$PRE" 2>/dev/null)
      PRE_AMBIGUITY=$(jq -r '.score_ambiguity // 0' "$PRE" 2>/dev/null)

      POST_CONFIDENCE=$(jq -r '.confidence // 0' "$POST" 2>/dev/null)
      POST_OUTCOME=$(jq -r '.outcome // 0' "$POST" 2>/dev/null)
      POST_COMPLEXITY=$(jq -r '.score_complexity // 0' "$POST" 2>/dev/null)
      POST_AMBIGUITY=$(jq -r '.score_ambiguity // 0' "$POST" 2>/dev/null)

      # Compute deltas
      DELTA_CONFIDENCE=$((POST_CONFIDENCE - PRE_CONFIDENCE))
      DELTA_OUTCOME=$((POST_OUTCOME - PRE_OUTCOME))
      # For complexity/ambiguity, improvement means score went DOWN, so invert delta
      DELTA_COMPLEXITY=$((PRE_COMPLEXITY - POST_COMPLEXITY))
      DELTA_AMBIGUITY=$((PRE_AMBIGUITY - POST_AMBIGUITY))

      # Total improvement: sum of all deltas (positive = improved)
      TOTAL_DELTA=$((DELTA_CONFIDENCE + DELTA_OUTCOME + DELTA_COMPLEXITY + DELTA_AMBIGUITY))

      # Increment remediation counter
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      REM_COUNT=$((REM_COUNT + 1))
      echo "$REM_COUNT" > "$REM_COUNTER_FILE"

      # Log convergence data
      printf '{"id":"%s","pre_confidence":%s,"post_confidence":%s,"pre_outcome":%s,"post_outcome":%s,"delta_confidence":%s,"delta_outcome":%s,"delta_complexity":%s,"delta_ambiguity":%s,"total_delta":%s}\n' \
        "$ID" "$PRE_CONFIDENCE" "$POST_CONFIDENCE" "$PRE_OUTCOME" "$POST_OUTCOME" \
        "$DELTA_CONFIDENCE" "$DELTA_OUTCOME" "$DELTA_COMPLEXITY" "$DELTA_AMBIGUITY" "$TOTAL_DELTA" \
        > "$RUN_DIR/convergence_$${ID}.json"

      # BUG-2007 Defect 3: refresh the pre-scores baseline with this pass's
      # post-scores so the NEXT pass measures pass-over-pass delta rather than
      # cumulative session delta. Without this, a plateaued issue keeps a large
      # accumulated TOTAL_DELTA and never emits CONVERGED_STALLED.
      cp "$POST" "$PRE"

      # Convergence rules (first match wins)
      if [ "$POST_CONFIDENCE" -ge "$READINESS_THRESHOLD" ] && [ "$POST_OUTCOME" -ge "$OUTCOME_THRESHOLD" ]; then
        # BUG-2193: guard the pass path; a decision blocks implementation even when
        # scores meet thresholds — mirror the stall-branch check from BUG-1985.
        POST_DECISION=$(jq -r '.decision_needed // "false"' "$POST" 2>/dev/null)
        if [ "$POST_DECISION" = "true" ]; then
          echo "NEEDS_MANUAL_REVIEW"
        else
          echo "CONVERGED_PASS"
        fi
      elif [ "$TOTAL_DELTA" -le 0 ]; then
        # Distinguish: stalled because unresolvable decision vs genuinely too large
        POST_DECISION=$(jq -r '.decision_needed // "false"' "$POST" 2>/dev/null)
        if [ "$POST_DECISION" = "true" ]; then
          echo "NEEDS_MANUAL_REVIEW"
        else
          echo "CONVERGED_STALLED"
        fi
      else
        echo "CONVERGED_IMPROVED"
      fi
    evaluate:
      type: classify
    route:
      # Marker-gate: a PASS can follow a single refine OR wire OR decide,
      # so route through gate_implement to force the missing one for
      # above-minimal issues.
      CONVERGED_PASS:      gate_implement
      # ENH-2107: IMPROVED and STALLED both get a budget-gated retry before
      # escalating to emit_stalled_needs_decompose.
      CONVERGED_IMPROVED:  check_remediation_budget
      NEEDS_MANUAL_REVIEW: emit_needs_manual_review
      CONVERGED_STALLED:   check_remediation_budget
      # unmatched token: treat as a retry (safe fallback)
      _:                   check_remediation_budget
      # shell non-zero exit: fail-open, same as original on_error: route_conv_pass
      _error:              gate_implement

  check_remediation_budget:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      MAX_PASSES="${context.max_remediation_passes}"
      REM_COUNTER_FILE="$${RUN_DIR}/remediation_count_$${ID}.txt"
      REM_COUNT=$(cat "$REM_COUNTER_FILE" 2>/dev/null || echo 0)
      echo "$REM_COUNT"
    evaluate:
      type: output_numeric
      operator: lt
      target: "${context.max_remediation_passes}"
    on_yes: diagnose
    # BUG-2006: remediation budget exhausted is stall-adjacent — the automated
    # moves ran out without convergence. Emit the stall token so the parent
    # defers rather than silently skipping.
    on_no: emit_stalled_needs_decompose
    on_error: emit_implement_failed

  # =========================================================================
  # Outcome-Token Emitters (ENH-1977 Fix 1 — parent↔sub-loop classification)
  # =========================================================================
  # Each terminal path writes exactly one outcome token to the shared run_dir so
  # the parent's classify_remediation can route deterministically rather than
  # collapsing every non-done terminal into "decompose". Tokens:
  #   IMPLEMENTED | NEEDS_DECOMPOSE | NEEDS_MANUAL_REVIEW | IMPLEMENT_FAILED | SCORES_MISSING | RATE_LIMITED

  emit_implemented:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      echo "IMPLEMENTED" > "${context.run_dir}/subloop_outcome_$ID.txt"
      if ! grep -qxF "$ID" "${context.run_dir}/counted.txt" 2>/dev/null; then
        COUNT=$(cat "${context.run_dir}/implemented_count.txt" 2>/dev/null || echo 0)
        echo $((COUNT + 1)) > "${context.run_dir}/implemented_count.txt"
        echo "$ID" >> "${context.run_dir}/counted.txt"
      fi
    next: done

  emit_needs_decompose:
    action_type: shell
    action: |
      echo "NEEDS_DECOMPOSE" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_stalled_needs_decompose:
    # BUG-2006: stall-origin variant of NEEDS_DECOMPOSE. Reached only from the
    # convergence-stall and budget-exhausted paths (NOT diagnose-DECOMPOSE). The
    # token is a superstring of NEEDS_DECOMPOSE, so the parent's route_rem_decompose
    # (substring match) still triggers a decomposition attempt; the parent's
    # route_dec_stalled_origin disambiguates after NO_CHILDREN to defer rather than
    # skip.
    action_type: shell
    action: |
      echo "STALLED_NEEDS_DECOMPOSE" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_needs_manual_review:
    action_type: shell
    action: |
      echo "MANUAL_REVIEW_NEEDED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_implement_failed:
    action_type: shell
    action: |
      echo "IMPLEMENT_FAILED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  emit_scores_missing:
    action_type: shell
    action: |
      echo "SCORES_MISSING" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  # =========================================================================
  # Diagnostic State
  # =========================================================================

  rate_limit_diagnostic:
    # Writes RATE_LIMITED to subloop_outcome and routes to failed (ENH-1977 GAP A).
    # Parent's rate_limits.txt record is owned by the parent to avoid double counting.
    fragment: subloop_rate_limit_diagnostic
    with:
      operation: remediation

  # =========================================================================
  # Terminal States
  # =========================================================================

  done:
    terminal: true

  failed:
    terminal: true
