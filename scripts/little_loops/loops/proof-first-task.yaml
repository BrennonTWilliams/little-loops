name: proof-first-task
category: gate
description: Opt-in wrapper that gates any implementation loop on the Learning-Test Registry — proves a caller-supplied targets_csv directly when given, otherwise extracts external-API assumptions from the issue file via assumption-firewall — then delegates to a caller-specified impl loop. When no issue_file is given, skips the gate and runs the impl loop directly.
initial: check_issue_file
max_steps: 150
timeout: 7200
on_handoff: spawn
import:
  - lib/common.yaml

context:
  task: ""
  issue_file: ""
  impl_loop: "general-task"
  targets_csv: ""

states:

  check_issue_file:
    fragment: shell_exit
    action: test -n "${context.issue_file}" && test -f "${context.issue_file}"
    on_yes: check_targets_csv
    on_no: run_impl

  check_targets_csv:
    fragment: shell_exit
    action: test -n "${context.targets_csv}"
    on_yes: gate_direct
    on_no: gate

  gate_direct:
    loop: ready-to-implement-gate
    with:
      targets: "${context.targets_csv}"
    on_success: run_impl
    on_failure: blocked
    on_error: blocked

  gate:
    loop: assumption-firewall
    with:
      input: "${context.issue_file}"
    capture: gate_result
    on_success: run_impl
    on_failure: check_gate_blocked
    on_error: blocked

  check_gate_blocked:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import json, sys
      try:
          data = json.loads("""${captured.gate_result.extracted.output}""")
          count = data.get("count", -1)
      except Exception:
          count = -1
      sys.exit(0 if count == 0 else 1)
      PYEOF
    evaluate:
      type: exit_code
    on_yes: run_impl
    on_no: blocked

  run_impl:
    loop: "${context.impl_loop}"
    with:
      input: "${context.task}"
    on_success: done
    on_failure: impl_failed
    on_error: impl_failed

  done:
    terminal: true

  blocked:
    terminal: true

  impl_failed:
    terminal: true
