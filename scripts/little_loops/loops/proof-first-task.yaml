name: proof-first-task
category: gate
description: Opt-in wrapper that gates any implementation loop on assumption-firewall — extracts external-API assumptions from an issue file, proves each against the Learning-Test Registry, then delegates to a caller-specified impl loop. When no issue_file is given, skips the gate and runs the impl loop directly.
initial: check_issue_file
max_steps: 150
timeout: 7200
on_handoff: spawn
import:
  - lib/common.yaml

context:
  task: ""
  issue_file: ""
  impl_loop: "general-task"

states:

  check_issue_file:
    fragment: shell_exit
    action: test -n "${context.issue_file}" && test -f "${context.issue_file}"
    on_yes: gate
    on_no: run_impl

  gate:
    loop: assumption-firewall
    with:
      input: "${context.issue_file}"
    capture: gate_result
    on_success: run_impl
    on_failure: check_gate_blocked
    on_error: blocked

  check_gate_blocked:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import json, sys
      try:
          data = json.loads("""${captured.gate_result.extracted.output}""")
          count = data.get("count", -1)
      except Exception:
          count = -1
      sys.exit(0 if count == 0 else 1)
      PYEOF
    evaluate:
      type: exit_code
    on_yes: run_impl
    on_no: blocked

  run_impl:
    loop: "${context.impl_loop}"
    with:
      input: "${context.task}"
    on_success: done
    on_failure: impl_failed
    on_error: impl_failed

  done:
    terminal: true

  blocked:
    terminal: true

  impl_failed:
    terminal: true
