name: "sprint-refine-and-implement"
category: issue-management
description: |
  Alias for auto-refine-and-implement scoped to a named sprint or EPIC.
  Delegates to auto-refine-and-implement with scope=<sprint-name|EPIC-NNN>.
  Preserved for backward compatibility; prefer the scope param directly:
    ll-loop run auto-refine-and-implement --input scope=<sprint-name|EPIC-NNN>
input_key: sprint_name
required_inputs: ["sprint_name"]
initial: delegate
on_handoff: spawn
context:
  sprint_name: ""   # sprint name (.sprints/<name>.yaml) or an EPIC-NNN id

states:
  delegate:
    loop: auto-refine-and-implement
    with:
      scope: "${context.sprint_name}"
    on_success: done
    on_failure: done
    on_error: done

  done:
    terminal: true
