name: "sprint-refine-and-implement"
category: issue-management
description: |
  Like auto-refine-and-implement but scoped to a named sprint's issue list.
  Usage: ll-loop run sprint-refine-and-implement <sprint-name>
  Reads .sprints/<sprint-name>.yaml and processes issues in sprint order:
  recursively refine via recursive-refine (with decomposition), then implement
  all issues that passed refinement. Skips issues that fail refinement or are
  decomposed. Stops when the sprint is exhausted.
input_key: sprint_name
required_inputs: ["sprint_name"]
initial: get_next_issue
max_iterations: 500
timeout: 28800
on_handoff: spawn
# The .loops/tmp/sprint-refine-and-implement-{skipped,impl-queue}.txt files are
# part of the caller_prefix contract with oracles/implement-issue-chain (which
# also declares shared_state_ok). Not safe for concurrent runs of this loop.
shared_state_ok: true
import:
  - lib/common.yaml
context:
  sprint_name: ""
  max_issues: 100

states:
  get_next_issue:
    action: |
      mkdir -p .loops/tmp
      SKIP_FILE=".loops/tmp/sprint-refine-and-implement-skipped.txt"
      if [ -z "${context.sprint_name}" ]; then
        echo "Usage: ll-loop run sprint-refine-and-implement <sprint-name>" >&2
        exit 1
      fi
      SPRINT_FILE=".sprints/${context.sprint_name}.yaml"
      if [ ! -f "$SPRINT_FILE" ]; then
        echo "Sprint '${context.sprint_name}' not found at $SPRINT_FILE" >&2
        exit 1
      fi
      while IFS= read -r ISSUE_ID; do
        [ -z "$ISSUE_ID" ] && continue
        if [ -f "$SKIP_FILE" ] && grep -qxF "$ISSUE_ID" "$SKIP_FILE"; then
          continue
        fi
        echo "$ISSUE_ID"
        exit 0
      done < <(grep '^ *-' "$SPRINT_FILE" | sed 's/^ *- *//')
      exit 1
    action_type: shell
    capture: input
    on_yes: refine_issue
    on_no: done
    on_error: done

  refine_issue:
    loop: recursive-refine
    context_passthrough: true
    on_success: implement_chain
    on_failure: skip_and_continue
    on_error: skip_and_continue

  implement_chain:
    loop: oracles/implement-issue-chain
    with:
      caller_prefix: "sprint-refine-and-implement"
    on_success: get_next_issue
    on_failure: done
    on_error: done

  skip_and_continue:
    action: |
      echo "Skipping ${captured.input.output} after refinement failure"
      echo "${captured.input.output}" >> .loops/tmp/sprint-refine-and-implement-skipped.txt
    fragment: queue_track
    next: get_next_issue

  done:
    terminal: true
