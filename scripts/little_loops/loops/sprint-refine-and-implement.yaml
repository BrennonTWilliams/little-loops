name: "sprint-refine-and-implement"
category: issue-management
description: |
  Alias for auto-refine-and-implement scoped to a named sprint or EPIC.
  Delegates to auto-refine-and-implement with scope=<sprint-name|EPIC-NNN>.
  Preserved for backward compatibility; prefer the scope param directly:
    ll-loop run auto-refine-and-implement --input scope=<sprint-name|EPIC-NNN>
input_key: sprint_name
required_inputs: ["sprint_name"]
initial: delegate
on_handoff: spawn
context:
  sprint_name: ""   # sprint name (.sprints/<name>.yaml) or an EPIC-NNN id
  # Learning-gate skip knob: parity with `ll-auto --skip-learning-gate`. Forwarded
  # to auto-refine-and-implement (→ autodev → inner `ll-auto --only`) via with:.
  skip_learning_gate: ""

states:
  delegate:
    # ENH-2005: on_success/on_failure both route to read_outcome (which recovers
    # the child's real verdict from the subloop_outcome_ artifact), while
    # on_error routes to a DISTINCT crash state. This breaks the verdict-laundering
    # pattern where every child outcome collapsed silently into `done`. The child
    # shares this loop's run_dir (executor injects it via setdefault), so its
    # summary.json / subloop_outcome token land under ${context.run_dir}.
    loop: auto-refine-and-implement
    with:
      scope: "${context.sprint_name}"
      skip_learning_gate: "${context.skip_learning_gate}"
    on_success: read_outcome
    on_failure: read_outcome
    on_error: record_crash

  read_outcome:
    action: |
      RUN_DIR="${context.run_dir}"
      OUTCOME="$RUN_DIR/subloop_outcome_auto-refine-and-implement.txt"
      VERDICT=$(cat "$OUTCOME" 2>/dev/null || echo unknown)
      echo "sprint-refine-and-implement: auto-refine verdict=$VERDICT"
      if [ -f "$RUN_DIR/summary.json" ]; then
        cat "$RUN_DIR/summary.json"
      fi
    action_type: shell
    next: done

  record_crash:
    # auto-refine-and-implement crashed at the infrastructure level before it
    # could write its verdict token. Record the crash explicitly so the run is
    # not indistinguishable from a clean completion.
    action: |
      RUN_DIR="${context.run_dir}"
      printf 'crashed\n' > "$RUN_DIR/subloop_outcome_auto-refine-and-implement.txt"
      printf '{"verdict":"crashed","reason":"auto-refine-and-implement on_error fired before finalize"}\n' \
        > "$RUN_DIR/summary.json"
      echo "sprint-refine-and-implement: delegate crashed — see events.jsonl"
    action_type: shell
    next: done

  done:
    terminal: true
