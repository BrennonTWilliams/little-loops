fragments:
  playwright_screenshot:
    description: |
      Shell fragment that captures a Playwright screenshot of a generated artifact and emits
      "CAPTURED" on success. Default action uses context.file_url (the file:// URL) and
      context.screenshot_path (output .png path) with 2>&1 stderr capture (Variant B).
      Callers needing $(pwd)/ path expansion (Variant A) must override action: at the call site.
    action_type: shell
    action: |
      playwright screenshot "${context.file_url}" "${context.screenshot_path}" 2>&1 && echo "CAPTURED"
    evaluate:
      type: output_contains
      pattern: "CAPTURED"

  ll_rubric_score:
    description: |
      Prompt fragment that scores a generated artifact in context.run_dir against the rubric
      in context.rubric with pass threshold context.pass_threshold. Emits ALL_PASS when all
      criteria meet or exceed the threshold; otherwise emits NEEDS_WORK with improvement notes.
      Used in the generator-evaluator oracle score state.
    action_type: prompt
    action: |
      Review the generated artifact in ${context.run_dir} against the rubric below.

      ${context.rubric}

      Pass threshold: ${context.pass_threshold}/10 per criterion.
      If all criteria meet or exceed the threshold, output ALL_PASS on its own line.
      Otherwise output NEEDS_WORK and describe the specific improvements required.
    evaluate:
      type: output_contains
      pattern: "ALL_PASS"
