fragments:
  playwright_screenshot:
    description: |
      Shell fragment that captures a full-page Playwright screenshot of a generated artifact
      and emits "CAPTURED" on success (--full-page so the evaluator sees the whole page, not
      just the above-the-fold viewport). Default action uses context.file_url (the file:// URL) and
      context.screenshot_path (output .png path) with 2>&1 stderr capture (Variant B).
      Callers needing $(pwd)/ path expansion (Variant A) must override action: at the call site.
    action_type: shell
    action: |
      playwright screenshot --full-page "${context.file_url}" "${context.screenshot_path}" 2>&1 && echo "CAPTURED"
    evaluate:
      type: output_contains
      pattern: "CAPTURED"

  ll_rubric_score:
    description: |
      Prompt fragment that scores a generated artifact against a rubric. Caller must supply
      via with: bindings:
        run_dir         — directory containing the artifact to review (runner-injected; bind via with: {run_dir: "${context.run_dir}"})
        rubric          — rubric criteria as markdown text (required)
        pass_threshold  — minimum score threshold, e.g. 6 (required)
    parameters:
      run_dir:
        type: string
        required: true
      rubric:
        type: string
        required: true
      pass_threshold:
        type: number
        required: true
    action_type: prompt
    action: |
      Review the generated artifact in ${param.run_dir} against the rubric below.

      ${param.rubric}

      Pass threshold: ${param.pass_threshold}/10 per criterion.
      If all criteria meet or exceed the threshold, output ALL_PASS on its own line.
      Otherwise output NEEDS_WORK and describe the specific improvements required.
    evaluate:
      type: output_contains
      pattern: "ALL_PASS"
