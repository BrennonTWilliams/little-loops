# Common fragment library for little-loops built-in loops.
#
# Import in any loop with:
#   import:
#     - lib/common.yaml
#
# Then reference a fragment in a state:
#   my_state:
#     fragment: shell_exit
#     action: "ruff check ."
#     on_yes: done
#     on_no: fix

fragments:
  shell_exit:
    description: |
      Shell command evaluated by exit code.
      State must supply: action, on_yes, on_no (and optionally on_error, timeout).
    action_type: shell
    evaluate:
      type: exit_code

  retry_counter:
    description: |
      Shell state that increments a counter file and evaluates whether it is still below
      the retry limit. Caller must supply via with: bindings:
        counter_key  — filename under .loops/tmp/ for the counter
        max_retries  — upper bound (lt comparison); defaults to 3 if not bound
      State must supply routing: on_yes (continue), on_no (give up).
    parameters:
      counter_key:
        type: string
        required: true
      max_retries:
        type: integer
        default: 3
    action: |
      FILE=".loops/tmp/${param.counter_key}"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1)); printf '%s' "$N" > "$FILE"; echo "$N"
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: "${param.max_retries}"

  llm_gate:
    description: |
      LLM prompt state evaluated by structured yes/no output.
      State must supply: action (the prompt text), evaluate.prompt (the yes/no question),
      on_yes, on_no (and optionally on_error, timeout, capture).
      Timeout budget: when the prompt performs multiple MCP tool calls followed by synthesis
      (~10 calls), set timeout: 1500 or higher at the state level. The 3600s executor
      fallback only applies when neither state-level timeout: nor loop-level default_timeout:
      is set — a low default_timeout: bypasses the fallback and will kill MCP-heavy prompts
      mid-synthesis.
    action_type: prompt
    evaluate:
      type: llm_structured

  with_rate_limit_handling:
    description: |
      Applies per-state rate-limit retry handling with a short-tier (3 retries, 30s base
      exponential backoff) and a long-wait tier (21600s total wall-clock budget, ladder
      of 5m/15m/30m/60m). Together these give multi-hour 429 resilience by default.
      State must supply: on_rate_limit_exhausted (target state when the full budget is spent).
      State may override any of: max_rate_limit_retries, rate_limit_backoff_base_seconds,
      rate_limit_max_wait_seconds, rate_limit_long_wait_ladder.
      Opt out of long-wait handling by setting rate_limit_max_wait_seconds: 0 at the state
      level, or by composing a custom fragment instead of this one.
    max_rate_limit_retries: 3
    rate_limit_backoff_base_seconds: 30
    rate_limit_max_wait_seconds: 21600
    rate_limit_long_wait_ladder: [300, 900, 1800, 3600]

  with_throttle:
    description: |
      Applies per-state progressive tool-call throttling with defaults from the executor
      module: calls 1-3 pass through (normal_max), call 8 injects a throttle_warn event,
      call 12 triggers a transition to on_throttle_hard (or on_error if not set), and
      calls beyond 12 hard-stop the loop.
      State must supply: on_throttle_hard (target state when hard_max is reached).
      State may override any of: throttle.normal_max, throttle.warn_max, throttle.hard_max.
      Note: States with type="learning" (FEAT-1283) are exempt from the hard_max check
      because they legitimately make N tool calls per visit (one per unproven target);
      the warn_max warning still fires so users can observe the work being done.
    throttle:
      normal_max: 3
      warn_max: 8
      hard_max: 12

  parse_tagged_json:
    description: |
      Shell state that extracts a tagged JSON line from LLM output.
      State must supply: action (full extraction + normalization logic),
      capture, evaluate (output_json recommended), on_yes, on_no.
      Context: set context.json_tag (e.g. ENUMERATE_JSON) and
      context.capture_var (e.g. raw_enumeration) to document intent;
      the action must reference captured output directly
      (e.g. ${captured.raw_enumeration.output}) as nested interpolation
      is not supported by the current engine.
      DESIGN NOTE: No default action: is provided. The FSM interpolation engine
      (interpolation.py:VARIABLE_PATTERN) is single-pass and stops at the first }
      so nested ${captured.${context.capture_var}.output} raises InterpolationError.
      Each caller must supply action: referencing the captured variable by its literal name.
    action_type: shell

  numeric_gate:
    description: |
      Shell command evaluated by numeric output comparison.
      State must supply: action (shell command that prints a number),
      evaluate.operator (eq|lt|gt|ge|le), evaluate.target (threshold),
      on_yes, on_no (and optionally on_error, timeout, capture).
    action_type: shell
    evaluate:
      type: output_numeric

  convergence_gate:
    description: |
      Shell state evaluated by the convergence evaluator (direction: maximize).
      State must supply: action (shell command that prints a number on its last line),
      evaluate.target (convergence threshold, e.g. "${context.coverage_target}"),
      evaluate.tolerance (acceptable delta before declaring stall),
      route.target, route.progress, route.stall (and optionally route.error,
      evaluate.previous for stall-detection across iterations).
    action_type: shell
    evaluate:
      type: convergence
      direction: maximize

  queue_pop:
    description: |
      Shell state that atomically pops the head of a queue file (head-1/tail-n+2/mv idiom).
      State must supply: action (the three-line pop shell script, plus any per-loop extras
      such as inflight sentinels or counter increments), on_yes (item popped), on_no (queue empty).
      Optionally: on_error, capture.
    action_type: shell
    evaluate:
      type: exit_code

  queue_track:
    description: |
      Shell state that appends an ID to a skip or visited tracking file (echo >> idiom).
      No evaluator — this state always transitions unconditionally via next:.
      State must supply: action (echo "<ID>" >> <track-file>), next:.
    action_type: shell

  diff_stall_gate:
    description: |
      Evaluator-only fragment that supplies evaluate.type: diff_stall and
      evaluate.max_stall: 2. Checks whether git diff has changed since the
      last iteration; returns yes on progress, no on stall (max_stall
      consecutive identical diffs).
      State must supply: action, action_type, and routing (on_yes, on_no);
      optionally on_error and evaluate.scope (list of paths) to limit the
      diff to specific subtrees. Default max_stall: 2 (EvaluateConfig default
      is 1; override per-state if needed).
    evaluate:
      type: diff_stall
      max_stall: 2

  score_stall_gate:
    description: |
      Evaluator-only fragment that supplies evaluate.type: score_stall and
      evaluate.max_stall: 2. Detects a scored-output plateau by reading a
      per-round score-history file (one numeric aggregate rubric score per
      line, appended under ${context.run_dir}/.score_history by the loop's
      score state). Returns yes while scores keep improving by more than
      epsilon; returns no once the aggregate score has not improved for
      max_stall consecutive rounds (accept best-so-far). This is the
      score-plateau companion to diff_stall_gate: byte-diff can keep changing
      while the visible/scored output stops improving, so score_stall catches
      the stagnation that diff_stall misses (ENH-2428).
      State must supply: action, action_type, and routing (on_yes, on_no);
      optionally on_error, evaluate.history_file (defaults to
      ${context.run_dir}/.score_history), and evaluate.epsilon (default 0.5).
      Default max_stall: 2 (EvaluateConfig default is 1; override per-state if
      needed).
    evaluate:
      type: score_stall
      max_stall: 2

  snapshot_artifact:
    description: |
      Shell state that snapshots the current artifact into a per-iteration
      iter-N/ subdirectory within the run directory. An iteration counter file
      tracks the version across loop iterations.
      Caller must supply via with: bindings:
        artifact_path — filename (relative to run_dir) of the artifact to snapshot
        run_dir      — absolute path to the run directory output area
      State must supply routing: on_yes, on_no, or next: (no evaluator — always
      succeeds unconditionally). Use next: <target> for unconditional forward.
    parameters:
      artifact_path:
        type: string
        required: true
      run_dir:
        type: string
        required: true
    action_type: shell
    action: |
      RUN_DIR="${param.run_dir}"
      COUNTER_FILE="$RUN_DIR/.iter_counter"
      COUNTER=$(cat "$COUNTER_FILE" 2>/dev/null || echo 0)
      COUNTER=$((COUNTER + 1))
      echo "$COUNTER" > "$COUNTER_FILE"
      mkdir -p "$RUN_DIR/iter-$COUNTER"
      cp "$RUN_DIR/${param.artifact_path}" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true
      cp "$RUN_DIR/screenshot.png" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true

  plan_rubric_score:
    description: |
      9-dimension plan scorer for rn-* planning loops. Reads plan.md and plan-rubric.md,
      evaluates the plan on breadth/depth/complexity/clarity/consistency/logic_strategy/
      feasibility/testability/risk_mitigation using the LOW/MEDIUM/HIGH/VERY-HIGH scale,
      rewrites plan-rubric.md, and emits the ALL_VERY_HIGH sentinel when all dimensions
      converge. Distinct from score_plan_quality (4-dimension batch scorer in
      lib/score-plan-quality.yaml).
      State must supply: on_yes (convergence route), on_no (iterate route), on_error.
    action_type: prompt
    action: |
      Read the current plan at ${captured.run_dir.output}/plan.md.
      Read the rubric at ${captured.run_dir.output}/plan-rubric.md.

      Evaluate the plan against each of the 9 dimensions using the LOW/MEDIUM/HIGH/VERY-HIGH scale:
      - LOW (1): significant gaps; not yet actionable
      - MEDIUM (2): covers basics but missing important details
      - HIGH (3): solid; minor gaps or ambiguities remain
      - VERY-HIGH (4): comprehensive, precise, actionable — no meaningful improvement possible

      Scoring criteria:
      - breadth: Are all relevant concerns, risks, and stakeholders covered?
      - depth: Are sub-steps specific and granular enough to execute without guessing?
      - complexity: Is the plan's scope calibrated to the task — not over- or under-engineered?
      - clarity: Is every directive unambiguous and free of vague language?
      - consistency: Are steps non-contradictory? No duplication or conflicting advice?
      - logic_strategy: Is the ordering sound? Does the approach make sense for this task?
      - feasibility: Are the steps achievable given realistic constraints (time, resources, skills, access)?
      - testability: Does the plan define clear success criteria and verification steps for each phase?
      - risk_mitigation: Are key risks identified with concrete contingencies or mitigation strategies?

      Update ${captured.run_dir.output}/plan-rubric.md — rewrite the ## Dimensions section
      with the new scores and update the ## Aggregate section:
      - score = mean of all 9 dimension values (1-4 scale)
      - verdict = ALL_VERY_HIGH if all 9 are VERY-HIGH, otherwise ITERATE

      After updating the rubric file:
      - If ALL 9 dimensions are VERY-HIGH, output exactly: ALL_VERY_HIGH
      - Otherwise output: ITERATE
    evaluate:
      type: output_contains
      pattern: "ALL_VERY_HIGH"

  loop_failure_diagnose:
    description: |
      Terminal failure handler for rn-* planning loops. Prompts for root-cause diagnosis,
      reads rubric and plan artifacts if available, and writes a one-paragraph diagnostic
      summary for the operator. Fixed next: failed.
      Caller must supply via with: bindings:
        loop_name     — name of the loop for the opening sentence (e.g. rn-plan, rn-refine)
      Optional:
        extra_bullets — additional diagnostic bullet points, one per line (default: "")
    parameters:
      loop_name:
        type: string
        required: true
      extra_bullets:
        type: string
        default: ""
    action_type: prompt
    action: |
      The ${param.loop_name} loop has terminated with an unrecoverable failure.

      Diagnose what happened:
      - If ${captured.run_dir.output}/plan-rubric.md exists, read it and report the last rubric scores.
      ${param.extra_bullets}
      - Identify the most likely failure cause.

      Write a one-paragraph diagnostic summary the operator can use to re-run or adjust inputs.
    next: failed

  ll_auto_auth_check:
    description: |
      Shell state that greps captured ll-auto output for host-auth failure signatures
      (HTTP 401/403 and the ll-auto fatal credential string) and emits AUTH_FAILED or OK.
      Designed to follow any ll-auto call site that sets capture: ll_auto_output.
      State must supply: on_yes (auth detected → abort route), on_no (no auth failure → continue).
      Callers MUST set capture: ll_auto_output on their ll-auto state so this fragment can
      read ${captured.ll_auto_output.output}. Detection is host-agnostic: output signatures
      only; no ANTHROPIC_API_KEY / CLAUDE_CODE_OAUTH_TOKEN env probes (ENH-2353).
    action_type: shell
    action: |
      if echo "${captured.ll_auto_output.output}" | grep -qiE '401|403|unauthorized|forbidden|could not resolve authentication|authentication method'; then
        echo "AUTH_FAILED"
      else
        echo "OK"
      fi
    evaluate:
      type: output_contains
      pattern: "AUTH_FAILED"

  ll_auto_learning_gate_check:
    description: |
      Shell state that greps captured ll-auto output for the learning-gate block
      marker (LEARNING_GATE_BLOCKED, emitted by process_issue_inplace when the
      ENH-2319 gate blocks an issue on unproven external-API deps) and emits
      GATE_BLOCKED or OK. Designed to follow any `ll-auto --only` call site that
      sets capture: ll_auto_output. State must supply: on_yes (gate block detected
      → distinct routing), on_no (no gate block → continue to the next check).
      Callers MUST set capture: ll_auto_output on their ll-auto state so this
      fragment can read ${captured.ll_auto_output.output}. Pair this BEFORE
      ll_auto_auth_check so a gate block is not misattributed as an auth failure
      or a generic implementation failure (consistency across rn-remediate /
      autodev, see HARNESS_OPTIMIZATION_GUIDE learning-gate section).
    action_type: shell
    action: |
      if echo "${captured.ll_auto_output.output}" | grep -qF 'LEARNING_GATE_BLOCKED'; then
        echo "GATE_BLOCKED"
      else
        echo "OK"
      fi
    evaluate:
      type: output_contains
      pattern: "GATE_BLOCKED"

  subloop_rate_limit_diagnostic:
    description: |
      Sub-loop terminal handler for rate-limit exhaustion (ENH-1977 GAP A). Writes an
      outcome token to the shared run_dir so the parent loop reads exhaustion correctly
      rather than treating it as success. Fixed next: failed.
      Uses ${context.issue_id} and ${context.run_dir} from the loop context.
      Caller must supply via with: bindings:
        operation   — operation word for the log line (e.g. remediation, decomposition)
      Optional:
        outcome_token — token written to the outcome file (default: RATE_LIMITED)
    parameters:
      operation:
        type: string
        required: true
      outcome_token:
        type: string
        default: RATE_LIMITED
    action_type: shell
    action: |
      ID="${context.issue_id}"
      echo "${param.outcome_token}" > "${context.run_dir}/subloop_outcome_$${ID}.txt"
      echo "[RATE_LIMIT] $${ID} rate-limited during ${param.operation}"
    next: failed
