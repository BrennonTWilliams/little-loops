# Common fragment library for little-loops built-in loops.
#
# Import in any loop with:
#   import:
#     - lib/common.yaml
#
# Then reference a fragment in a state:
#   my_state:
#     fragment: shell_exit
#     action: "ruff check ."
#     on_yes: done
#     on_no: fix

fragments:
  shell_exit:
    description: |
      Shell command evaluated by exit code.
      State must supply: action, on_yes, on_no (and optionally on_error, timeout).
    action_type: shell
    evaluate:
      type: exit_code

  retry_counter:
    description: |
      Shell state that increments a counter file and evaluates whether it is still below
      the retry limit. Caller must supply via with: bindings:
        counter_key  — filename under .loops/tmp/ for the counter
        max_retries  — upper bound (lt comparison); defaults to 3 if not bound
      State must supply routing: on_yes (continue), on_no (give up).
    parameters:
      counter_key:
        type: string
        required: true
      max_retries:
        type: integer
        default: 3
    action: |
      FILE=".loops/tmp/${param.counter_key}"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1)); printf '%s' "$N" > "$FILE"; echo "$N"
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: "${param.max_retries}"

  llm_gate:
    description: |
      LLM prompt state evaluated by structured yes/no output.
      State must supply: action (the prompt text), evaluate.prompt (the yes/no question),
      on_yes, on_no (and optionally on_error, timeout, capture).
      Timeout budget: when the prompt performs multiple MCP tool calls followed by synthesis
      (~10 calls), set timeout: 1500 or higher at the state level. The 3600s executor
      fallback only applies when neither state-level timeout: nor loop-level default_timeout:
      is set — a low default_timeout: bypasses the fallback and will kill MCP-heavy prompts
      mid-synthesis.
    action_type: prompt
    evaluate:
      type: llm_structured

  with_rate_limit_handling:
    description: |
      Applies per-state rate-limit retry handling with a short-tier (3 retries, 30s base
      exponential backoff) and a long-wait tier (21600s total wall-clock budget, ladder
      of 5m/15m/30m/60m). Together these give multi-hour 429 resilience by default.
      State must supply: on_rate_limit_exhausted (target state when the full budget is spent).
      State may override any of: max_rate_limit_retries, rate_limit_backoff_base_seconds,
      rate_limit_max_wait_seconds, rate_limit_long_wait_ladder.
      Opt out of long-wait handling by setting rate_limit_max_wait_seconds: 0 at the state
      level, or by composing a custom fragment instead of this one.
    max_rate_limit_retries: 3
    rate_limit_backoff_base_seconds: 30
    rate_limit_max_wait_seconds: 21600
    rate_limit_long_wait_ladder: [300, 900, 1800, 3600]

  with_throttle:
    description: |
      Applies per-state progressive tool-call throttling with defaults from the executor
      module: calls 1-3 pass through (normal_max), call 8 injects a throttle_warn event,
      call 12 triggers a transition to on_throttle_hard (or on_error if not set), and
      calls beyond 12 hard-stop the loop.
      State must supply: on_throttle_hard (target state when hard_max is reached).
      State may override any of: throttle.normal_max, throttle.warn_max, throttle.hard_max.
      Note: States with type="learning" (FEAT-1283) are exempt from the hard_max check
      because they legitimately make N tool calls per visit (one per unproven target);
      the warn_max warning still fires so users can observe the work being done.
    throttle:
      normal_max: 3
      warn_max: 8
      hard_max: 12

  parse_tagged_json:
    description: |
      Shell state that extracts a tagged JSON line from LLM output.
      State must supply: action (full extraction + normalization logic),
      capture, evaluate (output_json recommended), on_yes, on_no.
      Context: set context.json_tag (e.g. ENUMERATE_JSON) and
      context.capture_var (e.g. raw_enumeration) to document intent;
      the action must reference captured output directly
      (e.g. ${captured.raw_enumeration.output}) as nested interpolation
      is not supported by the current engine.
      DESIGN NOTE: No default action: is provided. The FSM interpolation engine
      (interpolation.py:VARIABLE_PATTERN) is single-pass and stops at the first }
      so nested ${captured.${context.capture_var}.output} raises InterpolationError.
      Each caller must supply action: referencing the captured variable by its literal name.
    action_type: shell

  numeric_gate:
    description: |
      Shell command evaluated by numeric output comparison.
      State must supply: action (shell command that prints a number),
      evaluate.operator (eq|lt|gt|ge|le), evaluate.target (threshold),
      on_yes, on_no (and optionally on_error, timeout, capture).
    action_type: shell
    evaluate:
      type: output_numeric

  convergence_gate:
    description: |
      Shell state evaluated by the convergence evaluator (direction: maximize).
      State must supply: action (shell command that prints a number on its last line),
      evaluate.target (convergence threshold, e.g. "${context.coverage_target}"),
      evaluate.tolerance (acceptable delta before declaring stall),
      route.target, route.progress, route.stall (and optionally route.error,
      evaluate.previous for stall-detection across iterations).
    action_type: shell
    evaluate:
      type: convergence
      direction: maximize

  queue_pop:
    description: |
      Shell state that atomically pops the head of a queue file (head-1/tail-n+2/mv idiom).
      State must supply: action (the three-line pop shell script, plus any per-loop extras
      such as inflight sentinels or counter increments), on_yes (item popped), on_no (queue empty).
      Optionally: on_error, capture.
    action_type: shell
    evaluate:
      type: exit_code

  queue_track:
    description: |
      Shell state that appends an ID to a skip or visited tracking file (echo >> idiom).
      No evaluator — this state always transitions unconditionally via next:.
      State must supply: action (echo "<ID>" >> <track-file>), next:.
    action_type: shell

  diff_stall_gate:
    description: |
      Evaluator-only fragment that supplies evaluate.type: diff_stall and
      evaluate.max_stall: 2. Checks whether git diff has changed since the
      last iteration; returns yes on progress, no on stall (max_stall
      consecutive identical diffs).
      State must supply: action, action_type, and routing (on_yes, on_no);
      optionally on_error and evaluate.scope (list of paths) to limit the
      diff to specific subtrees. Default max_stall: 2 (EvaluateConfig default
      is 1; override per-state if needed).
    evaluate:
      type: diff_stall
      max_stall: 2

  snapshot_artifact:
    description: |
      Shell state that snapshots the current artifact into a per-iteration
      iter-N/ subdirectory within the run directory. An iteration counter file
      tracks the version across loop iterations.
      Caller must supply via with: bindings:
        artifact_path — filename (relative to run_dir) of the artifact to snapshot
        run_dir      — absolute path to the run directory output area
      State must supply routing: on_yes, on_no, or next: (no evaluator — always
      succeeds unconditionally). Use next: <target> for unconditional forward.
    parameters:
      artifact_path:
        type: string
        required: true
      run_dir:
        type: string
        required: true
    action_type: shell
    action: |
      RUN_DIR="${param.run_dir}"
      COUNTER_FILE="$RUN_DIR/.iter_counter"
      COUNTER=$(cat "$COUNTER_FILE" 2>/dev/null || echo 0)
      COUNTER=$((COUNTER + 1))
      echo "$COUNTER" > "$COUNTER_FILE"
      mkdir -p "$RUN_DIR/iter-$COUNTER"
      cp "$RUN_DIR/${param.artifact_path}" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true
      cp "$RUN_DIR/screenshot.png" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true
