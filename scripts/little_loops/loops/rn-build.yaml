name: rn-build
category: orchestration
input_key: spec
required_inputs: ["spec"]
description: |
  Capstone orchestration loop for the recursive spec-to-project builder. Takes a spec
  file path and drives the full automated pipeline: spec validation → tech research →
  design artifacts → commit → scope EPIC + feature stubs → issue refinement →
  eval harness install → goal-cluster execution (dispatching batches to rn-implement
  with value_ranked scheduling) → eval gate with bounded re-entry → synthesize result.

  Use when you have a spec document and want a fully automated spec-to-implementation
  pipeline with no manual handoffs between phases. Delegates batch execution to
  goal-cluster which dispatches each batch to rn-implement(value_ranked).

  Run as: ll-loop run rn-build --context spec=<path>

  Spec format: specs/SPEC_TEMPLATE.md is the authoritative template. Required sections
  are Overview, Core Features, and Acceptance Criteria; all other sections are optional.
  See specs/sample.md for a worked example. Loosely-structured specs (missing required
  sections) are auto-normalized before tech_research; the original file is never modified.

  Architecture:
  - Front-half (ports from greenfield-builder): init → tech_research → design_artifacts
    → commit_design → scope_project → refine_seed → eval_harness
  - Execution: cluster_execute (goal-cluster → rn-implement/value_ranked)
  - Quality gate: check_harness_name → eval_gate → check_eval_retry_budget → capture_eval_failures → re-cluster
  - Terminal: synthesize_result → done
initial: init
max_steps: 30
timeout: 86400
on_handoff: spawn

context:
  spec: ""              # required: path(s) to spec file(s), comma-separated
  max_eval_retries: "2" # max eval_gate retry cycles before accepting partial result
  harness_name: ""      # auto-populated: name of created harness loop
  epic_id: ""           # auto-populated: EPIC ID from scope_project
  # ENH-2016: resume support. Re-enter cluster_execute for an already-scoped EPIC
  # without re-running the front half (init → … → eval_harness):
  #   ll-loop run rn-build --context resume_epic=EPIC-NNN --context resume_harness=<name>
  resume_epic: ""       # EPIC-NNN: skip front half, re-enter cluster_execute
  resume_harness: ""    # harness name for eval_gate when resuming

states:

  # ─── Phase 1: Validate spec file(s) and read their contents ──────────────────

  init:
    action_type: shell
    action: |
      RUN_DIR="${context.run_dir}"
      mkdir -p "$RUN_DIR"

      # ENH-2016: resume path — if ${context.resume_epic} is set, skip spec validation
      # and signal the output_contains evaluator to route to the resume state.
      RESUME_EPIC="${context.resume_epic}"
      if [ -n "$RESUME_EPIC" ]; then
        echo "RESUME_MODE:$RESUME_EPIC"
        exit 0
      fi

      # Normal mode: validate and read spec file(s)
      SPECS="${context.spec}"
      if [ -z "$SPECS" ]; then
        echo "ERROR: spec context variable is required. Pass --context spec=<path>"
        exit 1
      fi
      IFS=',' read -ra SPEC_LIST <<< "$SPECS"
      for S in "$${SPEC_LIST[@]}"; do
        S=$(echo "$S" | xargs)
        if [ ! -f "$S" ]; then
          echo "ERROR: Spec file not found: $S"
          exit 1
        fi
        echo "=== $S ==="
        cat "$S"
        echo ""
      done
    capture: spec_content
    evaluate:
      type: output_contains
      pattern: "RESUME_MODE:"
    on_yes: resume
    on_no: check_structure
    on_error: failed

  # ─── Phase 1.5: Normalize malformed spec (pre-gate before tech_research) ─────
  # check_structure: non-LLM exit_code gate — satisfies MR-1 for llm_normalize.
  # Combines all spec files and greps for the three required section headers.
  # Well-formed specs skip normalization entirely (check_structure → tech_research).

  check_structure:
    action_type: shell
    action: |
      RUN_DIR="${context.run_dir}"
      mkdir -p "$RUN_DIR"
      SPECS="${context.spec}"
      IFS=',' read -ra SPEC_LIST <<< "$SPECS"
      COMBINED="$RUN_DIR/spec_combined.tmp"
      for S in "$${SPEC_LIST[@]}"; do
        S=$(echo "$S" | xargs)
        cat "$S"
      done > "$COMBINED"
      COUNT=$(grep -c "## Overview\|## Core Features\|## Acceptance Criteria" "$COMBINED" 2>/dev/null || echo 0)
      echo "Required section count: $COUNT / 3"
      [ "$COUNT" -eq 3 ] && exit 0 || exit 1
    evaluate:
      type: exit_code
    on_yes: tech_research
    on_no: llm_normalize
    on_error: tech_research

  llm_normalize:
    action_type: prompt
    timeout: 300
    action: |
      The spec provided is missing one or more required sections. Normalize it to
      the standard format defined in specs/SPEC_TEMPLATE.md.

      Required sections: `## Overview`, `## Core Features`, `## Acceptance Criteria`
      Optional sections: `## Data Model`, `## Non-Goals`, `## Tech Constraints`

      Spec content (original):
      ${captured.spec_content.output}

      Instructions:
      1. Read the spec content above carefully — infer intent from whatever is present.
      2. Populate any missing required sections derived from the existing content.
         Do NOT fabricate features not implied by the text. Preserve all existing text.
      3. Write the complete normalized spec (with all required sections present) to:
         ${context.run_dir}/spec_normalized.md
      4. If the content is empty or too vague to derive any project description,
         do NOT write the file — instead output exactly this line:
         NORMALIZE_FAILED: Cannot normalize — spec is empty or contains no project description.
    capture: normalize_result
    next: verify_structure

  verify_structure:
    action_type: shell
    action: |
      NORMALIZED="${context.run_dir}/spec_normalized.md"
      if [ ! -f "$NORMALIZED" ]; then
        echo "ERROR: normalized spec was not written to $NORMALIZED"
        exit 1
      fi
      COUNT=$(grep -c "## Overview\|## Core Features\|## Acceptance Criteria" "$NORMALIZED" 2>/dev/null || echo 0)
      echo "Required section count in normalized spec: $COUNT / 3"
      [ "$COUNT" -eq 3 ] && exit 0 || exit 1
    evaluate:
      type: exit_code
    on_yes: load_normalized
    on_no: abort_normalize
    on_error: abort_normalize

  load_normalized:
    action_type: shell
    action: |
      cat "${context.run_dir}/spec_normalized.md"
    capture: spec_content
    evaluate:
      type: exit_code
    on_yes: tech_research
    on_no: tech_research
    on_error: tech_research

  abort_normalize:
    action_type: shell
    terminal: true
    action: |
      echo "ERROR: Spec normalization failed."
      echo ""
      echo "The spec could not be normalized to include all required sections:"
      echo "  ## Overview, ## Core Features, ## Acceptance Criteria"
      echo ""
      echo "Please provide a more complete spec or start from the template:"
      echo "  specs/SPEC_TEMPLATE.md"
      exit 1

  # ─── Phase 0 (resume only): Re-enter cluster_execute from a prior run ─────────
  # ENH-2016: Entered when init detects resume_epic is non-empty. Writes the
  # caller-supplied EPIC ID and optional harness name to run_dir so that
  # cluster_execute and check_harness_name can read them via captured variables,
  # exactly as the normal scope_project → eval_harness path would have done.

  resume:
    action_type: shell
    action: |
      EPIC="${context.resume_epic}"
      HARNESS="${context.resume_harness}"
      RUN_DIR="${context.run_dir}"
      mkdir -p "$RUN_DIR"
      if [ -z "$EPIC" ]; then
        echo "ERROR: resume_epic is required for resume mode"
        exit 1
      fi
      echo "$EPIC" > "$RUN_DIR/epic-id.txt"
      [ -n "$HARNESS" ] && echo "$HARNESS" > "$RUN_DIR/harness-name.txt"
      echo "$EPIC"
    capture: epic_id
    evaluate:
      type: exit_code
    on_yes: resume_read_harness
    on_no: failed
    on_error: failed

  resume_read_harness:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import sys, os, glob

      run_dir = '${context.run_dir}'.rstrip('/')
      os.makedirs(run_dir, exist_ok=True)

      # Step 1: harness-name.txt from this run (written if --context resume_harness was provided)
      harness_file = os.path.join(run_dir, 'harness-name.txt')
      if os.path.exists(harness_file):
          with open(harness_file) as f:
              name = f.read().strip()
          if name:
              print(name)
              sys.exit(0)

      # Step 2: most recent prior rn-build run that recorded a harness
      runs_dir = os.path.dirname(run_dir)
      prior_files = sorted(glob.glob(os.path.join(runs_dir, 'rn-build-*', 'harness-name.txt')))
      for hf in reversed(prior_files):
          if os.path.dirname(hf) == run_dir:
              continue  # skip the current run already checked above
          with open(hf) as f:
              name = f.read().strip()
          if name:
              print(f'[resume] auto-discovered harness "{name}" from prior run: {os.path.dirname(hf)}', file=sys.stderr)
              print(name)
              sys.exit(0)

      # Step 3: installed harness loop YAML in .loops/harness-*.yaml
      for hf in sorted(glob.glob('.loops/harness-*.yaml'), key=os.path.getmtime, reverse=True):
          name = os.path.splitext(os.path.basename(hf))[0]
          if name:
              print(f'[resume] auto-discovered installed harness loop: {name}', file=sys.stderr)
              print(name)
              sys.exit(0)

      # Step 4: no harness found — emit loud warning; eval gate will be skipped via check_harness_name
      print('', file=sys.stderr)
      print('=' * 64, file=sys.stderr)
      print('WARNING: no eval harness found for this resume.', file=sys.stderr)
      print('  Eval gate will be SKIPPED — build results will not be verified.', file=sys.stderr)
      print('  To enable verification on resume, either:', file=sys.stderr)
      print('    (a) pass --context resume_harness=<name>', file=sys.stderr)
      print('    (b) install a harness: ll-loop install harness-*', file=sys.stderr)
      print('=' * 64, file=sys.stderr)
      print('', file=sys.stderr)
      print('')
      sys.exit(0)
      PYEOF
    capture: harness_name
    evaluate:
      type: exit_code
    on_yes: cluster_execute
    on_no: cluster_execute
    on_error: cluster_execute

  # ─── Phase 2: Research technology decisions ───────────────────────────────────

  tech_research:
    action_type: prompt
    timeout: 600
    # FEAT-2711: continues into design_artifacts (across the check_research_written
    # shell gate, which is transparent to continuity — see fsm/executor.py). This
    # is the step-0 gate's named chain: design_artifacts otherwise re-reads the
    # spec + research.md from scratch to rebuild the same understanding this state
    # already derived.
    session_mode: continue
    action: |
      Analyze the project spec and research technology decisions. Write `docs/research.md`
      containing:
      1. **Technology Decisions** — table of chosen technologies with rationale
      2. **Library Comparisons** — alternatives considered for key dependencies
      3. **Rejected Alternatives** — what was not chosen and why
      4. **Security & Platform Notes** — relevant security considerations

      Spec content:
      ${captured.spec_content.output}

      Create the `docs/` directory if it doesn't exist.
    capture: tech_research
    next: check_research_written

  # check_research_written: timeout guard for tech_research. The prompt action has
  # a 600s timeout but (like all prompt actions) only supports `next:` routing — a
  # timeout (exit 124) silently yields empty captured output and would otherwise let
  # design_artifacts + commit_design proceed as if research existed, producing a
  # misleading "technology research AND design artifacts" commit. This shell state
  # writes a stub so the file always exists and downstream states have something to
  # reference. See rn-build-audit-2026-06-08.md fault #1.
  check_research_written:
    action_type: shell
    action: |
      mkdir -p docs
      if [ ! -s docs/research.md ]; then
        echo "WARNING: docs/research.md missing or empty — tech_research likely timed out; writing stub"
        {
          echo "# Technology Research"
          echo ""
          echo "> **Auto-stub:** \`tech_research\` produced no output (timeout or empty"
          echo "> response). Populate this file manually, or re-run the research step."
        } > docs/research.md
      else
        echo "docs/research.md present ($(wc -l < docs/research.md) lines)"
      fi
      exit 0
    capture: research_check
    evaluate:
      type: exit_code
    on_yes: design_artifacts
    on_no: design_artifacts
    on_error: design_artifacts

  # ─── Phase 3: Produce design artifacts ────────────────────────────────────────

  design_artifacts:
    action_type: prompt
    timeout: 600
    # FEAT-2711: consumes tech_research's continuity summary (injected ahead of
    # this prompt), then breaks the chain — commit_design doesn't need
    # design_artifacts's own reasoning re-derived, just its file output.
    session_mode: continue
    action: |
      Using the spec and technology research, create the following design artifacts:
      1. `docs/data-model.md` — key entities with fields, types, relationships, constraints
         (every entity must trace back to a spec requirement)
      2. `docs/contracts/` — one file per major interface boundary (operation name, inputs,
         outputs, error cases)
      3. `docs/quickstart.md` — 3-5 observable validation scenarios in prose

      Spec: ${captured.spec_content.output}
      Research: ${captured.tech_research.output}

      Create directories as needed.
    capture: design_artifacts
    next: commit_design

  # ─── Phase 4: Commit research and design artifacts ────────────────────────────

  commit_design:
    action_type: prompt
    action: |
      Run `/ll:commit` to commit all research and design artifacts.

      First check whether `docs/research.md` is a real research document or the
      auto-stub written when tech_research timed out (the stub begins with
      "> **Auto-stub:**"). Choose the commit message accordingly so it never
      over-claims:
        - Real research present:
          "docs: add technology research and design artifacts from spec"
        - Stub only (tech_research timed out):
          "docs: add design artifacts from spec (research.md stubbed — research step timed out)"
    next: check_substrate

  # ENH-2098: feasibility gate — validates proposed design actions against execution-environment
  # constraints before committing to project scoping and cluster execution. Routes infeasible
  # findings back to design_artifacts so the designer can revise before scoping begins.
  check_substrate:
    action: "echo 'Checking substrate constraints'"
    action_type: shell
    evaluate:
      type: llm_structured
      source: "${captured.design_artifacts.output}"
      prompt: >
        Enumerate the target execution environment's known constraints:
        shell command availability, MCP tool access, file write permissions, token budget.
        Validate each proposed action in the design artifacts against these constraints.
        Answer YES if every action is feasible in the target environment.
        Otherwise NO, listing each infeasible action and the constraint it violates.
    on_yes: scope_project
    on_no: design_artifacts
    on_partial: design_artifacts

  # ─── Phase 5: Scope EPIC + feature stubs from spec + design artifacts ─────────

  scope_project:
    action_type: prompt
    timeout: 600
    action: |
      Scope the project into an EPIC with child feature stubs.

      Run `/ll:scope-epic` using the spec and design artifacts as context.
      Pass `--auto` so scope-epic skips its interactive review (AskUserQuestion)
      and creates all proposed children non-interactively — this loop cannot
      answer interactive prompts and will hang permanently without it:
        /ll:scope-epic "Project from spec" --from-doc docs/data-model.md --auto

      After scope-epic completes:
      1. Run `ll-issues list --json` and identify the newly created EPIC ID
         (format: EPIC-NNN — the highest-numbered EPIC in the list)
      2. Write the EPIC ID to ${context.run_dir}/epic-id.txt
      3. Output the EPIC ID on its own line as: EPIC_ID:<id>
         Example: EPIC_ID:EPIC-042
    capture: scope_project
    # No evaluate gate: write_epic_id is the real validator — it regex-extracts the
    # EPIC ID and routes to `failed` when none is found (covering the timeout/empty
    # case too). A separate output_contains gate here was degenerate (every verdict
    # routed to write_epic_id) and added no signal. See rn-build-audit-2026-06-08.md.
    next: write_epic_id

  write_epic_id:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import re, sys, os

      run_dir = '${context.run_dir}'
      os.makedirs(run_dir, exist_ok=True)
      output = """${captured.scope_project.output}"""

      # Try tagged format first: EPIC_ID:EPIC-NNN
      m = re.search(r'EPIC_ID:(EPIC-\d+)', output)
      if not m:
          # Fall back to any EPIC-NNN mention
          m = re.search(r'\b(EPIC-\d+)\b', output)
      if not m:
          print('ERROR: Could not extract EPIC ID from scope_project output')
          sys.exit(1)

      epic_id = m.group(1)
      epic_file = os.path.join(run_dir, 'epic-id.txt')
      with open(epic_file, 'w') as f:
          f.write(epic_id)
      print(epic_id)
      PYEOF
    capture: epic_id
    evaluate:
      type: exit_code
    on_yes: enumerate_epic_children
    on_no: failed
    on_error: failed

  # ─── Phase 6: Refine seed issues to readiness ─────────────────────────────────

  enumerate_epic_children:
    action: |
      ISSUES=$(ll-issues list --parent "${captured.epic_id.output}" --json | python3 -c "
      import json, sys
      ids = json.load(sys.stdin)
      print(','.join(i['id'] for i in ids))
      ")
      if [ -z "$ISSUES" ]; then exit 1; fi
      echo "$ISSUES"
    action_type: shell
    capture: input
    on_yes: refine_seed
    on_no: eval_harness
    on_error: eval_harness

  # Intentional fire-and-proceed: refinement quality is non-fatal to the pipeline.
  # Even if recursive-refine reports failure, the seed issues still exist and the
  # downstream eval harness + goal-cluster execution can proceed against them.
  # We advance to eval_harness regardless rather than dead-ending the build.
  refine_seed:
    loop: recursive-refine
    context_passthrough: true
    on_success: eval_harness
    on_failure: eval_harness
    on_error: eval_harness

  # ─── Phase 7: Install and customize an as-a-user eval harness ────────────────

  eval_harness:
    action_type: prompt
    timeout: 600
    action: |
      Plan and install an as-a-user eval harness for the project.
      Read `docs/guides/AUTOMATIC_HARNESSING_GUIDE.md` for the three harness variants
      (single-shot, multi-item, specialist-role pipeline).

      Using the design artifacts:
      ${captured.design_artifacts.output}

      1. Determine which variant fits:
         - Variant A (harness-single-shot): single validation scenario
         - Variant B (harness-multi-item): multiple test cases or items
         - Variant C (harness-plan-research-implement-report): Plan → Research → Implement → Report
      2. Run the appropriate install command:
         `ll-loop install harness-single-shot`, `ll-loop install harness-multi-item`, or
         `ll-loop install harness-plan-research-implement-report`
      3. Customize the installed harness YAML in `.loops/`:
         - Set `name` to a project-specific name (e.g., `myproject-harness`)
         - Configure `execute.action` to run the project
         - Configure `check_concrete.action` to run tests
         - Configure `check_semantic.evaluate.prompt` for semantic validation
         - Configure `check_invariants.evaluate.target` for diff size gates
      4. Write the harness name to ${context.run_dir}/harness-name.txt
      5. Output the harness name as: HARNESS_NAME:<name>
         Example: HARNESS_NAME:myproject-harness
    capture: harness_plan
    evaluate:
      type: output_contains
      pattern: "HARNESS_NAME:"
    on_yes: read_harness_name
    on_no: read_harness_name
    on_partial: read_harness_name
    on_error: cluster_execute

  read_harness_name:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import re, sys, os

      run_dir = '${context.run_dir}'
      os.makedirs(run_dir, exist_ok=True)

      # Try file written by the harness_plan prompt
      harness_file = os.path.join(run_dir, 'harness-name.txt')
      if os.path.exists(harness_file):
          with open(harness_file) as f:
              name = f.read().strip()
          if name:
              print(name)
              sys.exit(0)

      # Fall back: parse HARNESS_NAME: tag from prompt output
      output = """${captured.harness_plan.output}"""
      m = re.search(r'HARNESS_NAME:(\S+)', output)
      if not m:
          print('ERROR: Could not extract harness name')
          sys.exit(1)
      name = m.group(1)
      with open(harness_file, 'w') as f:
          f.write(name)
      print(name)
      PYEOF
    capture: harness_name
    evaluate:
      type: exit_code
    on_yes: cluster_execute
    on_no: cluster_execute
    on_error: cluster_execute

  # ─── Phase 8: Execute goal-cluster → rn-implement(value_ranked) pipeline ─────
  # goal-cluster.yaml threads schedule_mode through dispatch_cluster.with so
  # each batch dispatched to rn-implement receives schedule_mode=value_ranked.
  # max_batch_size=5: keeps batches large enough for cross-feature context while
  # remaining focused (see FEAT-1992 Design Notes §5).

  cluster_execute:
    loop: goal-cluster
    timeout: 345600
    with:
      goals: "${captured.epic_id.output}"
      auto: "true"
      propagate_context: "true"
      schedule_mode: "value_ranked"
      max_batch_size: "5"
    capture: cluster_result
    # Route every verdict to check_build_outcome, NOT directly to the eval gate. The
    # sub-loop verdict carries no usable success signal here: goal-cluster has no terminal
    # named `done` (success ends at `present_result`), so per _execute_sub_loop a child
    # terminal != "done" always routes the parent's on_no — for both success AND a hard
    # crash. check_build_outcome distinguishes them from CONTENT (cluster-state.json),
    # which goal-cluster writes into the shared run_dir. See rn-build-failure-findings.md.
    on_yes: check_build_outcome
    on_no: check_build_outcome
    on_error: check_build_outcome

  # ─── Phase 8.4: Content-based build-outcome gate (masking fix) ─────────────────
  # The reported "done but built nothing" bug: a goal-cluster hard crash (e.g. the
  # run_dir os.makedirs('') crash) was masked because every cluster_execute verdict
  # advanced to the eval gate and synthesize_result always terminated `done`. This gate
  # reads goal-cluster's own cluster-state.json and applies its success logic
  # (bool(state) and all(batch.success)). Zero successful work → build_failed terminal
  # (displayed as a failure, not "done"); any successful batch (partial included, still
  # worth validating) → continue to check_harness_name.
  check_build_outcome:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import json, os, sys

      run_dir = '${context.run_dir}'
      state_file = os.path.join(run_dir, 'cluster-state.json')
      try:
          with open(state_file) as f:
              state = json.load(f)
      except Exception:
          print("no cluster-state.json — goal-cluster produced no work")
          sys.exit(1)

      if state and any(b.get('success', False) for b in state):
          n_ok = sum(1 for b in state if b.get('success', False))
          print(f"{n_ok}/{len(state)} batches succeeded — proceeding to validation")
          sys.exit(0)

      print("no successful batches — goal-cluster produced no work")
      sys.exit(1)
      PYEOF
    capture: build_outcome
    evaluate:
      type: exit_code
    on_yes: check_harness_name
    on_no: build_failed
    on_error: build_failed

  # ─── Phase 8.5: Guard — skip eval_gate if harness name was never captured ──────
  # eval_harness on_error bypasses read_harness_name, leaving harness_name empty.
  # An empty loop name passed to eval_gate crashes the FSM executor with no useful
  # error message. This guard routes directly to synthesize_result in that case.

  check_harness_name:
    action_type: shell
    action: |
      NAME="${captured.harness_name.output:default=}"
      if [ -z "$NAME" ]; then
        echo "no_harness"
        exit 1
      fi
      echo "$NAME"
    evaluate:
      type: exit_code
    on_yes: eval_gate
    on_no: synthesize_result
    on_error: synthesize_result

  # ─── Phase 9: Run eval harness; re-enter cluster_execute on failure (bounded) ─

  eval_gate:
    loop: "${captured.harness_name.output}"
    timeout: 7200
    capture: eval_result
    on_yes: synthesize_result
    on_no: check_eval_retry_budget
    on_error: synthesize_result

  check_eval_retry_budget:
    action_type: shell
    action: |
      RUN_DIR="${context.run_dir}"
      COUNT=$(cat "$RUN_DIR/eval-retry-count.txt" 2>/dev/null || echo 0)
      COUNT=$((COUNT + 1))
      echo "$COUNT" > "$RUN_DIR/eval-retry-count.txt"
      echo "$COUNT"
    capture: eval_retry_count
    evaluate:
      type: output_numeric
      operator: le
      target: "${context.max_eval_retries}"
    on_yes: capture_eval_failures
    on_no: synthesize_result
    on_error: synthesize_result

  capture_eval_failures:
    action_type: prompt
    timeout: 300
    action: |
      The eval harness reported failures (retry ${captured.eval_retry_count.output} of
      ${context.max_eval_retries}). Capture issues for failing scenarios so goal-cluster
      can address them in the next execution cycle.

      Eval result:
      ${captured.eval_result.output}

      For each distinct failing scenario:
      1. Run `/ll:capture-issue` to create a FEAT or BUG issue describing what needs fixing
      2. Run `/ll:normalize-issues` after all issues are created
    next: cluster_execute

  # ─── Phase 10: Synthesize cluster-wide result as structured JSON ──────────────

  synthesize_result:
    action_type: prompt
    timeout: 300
    action: |
      Synthesize the rn-build pipeline results into a structured JSON report.

      SPEC: ${captured.spec_content.output}
      CLUSTER RESULT: ${captured.cluster_result.output}
      EVAL RESULT: ${captured.eval_result.output:default=not run}

      Read the EPIC ID from ${context.run_dir}/epic-id.txt if it exists (fall back to
      captured epic_id if the file is absent). Read the harness name from
      ${context.run_dir}/harness-name.txt if it exists.

      Write a summary covering:
      1. What was accomplished per goal
      2. What is still open or incomplete
      3. Recommended next batch or follow-up actions

      Output the JSON block LAST, prefixed with: SYNTHESIS_RESULT:
      ```json
      {
        "accomplished": ["list of completed features/goals"],
        "still_open": ["list of incomplete items"],
        "recommended_next_batch": ["list of suggested next actions"],
        "eval_passed": true,
        "eval_retry_count": 0
      }
      ```

      IMPORTANT: When `eval_passed` is false and `still_open` is non-empty, add a
      `resume_command` field containing the exact invocation to resume this build in a
      subsequent session:

      ```
      "resume_command": "ll-loop run rn-build --context resume_epic=<EPIC-NNN> --context resume_harness=<harness-name>"
      ```

      Populate `resume_epic` with the EPIC ID (from epic-id.txt or captured epic_id)
      and `resume_harness` with the harness name (from harness-name.txt). When
      `eval_passed` is true, omit `resume_command` from the JSON entirely.
    capture: synthesis
    evaluate:
      type: output_contains
      pattern: "SYNTHESIS_RESULT:"
    on_yes: done
    on_no: done
    on_partial: done
    on_error: done

  # ─── Terminal States ───────────────────────────────────────────────────────────

  done:
    terminal: true

  # build_failed: reached when goal-cluster produced zero successful work (hard crash or
  # empty cluster). Distinct from `failed:` (front-half/init faults). A non-`done` terminal
  # name makes ll-loop DISPLAY the run as a failure instead of "done" — this is the
  # codebase convention (mirrors `failed:`, goal-cluster `failed:`/`abort_cluster`). The
  # trailing `exit 1` is cosmetic: ll-loop's process exit code derives from terminated_by,
  # not the shell exit. Emits resume_command so the build stays resumable.
  build_failed:
    action_type: shell
    terminal: true
    action: |
      RUN_DIR="${context.run_dir}"
      EPIC=$(cat "$RUN_DIR/epic-id.txt" 2>/dev/null || echo "")
      HARNESS=$(cat "$RUN_DIR/harness-name.txt" 2>/dev/null || echo "")
      python3 -c "
      import json, sys
      epic, harness = sys.argv[1], sys.argv[2]
      d = {
          'accomplished': [],
          'still_open': ['goal-cluster produced no successful batches'],
          'recommended_next_batch': [],
          'eval_passed': False,
          'eval_retry_count': 0,
          'error': 'rn-build: goal-cluster produced no successful work (hard crash or empty cluster).',
      }
      if epic:
          cmd = f'll-loop run rn-build --context resume_epic={epic}'
          if harness:
              cmd += f' --context resume_harness={harness}'
          d['resume_command'] = cmd
      print(json.dumps(d, indent=2))
      " "$EPIC" "$HARNESS"
      exit 1

  failed:
    action_type: shell
    terminal: true
    action: |
      python3 -c "
      import json
      print(json.dumps({
          'accomplished': [],
          'still_open': [],
          'recommended_next_batch': [],
          'eval_passed': False,
          'eval_retry_count': 0,
          'error': 'rn-build encountered a fatal error during initialization or spec validation.'
      }, indent=2))
      "
      exit 1
