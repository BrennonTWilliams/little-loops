name: rn-decompose
visibility: internal
category: planning
description: |
  Sub-loop for the issue decomposition pipeline (size review → child detection →
  enqueue with cycle detection) extracted from rn-implement Phase 5. Accepts an
  issue ID via parameters and runs decomposition to split large issues into child
  issues. Terminates with done (children enqueued, or no decomposition needed —
  expected success path when size review score < 5) or failed (error only).

  Run standalone as: ll-loop run rn-decompose "<issue-id>"

  Invoked by parent rn-implement via:
    loop: rn-decompose
    with:
      issue_id: "${captured.input.output}"
      parent_depth: "${captured.current_depth.output}"
      run_dir: "${captured.run_dir.output}"
    on_yes: dequeue_next
    on_no: skip_issue
    on_error: skip_issue
initial: snap_for_size_review
max_steps: 100
timeout: 3600
on_handoff: spawn
import:
  - lib/common.yaml
meta_self_eval_ok: false
shared_state_ok: false

parameters:
  issue_id:
    type: string
    required: true
    description: "Issue ID to decompose (passed from parent's captured.input.output)"
  parent_depth:
    type: integer
    required: false
    description: "Current recursion depth (default: 0)"
  run_dir:
    type: path
    required: true
    description: "Parent loop's run directory for queue.txt coupling"

context:
  parent_depth: 0

states:
  # =========================================================================
  # Phase 5: Decomposition Path (extracted from rn-implement.yaml)
  # =========================================================================

  snap_for_size_review:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"

      # Capture current scores snapshot
      ll-issues show "$ID" --json > "$RUN_DIR/size_review_snap_$${ID}.json" 2>/dev/null

      # Also snapshot current issue ID list for child detection
      ll-issues list --json 2>/dev/null | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " | sort > "$RUN_DIR/issues_before_$${ID}.txt"

      echo "Snapshot captured for $ID"
    next: run_size_review
    on_error: emit_size_review_failed

  run_size_review:
    fragment: with_rate_limit_handling
    action: "/ll:issue-size-review ${context.issue_id} --auto"
    action_type: slash_command
    on_success: detect_children
    on_partial: detect_children   # partial = review ran with a caveat; proceed and log it (BUG-1975)
    on_no: emit_size_review_failed   # no = judge found size review inconclusive (ENH-1977)
    on_error: emit_size_review_failed
    on_rate_limit_exhausted: rate_limit_diagnostic

  detect_children:
    fragment: shell_exit
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      PARENT_DEPTH=$(cat "$${RUN_DIR}/current_depth.txt" 2>/dev/null || echo 0)

      # Capture post-review issue ID list
      ll-issues list --json 2>/dev/null | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in sorted(i['id'] for i in issues):
          print(i)
      " | sort > "$RUN_DIR/issues_after_$${ID}.txt"

      # Diff: find new IDs (in after but not in before)
      comm -13 "$RUN_DIR/issues_before_$${ID}.txt" \
               "$RUN_DIR/issues_after_$${ID}.txt" \
               > "$RUN_DIR/diff_$${ID}.txt" 2>/dev/null

      # Filter by parent reference — only include children that reference this parent
      PARENT_ID="$ID"
      > "$RUN_DIR/children_$${ID}.txt"
      while IFS= read -r child_id; do
        [ -z "$child_id" ] && continue
        # BUG-2003: tolerant resolution (handles cross-type prefix + no-priority-prefix children).
        CHILD_FILE=$(ll-issues path "$child_id" 2>/dev/null)
        if [ -n "$CHILD_FILE" ]; then
          # Check for parent reference
          if grep -q "parent:.*$PARENT_ID" "$CHILD_FILE" 2>/dev/null || \
             grep -q "Decomposed from $PARENT_ID" "$CHILD_FILE" 2>/dev/null; then
            echo "$child_id" >> "$RUN_DIR/children_$${ID}.txt"
          fi
        fi
      done < "$RUN_DIR/diff_$${ID}.txt"

      if [ -s "$RUN_DIR/children_$${ID}.txt" ]; then
        CHILD_COUNT=$(wc -l < "$RUN_DIR/children_$${ID}.txt" | tr -d ' ')
        echo "Found $CHILD_COUNT children for $ID"
        exit 0
      else
        echo "No children found for $ID"
        exit 1
      fi
    on_yes: enqueue_children
    on_no: emit_no_children   # "No children found" is expected success (size review < 5)
    on_error: emit_size_review_failed

  enqueue_children:
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      PARENT_DEPTH=$(cat "$${RUN_DIR}/current_depth.txt" 2>/dev/null || echo 0)
      CHILD_DEPTH=$((PARENT_DEPTH + 1))

      # Cycle detection: build visited set from visited.txt and queue.txt
      python3 -c "
      import sys

      run_dir = '$${RUN_DIR}'
      visited = set()
      for fname in ['visited.txt']:
          p = f'{run_dir}/{fname}'
          try:
              with open(p) as f:
                  visited.update(ln.strip() for ln in f if ln.strip())
          except FileNotFoundError:
              pass
      # Also include current queue
      try:
          with open(f'{run_dir}/queue.txt') as f:
              visited.update(ln.strip() for ln in f if ln.strip())
      except FileNotFoundError:
          pass

      candidates = []
      with open(f'{run_dir}/children_$${ID}.txt') as f:
          for line in f:
              cid = line.strip()
              if cid:
                  candidates.append(cid)

      survivors = []
      for cid in candidates:
          if cid in visited:
              with open(f'{run_dir}/cycles.txt', 'a') as cf:
                  cf.write(f'{cid} (cycle detected, parent=$${ID})\n')
              print(f'WARN: skipping cycle candidate {cid}', file=sys.stderr)
          else:
              # In-memory dedup: a child repeated within this same candidate
              # list must not be enqueued twice. Updating the in-memory set
              # (NOT visited.txt) is the correct dedup mechanism for a single
              # enqueue_children pass (BUG-2004).
              visited.add(cid)
              survivors.append(cid)

      with open(f'{run_dir}/children_$${ID}.txt', 'w') as f:
          for cid in survivors:
              f.write(cid + '\n')
      "

      if [ ! -s "$RUN_DIR/children_$${ID}.txt" ]; then
        echo "All children were cycle-filtered"
        exit 1
      fi

      # Depth-first prepend: children go BEFORE existing queue
      CHILDREN=$(cat "$RUN_DIR/children_$${ID}.txt")
      EXISTING=$(cat "$RUN_DIR/queue.txt" 2>/dev/null || true)
      { echo "$CHILDREN"; echo "$EXISTING"; } \
        | grep -v '^[[:space:]]*$' \
        > "$RUN_DIR/queue.txt"

      # Assign depth to each child. visited.txt is the authoritative "dequeued"
      # log written by rn-implement's fifo_pop/select_next at dequeue time;
      # enqueue_children must NOT write it here, or queued-but-not-yet-dequeued
      # children would be falsely treated as visited on a resumed run and
      # silently dropped by cycle detection (BUG-2004).
      while IFS= read -r child; do
        [ -z "$child" ] && continue
        echo "$child $CHILD_DEPTH" >> "$RUN_DIR/depth_map.txt"
      done < "$RUN_DIR/children_$${ID}.txt"

      # Increment decomposed count
      DECOMP_COUNT=$(cat "$RUN_DIR/decomposed_count.txt" 2>/dev/null || echo 0)
      echo $((DECOMP_COUNT + 1)) > "$RUN_DIR/decomposed_count.txt"

      CHILD_COUNT=$(wc -l < "$RUN_DIR/children_$${ID}.txt" | tr -d ' ')
      echo "Enqueued $CHILD_COUNT children for $ID (depth=$CHILD_DEPTH)"
    on_yes: finalize_parent
    on_no: emit_no_children   # all children cycle-filtered → nothing decomposed
    on_error: emit_size_review_failed

  finalize_parent:
    # ENH-1977 Fix 4: close the decomposed parent (status=done, body note, move to
    # completed/) and re-link its children into the parent's EPIC when it had one.
    # Also writes the DECOMPOSED outcome token for the parent's classify_decomposition.
    # Best-effort: a finalize error must not undo the already-enqueued children.
    action_type: shell
    action: |
      ID="${context.issue_id}"
      RUN_DIR="${context.run_dir}"
      echo "DECOMPOSED" > "$RUN_DIR/subloop_outcome_$${ID}.txt"
      ll-issues finalize-decomposition "$ID" \
        --children-file "$RUN_DIR/children_$${ID}.txt" || \
        echo "WARN: finalize-decomposition failed for $ID (children remain enqueued)" >&2
      echo "Finalized decomposed parent $ID"
    next: done

  # =========================================================================
  # Outcome-Token Emitters (ENH-1977 Fix 1)
  # =========================================================================
  # Every decompose terminal path overwrites the shared outcome token so the
  # parent's classify_decomposition never reads a stale remediation token.
  # Tokens: DECOMPOSED | NO_CHILDREN | SIZE_REVIEW_FAILED | RATE_LIMITED

  emit_no_children:
    action_type: shell
    action: |
      echo "NO_CHILDREN" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: done

  emit_size_review_failed:
    action_type: shell
    action: |
      echo "SIZE_REVIEW_FAILED" > "${context.run_dir}/subloop_outcome_${context.issue_id}.txt"
    next: failed

  # =========================================================================
  # Diagnostic State
  # =========================================================================

  rate_limit_diagnostic:
    # Writes RATE_LIMITED to subloop_outcome and routes to failed (ENH-1977 GAP A).
    # Parent's rate_limits.txt record is owned by the parent to avoid double counting.
    fragment: subloop_rate_limit_diagnostic
    with:
      operation: decomposition

  # =========================================================================
  # Terminal States
  # =========================================================================

  done:
    terminal: true

  failed:
    terminal: true
