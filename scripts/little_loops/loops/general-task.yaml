name: "general-task"
description: "General-purpose task loop: writes a Definition of Done, decomposes the task into steps, executes one step at a time, and loops until all DoD criteria are verified."
category: harness
initial: check_baseline_tests
max_steps: 200
default_timeout: 1800
on_handoff: spawn
artifact_versioning_ok: true
on_max_steps: summarize_partial

import:
  - lib/common.yaml

context:
  min_pass_rate: 0.95
  hard_criteria_tags: "hard"
  # Whole-suite test command, run ONLY by the final-only gate (run_final_tests),
  # NOT per-step (ENH-2225). Empty = read project.test_cmd from .ll/ll-config.json,
  # else fall back to bare "pytest". A whole-artifact gate embedded here (e.g. a
  # coverage threshold) is enforced at completion time, not after every step.
  test_cmd: ""
  max_step_attempts: 3    # max verify attempts per step before abandoning it (Fix #2)

circuit:
  repeated_failure:
    window: 3
    on_repeated_failure: diagnose
    exclude_paths:
      - "${context.run_dir}/plan.md"
      - "${context.run_dir}/dod.md"

states:
  check_baseline_tests:
    action: |
      CMD=$(python3 -c "import json,pathlib; p=pathlib.Path('.ll/ll-config.json'); cfg=json.loads(p.read_text()) if p.exists() else {}; print(cfg.get('project',{}).get('test_cmd','pytest'))")
      eval "$CMD" > "${context.run_dir}/baseline-test-output.txt" 2>&1
      echo $? > "${context.run_dir}/baseline-exit.txt"
    action_type: shell
    next: define_done
    on_error: define_done

  define_done:
    action: >
      Your task is: ${context.input}

      Before planning or executing anything, write a concrete Definition of Done
      to ${context.run_dir}/dod.md in this format:
      ```
      # Definition of Done
      ## Verification Criteria
      - [ ] <Hard criterion — must be satisfied for done> [hard]
      - [ ] <Another hard criterion — e.g., "Tests pass", "File X exists"> [hard]
      - [ ] <Soft criterion — desirable but non-blocking if pass rate is met>
      ```

      Tag each criterion that MUST be verified (technical correctness, tests, file existence)
      with `[hard]` at the end of the line. Leave criteria that depend on human decisions or
      pre-existing environment state (e.g., "Working tree is clean") untagged — these are
      soft criteria and are non-blocking once all hard criteria and the pass rate threshold
      (${context.min_pass_rate}) are met.

      Each criterion must be independently verifiable by checking files, running commands,
      or reading outputs.

      Do NOT write DoD criteria that target this loop's own internal tracking artifacts
      (${context.run_dir}/plan.md, ${context.run_dir}/dod.md)
      — e.g. "duplicate plan steps are struck through" or "the plan file has no pending
      steps." Those files are loop bookkeeping, not task deliverables; criteria about them
      are unsatisfiable by the worker (which is forbidden to edit them) and make the loop
      spin. Write criteria only about the actual task output.

      If the task involves running code, executing tests, installing a service, or
      producing output at runtime, the DoD MUST include criteria for that runtime
      behavior (e.g., "dry-run exits 0", "service plist loads without launchd errors",
      "first injection produces expected output"). Static file/import checks alone
      are insufficient when the task has a runtime surface.

      Do NOT start any work. Only write the DoD file.
    action_type: prompt
    next: plan
    on_error: diagnose

  plan:
    action: >
      Your task is: ${context.input}

      Before starting, decompose this task into a numbered list of discrete,
      independently completable steps. Each step should be small enough to
      complete in a single focused session.

      Write the step list to ${context.run_dir}/plan.md in this format:
      ```
      # Task Plan
      - [ ] Step 1: ...
      - [ ] Step 2: ...
      ```

      Do NOT start executing any steps yet. Only write the plan file.
    action_type: prompt
    next: resume_check
    on_error: diagnose

  resume_check:
    action: |
      CHECKPOINT="${context.run_dir}/checkpoint.json"
      CURRENT_STEP="${context.run_dir}/current-step.txt"
      LAST_FILES_PATH="${context.run_dir}/last-files.txt"
      if [ ! -f "$CHECKPOINT" ]; then
        echo "RESUME_NONE"
        exit 0
      fi
      # Fix 3: Reject checkpoint from a different task (task fingerprinting).
      STORED_HASH=$(grep -o '"task_hash":"[^"]*"' "$CHECKPOINT" 2>/dev/null | sed 's/"task_hash":"//;s/"//')
      if [ -n "$STORED_HASH" ] && [ "${context.input_hash}" != "$STORED_HASH" ]; then
        rm -f "$CHECKPOINT" "$CURRENT_STEP" "$LAST_FILES_PATH"
        echo "RESUME_CLEAN"
        exit 0
      fi
      # Fix 2: Inconsistent file set — checkpoint exists but current-step.txt doesn't.
      # mark_done deletes both together; a checkpoint without its current-step.txt
      # is a stale/corrupt artifact from a prior interrupted run.
      if [ ! -f "$CURRENT_STEP" ]; then
        rm -f "$CHECKPOINT"
        echo "RESUME_CLEAN"
        exit 0
      fi
      if [ -f "$LAST_FILES_PATH" ]; then
        FILES=$(grep 'LAST_FILES:' "$LAST_FILES_PATH" 2>/dev/null | sed 's/LAST_FILES:[[:space:]]*//')
        if [ -n "$FILES" ]; then
          MISSING=0
          for f in $FILES; do
            [ ! -e "$f" ] && MISSING=1 && break
          done
          if [ "$MISSING" = "0" ]; then
            echo "RESUME_SKIP"
            exit 0
          fi
        fi
      fi
      rm -f "$CHECKPOINT" "$CURRENT_STEP"
      echo "RESUME_CLEAN"
    action_type: shell
    capture: resume_check_result
    evaluate:
      type: output_contains
      source: "${captured.resume_check_result.output}"
      pattern: "RESUME_SKIP"
    on_yes: mark_done
    on_no: select_step
    on_error: diagnose

  select_step:
    action: |
      PLAN="${context.run_dir}/plan.md"
      STEP=$(grep -m1 '^- \[ \]' "$PLAN" || echo "")
      if [ -z "$STEP" ]; then
        echo "NO_UNCHECKED_STEPS"
        exit 0
      fi
      # Per-step attempt cap (Fix #2): a step whose verify keeps failing is never
      # marked [x], so it would be re-selected forever, spinning the loop to
      # max_iterations (do_work succeeds and verify_step's on_no is a verdict,
      # not a state failure, so the repeated_failure circuit never trips). Count
      # attempts per exact step line; once a step exhausts its budget, mark it
      # [x] with an abandonment note and fall through to check_done so the DoD
      # machinery — not an unbounded retry — decides whether the underlying
      # criterion is satisfied.
      ATTEMPTS="${context.run_dir}/step-attempts.txt"
      PRIOR=$(grep -Fx -- "$STEP" "$ATTEMPTS" 2>/dev/null | wc -l | tr -d ' ')
      if [ "$PRIOR" -ge "${context.max_step_attempts}" ]; then
        awk -v target="$STEP" -v n="${context.max_step_attempts}" \
          'found==0 && $0==target && /^- \[ \]/ { sub(/^- \[ \]/, "- [x]"); $0=$0 "  (abandoned: verify failed after " n " attempts)"; found=1 } 1' \
          "$PLAN" > "$PLAN.tmp" && mv "$PLAN.tmp" "$PLAN"
        rm -f "${context.run_dir}/current-step.txt" "${context.run_dir}/checkpoint.json"
        echo "STEP_ABANDONED: $STEP"
        exit 0
      fi
      echo "$STEP" >> "$ATTEMPTS"
      echo "$STEP" > "${context.run_dir}/current-step.txt"
      CHECKPOINT="${context.run_dir}/checkpoint.json"
      printf '{"in_flight_step":"%s","timestamp":"%s","task_hash":"%s"}\n' \
        "$STEP" "$(date -u +%Y-%m-%dT%H:%M:%SZ)" "${context.input_hash}" > "$CHECKPOINT"
      echo "SELECTED_STEP: $STEP"
    action_type: shell
    capture: selected_step
    evaluate:
      type: output_contains
      source: "${captured.selected_step.output}"
      pattern: "SELECTED_STEP:"
    on_yes: do_work
    on_no: check_done
    on_error: diagnose

  do_work:
    action: |
      Your task is: ${context.input}

      The step you must complete is in ${context.run_dir}/current-step.txt.
      Read that file to learn exactly which step to implement.

      Implement ONLY that step. Do NOT modify ${context.run_dir}/plan.md
      or ${context.run_dir}/dod.md.

      After completing the step, write exactly one line to
      ${context.run_dir}/last-files.txt:
      LAST_FILES: <space-separated list of files you created or modified>
    action_type: prompt
    capture: work_result
    next: verify_step
    on_error: do_work
    max_retries: 2
    on_retry_exhausted: capture_work_exit
    timeout: 900

  capture_work_exit:
    action: |
      echo "${captured.work_result.exit_code:default=0}" > "${context.run_dir}/last-exit-code.txt"
    action_type: shell
    next: continue_work
    on_error: continue_work

  verify_step:
    action: |
      FILES=$(grep 'LAST_FILES:' "${context.run_dir}/last-files.txt" 2>/dev/null | sed 's/LAST_FILES:[[:space:]]*//')
      if [ -z "$FILES" ]; then
        echo "VERIFY_PASS"
        exit 0
      fi
      # ENH-2225: verify_step is a per-step SMOKE gate, not a whole-suite gate.
      # It deliberately does NOT resolve/run ${context.test_cmd} (or project.test_cmd
      # from .ll/ll-config.json) — that whole-artifact command runs only at completion
      # time in run_final_tests. Running it per-step meant a whole-suite gate embedded
      # in the command (the canonical case: pytest --cov-fail-under=N injected via
      # pyproject.toml addopts) failed for EVERY step until the entire task was done,
      # because total coverage stays below threshold during partial implementation —
      # a category error that abandoned otherwise-correct steps.
      #
      # The smoke check is language-agnostic (cf. BUG-2127): confirm that every file
      # the step claimed to create/modify in LAST_FILES actually exists on disk. A
      # step that reported work but produced nothing fails here; per-step CORRECTNESS
      # (DoD criteria affected by this step) is verified separately by check_done, and
      # the whole suite is enforced by run_final_tests before terminal done.
      MISSING=""
      for f in $FILES; do
        [ ! -e "$f" ] && MISSING="$MISSING $f"
      done
      if [ -n "$MISSING" ]; then
        echo "VERIFY_FAIL: step reported files that do not exist:$MISSING" \
          > "${context.run_dir}/verify-output.txt"
        echo "VERIFY_FAIL"
      else
        echo "VERIFY_PASS"
      fi
    action_type: shell
    capture: verify_result
    evaluate:
      type: output_contains
      source: "${captured.verify_result.output}"
      pattern: "VERIFY_PASS"
    on_yes: mark_done
    on_no: continue_work
    on_error: diagnose

  mark_done:
    action: |
      PLAN="${context.run_dir}/plan.md"
      STEP_FILE="${context.run_dir}/current-step.txt"
      # Mark the step that select_step actually selected (bound to current-step.txt),
      # NOT just the first unchecked line. This decouples marking from selection order
      # so the two states can never desync (BUG-1766). $0==target is an exact string
      # compare, so bracket/slash chars in the step text are literal and safe.
      STEP_TEXT=$(cat "$STEP_FILE" 2>/dev/null)
      if [ -n "$STEP_TEXT" ]; then
        awk -v target="$STEP_TEXT" 'found==0 && $0==target && /^- \[ \]/ { sub(/^- \[ \]/, "- [x]"); found=1 } 1' "$PLAN" > "$PLAN.tmp" && mv "$PLAN.tmp" "$PLAN"
      else
        awk 'found==0 && /^- \[ \]/ { sub(/^- \[ \]/, "- [x]"); found=1 } 1' "$PLAN" > "$PLAN.tmp" && mv "$PLAN.tmp" "$PLAN"
      fi
      rm -f "$STEP_FILE"
      rm -f "${context.run_dir}/checkpoint.json"
    action_type: shell
    next: check_done
    on_error: diagnose

  check_done:
    action: |
      The previous step just completed. Use the following to scope delta verification.

      Step that was selected (extract LAST_STEP from the SELECTED_STEP line):
      ---BEGIN STEP SELECTION---
      ${captured.selected_step.output:default=not-reached}
      ---END STEP SELECTION---

      Files created or modified (extract LAST_FILES from the LAST_FILES line):
      ---BEGIN WORK RESULT---
      ${captured.work_result.output:default=not-reached}
      ---END WORK RESULT---

      Read both files:
      - ${context.run_dir}/dod.md — Definition of Done (criteria)
      - ${context.run_dir}/plan.md — Task Plan (steps)

      Step 1 — Plan-vs-DoD coverage reconciliation:
      For EVERY plan step, confirm at least one DoD criterion covers it. If a plan step
      has no matching DoD criterion, ADD a new criterion to the DoD file before
      evaluating completion. Do NOT silently mark plan steps [x] without DoD coverage.

      Step 2 — Delta-scoped criterion verification:
      Use LAST_STEP and LAST_FILES from the step selection and work result above to scope verification:
      - For DoD criteria that mention or depend on any file in LAST_FILES, OR that are
        plausibly affected by LAST_STEP: VERIFY BY EVIDENCE now (filesystem read /
        command run / file read). Update each criterion to [x] if verified, or leave
        [ ] with a one-line note on what is missing.
      - For previously-[x] criteria NOT plausibly affected by LAST_STEP or LAST_FILES:
        KEEP [x] without re-running their commands.
      - For previously-[ ] criteria NOT plausibly affected by LAST_STEP or LAST_FILES:
        leave [ ] with their existing one-line note.

      Step 3 — Sample re-verification:
      Pick up to min(3, total_checked) already-[x] DoD criteria and INDEPENDENTLY
      re-verify each by re-running the command / re-reading the file / re-checking
      the filesystem. Append a `## Sample Verification` section to the DoD file in
      this exact format:
      ```
      ## Sample Verification
      - [x] <criterion>: <evidence>
      - [x] <criterion>: <evidence>
      - [ ] <criterion>: FAILED — <what happened>
      ```
      If any sampled criterion fails re-verification, flip the corresponding criterion
      in the Verification Criteria list back to [ ] with a note explaining the mismatch.

      Print the final contents of the DoD file (including the new Sample Verification
      section) and the plan file to stdout so the evaluator can confirm completeness.
    action_type: prompt
    next: count_done
    on_error: select_step

  count_done:
    action: |
      DOD="${context.run_dir}/dod.md"
      PLAN="${context.run_dir}/plan.md"
      if [ ! -f "$DOD" ] || [ ! -f "$PLAN" ]; then
        echo '{"error": "missing artifact"}'
        exit 1
      fi
      TAG="${context.hard_criteria_tags}"
      HARD_UNCHECKED_DOD=$(awk -v tag="$TAG" '
        /^## Verification Criteria/ { in_section=1; next }
        /^## / { in_section=0 }
        in_section && /^[[:space:]]*-[[:space:]]*\[[[:space:]]\]/ {
          line = $0
          if (index(line, "[" tag "]") > 0) count++
        }
        END { print count+0 }
      ' "$DOD")
      SOFT_UNCHECKED_DOD=$(awk -v tag="$TAG" '
        /^## Verification Criteria/ { in_section=1; next }
        /^## / { in_section=0 }
        in_section && /^[[:space:]]*-[[:space:]]*\[[[:space:]]\]/ {
          line = $0
          if (index(line, "[" tag "]") == 0) count++
        }
        END { print count+0 }
      ' "$DOD")
      TOTAL_DOD=$(awk '
        /^## Verification Criteria/ { in_section=1; next }
        /^## / { in_section=0 }
        in_section && /^[[:space:]]*-[[:space:]]*\[/ { count++ }
        END { print count+0 }
      ' "$DOD")
      UNCHECKED_PLAN=$(grep -c '^[[:space:]]*-[[:space:]]*\[[[:space:]]\]' "$PLAN" || true)
      FAILED_SAMPLES=$(awk '
        /^## Sample Verification/ { in_section=1; next }
        in_section && /FAILED/ { count++ }
        END { print count+0 }
      ' "$DOD")
      MIN_PASS_PCT=$(awk 'BEGIN { printf "%d", ${context.min_pass_rate} * 100 }')
      if [ "$TOTAL_DOD" -gt 0 ]; then
        UNCHECKED_ALL=$(($HARD_UNCHECKED_DOD + $SOFT_UNCHECKED_DOD))
        CHECKED_DOD=$(($TOTAL_DOD - $UNCHECKED_ALL))
        PASS_PCT=$(awk "BEGIN { printf \"%d\", 100 * $CHECKED_DOD / $TOTAL_DOD }")
      else
        PASS_PCT=100
      fi
      BLOCKING_DOD=$HARD_UNCHECKED_DOD
      if [ "$PASS_PCT" -lt "$MIN_PASS_PCT" ]; then
        BLOCKING_DOD=$(($BLOCKING_DOD + $SOFT_UNCHECKED_DOD))
      fi
      TOTAL=$(($BLOCKING_DOD + $UNCHECKED_PLAN + $FAILED_SAMPLES))
      printf '{"hard_unchecked_dod": %d, "soft_unchecked_dod": %d, "unchecked_plan": %d, "failed_samples": %d, "total": %d}\n' \
        "$HARD_UNCHECKED_DOD" "$SOFT_UNCHECKED_DOD" "$UNCHECKED_PLAN" "$FAILED_SAMPLES" "$TOTAL"
    action_type: shell
    capture: done_counts
    evaluate:
      type: output_json
      path: ".total"
      operator: eq
      target: 0
    on_yes: final_verify
    on_no: continue_work
    on_error: diagnose

  final_verify:
    timeout: 1800
    action: |
      Your task is: ${context.input}

      Read ${context.run_dir}/dod.md.

      For EVERY criterion in the Verification Criteria section, independently
      re-verify it now by reading files / running commands / checking filesystem
      state. Do NOT trust the existing [x] mark — verify from evidence.

      Append a new section to the DoD file in this exact format:
      ```
      ## Final Verification
      - [x] <criterion>: <evidence>
      - [x] <criterion>: <evidence>
      - [ ] <criterion>: FAILED — <what happened>
      ```

      For any criterion that fails re-verification, flip its mark in the
      Verification Criteria list from [x] back to [ ] with a one-line note
      "(final_verify: failed — <reason>)".

      Print the full DoD file to stdout.
    action_type: prompt
    next: run_final_tests
    on_error: diagnose

  run_final_tests:
    # ENH-2225: final-only whole-suite gate. Whole-artifact criteria (full test
    # suite, coverage thresholds) are enforced HERE — at completion time — not
    # per-step, where they would block every step mid-implementation. Reuses the
    # shared shell_exit fragment (lib/common.yaml): gates on the resolved test
    # command's EXIT CODE so any config-sourced gate (e.g. --cov-fail-under via
    # pyproject.toml addopts) is honored before terminal done.
    # ENH-2244: compare against baseline to avoid treating pre-existing failures
    # as regressions (exit 0 if no regression: final=0 OR final=baseline).
    fragment: shell_exit
    timeout: 1800
    action: |
      # Resolve the whole-suite test command: explicit ${context.test_cmd}
      # override, else project.test_cmd from .ll/ll-config.json, else bare "pytest".
      if [ -n "${context.test_cmd}" ]; then
        CMD="${context.test_cmd}"
      else
        CMD=$(python3 -c "
      import json, pathlib
      p = pathlib.Path('.ll/ll-config.json')
      cfg = json.loads(p.read_text()) if p.exists() else {}
      raw = cfg.get('project', {}).get('test_cmd')
      print(raw if raw else 'pytest')
      ")
      fi
      eval "$CMD" > "${context.run_dir}/verify-output.txt" 2>&1
      FINAL_EXIT=$?
      BASELINE_EXIT=$(cat "${context.run_dir}/baseline-exit.txt" 2>/dev/null || echo "0")
      [ "$FINAL_EXIT" = "0" ] || [ "$FINAL_EXIT" = "$BASELINE_EXIT" ]
    on_yes: count_final
    on_no: continue_work
    on_error: diagnose

  count_final:
    action: |
      DOD="${context.run_dir}/dod.md"
      if [ ! -f "$DOD" ]; then
        echo '{"error": "missing artifact"}'
        exit 1
      fi
      FAILED=$(awk '
        /^## Final Verification/ { in_section=1; count=0; next }
        in_section && /FAILED/ { count++ }
        END { print count+0 }
      ' "$DOD")
      printf '{"failed_finals": %d}\n' "$FAILED"
    action_type: shell
    capture: final_counts
    evaluate:
      type: output_json
      path: ".failed_finals"
      operator: eq
      target: 0
    on_yes: done
    on_no: continue_work
    on_error: diagnose

  continue_work:
    action: |
      Your task is: ${context.input}

      The previous do_work exit code was: ${captured.work_result.exit_code:default=0}

      If the exit code is 124 (timeout): the previous step was too large to complete
      within the timeout window. Read ${context.run_dir}/current-step.txt to see
      which step timed out, then split it into 2–3 smaller independently-completable
      sub-steps and insert them (as unchecked - [ ] lines) before the next unchecked
      step in ${context.run_dir}/plan.md. Do NOT append a remediation step for a DoD
      criterion — the step was sound but oversized. Print a summary of the split.

      Otherwise (exit code is not 124): the last verify step may have failed. If
      ${context.run_dir}/verify-output.txt exists, read it FIRST to understand WHY —
      it holds the captured stdout/stderr of the resolved test command. Use it to
      classify the failure before deciding how to remediate:
      - A genuine test/assertion failure → a real step is missing or wrong; append a
        remediation step (below).
      - A whole-suite gate that no single step can satisfy mid-implementation (e.g. a
        coverage threshold like "Required test coverage of N% not reached" while all
        listed tests pass) → this is NOT a per-step failure. Do NOT append a step for
        it; that criterion belongs to final verification. Note that the failure is a
        whole-artifact gate and stop.
      - A lint/type/build error → append a step scoped to the specific code change needed.

      Read both files:
      - ${context.run_dir}/plan.md — Task Plan (steps)
      - ${context.run_dir}/dod.md — Definition of Done (criteria)

      Read the plan file to determine which steps are checked vs unchecked. At least
      one DoD criterion or plan step remains unresolved.
      Find the first unchecked DoD criterion. Before appending, read the existing plan
      steps. If the plan already contains an unchecked step that would satisfy this same
      DoD criterion (a near-duplicate remediation step), do NOT append another one —
      report that a remediation step already exists and stop. Only if no existing
      unchecked step covers this criterion, APPEND a new remediation step to the
      plan file (as - [ ] Step N: ...) describing the work needed to satisfy that
      criterion. Do not touch the DoD file and do not implement the step — the
      next states will handle that.

      Print a summary of the remediation step you appended (or note that an existing
      step already covers the criterion).
    action_type: prompt
    next: select_step
    on_error: continue_work
    max_retries: 3
    on_retry_exhausted: diagnose

  summarize_partial:
    action_type: prompt
    action: |
      The general-task loop has reached its iteration limit before all
      Definition of Done criteria were satisfied.

      Read ${context.run_dir}/dod.md and
      ${context.run_dir}/plan.md (if they exist).
      Write a one-paragraph summary to
      ${context.run_dir}/summary.md covering:
      (1) what was accomplished (list completed DoD criteria),
      (2) which DoD criteria remain unmet,
      (3) recommended next actions for a human operator.
    next: done

  done:
    terminal: true

  diagnose:
    action_type: prompt
    action: |
      The general-task loop has terminated with an unrecoverable failure.

      Diagnose what happened:
      - If ${context.run_dir}/plan.md exists, read it and summarize completed steps.
      - If ${context.run_dir}/dod.md exists, report which done-criteria were met.
      - Identify the most likely failure cause and which state failed (define_done, plan, resume_check, select_step, do_work, verify_step, mark_done, check_done, count_done, final_verify, run_final_tests, count_final, continue_work, or summarize_partial).

      Write a one-paragraph diagnostic summary the operator can use to re-run or adjust the task description.
    next: failed

  failed:
    terminal: true
