name: "auto-refine-and-implement"
category: issue-management
description: |
  Refine and implement an issue set with refinement and implementation
  INTERLEAVED depth-first per issue. Resolves the issue set once (a named
  sprint / EPIC-NNN via scope, or the priority-ranked backlog when scope is
  empty) and delegates the per-issue work to the autodev engine: refine one
  issue to readiness via refine-to-ready-issue, implement it immediately via
  ll-auto --only, and when it decomposes into children, prepend the children
  depth-first so each child is refined AND implemented before the next sibling.
  First implementation runs as soon as the first leaf passes refinement — NOT
  after the whole tree is refined.

  finalize verifies closure from the UNION of two ground-truth diffs
  (BUG-2403): a .issues/completed/ diff (ENH-2385, for decomposed umbrellas
  that autodev git-mv's there) and a status:done diff (for leaf issues, which
  complete IN PLACE per ENH-1418 and never enter completed/). It emits a
  summary.json verdict (success / partial / partial-with-errors / phantom /
  no-op) plus a subloop_outcome token that reflects real terminal state, not an
  exit-code proxy (ENH-2005).
initial: init
max_steps: 50
timeout: 28800
on_handoff: spawn
import:
  - lib/common.yaml
context:
  max_issues: 100
  scope: ""   # optional: sprint name (.sprints/<name>.yaml) or EPIC-NNN; empty → rank backlog
  # Learning-gate skip knob: parity with `ll-auto --skip-learning-gate`. Forwarded
  # to autodev (→ its inner `ll-auto --only`) via with:. Default empty = the
  # ENH-2319 gate stays active (config-gated by learning_tests.enabled).
  skip_learning_gate: ""

states:
  init:
    action: |
      mkdir -p "${context.run_dir}"
      RUN_DIR="${context.run_dir}"
      rm -f "$RUN_DIR/auto-refine-and-implement-errored.txt"
      rm -f "$RUN_DIR/summary.json"
      # ENH-2385: snapshot the closed set so finalize can compute ground-truth
      # closures (issues that reached .issues/completed/ during THIS run). This
      # captures autodev decomposition closures (enqueue_children git-mv's
      # decomposed umbrellas into completed/).
      ls .issues/completed/ 2>/dev/null | grep -oE '(BUG|FEAT|ENH|EPIC)-[0-9]+' \
        | sort -u > "$RUN_DIR/auto-refine-and-implement-completed-baseline.txt"
      # BUG-2403: leaf issues complete IN PLACE (status: done + completed_at,
      # ENH-1418) and never enter .issues/completed/ — only decomposed parents
      # still git-mv there. Snapshot the live done-set too so finalize can
      # union both closure paths instead of only counting decomposition moves.
      python3 << 'PYEOF' > "$RUN_DIR/auto-refine-and-implement-done-baseline.txt"
      import json
      import subprocess

      done_ids = set()
      try:
          r = subprocess.run(
              ["ll-issues", "list", "--json", "--status", "done"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
      except Exception:
          pass
      for issue_id in sorted(done_ids):
          print(issue_id)
      PYEOF
    action_type: shell
    next: resolve_set

  resolve_set:
    # Resolve the full issue set to a single comma-separated list, captured as
    # 'issue_set' for the autodev sub-loop's context.input. autodev maintains a
    # unified depth-first queue from this list and interleaves refine+implement
    # per issue, so there is no per-issue polling loop here.
    #   scope set    → SprintManager.load_or_resolve(scope) issue list
    #   scope empty  → priority-ranked backlog via `ll-issues next-issues`,
    #                  capped at max_issues
    # Exits non-zero (→ finalize, a no-op verdict) when the set is empty.
    action: |
      mkdir -p "${context.run_dir}"
      if [ -n "${context.scope}" ]; then
        LIST=$(python3 << 'PYEOF'
      import sys
      from pathlib import Path
      from little_loops.config import BRConfig
      from little_loops.sprint import SprintManager

      arg = """${context.scope}""".strip()
      sprint = SprintManager(config=BRConfig(Path.cwd())).load_or_resolve(arg)
      if sprint is None:
          sys.stderr.write(
              f"'{arg}' not found: no .sprints/{arg}.yaml and not a resolvable EPIC ID\n")
          sys.exit(1)
      issues = sprint.issues or []
      if not issues:
          sys.stderr.write(f"'{arg}' resolved but has no active issues to process\n")
          sys.exit(1)
      print(",".join(issues))
      PYEOF
      )
        if [ $? -ne 0 ]; then
          exit 1
        fi
      else
        LIST=$(ll-issues next-issues 2>/dev/null \
                 | grep -v '^[[:space:]]*$' \
                 | head -n ${context.max_issues} \
                 | paste -sd ',' -)
      fi
      LIST=$(printf '%s' "$LIST" | tr -d '[:space:]')
      if [ -z "$LIST" ]; then
        echo "No issues to process" >&2
        exit 1
      fi
      printf '%s\n' "$LIST"
    fragment: shell_exit
    capture: issue_set
    on_yes: delegate
    on_no: finalize
    on_error: finalize

  delegate:
    # Delegate the entire refine+implement to the autodev engine. autodev shares
    # this loop's run_dir (executor injects it via setdefault), so its
    # autodev-passed.txt / autodev-skipped.txt land under ${context.run_dir}
    # where finalize reads them. on_success/on_failure both route to finalize
    # (the ground-truth completed/ diff is the authoritative verdict regardless
    # of autodev's collapsed terminal verdict). on_error routes to a DISTINCT
    # crash state so an infrastructure failure is not laundered into a clean
    # completion (ENH-2005 / ENH-2376).
    loop: autodev
    with:
      input: "${captured.issue_set.output}"
      skip_learning_gate: "${context.skip_learning_gate}"
    on_success: finalize
    on_failure: finalize
    on_error: record_error

  record_error:
    # autodev crashed at the infrastructure level before it could drain the set.
    # Record the crash so finalize can report partial-with-errors / phantom
    # rather than a silent no-op.
    action: |
      echo "${captured.issue_set.output}" >> ${context.run_dir}/auto-refine-and-implement-errored.txt
      echo "ERROR: autodev crashed on set ${captured.issue_set.output} — see events.jsonl"
    action_type: shell
    next: finalize

  finalize:
    # Write a machine-readable summary.json so callers (e.g.
    # sprint-refine-and-implement) and post-hoc audits can distinguish genuine
    # success from a phantom run where every issue was skipped or crashed.
    # CLOSED is ground truth: the UNION of a completed/ diff (decomposed
    # parents) and a status:done diff (leaf issues, BUG-2403). NOT_CLOSED/
    # SKIPPED are sourced from autodev's ledgers under the shared run_dir;
    # ERRORED from record_error. awk counts non-blank lines and always exits 0.
    # ENH-2404: GATE_BLOCKED reads the distinct gate-blocked ledger (ENH-2402)
    # so learning-gate blocks are no longer invisible; SKIPPED_BREAKDOWN
    # aggregates the keyed "ID  REASON" skip ledger by reason; PARKED_RATE is
    # a visibility signal (not a gate) over the resolved issue_set size.
    action: |
      RUN_DIR="${context.run_dir}"
      P=auto-refine-and-implement
      count() { awk 'NF{c++} END{print c+0}' "$RUN_DIR/$1" 2>/dev/null || echo 0; }

      # ENH-2385: decomposed-parent closures — issues that reached
      # .issues/completed/ during this run (autodev git-mv on decomposition).
      ls .issues/completed/ 2>/dev/null | grep -oE '(BUG|FEAT|ENH|EPIC)-[0-9]+' \
        | sort -u > "$RUN_DIR/$P-completed-now.txt"
      comm -13 "$RUN_DIR/$P-completed-baseline.txt" "$RUN_DIR/$P-completed-now.txt" \
        2>/dev/null > "$RUN_DIR/$P-completed-new.txt"

      # BUG-2403: leaf closures — issues that reached status: done IN PLACE
      # during this run (ENH-1418; leaves never enter completed/).
      python3 << 'PYEOF' > "$RUN_DIR/$P-done-now.txt"
      import json
      import subprocess

      done_ids = set()
      try:
          r = subprocess.run(
              ["ll-issues", "list", "--json", "--status", "done"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
      except Exception:
          pass
      for issue_id in sorted(done_ids):
          print(issue_id)
      PYEOF
      comm -13 "$RUN_DIR/$P-done-baseline.txt" "$RUN_DIR/$P-done-now.txt" \
        2>/dev/null > "$RUN_DIR/$P-done-new.txt"

      # CLOSED = union of both closure paths' NEW entries (since baseline), so
      # decomposed parents (still moved) and leaves (closed in place) are both
      # counted as ground truth for "closed during this run".
      cat "$RUN_DIR/$P-completed-new.txt" "$RUN_DIR/$P-done-new.txt" 2>/dev/null \
        | grep '[^[:space:]]' | sort -u > "$RUN_DIR/$P-closed-union.txt"
      CLOSED=$(count $P-closed-union.txt)

      # NOT_CLOSED exclusion uses the FULL current snapshot (completed-now ∪
      # done-now), not just this run's new closures — an issue closed before
      # the run started that reappears in autodev-passed is still closed, not
      # "not closed" (preserves the pre-BUG-2403 completed-now semantics).
      cat "$RUN_DIR/$P-completed-now.txt" "$RUN_DIR/$P-done-now.txt" 2>/dev/null \
        | grep '[^[:space:]]' | sort -u > "$RUN_DIR/$P-closed-now-union.txt"

      # NOT_CLOSED: issues autodev passed refinement and ran ll-auto on that did
      # NOT close via either path (e.g. ll-auto refused to close, or a plan
      # awaits approval). Derived as autodev-passed − closed-now-union, so a
      # rate-limit retry that eventually closes cannot double-count.
      sort -u "$RUN_DIR/autodev-passed.txt" 2>/dev/null | grep '[^[:space:]]' \
        > "$RUN_DIR/$P-passed-sorted.txt" || true
      : > "$RUN_DIR/$P-not-closed.txt"
      if [ -s "$RUN_DIR/$P-passed-sorted.txt" ]; then
        comm -23 "$RUN_DIR/$P-passed-sorted.txt" "$RUN_DIR/$P-closed-now-union.txt" \
          > "$RUN_DIR/$P-not-closed.txt" 2>/dev/null || true
      fi
      NOT_CLOSED=$(count $P-not-closed.txt)

      # SKIPPED: issues autodev parked (refinement failure, decomposed parent,
      # dead-end leaf). ERRORED: infrastructure crash recorded by record_error.
      SKIP=$(count autodev-skipped.txt)
      ERR=$(count $P-errored.txt)

      # ENH-2404: GATE_BLOCKED — learning-gate blocks (ENH-2402) are a distinct
      # ledger from skips; previously never read here, so a blocked issue
      # vanished from summary.json with no trace.
      GATE_BLOCKED=$(count autodev-gate-blocked.txt)

      # BUG-2595: DECISION_UNRESOLVED — issues where run_decide's decide-issue
      # call left decision_needed still armed (silent no-op) are a distinct
      # ledger from skips; mirrors GATE_BLOCKED so a decision-unresolved issue
      # doesn't vanish from summary.json the same way ENH-2404 fixed for
      # gate-blocked issues.
      DECISION_UNRESOLVED=$(count autodev-decision-unresolved.txt)

      # ENH-2404: SKIPPED_BREAKDOWN aggregates the "ID  REASON" skip ledger by
      # reason (decomposed / refine_failed / low_readiness / ...), so a
      # reviewer can tell a healthy decomposition-heavy run from a failing
      # one without re-reading events.jsonl. Fails open to {} on any error.
      SKIPPED_BREAKDOWN=$(python3 -c "
      import json, sys
      breakdown = {}
      try:
          with open(sys.argv[1]) as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  parts = line.split(None, 1)
                  reason = parts[1].strip() if len(parts) > 1 else 'unspecified'
                  breakdown[reason] = breakdown.get(reason, 0) + 1
      except Exception:
          pass
      print(json.dumps(breakdown))
      " "$RUN_DIR/autodev-skipped.txt" 2>/dev/null || echo '{}')
      [ -z "$SKIPPED_BREAKDOWN" ] && SKIPPED_BREAKDOWN='{}'

      # ENH-2404: PARKED_RATE is a visibility signal, NOT a blocking gate —
      # with skipped_breakdown present, a high rate interprets itself (e.g.
      # "4 low_readiness" is actionable, "4 decomposed" is healthy). Denominator
      # is the resolved issue_set size from resolve_set; 0.0 when unavailable.
      INPUT_SIZE=$(printf '%s' "${captured.issue_set.output}" | tr ',' '\n' \
        | grep -c '[^[:space:]]' 2>/dev/null || echo 0)
      if [ "$INPUT_SIZE" -gt 0 ]; then
        PARKED_RATE=$(python3 -c "print(round(($SKIP + $NOT_CLOSED + $GATE_BLOCKED + $DECISION_UNRESOLVED) / $INPUT_SIZE, 4))" 2>/dev/null || echo 0.0)
      else
        PARKED_RATE=0.0
      fi

      # Verdict reflects real closure. A run is only 'success' when it closed
      # something and left nothing parked (no skips, no not-closed, no crash).
      if [ "$CLOSED" -gt 0 ] && [ "$ERR" -eq 0 ] && [ "$SKIP" -eq 0 ] && [ "$NOT_CLOSED" -eq 0 ]; then
        VERDICT=success
      elif [ "$CLOSED" -gt 0 ] && [ "$ERR" -gt 0 ]; then
        # ENH-2376: closed something AND crashed — distinct from a clean partial.
        VERDICT=partial-with-errors
      elif [ "$CLOSED" -gt 0 ]; then
        VERDICT=partial
      elif [ "$ERR" -gt 0 ] || [ "$NOT_CLOSED" -gt 0 ]; then
        # Attempted work but closed nothing — not a benign no-op.
        VERDICT=phantom
      else
        VERDICT=no-op
      fi

      printf '{"verdict":"%s","closed":%s,"not_closed":%s,"skipped":%s,"errored":%s,"skipped_breakdown":%s,"gate_blocked":%s,"decision_unresolved":%s,"parked_rate":%s}\n' \
        "$VERDICT" "$CLOSED" "$NOT_CLOSED" "$SKIP" "$ERR" "$SKIPPED_BREAKDOWN" "$GATE_BLOCKED" "$DECISION_UNRESOLVED" "$PARKED_RATE" > "$RUN_DIR/summary.json"
      # ENH-2005 artifact-channel sidecar: a parent loop (e.g.
      # sprint-refine-and-implement) recovers the real verdict from this token
      # rather than the collapsed done/failed routing verdict.
      printf '%s\n' "$VERDICT" > "$RUN_DIR/subloop_outcome_auto-refine-and-implement.txt"
      printf '%s: verdict=%s closed=%s not_closed=%s skipped=%s errored=%s gate_blocked=%s decision_unresolved=%s parked_rate=%s\n' \
        "$P" "$VERDICT" "$CLOSED" "$NOT_CLOSED" "$SKIP" "$ERR" "$GATE_BLOCKED" "$DECISION_UNRESOLVED" "$PARKED_RATE"
    action_type: shell
    next: done

  done:
    terminal: true
