name: "auto-refine-and-implement"
category: issue-management
description: |
  For each backlog issue (priority order): recursively refine via recursive-refine
  (which handles decomposition into child issues), then implement all issues that
  passed refinement. Skips issues that fail refinement or are decomposed, tracking
  them to avoid retrying. Loops until backlog is exhausted.
initial: init
max_iterations: 500
timeout: 28800
on_handoff: spawn
# The .loops/tmp/auto-refine-and-implement-{skipped,impl-queue}.txt files are
# part of the caller_prefix contract with oracles/implement-issue-chain (which
# also declares shared_state_ok). Not safe for concurrent runs of this loop.
shared_state_ok: true
import:
  - lib/common.yaml
context:
  max_issues: 100

states:
  init:
    action: mkdir -p .loops/tmp && rm -f .loops/tmp/auto-refine-and-implement-skipped.txt && rm -f .loops/tmp/auto-refine-and-implement-impl-queue.txt
    action_type: shell
    next: get_next_issue

  get_next_issue:
    action: |
      mkdir -p .loops/tmp
      SKIPPED=""
      if [ -f .loops/tmp/auto-refine-and-implement-skipped.txt ]; then
        SKIPPED=$(paste -sd ',' .loops/tmp/auto-refine-and-implement-skipped.txt)
      fi
      if [ -n "$SKIPPED" ]; then
        ll-issues next-issue --skip "$SKIPPED"
      else
        ll-issues next-issue
      fi
    action_type: shell
    capture: input
    on_yes: refine_issue
    on_no: done
    on_error: done

  refine_issue:
    loop: recursive-refine
    with:
      input: "${captured.input.output}"
    on_success: implement_chain
    on_failure: skip_and_continue
    on_error: skip_and_continue

  implement_chain:
    loop: oracles/implement-issue-chain
    with:
      caller_prefix: "auto-refine-and-implement"
    on_success: get_next_issue
    on_failure: done
    on_error: done

  skip_and_continue:
    action: |
      echo "Skipping ${captured.input.output} after refinement failure"
      echo "${captured.input.output}" >> .loops/tmp/auto-refine-and-implement-skipped.txt
    fragment: queue_track
    next: get_next_issue

  done:
    terminal: true
