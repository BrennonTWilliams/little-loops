name: "auto-refine-and-implement"
category: issue-management
description: |
  Refine and implement an issue set with refinement and implementation
  INTERLEAVED depth-first per issue. Resolves the issue set once (a named
  sprint / EPIC-NNN via scope, or the priority-ranked backlog when scope is
  empty) and delegates the per-issue work to the autodev engine: refine one
  issue to readiness via refine-to-ready-issue, implement it immediately via
  ll-auto --only, and when it decomposes into children, prepend the children
  depth-first so each child is refined AND implemented before the next sibling.
  First implementation runs as soon as the first leaf passes refinement — NOT
  after the whole tree is refined.

  finalize verifies closure from the UNION of two ground-truth diffs
  (BUG-2403): a .issues/completed/ diff (ENH-2385, for decomposed umbrellas
  that autodev git-mv's there) and a status:done diff (for leaf issues, which
  complete IN PLACE per ENH-1418 and never enter completed/). It emits a
  summary.json verdict (success / partial / partial-with-errors / phantom /
  no-op) plus a subloop_outcome token that reflects real terminal state, not an
  exit-code proxy (ENH-2005).

  ENH-2601: when scope is an EPIC-NNN id and parallel.epic_branches.enabled is
  true, checkout_epic_branch ensures epic/<EPIC-ID>-<slug> exists off
  base_branch before delegate runs (create-without-switch, mirrors
  WorkerPool._ensure_epic_branch — the main working tree is NOT switched to
  it). After delegate, a verify state runs project.test_cmd/lint_cmd and folds
  the pass/fail/skipped verdict into summary.json as an additive
  verify_verdict field (advisory only — it does not gate finalize's own
  ledger-based closure verdict).

  ENH-2609: delegate declares `worktree: ${captured.epic_branch.output}` so the
  autodev sub-loop actually runs inside a scratch worktree attached to the epic
  branch — its refine+implement commits land on epic/<EPIC-ID>-<slug> without
  the main tree's checkout changing. When the capture is empty (non-EPIC scope
  or epic_branches disabled) the field is a strict no-op. verify and finalize
  are epic-branch aware for the same reason: the main tree never has the
  branch's commits, so verify attaches its own scratch worktree and finalize
  snapshots completed/ and status:done from the branch via git.

  BUG-2614: merge_epic_branch runs after verify, before finalize — once all
  the EPIC's children are done, it merges (or, per epic_branches.open_pr,
  opens a PR for) the integration branch back into base_branch, honoring
  merge_to_base_on_complete/verify_before_merge the same way ll-parallel's
  ParallelOrchestrator already does (both share the stateless free functions
  in worktree_utils.py). Previously this config was silently unhonored on the
  FSM path — the branch was created and committed to but never merged back.

  ENH-2615: on EPIC scopes the issue set is no longer resolved only once —
  after each delegate pass, recheck_set re-resolves the EPIC's descendant set
  (SprintManager.load_or_resolve now walks parent: chains transitively) and
  diffs it against the dispatched ledger. Children decomposed mid-run cycle
  back into delegate, whose per-entry worktree attach re-attaches the SAME
  epic branch, so their commits also land on epic/<EPIC-ID>-<slug> instead of
  bypassing it. Non-EPIC scopes keep the single upfront resolution.
initial: init
max_steps: 50
timeout: 28800
on_handoff: spawn
import:
  - lib/common.yaml
context:
  max_issues: 100
  scope: ""   # optional: sprint name (.sprints/<name>.yaml) or EPIC-NNN; empty → rank backlog
  # Learning-gate skip knob: parity with `ll-auto --skip-learning-gate`. Forwarded
  # to autodev (→ its inner `ll-auto --only`) via with:. Default empty = the
  # ENH-2319 gate stays active (config-gated by learning_tests.enabled).
  skip_learning_gate: ""

states:
  init:
    action: |
      mkdir -p "${context.run_dir}"
      RUN_DIR="${context.run_dir}"
      rm -f "$RUN_DIR/auto-refine-and-implement-errored.txt"
      rm -f "$RUN_DIR/summary.json"
      # ENH-2385: snapshot the closed set so finalize can compute ground-truth
      # closures (issues that reached .issues/completed/ during THIS run). This
      # captures autodev decomposition closures (enqueue_children git-mv's
      # decomposed umbrellas into completed/).
      ls .issues/completed/ 2>/dev/null | grep -oE '(BUG|FEAT|ENH|EPIC)-[0-9]+' \
        | sort -u > "$RUN_DIR/auto-refine-and-implement-completed-baseline.txt"
      # BUG-2403: leaf issues complete IN PLACE (status: done + completed_at,
      # ENH-1418) and never enter .issues/completed/ — only decomposed parents
      # still git-mv there. Snapshot the live done-set too so finalize can
      # union both closure paths instead of only counting decomposition moves.
      python3 << 'PYEOF' > "$RUN_DIR/auto-refine-and-implement-done-baseline.txt"
      import json
      import subprocess

      done_ids = set()
      try:
          r = subprocess.run(
              ["ll-issues", "list", "--json", "--status", "done"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
      except Exception:
          pass
      for issue_id in sorted(done_ids):
          print(issue_id)
      PYEOF
    action_type: shell
    next: resolve_set

  resolve_set:
    # Resolve the full issue set to a single comma-separated list, captured as
    # 'issue_set' for the autodev sub-loop's context.input. autodev maintains a
    # unified depth-first queue from this list and interleaves refine+implement
    # per issue, so there is no per-issue polling loop here.
    #   scope set    → SprintManager.load_or_resolve(scope) issue list
    #   scope empty  → priority-ranked backlog via `ll-issues next-issues`,
    #                  capped at max_issues
    # Exits non-zero (→ finalize, a no-op verdict) when the set is empty.
    action: |
      mkdir -p "${context.run_dir}"
      if [ -n "${context.scope}" ]; then
        LIST=$(python3 << 'PYEOF'
      import sys
      from pathlib import Path
      from little_loops.config import BRConfig
      from little_loops.sprint import SprintManager

      arg = """${context.scope}""".strip()
      sprint = SprintManager(config=BRConfig(Path.cwd())).load_or_resolve(arg)
      if sprint is None:
          sys.stderr.write(
              f"'{arg}' not found: no .sprints/{arg}.yaml and not a resolvable EPIC ID\n")
          sys.exit(1)
      issues = sprint.issues or []
      if not issues:
          sys.stderr.write(f"'{arg}' resolved but has no active issues to process\n")
          sys.exit(1)
      print(",".join(issues))
      PYEOF
      )
        if [ $? -ne 0 ]; then
          exit 1
        fi
      else
        LIST=$(ll-issues next-issues 2>/dev/null \
                 | grep -v '^[[:space:]]*$' \
                 | head -n ${context.max_issues} \
                 | paste -sd ',' -)
      fi
      LIST=$(printf '%s' "$LIST" | tr -d '[:space:]')
      if [ -z "$LIST" ]; then
        echo "No issues to process" >&2
        exit 1
      fi
      # ENH-2615: seed the dispatched ledger so recheck_set can diff later
      # re-resolutions against what has already been dispatched to delegate.
      printf '%s\n' "$LIST" | tr ',' '\n' | grep -v '^[[:space:]]*$' \
        >> "${context.run_dir}/auto-refine-and-implement-dispatched.txt"
      printf '%s\n' "$LIST"
    fragment: shell_exit
    capture: issue_set
    on_yes: checkout_epic_branch
    on_no: finalize
    on_error: finalize

  checkout_epic_branch:
    # ENH-2601 Option A (create-without-switching — mirrors
    # WorkerPool._ensure_epic_branch, worker_pool.py:1707-1743): when scope is
    # an EPIC-NNN id and parallel.epic_branches.enabled is true, ensure
    # epic/<EPIC-ID>-<slug> exists off base_branch. Deliberately does NOT `git
    # checkout` it — the main working tree stays on whatever branch was
    # already active, preserving the invariant documented in orchestrator.py's
    # _merge_epic_branch_to_base docstring. No-op (writes nothing, always
    # continues) when scope isn't an EPIC id or the config flag is off.
    action: |
      python3 << 'PYEOF'
      import re
      import subprocess
      import sys
      from pathlib import Path

      from little_loops.config import BRConfig
      from little_loops.issue_parser import IssueParser, slugify
      from little_loops.worktree_utils import (
          detect_default_branch,
          resolve_epic_base,
          resolve_epic_branch_name,
      )

      scope = """${context.scope}""".strip()
      run_dir = Path("""${context.run_dir}""")

      # ENH-2609: stdout is reserved for the branch name (captured as
      # epic_branch, referenced by delegate's worktree: template); all log
      # lines go to stderr. Skip paths print nothing to stdout, which
      # disables delegate's worktree attach.
      if not re.fullmatch(r"EPIC-\d+", scope):
          print("checkout_epic_branch: scope is not an EPIC id — skipping", file=sys.stderr)
          raise SystemExit(0)

      cfg = BRConfig(Path.cwd())
      epic_cfg = cfg.parallel.epic_branches
      if not epic_cfg.enabled:
          print(
              "checkout_epic_branch: parallel.epic_branches.enabled is false — skipping",
              file=sys.stderr,
          )
          raise SystemExit(0)

      epic_id = scope
      slug = epic_id.lower()
      issues_base = Path(".issues")
      if issues_base.is_dir():
          parser = IssueParser(cfg)
          for category_dir in sorted(issues_base.iterdir()):
              if not category_dir.is_dir():
                  continue
              for issue_file in sorted(category_dir.glob(f"P?-{epic_id}-*.md")):
                  try:
                      info = parser.parse_file(issue_file)
                  except Exception:
                      continue
                  if info.title:
                      slug = slugify(info.title)
                  break

      # ENH-2656: single-sourced name/base derivation. FEAT-2652: resolve_epic_base
      # honors a per-EPIC base_branch: declaration (passed repo_path + cfg enable
      # the .issues lookup), falling back to default_base when the EPIC declares none.
      branch = resolve_epic_branch_name(epic_id, epic_cfg.prefix, slug)
      default_base = cfg.parallel.base_branch or detect_default_branch(Path.cwd())
      base = resolve_epic_base(epic_id, default_base, Path.cwd(), cfg)

      def _git(args: list[str]) -> subprocess.CompletedProcess:
          return subprocess.run(["git", *args], capture_output=True, text=True)

      exists = _git(["rev-parse", "--verify", branch]).returncode == 0
      if not exists:
          remote = _git(["ls-remote", "--heads", cfg.parallel.remote_name, branch])
          exists = bool(remote.stdout and remote.stdout.strip())
      if not exists:
          _git(["branch", branch, base])
          print(f"checkout_epic_branch: created {branch} off {base}", file=sys.stderr)
      else:
          print(f"checkout_epic_branch: {branch} already exists", file=sys.stderr)

      run_dir.mkdir(parents=True, exist_ok=True)
      (run_dir / "epic-branch-name.txt").write_text(branch + "\n")
      # BUG-2614: persist the resolved base branch so merge_epic_branch can
      # merge back into the SAME branch this one was forked from, instead of
      # re-deriving it (and potentially disagreeing, since
      # create_parallel_config()'s "main" fallback differs from
      # detect_default_branch()'s git-derived one used here).
      (run_dir / "base-branch-name.txt").write_text(base + "\n")
      print(branch)
      PYEOF
    action_type: shell
    capture: epic_branch
    next: delegate
    on_error: delegate

  delegate:
    # Delegate the entire refine+implement to the autodev engine. autodev shares
    # this loop's run_dir (executor injects it via setdefault), so its
    # autodev-passed.txt / autodev-skipped.txt land under ${context.run_dir}
    # where finalize reads them. on_success/on_failure both route to recheck_set
    # (ENH-2615) so an EPIC scope re-resolves its descendant set and cycles new
    # mid-run children back through this state before verify's post-
    # implementation test/lint check runs (the ground-truth completed/ diff
    # computed in finalize remains the authoritative closure verdict). on_error
    # routes to a DISTINCT crash state so an infrastructure failure is not
    # laundered into a clean completion (ENH-2005 / ENH-2376).
    # ENH-2609: worktree attaches a scratch worktree to the epic branch that
    # checkout_epic_branch created (checkout_existing, branch preserved on
    # detach), so autodev's commits land on epic/<EPIC-ID>-<slug> without the
    # main tree's checkout changing. Empty capture (non-EPIC scope or
    # epic_branches disabled) → strict no-op, delegate runs in place as before.
    loop: autodev
    worktree: "${captured.epic_branch.output}"
    with:
      input: "${captured.issue_set.output}"
      skip_learning_gate: "${context.skip_learning_gate}"
    on_success: recheck_set
    on_failure: recheck_set
    on_error: record_error

  recheck_set:
    # ENH-2615: after each delegate pass, re-resolve the EPIC's descendant set
    # (SprintManager.load_or_resolve now walks parent: chains transitively) and
    # diff it against the dispatched ledger. Children decomposed mid-run —
    # repointed to the EPIC by autodev's finalize-decomposition wiring, or
    # chaining to it transitively — surface here and cycle back to delegate,
    # whose per-entry worktree attach (ENH-2609, fsm/executor.py) re-attaches
    # the SAME epic branch for the new batch, preserving the "everything for
    # this epic lands on one branch" guarantee. Non-EPIC scopes exit 1 →
    # verify: the backlog/sprint paths keep the single upfront resolution and
    # must not pick up unrelated new issues mid-run. Re-dispatch cycles are
    # capped at 5 (the recheck-count artifact) as a runaway guard on top of
    # max_steps; load_or_resolve's active-status filter drops closed children,
    # and the dispatched-ledger diff drops parked/skipped ones, so each cycle
    # only dispatches genuinely new work.
    action: |
      RUN_DIR="${context.run_dir}"
      SCOPE=$(printf '%s' "${context.scope}" | tr -d '[:space:]')
      printf '%s' "$SCOPE" | grep -qE '^EPIC-[0-9]+$' || exit 1
      N=$(cat "$RUN_DIR/auto-refine-and-implement-recheck-count.txt" 2>/dev/null || echo 0)
      if [ "$N" -ge 5 ]; then
        echo "recheck_set: re-dispatch cycle cap (5) reached" >&2
        exit 1
      fi
      LIST=$(python3 << 'PYEOF'
      import sys
      from pathlib import Path
      from little_loops.config import BRConfig
      from little_loops.sprint import SprintManager

      arg = """${context.scope}""".strip()
      sprint = SprintManager(config=BRConfig(Path.cwd())).load_or_resolve(arg)
      if sprint is None:
          sys.exit(1)
      print(",".join(sprint.issues or []))
      PYEOF
      ) || exit 1
      sort -u "$RUN_DIR/auto-refine-and-implement-dispatched.txt" 2>/dev/null \
        > "$RUN_DIR/auto-refine-and-implement-dispatched-sorted.txt" || true
      NEW=$(printf '%s\n' "$LIST" | tr ',' '\n' | grep -v '^[[:space:]]*$' | sort -u \
        | comm -23 - "$RUN_DIR/auto-refine-and-implement-dispatched-sorted.txt")
      # ENH-2686: fold back any abandoned mid-drain residual — issues autodev
      # left in $RUN_DIR/autodev-queue.txt when it hit timeout/max_steps
      # (the same file finalize's ABANDONED count reads, ENH-2657). These IDs
      # are already present in dispatched.txt from the initial seed, so NEW's
      # comm -23 against dispatched.txt permanently excludes them without
      # this explicit union — they'd never get another delegate pass.
      RESIDUAL=$(grep '[^[:space:]]' "$RUN_DIR/autodev-queue.txt" 2>/dev/null | sort -u || true)
      COMBINED=$(printf '%s\n%s\n' "$NEW" "$RESIDUAL" | grep -v '^[[:space:]]*$' | sort -u)
      if [ -z "$COMBINED" ]; then
        exit 1
      fi
      echo $((N + 1)) > "$RUN_DIR/auto-refine-and-implement-recheck-count.txt"
      # Only append IDs not already in dispatched.txt — residual IDs were
      # already seeded there (initial seed or a prior recheck cycle), so
      # re-appending them would break comm -23's dedup for later cycles.
      comm -23 <(printf '%s\n' "$COMBINED") "$RUN_DIR/auto-refine-and-implement-dispatched-sorted.txt" \
        >> "$RUN_DIR/auto-refine-and-implement-dispatched.txt"
      COMBINED_CSV=$(printf '%s\n' "$COMBINED" | paste -sd ',' -)
      echo "recheck_set: re-dispatching: $COMBINED_CSV" >&2
      printf '%s\n' "$COMBINED_CSV"
    fragment: shell_exit
    capture: issue_set
    on_yes: delegate
    on_no: verify
    on_error: verify

  verify:
    # ENH-2601: post-implementation correctness check, folded into
    # summary.json as an ADDITIVE verify_verdict field — advisory only, does
    # not gate finalize's own ledger-based closure verdict (a failing verify
    # does not turn a successful closure into a failure). Runs
    # project.test_cmd and, if configured, project.lint_cmd. Skips (verdict
    # "skipped") when test_cmd is unconfigured, matching the SKIP-status
    # convention used elsewhere for unconfigured verification commands.
    # ENH-2609: when epic-branch-name.txt exists, the commits under test live
    # on the epic branch, NOT in the main tree — so verify attaches its own
    # scratch worktree via the shared worktree_utils.verify_epic_branch_before_merge
    # (BUG-2614: extracted from orchestrator._verify_epic_branch_before_merge,
    # called here with verify_before_merge=True since this state's checks are
    # unconditional rather than gated by the epic_branches.verify_before_merge
    # config flag — that flag instead gates merge_epic_branch's own call to
    # the same function below). Non-epic runs verify in place, unchanged.
    action: |
      RUN_DIR="${context.run_dir}"
      VERIFY_VERDICT=$(python3 << 'PYEOF'
      import json
      import shlex
      import subprocess
      import sys
      from pathlib import Path

      run_dir = Path("""${context.run_dir}""")

      # ENH-2631: map a process exit code to a verdict class so triage can tell
      # a pytest collection/usage error (exit 2 — a harness/env problem like
      # BUG-2629) from a real test failure (exit 1, a code defect) without
      # re-running the suite. Everything non-zero-and-not-2 stays 'failed'.
      # ENH-2742: a missing/misconfigured npm script (e.g. test_cmd pointed at
      # the wrong directory) also exits non-zero but is a config error, not a
      # code defect — distinguish it via a stderr substring match before
      # falling back to 'failed'.
      def classify(returncode, stderr=""):
          if returncode == 0:
              return 'passed'
          if returncode == 2:
              return 'collection_error'
          if 'missing script' in stderr.lower():
              return 'config_error'
          return 'failed'

      # ENH-2631: persist the failing exit code + a detail snippet as flat text
      # artifacts alongside the verdict token (Option A, ENH-2631 decision), then
      # emit the verdict on stdout. Written only on failure; passed/skipped runs
      # leave the detail/returncode files absent so finalize defaults them.
      def emit(verdict, returncode=None, detail=''):
          if returncode is not None:
              (run_dir / 'verify-returncode.txt').write_text(str(returncode))
          if detail:
              # ENH-2641: `detail` is already a bounded line-tail (produced by
              # format_verify_detail below / worktree_utils on the epic path);
              # write it verbatim rather than re-clipping its head to 500 chars,
              # which was dropping the pytest FAILED/summary lines.
              (run_dir / 'verify-detail.txt').write_text(detail)
          print(verdict)
          raise SystemExit(0)

      p = Path('.ll/ll-config.json')
      cfg = json.loads(p.read_text()) if p.exists() else {}
      project = cfg.get('project', {})
      test_cmd = project.get('test_cmd')
      lint_cmd = project.get('lint_cmd')

      if not test_cmd:
          emit('skipped')

      branch_file = run_dir / 'epic-branch-name.txt'
      epic_branch = branch_file.read_text().strip() if branch_file.exists() else ''

      # ENH-2641: capture the diagnostic line-tail of combined stderr+stdout so
      # the pytest FAILED/short-summary lines (written to stdout at the tail)
      # survive rather than being crowded out by leading stderr warnings.
      from little_loops.worktree_utils import format_verify_detail

      if not epic_branch:
          for cmd in (test_cmd, lint_cmd):
              if not cmd:
                  continue
              result = subprocess.run(
                  shlex.split(cmd), capture_output=True, text=True
              )
              if result.returncode != 0:
                  detail = format_verify_detail(result.stdout, result.stderr)
                  emit(classify(result.returncode, result.stderr), result.returncode, detail)
          emit('passed', 0)

      from little_loops.config import BRConfig
      from little_loops.logger import Logger
      from little_loops.parallel.git_lock import GitLock
      from little_loops.worktree_utils import verify_epic_branch_before_merge

      repo = Path.cwd()
      ll_cfg = BRConfig(repo)
      logger = Logger(verbose=False)
      lock = GitLock(logger)
      epic_id = """${context.scope}""".strip()

      # ENH-2630: persist the epic branch tip alongside the verdict so
      # merge_epic_branch can reuse this run's result when the tip is unchanged
      # (the two states run back-to-back, so it normally is) instead of
      # re-running the full suite. Written only on the epic-branch code path —
      # the non-epic in-place branch above has no branch to rev-parse.
      sha = subprocess.run(
          ["git", "rev-parse", "--verify", epic_branch],
          capture_output=True, text=True,
      )
      if sha.returncode == 0:
          (run_dir / 'verify-sha.txt').write_text(sha.stdout.strip())

      ok, message, returncode = verify_epic_branch_before_merge(
          epic_id,
          epic_branch,
          verify_before_merge=True,
          repo_path=repo,
          worktree_base=ll_cfg.get_worktree_base(),
          test_cmd=test_cmd,
          lint_cmd=lint_cmd,
          logger=logger,
          git_lock=lock,
          src_dir=ll_cfg.project.src_dir,
      )
      if ok:
          emit('passed', 0)
      if message:
          print(f'verify: {message}', file=sys.stderr)
      # ENH-2631: returncode is None only for a worktree-setup failure (no
      # command ran) — fall back to 'failed' there rather than misclassifying.
      verdict = classify(returncode, message or '') if returncode is not None else 'failed'
      emit(verdict, returncode, message or '')
      PYEOF
      )
      echo "$VERIFY_VERDICT" > "$RUN_DIR/verify-verdict.txt"
      echo "verify: verdict=$VERIFY_VERDICT"
    action_type: shell
    next: merge_epic_branch
    on_error: merge_epic_branch

  record_error:
    # autodev crashed at the infrastructure level before it could drain the set.
    # Record the crash so finalize can report partial-with-errors / phantom
    # rather than a silent no-op.
    action: |
      echo "${captured.issue_set.output}" >> ${context.run_dir}/auto-refine-and-implement-errored.txt
      echo "ERROR: autodev crashed on set ${captured.issue_set.output} — see events.jsonl"
    action_type: shell
    next: finalize

  merge_epic_branch:
    # BUG-2614: the FSM-loop-side equivalent of
    # ParallelOrchestrator._maybe_complete_epic — merges (or, per
    # epic_branches.open_pr, opens a PR for) the EPIC integration branch back
    # to base_branch once all its children are done, honoring
    # parallel.epic_branches.merge_to_base_on_complete/verify_before_merge/
    # open_pr the same way ll-parallel already does. Previously this config
    # was silently unhonored on the FSM path — the branch was created and
    # committed to but never merged back (see issue for the EPIC-2575 case
    # this was found from).
    #
    # No-op ("skipped") when scope isn't an EPIC id (no epic-branch-name.txt),
    # both merge_to_base_on_complete and open_pr are false, or the branch has
    # already been merged by a prior run/retry — idempotency comes for free
    # from git: merge_epic_branch_to_base deletes the branch on success, so a
    # `git rev-parse --verify` miss means "already merged", no persisted
    # marker needed (see issue's FSM Plumbing Design — this state runs
    # exactly once per loop execution, unlike the orchestrator's
    # multiply-fired _maybe_complete_epic, so no idempotency SET is needed
    # either, only the git-existence check).
    #
    # "held_open" when the EPIC's children aren't all `done` yet (mirrors the
    # orchestrator's all-done gate via compute_epic_progress; no run-level
    # failure-set gate here since finalize has no queue/state object to scope
    # one from — on-disk status is the sole source of truth in this context).
    action: |
      RUN_DIR="${context.run_dir}"
      python3 << 'PYEOF' > "$RUN_DIR/epic-merge-verdict.txt"
      import subprocess
      import sys
      from pathlib import Path

      run_dir = Path("""${context.run_dir}""")
      branch_file = run_dir / "epic-branch-name.txt"
      base_file = run_dir / "base-branch-name.txt"
      epic_id = """${context.scope}""".strip()

      if not branch_file.exists():
          print("skipped")
          raise SystemExit(0)
      epic_branch = branch_file.read_text().strip()

      exists = subprocess.run(
          ["git", "rev-parse", "--verify", epic_branch],
          capture_output=True, text=True,
      ).returncode == 0
      if not exists:
          print("skipped")
          raise SystemExit(0)

      from little_loops.config import BRConfig

      cfg = BRConfig(Path.cwd())
      epic_cfg = cfg.parallel.epic_branches
      if not epic_cfg.merge_to_base_on_complete and not epic_cfg.open_pr:
          print("skipped")
          raise SystemExit(0)

      from little_loops.issue_parser import find_issues
      from little_loops.issue_progress import compute_epic_progress

      all_issues = find_issues(
          cfg,
          status_filter={"open", "in_progress", "blocked", "done", "cancelled", "deferred"},
      )
      # BUG-2637: the run that completes the FINAL child wrote `status: done`
      # inside the epic-branch worktree — that status lives only on the epic
      # branch tip, not on the base working tree find_issues() just scanned. So
      # the all-done gate reads the completing child as still `open` and never
      # merges. Union the epic-branch-tip `done` set over the base status before
      # counting, mirroring finalize's `git grep -lE '^status: *done' <branch>`
      # tip-read idiom (ENH-2609) in this same file.
      import re

      tip_done: set[str] = set()
      try:
          tip = subprocess.run(
              ["git", "grep", "-lE", r"^status: *done", epic_branch, "--", ".issues"],
              capture_output=True, text=True, timeout=30,
          )
          if tip.returncode in (0, 1):
              for line in tip.stdout.splitlines():
                  m = re.search(r"(BUG|FEAT|ENH|EPIC)-[0-9]+", line)
                  if m:
                      tip_done.add(m.group(0))
      except Exception:
          pass
      for iss in all_issues:
          if iss.issue_id in tip_done:
              iss.status = "done"

      prog = compute_epic_progress(epic_id, all_issues)
      if prog is None:
          print("skipped")
          raise SystemExit(0)

      total = len(prog.children)
      done_count = prog.by_status.get("done", 0)
      blocked_count = prog.by_status.get("blocked", 0)
      cancelled_count = prog.by_status.get("cancelled", 0)
      all_done = (
          total > 0 and done_count == total and blocked_count == 0 and cancelled_count == 0
      )
      if not all_done:
          print("held_open")
          raise SystemExit(0)

      base_branch = (
          base_file.read_text().strip()
          if base_file.exists()
          else (cfg.parallel.base_branch or "main")
      )

      from little_loops.logger import Logger
      from little_loops.parallel.git_lock import GitLock
      from little_loops.worktree_utils import (
          merge_epic_branch_to_base,
          open_pr_for_epic_branch,
          verify_epic_branch_before_merge,
      )

      repo = Path.cwd()
      logger = Logger(verbose=False)
      lock = GitLock(logger)

      # ENH-2630: the verify state already ran the suite against this same tip
      # and recorded verify-verdict.txt + verify-sha.txt. When that verdict is
      # `passed` and its recorded SHA still matches the current epic tip, reuse
      # it instead of re-running ~15k tests a second time (the two states run
      # back-to-back, so the tip normally matches). The binding gate below is
      # kept as a fallback for a missing/non-passed verdict or a SHA mismatch,
      # so a disagreement can still never merge a failing tip.
      ok = None
      message = None
      if epic_cfg.verify_before_merge:
          verdict_file = run_dir / "verify-verdict.txt"
          sha_file = run_dir / "verify-sha.txt"
          prior_verdict = (
              verdict_file.read_text().strip() if verdict_file.exists() else ""
          )
          prior_sha = sha_file.read_text().strip() if sha_file.exists() else ""
          current = subprocess.run(
              ["git", "rev-parse", "--verify", epic_branch],
              capture_output=True, text=True,
          )
          current_sha = current.stdout.strip() if current.returncode == 0 else ""
          if prior_verdict == "passed" and prior_sha and prior_sha == current_sha:
              ok, message = True, None

      if ok is None:
          # ENH-2631: the free function now returns (ok, message, returncode);
          # merge_epic_branch only gates on ok, so the exit code is discarded here
          # (the verify state already persisted it to verify-returncode.txt).
          ok, message, _returncode = verify_epic_branch_before_merge(
              epic_id,
              epic_branch,
              verify_before_merge=epic_cfg.verify_before_merge,
              repo_path=repo,
              worktree_base=cfg.get_worktree_base(),
              test_cmd=cfg.project.test_cmd,
              lint_cmd=cfg.project.lint_cmd,
              logger=logger,
              git_lock=lock,
              src_dir=cfg.project.src_dir,
          )
      if not ok:
          print(f"merge_epic_branch: verify gate failed: {message}", file=sys.stderr)
          print("verify_failed")
          raise SystemExit(0)

      if epic_cfg.open_pr:
          open_pr_for_epic_branch(
              epic_id, epic_branch, base_branch=base_branch, repo_path=repo, logger=logger
          )
          print("pr_opened")
      else:
          merged = merge_epic_branch_to_base(
              epic_id,
              epic_branch,
              base_branch=base_branch,
              repo_path=repo,
              logger=logger,
              git_lock=lock,
              run_dir=run_dir,  # ENH-2643: persist merge-detail on failure
          )
          print("merged" if merged else "merge_failed")
      PYEOF
      echo "merge_epic_branch: verdict=$(cat "$RUN_DIR/epic-merge-verdict.txt")"
    action_type: shell
    next: finalize
    on_error: finalize

  finalize:
    # Write a machine-readable summary.json so callers (e.g.
    # sprint-refine-and-implement) and post-hoc audits can distinguish genuine
    # success from a phantom run where every issue was skipped or crashed.
    # CLOSED is ground truth: the UNION of a completed/ diff (decomposed
    # parents) and a status:done diff (leaf issues, BUG-2403). NOT_CLOSED/
    # SKIPPED are sourced from autodev's ledgers under the shared run_dir;
    # ERRORED from record_error. awk counts non-blank lines and always exits 0.
    # ENH-2404: GATE_BLOCKED reads the distinct gate-blocked ledger (ENH-2402)
    # so learning-gate blocks are no longer invisible; SKIPPED_BREAKDOWN
    # aggregates the keyed "ID  REASON" skip ledger by reason; PARKED_RATE is
    # a visibility signal (not a gate) over the resolved issue_set size.
    action: |
      RUN_DIR="${context.run_dir}"
      P=auto-refine-and-implement
      count() { awk 'NF{c++} END{print c+0}' "$RUN_DIR/$1" 2>/dev/null || echo 0; }

      # ENH-2609: on an epic-branch run, closures live on the epic branch —
      # delegate committed inside a worktree, so the main tree's .issues never
      # changed. Snapshot the NOW sets from the branch via git instead of the
      # working tree, or a fully successful epic run would report 'phantom'.
      EPIC_BRANCH=$(cat "$RUN_DIR/epic-branch-name.txt" 2>/dev/null || true)
      export LL_EPIC_BRANCH="$EPIC_BRANCH"

      # ENH-2385: decomposed-parent closures — issues that reached
      # .issues/completed/ during this run (autodev git-mv on decomposition).
      if [ -n "$EPIC_BRANCH" ]; then
        git ls-tree -r --name-only "$EPIC_BRANCH" -- .issues/completed/ 2>/dev/null \
          | grep -oE '(BUG|FEAT|ENH|EPIC)-[0-9]+' \
          | sort -u > "$RUN_DIR/$P-completed-now.txt"
      else
        ls .issues/completed/ 2>/dev/null | grep -oE '(BUG|FEAT|ENH|EPIC)-[0-9]+' \
          | sort -u > "$RUN_DIR/$P-completed-now.txt"
      fi
      comm -13 "$RUN_DIR/$P-completed-baseline.txt" "$RUN_DIR/$P-completed-now.txt" \
        2>/dev/null > "$RUN_DIR/$P-completed-new.txt"

      # BUG-2403: leaf closures — issues that reached status: done IN PLACE
      # during this run (ENH-1418; leaves never enter completed/). On an epic
      # run the snapshot comes from the branch (git grep on frontmatter);
      # otherwise from the working tree via ll-issues (ENH-2609).
      python3 << 'PYEOF' > "$RUN_DIR/$P-done-now.txt"
      import json
      import os
      import re
      import subprocess

      done_ids = set()
      branch = os.environ.get("LL_EPIC_BRANCH", "").strip()
      try:
          if branch:
              r = subprocess.run(
                  ["git", "grep", "-lE", r"^status: *done", branch, "--", ".issues"],
                  capture_output=True, text=True, timeout=30,
              )
              if r.returncode in (0, 1):
                  for line in r.stdout.splitlines():
                      m = re.search(r"(BUG|FEAT|ENH|EPIC)-[0-9]+", line)
                      if m:
                          done_ids.add(m.group(0))
          else:
              r = subprocess.run(
                  ["ll-issues", "list", "--json", "--status", "done"],
                  capture_output=True, text=True, timeout=30,
              )
              if r.returncode == 0:
                  done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
      except Exception:
          pass
      for issue_id in sorted(done_ids):
          print(issue_id)
      PYEOF
      comm -13 "$RUN_DIR/$P-done-baseline.txt" "$RUN_DIR/$P-done-now.txt" \
        2>/dev/null > "$RUN_DIR/$P-done-new.txt"

      # CLOSED = union of both closure paths' NEW entries (since baseline), so
      # decomposed parents (still moved) and leaves (closed in place) are both
      # counted as ground truth for "closed during this run".
      cat "$RUN_DIR/$P-completed-new.txt" "$RUN_DIR/$P-done-new.txt" 2>/dev/null \
        | grep '[^[:space:]]' | sort -u > "$RUN_DIR/$P-closed-union.txt"
      CLOSED=$(count $P-closed-union.txt)

      # NOT_CLOSED exclusion uses the FULL current snapshot (completed-now ∪
      # done-now), not just this run's new closures — an issue closed before
      # the run started that reappears in autodev-passed is still closed, not
      # "not closed" (preserves the pre-BUG-2403 completed-now semantics).
      cat "$RUN_DIR/$P-completed-now.txt" "$RUN_DIR/$P-done-now.txt" 2>/dev/null \
        | grep '[^[:space:]]' | sort -u > "$RUN_DIR/$P-closed-now-union.txt"

      # BUG-2636: INFLIGHT_UNRESOLVED — a still-set autodev-inflight sentinel at
      # finalize time means the sub-loop reached its terminal (or was cut off by a
      # step/time cap, or an env-abort path) with an issue mid-implementation that
      # never landed in passed/skipped/gate-blocked. It is invisible to every
      # ledger above, so a dispatched-but-abandoned issue would misread as a
      # benign no-op (observed: run 20260713T190717 left ENH-2578 in-flight yet
      # reported verdict=no-op / "done"). Count it as its own signal (mirrors
      # ENH-2404 gate_blocked / BUG-2595 decision_unresolved), but only when the
      # in-flight issue did NOT actually close via either path — an issue that
      # closed while its sentinel merely lingered is not unresolved.
      INFLIGHT_ID=$(cat "$RUN_DIR/autodev-inflight" 2>/dev/null | tr -d '[:space:]' || true)
      INFLIGHT_UNRESOLVED=0
      if [ -n "$INFLIGHT_ID" ] \
         && ! grep -qxF "$INFLIGHT_ID" "$RUN_DIR/$P-closed-now-union.txt" 2>/dev/null; then
        INFLIGHT_UNRESOLVED=1
        printf '%s\n' "$INFLIGHT_ID" > "$RUN_DIR/$P-inflight-unresolved.txt"
      fi

      # ENH-2657: ABANDONED — autodev drains a unified depth-first queue
      # (autodev-queue.txt under the run_dir) one issue at a time and exits to its own
      # `done` only when the queue is empty. If it hits timeout (28800s) or
      # max_steps (500) mid-drain it terminates with a NON-EMPTY queue — those
      # issues were dispatched but never refined/implemented/parked, and appear
      # in none of the ledgers above (observed: EPIC-058 run left 18 of 27
      # undrained, summary reported closed=1 and routed green). Count the residual
      # queue as its own signal. Subtract the closed-now union so a late-closing
      # race (an issue that actually closed while still lingering in the queue
      # file) does not double-count as abandoned.
      : > "$RUN_DIR/$P-abandoned.txt"
      if [ -s "$RUN_DIR/autodev-queue.txt" ]; then
        grep '[^[:space:]]' "$RUN_DIR/autodev-queue.txt" | sort -u \
          | comm -23 - "$RUN_DIR/$P-closed-now-union.txt" \
          > "$RUN_DIR/$P-abandoned.txt" 2>/dev/null || true
      fi
      ABANDONED=$(count $P-abandoned.txt)

      # NOT_CLOSED: issues autodev passed refinement and ran ll-auto on that did
      # NOT close via either path (e.g. ll-auto refused to close, or a plan
      # awaits approval). Derived as autodev-passed − closed-now-union, so a
      # rate-limit retry that eventually closes cannot double-count.
      sort -u "$RUN_DIR/autodev-passed.txt" 2>/dev/null | grep '[^[:space:]]' \
        > "$RUN_DIR/$P-passed-sorted.txt" || true
      : > "$RUN_DIR/$P-not-closed.txt"
      if [ -s "$RUN_DIR/$P-passed-sorted.txt" ]; then
        comm -23 "$RUN_DIR/$P-passed-sorted.txt" "$RUN_DIR/$P-closed-now-union.txt" \
          > "$RUN_DIR/$P-not-closed.txt" 2>/dev/null || true
      fi
      NOT_CLOSED=$(count $P-not-closed.txt)

      # SKIPPED: issues autodev parked (refinement failure, decomposed parent,
      # dead-end leaf). ERRORED: infrastructure crash recorded by record_error.
      SKIP=$(count autodev-skipped.txt)
      ERR=$(count $P-errored.txt)

      # ENH-2404: GATE_BLOCKED — learning-gate blocks (ENH-2402) are a distinct
      # ledger from skips; previously never read here, so a blocked issue
      # vanished from summary.json with no trace.
      GATE_BLOCKED=$(count autodev-gate-blocked.txt)

      # BUG-2595: DECISION_UNRESOLVED — issues where run_decide's decide-issue
      # call left decision_needed still armed (silent no-op) are a distinct
      # ledger from skips; mirrors GATE_BLOCKED so a decision-unresolved issue
      # doesn't vanish from summary.json the same way ENH-2404 fixed for
      # gate-blocked issues.
      DECISION_UNRESOLVED=$(count autodev-decision-unresolved.txt)

      # ENH-2404: SKIPPED_BREAKDOWN aggregates the "ID  REASON" skip ledger by
      # reason (decomposed / refine_failed / low_readiness / ...), so a
      # reviewer can tell a healthy decomposition-heavy run from a failing
      # one without re-reading events.jsonl. Fails open to {} on any error.
      SKIPPED_BREAKDOWN=$(python3 -c "
      import json, sys
      breakdown = {}
      try:
          with open(sys.argv[1]) as f:
              for line in f:
                  line = line.strip()
                  if not line:
                      continue
                  parts = line.split(None, 1)
                  reason = parts[1].strip() if len(parts) > 1 else 'unspecified'
                  breakdown[reason] = breakdown.get(reason, 0) + 1
      except Exception:
          pass
      print(json.dumps(breakdown))
      " "$RUN_DIR/autodev-skipped.txt" 2>/dev/null || echo '{}')
      [ -z "$SKIPPED_BREAKDOWN" ] && SKIPPED_BREAKDOWN='{}'

      # ENH-2743: CLOSED_VIA_RECOVERY — a skipped/parked issue whose
      # working-tree status nonetheless reached `done` by finalize time (e.g.
      # ll-auto re-implemented it after the sprint queue released the lock).
      # $P-skipped-ids.txt derives bare IDs from the same "ID  REASON" ledger
      # SKIPPED_BREAKDOWN reads; comm -12 against $P-done-now.txt (the full
      # current done-set, not just this run's new closures) intersects the
      # two so a recovery is detected regardless of when it happened relative
      # to the done_baseline snapshot.
      awk '{print $1}' "$RUN_DIR/autodev-skipped.txt" 2>/dev/null \
        | sort -u > "$RUN_DIR/$P-skipped-ids.txt"
      comm -12 "$RUN_DIR/$P-skipped-ids.txt" "$RUN_DIR/$P-done-now.txt" \
        2>/dev/null > "$RUN_DIR/$P-closed-via-recovery.txt" || true
      CLOSED_VIA_RECOVERY=$(count $P-closed-via-recovery.txt)

      # ENH-2404: PARKED_RATE is a visibility signal, NOT a blocking gate —
      # with skipped_breakdown present, a high rate interprets itself (e.g.
      # "4 low_readiness" is actionable, "4 decomposed" is healthy).
      # ENH-2615: with per-dispatch re-resolution the captured issue_set holds
      # only the LAST batch, so the cumulative dispatched ledger is the real
      # denominator; fall back to the capture when the ledger is absent.
      if [ -s "$RUN_DIR/auto-refine-and-implement-dispatched.txt" ]; then
        INPUT_SIZE=$(sort -u "$RUN_DIR/auto-refine-and-implement-dispatched.txt" \
          | grep -c '[^[:space:]]' 2>/dev/null || echo 0)
      else
        INPUT_SIZE=$(printf '%s' "${captured.issue_set.output}" | tr ',' '\n' \
          | grep -c '[^[:space:]]' 2>/dev/null || echo 0)
      fi
      if [ "$INPUT_SIZE" -gt 0 ]; then
        PARKED_RATE=$(python3 -c "print(round(($SKIP + $NOT_CLOSED + $GATE_BLOCKED + $DECISION_UNRESOLVED + $INFLIGHT_UNRESOLVED + $ABANDONED) / $INPUT_SIZE, 4))" 2>/dev/null || echo 0.0)
      else
        PARKED_RATE=0.0
      fi

      # ENH-2601: VERIFY_VERDICT is sourced from the verify state's artifact
      # (passed/failed/skipped) — "not_run" when verify never ran (e.g. the
      # resolve_set on_no/on_error path skipped straight to finalize with no
      # delegate/verify pass at all).
      VERIFY_VERDICT=$(cat "$RUN_DIR/verify-verdict.txt" 2>/dev/null || echo "not_run")

      # ENH-2631: the verify state persists the failing process exit code to
      # verify-returncode.txt (flat text, Option A). Surface it as a JSON number
      # so a `verify_verdict: failed` run is triageable without a re-run — 1 =
      # tests failed, 2 = collection/usage error (verdict class collection_error).
      # Defaults to `null` when absent (passed/skipped/not_run leave no file, or
      # only the verdict was seeded). The value is a bare integer we control, so
      # embedding it unquoted in the summary.json printf is safe (unlike an
      # arbitrary-text detail field — see the ENH-2631 decision rationale, which
      # keeps the detail snippet in verify-detail.txt out of the JSON entirely).
      VERIFY_RETURNCODE=$(cat "$RUN_DIR/verify-returncode.txt" 2>/dev/null || echo "null")
      case "$VERIFY_RETURNCODE" in
        ''|*[!0-9-]*) VERIFY_RETURNCODE=null ;;
      esac

      # BUG-2614: EPIC_MERGE_VERDICT is sourced from merge_epic_branch's
      # artifact (merged/pr_opened/held_open/verify_failed/merge_failed/
      # skipped) — "not_run" when merge_epic_branch never ran (e.g. the
      # record_error crash path routes straight to finalize). Advisory only,
      # same as VERIFY_VERDICT — does not gate finalize's own closure verdict.
      EPIC_MERGE_VERDICT=$(cat "$RUN_DIR/epic-merge-verdict.txt" 2>/dev/null || echo "not_run")

      # Verdict reflects real closure. A run is only 'success' when it closed
      # something and left nothing parked (no skips, no not-closed, no crash).
      # ENH-2657: an abandoned queue takes precedence over every closed>0 bucket —
      # a run that closed 1 and abandoned 18 is misleading as `partial`, so it
      # gets its own compound verdict (Option B, mirroring ENH-2376's
      # partial-with-errors) that names the abandonment and diverts to incomplete
      # regardless of CLOSED. A genuinely drained queue leaves ABANDONED=0.
      if [ "$ABANDONED" -gt 0 ]; then
        VERDICT=incomplete-abandoned
      elif [ "$CLOSED" -gt 0 ] && [ "$ERR" -eq 0 ] && [ "$SKIP" -eq 0 ] && [ "$NOT_CLOSED" -eq 0 ]; then
        VERDICT=success
      elif [ "$CLOSED" -gt 0 ] && [ "$ERR" -gt 0 ]; then
        # ENH-2376: closed something AND crashed — distinct from a clean partial.
        VERDICT=partial-with-errors
      elif [ "$CLOSED" -gt 0 ]; then
        VERDICT=partial
      elif [ "$ERR" -gt 0 ] || [ "$NOT_CLOSED" -gt 0 ] || [ "$INFLIGHT_UNRESOLVED" -gt 0 ]; then
        # Attempted work but closed nothing — not a benign no-op. BUG-2636: a
        # dispatched issue left in-flight counts here, so it can no longer hide as
        # a no-op.
        VERDICT=phantom
      else
        VERDICT=no-op
      fi

      printf '{"verdict":"%s","closed":%s,"not_closed":%s,"skipped":%s,"errored":%s,"skipped_breakdown":%s,"closed_via_recovery":%s,"gate_blocked":%s,"decision_unresolved":%s,"inflight_unresolved":%s,"abandoned":%s,"parked_rate":%s,"verify_verdict":"%s","verify_returncode":%s,"epic_merge_verdict":"%s"}\n' \
        "$VERDICT" "$CLOSED" "$NOT_CLOSED" "$SKIP" "$ERR" "$SKIPPED_BREAKDOWN" "$CLOSED_VIA_RECOVERY" "$GATE_BLOCKED" "$DECISION_UNRESOLVED" "$INFLIGHT_UNRESOLVED" "$ABANDONED" "$PARKED_RATE" "$VERIFY_VERDICT" "$VERIFY_RETURNCODE" "$EPIC_MERGE_VERDICT" > "$RUN_DIR/summary.json"
      # ENH-2005 artifact-channel sidecar: a parent loop (e.g.
      # sprint-refine-and-implement) recovers the real verdict from this token
      # rather than the collapsed done/failed routing verdict.
      printf '%s\n' "$VERDICT" > "$RUN_DIR/subloop_outcome_auto-refine-and-implement.txt"
      printf '%s: verdict=%s closed=%s not_closed=%s skipped=%s errored=%s closed_via_recovery=%s gate_blocked=%s decision_unresolved=%s inflight_unresolved=%s abandoned=%s parked_rate=%s verify_verdict=%s epic_merge_verdict=%s\n' \
        "$P" "$VERDICT" "$CLOSED" "$NOT_CLOSED" "$SKIP" "$ERR" "$CLOSED_VIA_RECOVERY" "$GATE_BLOCKED" "$DECISION_UNRESOLVED" "$INFLIGHT_UNRESOLVED" "$ABANDONED" "$PARKED_RATE" "$VERIFY_VERDICT" "$EPIC_MERGE_VERDICT"

      # BUG-2636: route the FSM terminal on the REAL outcome, not just "reached the
      # end". `ll-loop` derives success purely from the terminal state's NAME —
      # any terminal != `done` renders orange and surfaces this state's stdout as
      # the failure reason (cli/loop/_helpers.py `_is_success`). Previously
      # finalize unconditionally routed to `done`, so a phantom run (attempted
      # work, closed nothing, left issues parked/not-closed/in-flight/errored)
      # reported green "done" — the exact mis-signal behind run 20260713T190717.
      # success/partial/partial-with-errors (real progress) and a genuine
      # empty-backlog no-op stay `done`; only `phantom` diverts to `incomplete`.
      # ENH-2657: incomplete-abandoned joins phantom on the exit-1 → incomplete
      # route so an abandoned-queue run never renders green `done`.
      case "$VERDICT" in
        phantom|incomplete-abandoned) exit 1 ;;
        *) exit 0 ;;
      esac
    fragment: shell_exit
    on_yes: done
    on_no: incomplete
    on_error: incomplete

  done:
    terminal: true

  incomplete:
    # BUG-2636: non-success terminal for phantom runs. Reached only when finalize
    # exits non-zero (verdict=phantom) or errors. Its own stdout is redundant with
    # the failure reason `ll-loop` already surfaces from finalize's non-zero
    # action_complete, but a terminal message keeps standalone/log readers honest.
    # ENH-2657: also reached on verdict=incomplete-abandoned — autodev hit its
    # timeout/max_steps mid-drain and left issues in autodev-queue.txt that were
    # never refined/implemented/parked. The abandoned count and the residual-ID
    # artifact are in summary.json / auto-refine-and-implement-abandoned.txt so a
    # re-run to drain the remainder is obvious.
    action: |
      echo "auto-refine-and-implement: incomplete — see summary.json verdict. phantom: dispatched work closed nothing (parked / not-closed / in-flight / errored). incomplete-abandoned: autodev abandoned N issues left in autodev-queue.txt at timeout/max_steps (see the 'abandoned' count and auto-refine-and-implement-abandoned.txt); re-run to drain the remainder. Re-run after resolving blockers."
    action_type: shell
    terminal: true
