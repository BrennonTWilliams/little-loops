name: dead-code-cleanup
category: code-quality
description: |
  Find dead code, remove high-confidence items, and verify tests pass after
  each removal. Scans for unused imports, functions, and variables, removes
  the most confident items, and loops until clean or count stops decreasing.
initial: scan
scope:
  - "scripts/"
import:
  - lib/common.yaml
  - lib/prompt-fragments.yaml
context:
  commit_message: "refactor: remove dead code identified by scan"
states:
  scan:
    action_type: prompt
    timeout: 300
    action: |
      Run `/ll:find-dead-code` to scan for unused code in the codebase.
      Save findings to ${context.run_dir}/ll-dead-code-report.txt. Focus on:
      - Unused imports
      - Unreferenced functions and classes
      - Dead variables and constants

      If ${context.run_dir}/ll-dead-code-excluded.txt exists, filter out any items listed
      there — those were previously reverted because removal broke tests.
      (To retry excluded items in a fresh run, delete ${context.run_dir}/ll-dead-code-excluded.txt first.)
    capture: scan_results
    next: count_findings
  count_findings:
    action: |
      REPORT="${context.run_dir}/ll-dead-code-report.txt"
      if [ -f "$REPORT" ]; then
        COUNT=$(grep -c '^[[:space:]]*-' "$REPORT" 2>/dev/null || echo 0)
      else
        COUNT=0
      fi
      echo "{\"count\": $COUNT}"
    action_type: shell
    capture: finding_count
    evaluate:
      type: output_json
      path: ".count"
      operator: eq
      target: 0
    on_yes: done
    on_no: remove_code
    on_error: done
  remove_code:
    action_type: prompt
    timeout: 600
    action: |
      Dead code scan results:
      ${captured.scan_results.output}

      Remove the top 3 highest-confidence dead code items. For each:
      1. Verify the code is truly unused (check for dynamic references)
      2. Remove the dead code
      3. Remove any imports that become unused after removal

      Do NOT remove code that might be used via:
      - Dynamic dispatch / getattr
      - Plugin registration
      - Public API contracts
    next: verify_tests
  verify_tests:
    fragment: shell_exit
    timeout: 600
    action: |
      CMD=$(python3 -c "
      import json, pathlib
      p = pathlib.Path('.ll/ll-config.json')
      cfg = json.loads(p.read_text()) if p.exists() else {}
      raw = cfg.get('project', {}).get('test_cmd')
      print(raw if raw else 'pytest')
      ")
      set -o pipefail
      eval "$CMD" 2>&1 | tee ${context.run_dir}/ll-dead-code-tests.txt
    on_yes: commit
    on_no: revert_and_scan
    on_error: revert_and_scan
  revert_and_scan:
    action_type: prompt
    timeout: 120
    action: |
      Tests failed after dead code removal. Read ${context.run_dir}/ll-dead-code-tests.txt
      to see the failures.

      Revert the most recent dead code removal that caused the failure using
      `git checkout -- <file>`.

      Then append the reverted item (function/class/import name and file path)
      to ${context.run_dir}/ll-dead-code-excluded.txt (one item per line) so future scan
      cycles skip it.
    next: scan
  commit:
    fragment: ll_commit
    next: scan
  done:
    terminal: true
max_steps: 15
timeout: 5400
on_handoff: spawn
