name: rn-implement
category: planning
description: |
  Queue orchestrator for recursive plan-and-implement. Manages a depth-bounded
  issue queue, delegating per-issue remediation to rn-remediate and decomposition
  to rn-decompose. Domain logic (diagnosis, dimensional routing, convergence
  detection) lives in the delegated sub-loops.

  Run as: ll-loop run rn-implement "<issue-id>"

  Architecture:
  - Queue lifecycle: init → dequeue → depth gate → sub-loop delegation → repeat
  - Remediation: delegates to rn-remediate (diagnose → remediate → converge)
  - Decomposition: delegates to rn-decompose (size review → child detection →
    enqueue with cycle detection)
  - Terminal: report state writes summary before bare done anchor (avoids
    terminal-state caveat where actions on terminal states are skipped)
initial: init
max_steps: 500
timeout: 28800
on_handoff: spawn
context:
  readiness_threshold: 85
  outcome_threshold: 75
  max_depth: 3
  max_remediation_passes: 3
  # ENH-1977 Fix 3: resume support. Re-run a killed loop against its prior run
  # directory without re-seeding the queue:
  #   ll-loop run rn-implement --context resume=1 --context run_dir=<prior_run_dir>
  resume: ""
  # FEAT-1991: "fifo" (default) preserves existing FIFO pop. "value_ranked" selects
  # the highest-value ready issue at each tick using dependency-readiness + impact/effort.
  schedule_mode: "fifo"
import:
  - lib/common.yaml
meta_self_eval_ok: false
shared_state_ok: false
partial_route_ok: true

states:
  # =========================================================================
  # Phase 1: Foundation — Init & Queue Management
  # =========================================================================

  init:
    action_type: shell
    action: |
      INPUT="${context.input}"
      if [ -z "$INPUT" ]; then
        echo "ERROR: No input provided. Pass an issue ID as argument."
        exit 1
      fi
      RUN_DIR="${context.run_dir}"
      mkdir -p "$RUN_DIR"

      # ENH-1977 Fix 3: resume path — if resume is requested and a non-empty
      # queue survives in the run_dir, preserve queue/visited/depth_map/counters
      # instead of re-seeding and truncating them.
      RESUME="${context.resume}"
      if [ -n "$RESUME" ] && [ -s "$RUN_DIR/queue.txt" ]; then
        QUEUE_COUNT=$(wc -l < "$RUN_DIR/queue.txt" | tr -d ' ')
        echo "Resuming run in $RUN_DIR with $QUEUE_COUNT queued issue(s)" >&2
        echo "$RUN_DIR"
        exit 0
      fi

      # Seed queue with input (support comma-separated list)
      echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | grep -v '^$' > "$RUN_DIR/queue_raw.txt"

      # BUG-2003 Layer 1: normalize each ID to its canonical TYPE-NNN form before
      # seeding the queue. A stale/mismatched type prefix (e.g. FEAT-1903 for a file
      # named ENH-1903) and cross-type duplicate refs collapse to one identity, so
      # the visited-set / cycle detection keys on a single canonical ID downstream.
      : > "$RUN_DIR/queue.txt"
      while IFS= read -r raw_id; do
        [ -z "$raw_id" ] && continue
        resolved=$(ll-issues path "$raw_id" 2>/dev/null)
        if [ -n "$resolved" ]; then
          canon=$(basename "$resolved" | grep -oE '(BUG|FEAT|ENH|EPIC)-[0-9]+' | head -1)
          echo "$${canon:-$raw_id}" >> "$RUN_DIR/queue.txt"
        else
          # Unresolvable now -> keep raw so existing downstream error handling fires.
          echo "$raw_id" >> "$RUN_DIR/queue.txt"
        fi
      done < "$RUN_DIR/queue_raw.txt"
      rm -f "$RUN_DIR/queue_raw.txt"
      QUEUE_COUNT=$(wc -l < "$RUN_DIR/queue.txt" | tr -d ' ')
      if [ "$QUEUE_COUNT" -eq 0 ]; then
        echo "ERROR: No valid issue IDs parsed from input: $INPUT"
        exit 1
      fi

      # Initialize tracking files
      : > "$RUN_DIR/visited.txt"
      : > "$RUN_DIR/depth_capped.txt"
      : > "$RUN_DIR/skipped.txt"
      : > "$RUN_DIR/deferred.txt"
      : > "$RUN_DIR/blocked.txt"
      : > "$RUN_DIR/cycles.txt"
      : > "$RUN_DIR/rate_limits.txt"
      : > "$RUN_DIR/failures.txt"
      : > "$RUN_DIR/timeouts.txt"

      # Initialize counters
      echo "0" > "$RUN_DIR/dequeue_count.txt"
      echo "0" > "$RUN_DIR/implemented_count.txt"
      echo "0" > "$RUN_DIR/decomposed_count.txt"

      # Write config snapshot
      printf '{"readiness_threshold":%s,"outcome_threshold":%s,"max_depth":%s,"max_remediation_passes":%s}\n' \
        "${context.readiness_threshold}" "${context.outcome_threshold}" \
        "${context.max_depth}" "${context.max_remediation_passes}" \
        > "$RUN_DIR/config.json"

      echo "Queue seeded with $QUEUE_COUNT issue(s)" >&2
      echo "$RUN_DIR"
    capture: run_dir
    on_yes: dequeue_next
    on_no: failed
    on_error: failed

  dequeue_next:
    # FEAT-1991: mode dispatch — routes to fifo_pop (default) or select_next (value_ranked).
    # All downstream states that loop back to dequeue_next continue to target this state so
    # the schedule_mode is re-evaluated at every tick.
    action_type: shell
    action: |
      test "${context.schedule_mode}" = "value_ranked" && exit 0 || exit 1
    evaluate:
      type: exit_code
    on_yes: select_next
    on_no: fifo_pop
    on_error: fifo_pop

  fifo_pop:
    # Original FIFO pop — unchanged behavior for schedule_mode: fifo (the default).
    # Uses output_contains instead of exit_code so an empty queue exits 0 (QUEUE_EMPTY
    # token) and doesn't produce false-positive exit_code!=0 signals in telemetry.
    fragment: queue_pop
    action: |
      QUEUE="${captured.run_dir.output}/queue.txt"
      if [ ! -f "$QUEUE" ] || [ ! -s "$QUEUE" ]; then
        echo "QUEUE_EMPTY"
        exit 0
      fi
      CURRENT=$(head -1 "$QUEUE")
      tail -n +2 "$QUEUE" > "$QUEUE.tmp" && mv "$QUEUE.tmp" "$QUEUE"

      # Read depth for this issue (from depth_map.txt or default 0)
      DEPTH_MAP="${captured.run_dir.output}/depth_map.txt"
      DEPTH=$(grep "^$CURRENT " "$DEPTH_MAP" 2>/dev/null | awk '{print $2}')
      DEPTH=$${DEPTH:-0}
      echo "$DEPTH" > "${captured.run_dir.output}/current_depth.txt"

      # Mark as visited
      echo "$CURRENT" >> "${captured.run_dir.output}/visited.txt"

      # Increment dequeue count
      COUNT=$(cat "${captured.run_dir.output}/dequeue_count.txt" 2>/dev/null || echo 0)
      echo $((COUNT + 1)) > "${captured.run_dir.output}/dequeue_count.txt"

      echo "$CURRENT"
    evaluate:
      type: output_contains
      pattern: "QUEUE_EMPTY"
    capture: input
    # ENH-2008: gate on blocked_by frontmatter before scoring (was check_depth)
    on_yes: report
    on_no: check_blocked_by
    on_error: report

  select_next:
    # FEAT-1991: value-ranked dequeue for schedule_mode: value_ranked.
    # Computes ready set (blocked_by deps all done, not in blocked.txt), ranks by composite
    # score (priority weight + impact/effort ratio), depth-first tie-break. Post-conditions
    # are identical to fifo_pop so downstream states are unchanged.
    # Uses output_contains (same as fifo_pop) so an empty queue exits 0 with QUEUE_EMPTY
    # rather than exit 1, avoiding false-positive telemetry signals.
    fragment: queue_pop
    action: |
      QUEUE="${captured.run_dir.output}/queue.txt"
      if [ ! -f "$QUEUE" ] || [ ! -s "$QUEUE" ]; then
        echo "QUEUE_EMPTY"
        exit 0
      fi

      # Python selects the highest-value ready issue from the queue.
      # Note: all Python lines are indented to the YAML block-scalar level; YAML
      # strips the common prefix so the Python interpreter sees column-0 code.
      CHOSEN=$(python3 << 'PYEOF'
      import os, re, subprocess, json, sys
      from pathlib import Path
      try:
          import yaml as _yaml
          def _parse_yaml(text):
              return _yaml.safe_load(text) or {}
      except ImportError:
          def _parse_yaml(text):
              result = {}
              for line in text.splitlines():
                  m = re.match(r'^([\w-]+):\s*(.*)', line)
                  if m:
                      result[m.group(1)] = m.group(2).strip()
              return result

      run_dir = "${captured.run_dir.output}"
      queue_path = os.path.join(run_dir, "queue.txt")
      blocked_path = os.path.join(run_dir, "blocked.txt")
      depth_path = os.path.join(run_dir, "depth_map.txt")

      queue_lines = [l.strip() for l in open(queue_path).readlines() if l.strip()]
      if not queue_lines:
          sys.exit(1)

      blocked = set()
      if os.path.exists(blocked_path):
          blocked = {l.strip() for l in open(blocked_path).readlines() if l.strip()}

      depth_map = {}
      if os.path.exists(depth_path):
          for line in open(depth_path).readlines():
              parts = line.strip().split()
              if len(parts) >= 2:
                  try:
                      depth_map[parts[0]] = int(parts[1])
                  except ValueError:
                      pass

      issue_idx = {}
      for d in (".issues/bugs", ".issues/features", ".issues/enhancements", ".issues/epics"):
          dp = Path(d)
          if not dp.exists():
              continue
          for p in dp.glob("*.md"):
              m = re.match(r'P\d-([A-Z]+-\d+)-', p.name)
              if m:
                  issue_idx[m.group(1)] = p

      def get_frontmatter(issue_id):
          p = issue_idx.get(issue_id)
          if not p or not p.exists():
              return {}
          try:
              content = p.read_text()
              m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              return _parse_yaml(m.group(1)) if m else {}
          except Exception:
              return {}

      def get_blocked_by(fm):
          val = fm.get("blocked_by") or []
          if isinstance(val, str):
              return [v.strip() for v in val.split(",") if v.strip()]
          return [str(v).strip() for v in (val if isinstance(val, list) else []) if v]

      done_ids = set()
      try:
          r = subprocess.run(
              ["ll-issues", "list", "--json", "--status", "done"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
      except Exception:
          pass

      ie_map = {}
      try:
          r = subprocess.run(
              ["ll-issues", "impact-effort", "--json"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              for items in json.loads(r.stdout).values():
                  if isinstance(items, list):
                      for item in items:
                          if "id" in item:
                              ie_map[item["id"]] = {
                                  "impact": item.get("impact", 2),
                                  "effort": item.get("effort", 2),
                              }
      except Exception:
          pass

      PRIO_WEIGHT = {"P0": 100, "P1": 80, "P2": 60, "P3": 40, "P4": 20, "P5": 10}

      def composite_score(issue_id, priority, depth):
          pw = PRIO_WEIGHT.get(priority, 40)
          v = ie_map.get(issue_id, {"impact": 2, "effort": 2})
          ie_ratio = v["impact"] / max(v["effort"], 1)
          depth_bonus = depth * 0.001
          return pw + ie_ratio * 10 + depth_bonus

      candidates = []
      for issue_id in queue_lines:
          if issue_id in blocked:
              continue
          fm = get_frontmatter(issue_id)
          deps = get_blocked_by(fm)
          if not all(d in done_ids for d in deps):
              continue
          priority = fm.get("priority", "P3")
          depth = depth_map.get(issue_id, 0)
          candidates.append((composite_score(issue_id, priority, depth), issue_id))

      if not candidates:
          sys.exit(1)

      candidates.sort(key=lambda x: -x[0])
      print(candidates[0][1])
      PYEOF
      )

      if [ -z "$CHOSEN" ]; then
        echo "QUEUE_EMPTY"
        exit 0
      fi

      # Remove chosen issue from queue (not necessarily the head)
      grep -vxF "$CHOSEN" "$QUEUE" > "$QUEUE.tmp" && mv "$QUEUE.tmp" "$QUEUE"

      # Read depth for chosen issue
      DEPTH_MAP="${captured.run_dir.output}/depth_map.txt"
      DEPTH=$(grep "^$CHOSEN " "$DEPTH_MAP" 2>/dev/null | awk '{print $2}')
      DEPTH=$${DEPTH:-0}
      echo "$DEPTH" > "${captured.run_dir.output}/current_depth.txt"

      # Mark as visited
      echo "$CHOSEN" >> "${captured.run_dir.output}/visited.txt"

      # Increment dequeue count
      COUNT=$(cat "${captured.run_dir.output}/dequeue_count.txt" 2>/dev/null || echo 0)
      echo $((COUNT + 1)) > "${captured.run_dir.output}/dequeue_count.txt"

      echo "$CHOSEN"
    evaluate:
      type: output_contains
      pattern: "QUEUE_EMPTY"
    capture: input
    # ENH-2008: gate on blocked_by frontmatter before scoring (was check_depth).
    # select_next already filters unmet-dep issues from the ready set, so the gate
    # is a no-op here in practice — routed through it anyway for defense-in-depth
    # and parity with the FIFO path.
    on_yes: report
    on_no: check_blocked_by
    on_error: report

  check_blocked_by:
    # ENH-2008: cheap upfront gate. If the dequeued issue has unmet `blocked_by`
    # frontmatter deps (any blocker not yet `done`), defer it BEFORE scoring —
    # skipping run_remediation + run_decomposition, which can never move scores on a
    # structural blocker. This honors issue frontmatter in the per-issue route, not
    # just queue ordering (which is all select_next does).
    #
    # Note: deliberately parses the issue file's YAML frontmatter directly rather
    # than `ll-issues show --json` — the JSON projection does NOT expose blocked_by
    # (returns null). This mirrors select_next's get_frontmatter/get_blocked_by,
    # handling both list and comma-separated scalar forms.
    #
    # Fail-open: unresolved issue file, parse error, or an inability to compute the
    # done-set all yield no unmet deps -> READY -> check_depth. Processing is never
    # blocked on a gate error (on_error: check_depth covers shell-level failures too).
    action_type: shell
    action: |
      ID="${captured.input.output}"
      RUN_DIR="${captured.run_dir.output}"
      UNMET=$(python3 << 'PYEOF'
      import os, re, subprocess, json, sys
      from pathlib import Path
      try:
          import yaml as _yaml
          def _parse_yaml(text):
              return _yaml.safe_load(text) or {}
      except ImportError:
          def _parse_yaml(text):
              result = {}
              for line in text.splitlines():
                  m = re.match(r'^([\w-]+):\s*(.*)', line)
                  if m:
                      result[m.group(1)] = m.group(2).strip()
              return result

      issue_id = "${captured.input.output}"

      # Resolve the issue file across active category dirs (mirrors select_next's index)
      issue_path = None
      for d in (".issues/bugs", ".issues/features", ".issues/enhancements", ".issues/epics"):
          dp = Path(d)
          if not dp.exists():
              continue
          for p in dp.glob("*.md"):
              m = re.match(r'P\d-([A-Z]+-\d+)-', p.name)
              if m and m.group(1) == issue_id:
                  issue_path = p
                  break
          if issue_path:
              break

      if not issue_path:
          sys.exit(0)  # unresolved -> fail-open (let downstream handle)

      try:
          content = issue_path.read_text()
          m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
          fm = _parse_yaml(m.group(1)) if m else {}
      except Exception:
          sys.exit(0)  # parse error -> fail-open

      val = fm.get("blocked_by") or []
      if isinstance(val, str):
          deps = [v.strip() for v in val.split(",") if v.strip()]
      else:
          deps = [str(v).strip() for v in (val if isinstance(val, list) else []) if v]

      if not deps:
          sys.exit(0)  # no deps -> ready

      done_ids = set()
      try:
          r = subprocess.run(
              ["ll-issues", "list", "--json", "--status", "done"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
          else:
              sys.exit(0)  # cannot determine done set -> fail-open
      except Exception:
          sys.exit(0)  # fail-open

      unmet = [d for d in deps if d not in done_ids]
      if unmet:
          print(" ".join(unmet))
      PYEOF
      )
      if [ -n "$UNMET" ]; then
        echo "$UNMET" > "$RUN_DIR/blocked_by_unmet_$${ID}.txt"
        echo "[BLOCKED_BY] $ID has unmet deps:$UNMET"
        echo "BLOCKED"
      else
        echo "READY"
      fi
    capture: blocked_by_status
    next: route_blocked_by
    on_error: check_depth   # fail-open: never block processing on a gate error

  route_blocked_by:
    # ENH-2008: BLOCKED -> reuse BUG-2006's mark_deferred (which now names the
    # specific unmet dep). READY / any error -> proceed to check_depth.
    evaluate:
      type: output_contains
      source: "${captured.blocked_by_status.output}"
      pattern: "BLOCKED"
    on_yes: mark_deferred
    on_no: check_depth
    on_error: check_depth

  check_depth:
    action_type: shell
    action: |
      DEPTH=$(cat "${captured.run_dir.output}/current_depth.txt" 2>/dev/null || echo 0)
      echo "$DEPTH"
    evaluate:
      type: output_numeric
      operator: lt
      target: "${context.max_depth}"
    capture: current_depth
    on_yes: check_issue_status
    on_no: mark_depth_capped
    on_error: check_issue_status

  check_issue_status:
    # BUG-2201: pre-flight gate before delegating to rn-remediate. If the issue
    # was completed out-of-band (e.g. by a continuation session that escaped its
    # scope), skip it immediately rather than re-entering rn-remediate and ll-auto.
    # Fail-open: unresolved path, parse error, or a missing status field all yield
    # NEEDS_IMPLEMENTATION so processing is never blocked on a gate error.
    action_type: shell
    action: |
      ID="${captured.input.output}"
      ISSUE_FILE=$(ll-issues path "$ID" 2>/dev/null)
      STATUS="open"
      if [ -n "$ISSUE_FILE" ]; then
        STATUS=$(grep '^status:' "$ISSUE_FILE" | awk '{print $2}' | tr -d "'\"" 2>/dev/null || echo "open")
      fi
      if [ "$STATUS" = "done" ] || [ "$STATUS" = "cancelled" ]; then
        echo "ALREADY_DONE"
      else
        echo "NEEDS_IMPLEMENTATION"
      fi
    evaluate:
      type: output_contains
      pattern: "ALREADY_DONE"
    on_yes: skip_issue
    on_no: run_remediation
    on_error: run_remediation

  mark_depth_capped:
    action_type: shell
    action: |
      CURRENT="${captured.input.output}"
      DEPTH=$(cat "${captured.run_dir.output}/current_depth.txt" 2>/dev/null || echo 0)
      echo "$CURRENT (depth=$DEPTH)" >> "${captured.run_dir.output}/depth_capped.txt"
      echo "[DEPTH_CAPPED] $CURRENT (depth=$DEPTH)"
    next: dequeue_next

  # =========================================================================
  # Phase 2: Sub-Loop Delegation
  # =========================================================================

  run_remediation:
    # ENH-1977 Fix 1: the outcome token written by rn-remediate — not the bare
    # done/failed verdict — decides the next step. The old dead
    # on_rate_limit_exhausted route is removed (a loop child can never yield a
    # rate-limit verdict; RATE_LIMITED now arrives via the token channel).
    #
    # ENH-2005: on_success == on_failure is INTENTIONAL sidecar routing, not
    # verdict laundering. The child's real outcome is read from
    # subloop_outcome_<ID>.txt by classify_remediation, so collapsing the
    # done/failed verdict here is by design. on_error is NOT collapsed: an
    # infrastructure crash/timeout can fire before the child writes its token,
    # so it routes to record_sub_loop_crash instead of being laundered into
    # IMPLEMENT_FAILED by the classifier's `|| echo` fallback.
    loop: rn-remediate
    with:
      issue_id: "${captured.input.output}"
      readiness_threshold: "${context.readiness_threshold}"
      outcome_threshold: "${context.outcome_threshold}"
      max_remediation_passes: "${context.max_remediation_passes}"
      run_dir: "${captured.run_dir.output}"
    on_success: classify_remediation
    on_failure: classify_remediation
    on_error: record_sub_loop_crash   # ENH-2005: crash ≠ implementation failure

  classify_remediation:
    action_type: shell
    action: |
      cat "${captured.run_dir.output}/subloop_outcome_${captured.input.output}.txt" 2>/dev/null \
        || echo "IMPLEMENT_FAILED"
    capture: rem_outcome
    next: route_rem_implemented

  route_rem_implemented:
    evaluate:
      type: output_contains
      source: "${captured.rem_outcome.output}"
      pattern: "IMPLEMENTED"
    on_yes: re_enqueue_unblocked
    on_no: route_rem_decompose
    on_error: record_failure

  re_enqueue_unblocked:
    # ENH-2195: after a successful implementation, scan deferred.txt for issues
    # whose blocked_by deps are now all done and re-add them to queue.txt so they
    # are processed in the same run without a second invocation.
    #
    # deferred.txt format: "<ID>  <REASON>" (two-space separator).
    # Only re-enqueues issues that have a non-empty blocked_by list — stalled
    # remediations with no blocked_by deps are left deferred (not re-enqueued).
    # Fail-open per-issue: if the done-set cannot be queried, the issue stays in
    # deferred.txt (mirrors check_blocked_by fail-open philosophy).
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      DEFERRED="$RUN_DIR/deferred.txt"
      QUEUE="$RUN_DIR/queue.txt"
      if [ ! -s "$DEFERRED" ]; then
        echo "0"
        exit 0
      fi
      NEW_DEFERRED="$RUN_DIR/deferred.tmp"
      : > "$NEW_DEFERRED"
      ADDED=0
      while IFS= read -r line; do
        [ -z "$line" ] && continue
        ID=$(echo "$line" | awk '{print $1}')
        [ -z "$ID" ] && continue
        REASON=$(echo "$line" | cut -d' ' -f2-)
        if ! echo "$REASON" | grep -q "blocked_by"; then
          echo "$line" >> "$NEW_DEFERRED"
          continue
        fi
        export _REQUEUE_ID="$ID"
        UNMET=$(python3 << 'PYEOF'
      import os, re, subprocess, json, sys
      from pathlib import Path
      try:
          import yaml as _yaml
          def _parse_yaml(text):
              return _yaml.safe_load(text) or {}
      except ImportError:
          def _parse_yaml(text):
              result = {}
              for line in text.splitlines():
                  m = re.match(r'^([\w-]+):\s*(.*)', line)
                  if m:
                      result[m.group(1)] = m.group(2).strip()
              return result

      issue_id = os.environ.get("_REQUEUE_ID", "")
      if not issue_id:
          sys.exit(0)

      issue_path = None
      for d in (".issues/bugs", ".issues/features", ".issues/enhancements", ".issues/epics"):
          dp = Path(d)
          if not dp.exists():
              continue
          for p in dp.glob("*.md"):
              m = re.match(r'P\d-([A-Z]+-\d+)-', p.name)
              if m and m.group(1) == issue_id:
                  issue_path = p
                  break
          if issue_path:
              break

      if not issue_path:
          print("UNRESOLVED")
          sys.exit(0)

      try:
          content = issue_path.read_text()
          m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
          fm = _parse_yaml(m.group(1)) if m else {}
      except Exception:
          print("PARSE_ERROR")
          sys.exit(0)

      val = fm.get("blocked_by") or []
      if isinstance(val, str):
          deps = [v.strip() for v in val.split(",") if v.strip()]
      else:
          deps = [str(v).strip() for v in (val if isinstance(val, list) else []) if v]

      if not deps:
          print("NO_BLOCKED_BY")
          sys.exit(0)

      done_ids = set()
      try:
          r = subprocess.run(
              ["ll-issues", "list", "--json", "--status", "done"],
              capture_output=True, text=True, timeout=30,
          )
          if r.returncode == 0:
              done_ids = {i["id"] for i in json.loads(r.stdout) if "id" in i}
          else:
              print("DONE_SET_ERROR")
              sys.exit(0)
      except Exception:
          print("DONE_SET_ERROR")
          sys.exit(0)

      unmet = [d for d in deps if d not in done_ids]
      if unmet:
          print(" ".join(unmet))
      PYEOF
        )
        if [ -z "$UNMET" ]; then
          { echo "$ID"; cat "$QUEUE"; } > "$QUEUE.tmp" && mv "$QUEUE.tmp" "$QUEUE"
          ADDED=$((ADDED + 1))
          echo "[RE_ENQUEUE] $ID unblocked, re-added to queue" >&2
        else
          echo "$line" >> "$NEW_DEFERRED"
        fi
      done < "$DEFERRED"
      mv "$NEW_DEFERRED" "$DEFERRED"
      echo "$ADDED"
    next: dequeue_next

  route_rem_decompose:
    evaluate:
      type: output_contains
      source: "${captured.rem_outcome.output}"
      pattern: "NEEDS_DECOMPOSE"
    on_yes: run_decomposition
    on_no: route_rem_manual_review
    on_error: record_failure

  route_rem_manual_review:
    evaluate:
      type: output_contains
      source: "${captured.rem_outcome.output}"
      pattern: "MANUAL_REVIEW_NEEDED"
    on_yes: mark_blocked
    on_no: route_rem_rate_limited
    on_error: record_failure

  route_rem_rate_limited:
    evaluate:
      type: output_contains
      source: "${captured.rem_outcome.output}"
      pattern: "RATE_LIMITED"
    on_yes: rate_limit_diagnostic
    on_no: route_rem_scores_missing
    on_error: route_rem_scores_missing

  route_rem_scores_missing:
    # Split SCORES_MISSING out of the generic record_failure bucket: it is a
    # diagnostic/tooling failure (confidence/outcome frontmatter unreadable after a
    # scoring pass), not a genuine implementation failure. Tagging it distinctly lets
    # operators triage scoring errors from real ll-auto failures. on_no falls through
    # to record_failure for the remaining IMPLEMENT_FAILED outcome.
    evaluate:
      type: output_contains
      source: "${captured.rem_outcome.output}"
      pattern: "SCORES_MISSING"
    on_yes: record_scores_missing
    on_no: record_failure   # genuine IMPLEMENT_FAILED → recorded failure
    on_error: record_failure

  run_decomposition:
    # ENH-2005: on_success == on_failure is INTENTIONAL sidecar routing — the
    # child's real outcome is read from subloop_outcome_<ID>.txt by
    # classify_decomposition, so collapsing the done/failed verdict is by
    # design (not verdict laundering). on_error is split out to
    # record_sub_loop_crash so an infrastructure crash/timeout (no outcome
    # token written) is attributed as a crash, not laundered into
    # SIZE_REVIEW_FAILED by the classifier's `|| echo` fallback.
    loop: rn-decompose
    with:
      issue_id: "${captured.input.output}"
      parent_depth: "${captured.current_depth.output}"
      run_dir: "${captured.run_dir.output}"
    on_success: classify_decomposition
    on_failure: classify_decomposition
    on_error: record_sub_loop_crash   # ENH-2005: crash ≠ size-review failure

  classify_decomposition:
    action_type: shell
    action: |
      cat "${captured.run_dir.output}/subloop_outcome_${captured.input.output}.txt" 2>/dev/null \
        || echo "SIZE_REVIEW_FAILED"
    capture: dec_outcome
    next: route_dec_decomposed

  route_dec_decomposed:
    evaluate:
      type: output_contains
      source: "${captured.dec_outcome.output}"
      pattern: "DECOMPOSED"
    on_yes: dequeue_next
    on_no: route_dec_no_children
    on_error: record_failure

  route_dec_no_children:
    evaluate:
      type: output_contains
      source: "${captured.dec_outcome.output}"
      pattern: "NO_CHILDREN"
    # BUG-2006: a NO_CHILDREN decline is no longer a flat skip. Disambiguate by
    # the remediation origin: a stall (CONVERGED_STALLED / budget-exhausted)
    # should defer with a reason and a status change; a genuinely-atomic
    # diagnose-DECOMPOSE decline still skips.
    on_yes: route_dec_stalled_origin
    on_no: route_dec_rate_limited
    on_error: record_failure

  route_dec_stalled_origin:
    # BUG-2006: distinguish "remediation stalled, then decompose declined" from
    # "issue is genuinely atomic/too-large, decompose declined". The stall paths
    # in rn-remediate emit STALLED_NEEDS_DECOMPOSE; the diagnose-DECOMPOSE path
    # emits plain NEEDS_DECOMPOSE. The retained rem_outcome capture tells them
    # apart. Match the more-specific token (STALLED_NEEDS_DECOMPOSE) so only true
    # stalls route to mark_deferred.
    evaluate:
      type: output_contains
      source: "${captured.rem_outcome.output}"
      pattern: "STALLED_NEEDS_DECOMPOSE"
    on_yes: mark_deferred
    on_no: skip_issue
    on_error: record_failure

  route_dec_rate_limited:
    evaluate:
      type: output_contains
      source: "${captured.dec_outcome.output}"
      pattern: "RATE_LIMITED"
    on_yes: rate_limit_diagnostic
    on_no: route_dec_size_review_failed
    on_error: route_dec_size_review_failed

  route_dec_size_review_failed:
    # Split SIZE_REVIEW_FAILED out of the generic record_failure bucket: it is a
    # diagnostic/tooling failure (/ll:issue-size-review errored or was inconclusive),
    # not a genuine decomposition/implementation failure. Tagging it distinctly lets
    # operators triage size-review errors from real failures.
    evaluate:
      type: output_contains
      source: "${captured.dec_outcome.output}"
      pattern: "SIZE_REVIEW_FAILED"
    on_yes: record_size_review_failed
    on_no: record_failure
    on_error: record_failure

  # =========================================================================
  # Phase 3: Skip, Failure & Diagnostic States
  # =========================================================================

  record_failure:
    # ENH-1977 Fix 1 (resolves C): genuine implement crashes / score errors /
    # size-review errors are counted as failures and do NOT trigger a
    # decomposition attempt.
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $${ID}" >> "${captured.run_dir.output}/failures.txt"
      echo "[FAILED] $ID recorded as an implementation failure"
    next: dequeue_next

  record_sub_loop_crash:
    # ENH-2005: a sub-loop on_error (crash / timeout / context-resolution
    # failure) can occur BEFORE the child writes its outcome token. Routing it
    # through classify_* would hit the `|| echo IMPLEMENT_FAILED` fallback and
    # silently mislabel an infrastructure failure as an implementation failure.
    # Record it as SUB_LOOP_CRASH in failures.txt so the line is distinguishable
    # from a clean IMPLEMENT_FAILED / SCORES_MISSING outcome for operator triage.
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $${ID} SUB_LOOP_CRASH" >> "${captured.run_dir.output}/failures.txt"
      echo "[SUB_LOOP_CRASH] $ID — sub-loop infrastructure failure (crash/timeout/context error)"
    next: dequeue_next

  record_scores_missing:
    # rn-remediate emitted SCORES_MISSING: confidence/outcome frontmatter could not
    # be read after a scoring pass. A diagnostic/tooling failure, distinct from a
    # genuine implementation failure — tag it (like SUB_LOOP_CRASH) so report tallies
    # it separately and operators can triage scoring errors from real failures.
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $${ID} SCORES_MISSING" >> "${captured.run_dir.output}/failures.txt"
      echo "[SCORES_MISSING] $ID — scores could not be read after remediation"
    next: dequeue_next

  record_size_review_failed:
    # rn-decompose emitted SIZE_REVIEW_FAILED: /ll:issue-size-review errored or was
    # inconclusive. Diagnostic, distinct from a real decomposition/implementation
    # failure — tag it so report tallies it separately for operator triage.
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $${ID} SIZE_REVIEW_FAILED" >> "${captured.run_dir.output}/failures.txt"
      echo "[SIZE_REVIEW_FAILED] $ID — size review errored or was inconclusive"
    next: dequeue_next

  mark_blocked:
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$ID" >> "${captured.run_dir.output}/blocked.txt"
      echo "[BLOCKED] $ID requires human decision before automation can proceed"
    next: dequeue_next

  mark_deferred:
    # BUG-2006: terminal state for an issue whose remediation stalled (scores did
    # not converge) AND decomposition declined to split it — the honest outcome is
    # "deferred, likely blocked on a dependency", not a silent skip. Records a
    # human-readable reason in deferred.txt and sets the issue's status frontmatter
    # so it re-surfaces naturally once its blocker clears. Follows the mark_blocked
    # pattern.
    #
    # ENH-2008: also the target for the upfront blocked_by gate. When
    # check_blocked_by deferred this issue it left blocked_by_unmet_<ID>.txt; use it
    # to name the specific unmet blocker(s) in the reason instead of the generic
    # stall message.
    action_type: shell
    action: |
      ID="${captured.input.output}"
      RUN_DIR="${captured.run_dir.output}"
      UNMET_FILE="$RUN_DIR/blocked_by_unmet_$${ID}.txt"
      if [ -f "$UNMET_FILE" ]; then
        UNMET=$(tr -s ' ' < "$UNMET_FILE" | sed 's/^ *//;s/ *$//')
        REASON="blocked_by $UNMET (not done)"
      else
        REASON="remediation stalled (scores did not converge across passes) and decomposition declined to split; likely blocked on a dependency or otherwise un-actionable by automation"
      fi
      echo "$ID  $REASON" >> "$RUN_DIR/deferred.txt"
      # Set issue status so it re-surfaces when the blocker clears
      ll-issues set-status "$ID" deferred 2>/dev/null || true
      echo "[DEFERRED] $ID — $REASON"
    next: dequeue_next

  skip_issue:
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$ID" >> "${captured.run_dir.output}/skipped.txt"
      echo "[SKIP] $ID"
    next: dequeue_next

  rate_limit_diagnostic:
    action_type: shell
    action: |
      ID="${captured.input.output}"
      echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") $${ID}" >> "${captured.run_dir.output}/rate_limits.txt"
      echo "[RATE_LIMIT] Skipping $ID due to rate limit exhaustion"
    next: dequeue_next

  # =========================================================================
  # Phase 4: Terminal States
  # =========================================================================

  report:
    # Pre-terminal report — writes summary before transitioning to the bare
    # terminal anchor. Exists as a separate state because the FSM runner skips
    # actions on terminal states (fires loop_complete immediately on routing
    # to a terminal without entering it).
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      DEQUEUE_COUNT=$(cat "$RUN_DIR/dequeue_count.txt" 2>/dev/null || echo 0)
      IMPLEMENTED=$(cat "$RUN_DIR/implemented_count.txt" 2>/dev/null || echo 0)
      DECOMPOSED=$(cat "$RUN_DIR/decomposed_count.txt" 2>/dev/null || echo 0)
      SKIPPED=$(wc -l < "$RUN_DIR/skipped.txt" 2>/dev/null | tr -d ' ' || echo 0)
      # BUG-2006: deferred ≠ skipped — issues that stalled and could not be
      # decomposed are recorded with a dependency reason and a status change.
      DEFERRED=$(wc -l < "$RUN_DIR/deferred.txt" 2>/dev/null | tr -d ' ' || echo 0)
      BLOCKED=$(wc -l < "$RUN_DIR/blocked.txt" 2>/dev/null | tr -d ' ' || echo 0)
      DEPTH_CAPPED=$(wc -l < "$RUN_DIR/depth_capped.txt" 2>/dev/null | tr -d ' ' || echo 0)
      # ENH-2005: failures.txt holds both genuine implementation failures and
      # sub-loop infrastructure crashes (tagged SUB_LOOP_CRASH). Tally them
      # separately so "failed" reflects only implementation failures and
      # operators can triage crashes distinctly.
      SUB_LOOP_CRASHES=$(grep -c "SUB_LOOP_CRASH" "$RUN_DIR/failures.txt" 2>/dev/null | tr -d ' ' || echo 0)
      # Diagnostic outcomes tagged into failures.txt — tally separately so "failed"
      # reflects only genuine implementation failures (operator triage).
      SCORES_MISSING=$(grep -c "SCORES_MISSING" "$RUN_DIR/failures.txt" 2>/dev/null | tr -d ' ' || echo 0)
      SIZE_REVIEW_FAILED=$(grep -c "SIZE_REVIEW_FAILED" "$RUN_DIR/failures.txt" 2>/dev/null | tr -d ' ' || echo 0)
      TOTAL_FAILURES=$(wc -l < "$RUN_DIR/failures.txt" 2>/dev/null | tr -d ' ' || echo 0)
      FAILURES=$((TOTAL_FAILURES - SUB_LOOP_CRASHES - SCORES_MISSING - SIZE_REVIEW_FAILED))
      RATE_LIMITED=$(wc -l < "$RUN_DIR/rate_limits.txt" 2>/dev/null | tr -d ' ' || echo 0)

      {
        printf '{\n'
        printf '  "total_processed": %s,\n' "$DEQUEUE_COUNT"
        printf '  "implemented": %s,\n' "$IMPLEMENTED"
        printf '  "decomposed": %s,\n' "$DECOMPOSED"
        printf '  "skipped": %s,\n' "$SKIPPED"
        printf '  "deferred": %s,\n' "$DEFERRED"
        printf '  "blocked": %s,\n' "$BLOCKED"
        printf '  "depth_capped": %s,\n' "$DEPTH_CAPPED"
        printf '  "failed": %s,\n' "$FAILURES"
        printf '  "sub_loop_crashes": %s,\n' "$SUB_LOOP_CRASHES"
        printf '  "scores_missing": %s,\n' "$SCORES_MISSING"
        printf '  "size_review_failed": %s,\n' "$SIZE_REVIEW_FAILED"
        printf '  "rate_limited": %s\n' "$RATE_LIMITED"
        printf '}\n'
      } > "$RUN_DIR/summary.json"

      echo "=== rn-implement Complete ==="
      echo "  Processed: $DEQUEUE_COUNT | Implemented: $IMPLEMENTED | Decomposed: $DECOMPOSED"
      echo "  Skipped: $SKIPPED | Deferred: $DEFERRED | Blocked: $BLOCKED | Depth-capped: $DEPTH_CAPPED | Failures: $FAILURES | Sub-loop crashes: $SUB_LOOP_CRASHES | Scores-missing: $SCORES_MISSING | Size-review-failed: $SIZE_REVIEW_FAILED | Rate-limited: $RATE_LIMITED"
      echo "  Summary written to: $RUN_DIR/summary.json"
    next: done

  done:
    # Terminal anchor — clean exit point with no action. Report is handled by
    # the preceding `report` state to work around the runner's terminal
    # short-circuit.
    terminal: true

  failed:
    # Bare terminal. ENH-1977 Fix 3: the previous checkpoint.json write was dead
    # weight — actions on terminal states are skipped by the runner, and there was
    # no resume entry point to consume it. Resume is now handled by the
    # resume-aware `init` (queue.txt survives in the run_dir); a killed run is
    # restarted with `--context resume=1 --context run_dir=<prior_run_dir>`.
    terminal: true
