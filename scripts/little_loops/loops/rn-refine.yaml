name: rn-refine
category: planning
input_key: plan_file
description: |
  Recursive-N refinement loop for an existing plan document. Accepts a path to
  a plan .md file, calibrates a 9-dimension scoring rubric to the plan's current
  state, then iteratively researches and refines until all dimensions reach
  VERY-HIGH or max_iterations is exhausted.
  Run as: ll-loop run rn-refine "path/to/plan.md"
scope:
  - "${context.plan_file}"
initial: init
max_iterations: 30
timeout: 7200
on_handoff: spawn
required_inputs: ["plan_file"]
artifact_versioning: true
import:
  - lib/common.yaml

context:
  plan_file: "" # populated from positional CLI arg via input_key: plan_file

states:
  init:
    # Setup phase — validate the source plan file exists, copy it into the
    # runner-injected run_dir, and initialize supporting files.
    action_type: shell
    action: |
      if [ ! -f "${context.plan_file}" ]; then
        echo "ERROR: Plan file not found: ${context.plan_file}"
        exit 1
      fi
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      cp "${context.plan_file}" "$DIR/plan.md"
      realpath "${context.plan_file}" > "$DIR/.source-path"
      : > "$DIR/plan-rubric.md"
      : > "$DIR/research.md"
      echo "$(pwd)/$DIR"
    capture: run_dir
    on_error: diagnose
    next: assess_existing

  assess_existing:
    # Rubric initialization — reads the copied plan.md and infers the task/goal
    # from its content. Scores all 9 dimensions at their ACTUAL current level
    # (not all-LOW) to reflect the plan's real quality. This is the key difference
    # from rn-plan's generate_rubric state, which always starts from all-LOW.
    action_type: prompt
    action: |
      Read the existing plan at ${captured.run_dir.output}/plan.md.

      Step 1: Infer the task and goal from the plan content. Do not ask the user —
      derive it from whatever title, objective, or goal statement appears in the plan.

      Step 2: Write the scoring rubric to ${captured.run_dir.output}/plan-rubric.md.
      Score each dimension at its ACTUAL current level based on the plan as written.
      Do NOT default all dimensions to LOW — calibrate each one to what the plan
      currently achieves.

      Use exactly this format:

      ```
      # Planning Rubric

      task: "<inferred task/goal from the plan>"

      ## Dimensions

      breadth: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Does the plan cover all relevant concerns, stakeholders, and edge cases?

      depth: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Are sub-steps sufficiently detailed and granular to be actionable without further clarification?

      complexity: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Is the plan's complexity calibrated to the task — neither over- nor under-engineered?

      clarity: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Is language unambiguous, specific, and free of vague directives like "handle X" or "ensure Y"?

      consistency: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Are steps non-contradictory? Are no concerns addressed twice with conflicting advice?

      logic_strategy: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Does the ordering and approach make sense? Is the strategy sound for this specific task?

      feasibility: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Are the steps achievable given realistic constraints (time, resources, skills, access)?

      testability: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Does the plan define clear success criteria and verification steps for each phase?

      risk_mitigation: <LOW|MEDIUM|HIGH|VERY-HIGH>
      # Are key risks identified with concrete contingencies or mitigation strategies?

      ## Aggregate

      score: <mean of all 9 dimension values on 1.00–4.00 scale>
      verdict: <ALL_VERY_HIGH if all 9 are VERY-HIGH, otherwise ITERATE>
      ```

      Scoring scale: LOW=1, MEDIUM=2, HIGH=3, VERY-HIGH=4.
      Update the aggregate score = mean of all dimension scores (1.00–4.00).
      If all 9 dimensions are already VERY-HIGH, set verdict: ALL_VERY_HIGH.
      Otherwise set verdict: ITERATE.
    next: classify_research

  classify_research:
    # Research classification — examines the task and current plan to decide what
    # type of research is most needed this iteration. Emits a single routing token.
    # The chained route_files → route_web router states dispatch based on this capture.
    action_type: prompt
    action: |
      Read the current plan at ${captured.run_dir.output}/plan.md and the rubric at
      ${captured.run_dir.output}/plan-rubric.md.

      Determine what type of research would most improve the plan on this iteration:

      - NEEDS_FILES: the plan references a codebase, local files, project structure, APIs,
        or any artifact that can be inspected with Read/Grep/Glob/Bash tools.
      - NEEDS_WEB: the plan involves external APIs, third-party libraries, current best
        practices, documentation, or any information that requires WebSearch/WebFetch.

      Pick the single most valuable research type for the lowest-scoring dimension.

      End your response with EXACTLY one of these tokens on its own line:
      NEEDS_FILES
      NEEDS_WEB
    capture: classification
    next: route_files

  route_files:
    # Router: dispatch to file research when classification captured NEEDS_FILES.
    evaluate:
      type: output_contains
      source: "${captured.classification.output}"
      pattern: "NEEDS_FILES"
    on_yes: research_files
    on_no: route_web
    on_error: synthesize

  route_web:
    # Router: dispatch to web research when classification captured NEEDS_WEB.
    # Falls back to research_files if neither token matched (unexpected output).
    evaluate:
      type: output_contains
      source: "${captured.classification.output}"
      pattern: "NEEDS_WEB"
    on_yes: research_web
    on_no: research_files
    on_error: synthesize

  research_files:
    # File research — uses Read, Grep, and Glob tools to inspect the local codebase
    # and gather concrete facts that improve plan accuracy and specificity.
    action_type: prompt
    action: |
      Read the current plan at ${captured.run_dir.output}/plan.md.
      The plan references local files, code, or project structure that should be verified.

      Use the Read, Grep, Glob, and Bash tools to:
      1. Locate and read the files most relevant to the lowest-scoring plan dimensions
      2. Verify that file paths, function names, module names, and APIs cited in the plan exist
      3. Discover related code that the plan should account for but does not currently mention
      4. Note specific line numbers, signatures, or patterns that should be referenced in the plan

      Write a research summary to ${captured.run_dir.output}/research.md using this format:

      ```
      # File Research Findings

      ## Verified References
      [facts confirmed in code — include file:line pointers]

      ## Gaps Found
      [things the plan claims that do not match reality, or missing context]

      ## New Discoveries
      [relevant code/structure not yet in the plan that should be included]
      ```
    next: synthesize

  research_web:
    # Web research — uses WebSearch and WebFetch tools to gather external information
    # such as API documentation, library capabilities, and current best practices.
    action_type: prompt
    action: |
      Read the current plan at ${captured.run_dir.output}/plan.md.
      The plan involves external technologies, APIs, or practices that require research.

      Use the WebSearch and WebFetch tools to:
      1. Look up documentation for the libraries, APIs, or services referenced in the plan
      2. Find current best practices for the lowest-scoring plan dimensions
      3. Identify known pitfalls, version constraints, or breaking changes relevant to the task
      4. Gather concrete examples, configuration snippets, or reference architectures

      Write a research summary to ${captured.run_dir.output}/research.md using this format:

      ```
      # Web Research Findings

      ## Key Documentation
      [relevant docs found, with source URLs]

      ## Best Practices
      [current recommendations that should be reflected in the plan]

      ## Pitfalls & Constraints
      [known issues, version requirements, or anti-patterns to avoid]
      ```
    next: synthesize

  synthesize:
    # Synthesis — merges research findings into an improved plan. Updates plan.md
    # in-place, incorporating all verified facts and new discoveries from research.md.
    action_type: prompt
    action: |
      Read all three files:
      - ${captured.run_dir.output}/plan.md — current plan to improve
      - ${captured.run_dir.output}/plan-rubric.md — scoring rubric with dimension criteria
      - ${captured.run_dir.output}/research.md — research findings from this iteration

      Rewrite ${captured.run_dir.output}/plan.md to produce a substantially improved plan:

      1. Address every gap and correction identified in research.md
      2. Promote bullet-point items to numbered, actionable steps where rubric dimension
         scores are LOW or MEDIUM (focus on depth and granularity first)
      3. Replace vague directives ("handle X", "ensure Y", "configure Z") with specific,
         concrete instructions
      4. Add missing concerns surfaced by research (breadth)
      5. Verify step ordering is logical and dependencies are explicit (logic_strategy)
      6. Remove duplicate or contradictory content (consistency)

      Overwrite ${captured.run_dir.output}/plan.md with the improved version.
      Preserve the task title and goal statement; replace everything else as needed.

      Step 7: Read ${captured.run_dir.output}/.source-path to get the absolute path
      of the original file the user passed in. Overwrite that file with the same
      improved plan content so the user's file is updated in-place — they should not
      need to copy anything from .loops/ to see the result.

      Step 8: After overwriting both plan files, update the task: field in
      ${captured.run_dir.output}/plan-rubric.md to reflect the corrected goal
      statement from the rewritten plan. Derive the new task value from the
      title, objective, or first goal statement in the just-written plan.md.
      Update only the task: line (format: task: "<double-quoted goal>"); preserve
      all ## Dimensions scores and the ## Aggregate section exactly as they are.
    next: snapshot

  snapshot:
    description: |
      Per-iteration plan versioning — copies plan.md into iter-N/ subdirectory
      so every iteration's plan is preserved for comparison and rollback.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      COUNTER=$(cat "$RUN_DIR/.iter_counter" 2>/dev/null || echo 0)
      COUNTER=$((COUNTER + 1))
      echo "$COUNTER" > "$RUN_DIR/.iter_counter"
      mkdir -p "$RUN_DIR/iter-$COUNTER"
      cp "$RUN_DIR/plan.md" "$RUN_DIR/iter-$COUNTER/" 2>/dev/null || true
    next: score

  score:
    fragment: plan_rubric_score
    on_yes: verify_score
    on_no: classify_research
    on_error: diagnose

  verify_score:
    # File verification — reads the actual rubric file to confirm ALL_VERY_HIGH is
    # present before accepting convergence. Guards against hallucinated convergence
    # signals where the LLM outputs ALL_VERY_HIGH but writes ITERATE to the file.
    action_type: shell
    action: |
      RUBRIC="${captured.run_dir.output}/plan-rubric.md"
      if [ ! -f "$RUBRIC" ]; then echo "RUBRIC_MISSING"; exit 0; fi
      grep -q "ALL_VERY_HIGH" "$RUBRIC" && echo "ALL_VERY_HIGH" || echo "ITERATE"
    capture: rubric_check
    evaluate:
      type: output_contains
      source: "${captured.rubric_check.output}"
      pattern: "ALL_VERY_HIGH"
    on_yes: report
    on_no: classify_research
    on_error: diagnose

  report:
    # Pre-terminal report — reads the final rubric and summarises results for the user
    # before transitioning to the bare terminal anchor. Exists as a separate state
    # because the FSM runner skips actions on terminal states (fires loop_complete
    # immediately on routing to a terminal without entering it).
    action_type: prompt
    action: |
      The rn-refine recursive refinement loop has completed.

      Final output files:
      - ${captured.run_dir.output}/plan.md          — working copy of the refined plan
      - ${captured.run_dir.output}/plan-rubric.md   — the final rubric scores
      - ${captured.run_dir.output}/research.md      — accumulated research findings

      Step 1: Read ${captured.run_dir.output}/plan-rubric.md and report the final dimension
      scores and aggregate verdict to the user. Confirm the plan is ready for implementation.

      Step 2: Read ${captured.run_dir.output}/.source-path to get the absolute path of the
      original plan file the user passed in. Call this value SOURCE. Confirm to the user that
      SOURCE has been updated in-place with the refined plan.

      Step 3: Print the following block VERBATIM to the user, replacing <SOURCE> with the
      absolute path read from .source-path and <WORKING> with ${captured.run_dir.output}/plan.md.
      Use the actual absolute paths — do not leave the placeholders in. Both paths must be
      absolute so the commands work from any working directory.

      ```
      To review changes against the working copy:
        diff <SOURCE> <WORKING>

      The original file has already been updated. The working copy in .loops/ is kept as a
      reference — you can delete it when you're satisfied.
      ```
    next: done

  done:
    # Terminal anchor — clean exit point with no action. Report is handled by the
    # preceding `report` state to work around the runner's terminal short-circuit.
    terminal: true

  diagnose:
    fragment: loop_failure_diagnose
    with:
      loop_name: rn-refine
      extra_bullets: |
        - If ${captured.run_dir.output}/plan.md exists, note whether any refinement occurred.
        - If failure was in the init state, report whether the source plan file was found.

  failed:
    # Error terminal — reached when the score state encounters an unrecoverable error,
    # or when init cannot find the source plan file.
    terminal: true
