name: rn-refine
category: planning
input_key: plan_file
description: |
  Recursive-N refinement loop for an existing plan document. Unlike a flat
  whole-document pass, rn-refine treats the plan as the ROOT of a decomposition
  tree and refines it recursively to whatever depth the work demands ("n" depth):

    1. The root plan is refined to rubric convergence, then classified — is it an
       atomic work-package, or does it bundle independent sub-goals?
    2. If it bundles sub-goals, it is DECOMPOSED into child sub-plans (each its own
       node), and the parent is rewritten as an index. Children are enqueued
       depth-first and the same refine→classify→decompose cycle is applied to each.
    3. Decomposition continues adaptively (ADaPT-style: depth grows only where
       complexity warrants) until every branch reaches a leaf or the safety cap
       (max_depth / max_nodes).
    4. Once the whole tree is refined, leaves are rolled UP bottom-first: each
       internal node integrates its refined children into a coherent section, until
       the root is reassembled into a single improved plan.
    5. The reassembled plan is scored, written back over the user's source file
       in-place, and a tree summary is reported.

  Per-node refinement and the decompose decision are delegated to the reusable
  oracles/plan-node-refine sub-loop; each node is a self-contained mini-plan under
  ${run_dir}/nodes/<id>/, reusing the proven research/synthesize chain and the
  9-dimension scorer verbatim.

  Run as: ll-loop run rn-refine "path/to/plan.md"
scope:
  - "${context.plan_file}"
initial: init
max_steps: 300
timeout: 21600
on_handoff: spawn
required_inputs: ["plan_file"]
artifact_versioning: true
import:
  - lib/common.yaml

context:
  plan_file: ""        # populated from positional CLI arg via input_key: plan_file
  max_depth: 3         # safety cap on recursion depth (adaptive depth never exceeds this)
  max_node_iters: 2    # per-node refinement budget (research→synthesize→score passes)
  max_nodes: 40        # global cap on total tree nodes (decomposition stops when reached)

states:
  init:
    # Setup — validate the source plan, seed the decomposition tree with the root
    # node (n0 = the whole plan), and initialize the shared work-tree bookkeeping
    # files (queue, depth map, node-id counter, edge list). Per-run isolation: all
    # state lives under the runner-injected ${context.run_dir}.
    action_type: shell
    action: |
      if [ ! -f "${context.plan_file}" ]; then
        echo "ERROR: Plan file not found: ${context.plan_file}"
        exit 1
      fi
      DIR="${context.run_dir}"
      mkdir -p "$DIR/nodes/n0"
      # Canonical working copy of the (eventually reassembled) plan + final rubric.
      cp "${context.plan_file}" "$DIR/plan.md"
      : > "$DIR/plan-rubric.md"
      realpath "${context.plan_file}" > "$DIR/.source-path"
      # Root node working dir: a self-contained mini-plan seeded from the source.
      cp "${context.plan_file}" "$DIR/nodes/n0/plan.md"
      : > "$DIR/nodes/n0/plan-rubric.md"
      : > "$DIR/nodes/n0/research.md"
      # Work-tree bookkeeping (shared across all node sub-loops).
      echo "n0" > "$DIR/queue.txt"        # FIFO/depth-first queue of node ids to process
      echo "n0 0" > "$DIR/depth_map.txt"  # "<node_id> <depth>" per line
      echo "1" > "$DIR/node_counter.txt"  # next free node-id index (n1, n2, …)
      : > "$DIR/edges.tsv"                 # "<parent>\t<child>\t<title>" per decomposition
      : > "$DIR/visited.txt"
      : > "$DIR/leaves.txt"
      : > "$DIR/capped.txt"
      : > "$DIR/failed_nodes.txt"
      echo "0" > "$DIR/dequeue_count.txt"
      case "$DIR" in
        /*) echo "$DIR" ;;
        *) echo "$(pwd)/$DIR" ;;
      esac
    capture: run_dir
    on_error: diagnose
    next: dequeue_next

  dequeue_next:
    # Pop the head of the work-tree queue (depth-first: children are prepended by a
    # decomposing node, so a whole subtree is refined before the next sibling).
    # An empty queue means the entire tree is refined → move to bottom-up synthesis.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      QUEUE="$RUN_DIR/queue.txt"
      if [ ! -s "$QUEUE" ]; then
        echo "QUEUE_EMPTY"
        exit 0
      fi
      CURRENT=$(head -1 "$QUEUE")
      tail -n +2 "$QUEUE" > "$QUEUE.tmp" && mv "$QUEUE.tmp" "$QUEUE"
      DEPTH=$(grep "^$CURRENT " "$RUN_DIR/depth_map.txt" 2>/dev/null | awk '{print $2}')
      echo "$${DEPTH:-0}" > "$RUN_DIR/current_depth.txt"
      echo "$CURRENT" >> "$RUN_DIR/visited.txt"
      C=$(cat "$RUN_DIR/dequeue_count.txt" 2>/dev/null || echo 0)
      echo $((C + 1)) > "$RUN_DIR/dequeue_count.txt"
      echo "$CURRENT"
    evaluate:
      type: output_contains
      pattern: "QUEUE_EMPTY"
    capture: input
    on_yes: build_synth
    on_no: read_depth
    on_error: build_synth

  read_depth:
    # Surface the dequeued node's depth as a capture for the sub-loop binding.
    action_type: shell
    action: |
      cat "${captured.run_dir.output}/current_depth.txt" 2>/dev/null || echo 0
    capture: current_depth
    next: refine_node
    on_error: refine_node

  refine_node:
    # Delegate the node to the per-node oracle: refine to convergence (or budget),
    # then decide LEAF vs DECOMPOSE. On DECOMPOSE the oracle creates child node dirs
    # and prepends them to queue.txt itself, so the parent just loops back to
    # dequeue_next. The real outcome is read from the node_outcome token file.
    loop: oracles/plan-node-refine
    with:
      run_dir: "${captured.run_dir.output}"
      node_id: "${captured.input.output}"
      depth: "${captured.current_depth.output}"
      max_depth: "${context.max_depth}"
      max_node_iters: "${context.max_node_iters}"
      max_nodes: "${context.max_nodes}"
    on_success: classify_node
    on_failure: classify_node
    on_error: record_node_crash

  classify_node:
    # Read the outcome token the oracle wrote for this node and route on it.
    action_type: shell
    action: |
      cat "${captured.run_dir.output}/node_outcome_${captured.input.output}.txt" 2>/dev/null \
        || echo "REFINE_FAILED"
    capture: node_outcome
    next: route_decomposed

  route_decomposed:
    evaluate:
      type: output_contains
      source: "${captured.node_outcome.output}"
      pattern: "DECOMPOSED"
    on_yes: dequeue_next       # children already enqueued by the oracle
    on_no: route_leaf
    on_error: record_failure

  route_leaf:
    evaluate:
      type: output_contains
      source: "${captured.node_outcome.output}"
      pattern: "REFINED_LEAF"
    on_yes: record_leaf
    on_no: route_capped
    on_error: record_failure

  route_capped:
    evaluate:
      type: output_contains
      source: "${captured.node_outcome.output}"
      pattern: "REFINED_CAPPED"
    on_yes: record_capped
    on_no: record_failure      # REFINE_FAILED or unknown token
    on_error: record_failure

  record_leaf:
    action_type: shell
    action: |
      echo "${captured.input.output}" >> "${captured.run_dir.output}/leaves.txt"
      echo "[LEAF] ${captured.input.output}"
    next: dequeue_next
    on_error: dequeue_next

  record_capped:
    action_type: shell
    action: |
      echo "[CAPPED] ${captured.input.output} (refined; decomposition suppressed by cap)"
    next: dequeue_next
    on_error: dequeue_next

  record_failure:
    action_type: shell
    action: |
      echo "${captured.input.output}" >> "${captured.run_dir.output}/failed_nodes.txt"
      echo "[FAILED] ${captured.input.output}"
    next: dequeue_next
    on_error: dequeue_next

  record_node_crash:
    action_type: shell
    action: |
      echo "${captured.input.output} CRASH" >> "${captured.run_dir.output}/failed_nodes.txt"
      echo "[NODE_CRASH] ${captured.input.output} — sub-loop infrastructure failure"
    next: dequeue_next
    on_error: dequeue_next

  build_synth:
    # Bottom-up synthesis setup. The refinement phase produced a tree of nodes;
    # leaves already have a final.md (the refined node). Internal (decomposed) nodes
    # need their refined children integrated. Emit internal node ids deepest-first
    # into synth_queue.txt so every node is integrated only after all its children
    # are. Also backfill final.md for any non-internal node missing one (defensive).
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      export LL_RUN_DIR="$RUN_DIR"
      python3 << 'PYEOF'
      import os
      from pathlib import Path

      run_dir = os.environ["LL_RUN_DIR"]
      edges_p = Path(run_dir) / "edges.tsv"
      depth_p = Path(run_dir) / "depth_map.txt"
      nodes_dir = Path(run_dir) / "nodes"

      children = {}
      if edges_p.exists():
          for line in edges_p.read_text().splitlines():
              parts = line.split("\t")
              if len(parts) >= 2:
                  children.setdefault(parts[0], []).append(parts[1])

      depth = {}
      if depth_p.exists():
          for line in depth_p.read_text().splitlines():
              p = line.split()
              if len(p) >= 2:
                  try:
                      depth[p[0]] = int(p[1])
                  except ValueError:
                      pass

      # Defensive: every node that is NOT internal must have a final.md so the
      # integration passes (and final assembly) always find their inputs.
      all_nodes = [d.name for d in nodes_dir.iterdir() if d.is_dir()] if nodes_dir.exists() else []
      internal = set(children.keys())
      for nid in all_nodes:
          if nid in internal:
              continue
          fp = nodes_dir / nid / "final.md"
          pp = nodes_dir / nid / "plan.md"
          if not fp.exists() and pp.exists():
              fp.write_text(pp.read_text())

      # Internal nodes deepest-first (children always have strictly greater depth).
      ordered = sorted(internal, key=lambda n: depth.get(n, 0), reverse=True)
      (Path(run_dir) / "synth_queue.txt").write_text("".join(f"{n}\n" for n in ordered))
      print(f"SYNTH_QUEUE {len(ordered)}")
      PYEOF
    capture: synth_setup
    next: synth_pop
    on_error: assemble

  synth_pop:
    # Pop the next internal node to integrate; empty queue → final assembly.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      SQ="$RUN_DIR/synth_queue.txt"
      if [ ! -s "$SQ" ]; then
        echo "SYNTH_DONE"
        exit 0
      fi
      NODE=$(head -1 "$SQ")
      tail -n +2 "$SQ" > "$SQ.tmp" && mv "$SQ.tmp" "$SQ"
      echo "$NODE"
    evaluate:
      type: output_contains
      pattern: "SYNTH_DONE"
    capture: synth_node
    on_yes: assemble
    on_no: integrate_node
    on_error: assemble

  integrate_node:
    # Roll a decomposed node back up: integrate its refined children into one
    # coherent section. Children are already assembled (deepest-first ordering),
    # so this reads each child's final.md and the node's own index plan.md.
    action_type: prompt
    action: |
      You are reassembling one node of a refined plan tree, bottom-up.

      Node id: ${captured.synth_node.output}
      Run dir: ${captured.run_dir.output}

      Step 1: Read ${captured.run_dir.output}/edges.tsv and select the lines whose
      FIRST tab-separated column equals "${captured.synth_node.output}". Those rows
      give this node's children (second column = child id, third = title), in order.

      Step 2: Read this node's index/overview at
      ${captured.run_dir.output}/nodes/${captured.synth_node.output}/plan.md, and read
      each child's fully-refined content at
      ${captured.run_dir.output}/nodes/<child_id>/final.md (one per child row).

      Step 3: Write an integrated section to
      ${captured.run_dir.output}/nodes/${captured.synth_node.output}/final.md that:
        - keeps this node's framing, goal, and any cross-cutting concerns from its index,
        - inlines each child's refined content in order under clear sub-headings,
        - removes duplication and resolves any contradictions between children,
        - ensures the ordering and dependencies across children are explicit and sound.

      The result must read as one continuous, self-contained section — not a list of
      links. Do not lose any concrete detail from the children's final.md files.
    next: snapshot_node
    on_error: synth_pop

  snapshot_node:
    # Diagnostics: copy the just-integrated node's final.md to a durable location
    # outside the (potentially interrupted) run dir, so a mid-integration timeout
    # never loses completed integration work. Best-effort only — never blocks the
    # main synth loop on a copy failure.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      NODE="${captured.synth_node.output}"
      RUN_ID=$(basename "$RUN_DIR")
      mkdir -p .loops/diagnostics
      if [ -f "$RUN_DIR/nodes/$NODE/final.md" ]; then
        cp "$RUN_DIR/nodes/$NODE/final.md" ".loops/diagnostics/${RUN_ID}-${NODE}.md"
      fi
    next: synth_pop
    on_error: synth_pop

  assemble:
    # Final assembly: the root's reassembled content becomes the working plan.md.
    # If nodes/n0/final.md is missing (e.g. root integration never ran before a
    # timeout), fall back to the un-integrated root plan.md and flag it: this is
    # the REFINED-but-not-INTEGRATED case, so plan-rubric.md must not read as a
    # normal clean pass.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      if [ -f "$RUN_DIR/nodes/n0/final.md" ]; then
        cp "$RUN_DIR/nodes/n0/final.md" "$RUN_DIR/plan.md"
      elif [ -f "$RUN_DIR/nodes/n0/plan.md" ]; then
        cp "$RUN_DIR/nodes/n0/plan.md" "$RUN_DIR/plan.md"
        echo "RECOVERY_NEEDED: nodes/n0/final.md was missing; plan.md is the refined-but-not-integrated root (bottom-up integration did not complete before assemble ran)." >> "$RUN_DIR/plan-rubric.md"
      fi
    next: final_score
    on_error: finalize

  final_score:
    # Score the fully reassembled plan on the 9-dimension rubric. This records final
    # quality (written to plan-rubric.md); it does not loop — the recursive per-node
    # refinement is where convergence happens. Both verdicts proceed to the preflight
    # check (ENH-2418), which gates the destructive in-place overwrite.
    fragment: plan_rubric_score
    on_yes: preflight_check
    on_no: preflight_check
    on_error: preflight_check

  preflight_check:
    # ENH-2418: diff-size invariant guard. Read-only policy check before the
    # destructive in-place overwrite in `finalize`. Verifies:
    #   1. plan.md is not empty                                  -> INVARIANT_FAIL:EMPTY
    #   2. plan.md is at least floor_fraction (default 0.5) of   -> INVARIANT_FAIL:BELOW_FLOOR:<ratio>
    #      the source's byte length
    #   3. plan.md preserves every top-level `## heading`        -> INVARIANT_FAIL:MISSING_SECTIONS:<list>
    #      present in the source
    # On INVARIANT_OK, route to `finalize` (which writes a timestamped backup
    # first, then overwrites). On INVARIANT_FAIL or shell error, route to
    # `finalize_aborted` — the source is left untouched.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      SOURCE=$(cat "$RUN_DIR/.source-path" 2>/dev/null || echo "")
      FLOOR="${context.floor_fraction:default=0.5}"
      NEW_LEN=$(wc -c < "$RUN_DIR/plan.md" 2>/dev/null | tr -d ' ' || echo 0)
      if [ -z "$SOURCE" ] || [ ! -f "$SOURCE" ]; then
        echo "INVARIANT_FAIL: MISSING_SOURCE"
        exit 0
      fi
      if [ ! -s "$RUN_DIR/plan.md" ]; then
        echo "INVARIANT_FAIL: EMPTY"
        exit 0
      fi
      ORIG_LEN=$(wc -c < "$SOURCE" | tr -d ' ')
      ORIG_LEN=$${ORIG_LEN:-1}
      # Use Python for portable float comparison (BSD awk on macOS lacks ?: ternary).
      CHECK=$(NEW_LEN="$NEW_LEN" ORIG_LEN="$ORIG_LEN" FLOOR="$FLOOR" python3 -c '
      import os
      n = float(os.environ.get("NEW_LEN", "0"))
      o = float(os.environ.get("ORIG_LEN", "1"))
      f = float(os.environ.get("FLOOR", "0.5"))
      print("OK" if (n / o) >= f else "BELOW")
      ' 2>/dev/null) || CHECK="OK"
      if [ "$CHECK" = "BELOW" ]; then
        RATIO=$(NEW_LEN="$NEW_LEN" ORIG_LEN="$ORIG_LEN" python3 -c '
      import os
      n = float(os.environ.get("NEW_LEN", "0"))
      o = float(os.environ.get("ORIG_LEN", "1"))
      print(f"{n / o:.2f}")
      ')
        echo "INVARIANT_FAIL: BELOW_FLOOR:$RATIO"
        exit 0
      fi
      # Section-preservation check: every `## heading` in source must also be
      # in the reassembled plan. Inline Python heredoc for reliable regex.
      SOURCE_HEADINGS=$(grep -E "^##[[:space:]]" "$SOURCE" | sed -E 's/^##[[:space:]]+//' | sort -u)
      NEW_HEADINGS=$(grep -E "^##[[:space:]]" "$RUN_DIR/plan.md" | sed -E 's/^##[[:space:]]+//' | sort -u)
      MISSING=$(comm -23 <(printf "%s\n" "$SOURCE_HEADINGS") <(printf "%s\n" "$NEW_HEADINGS"))
      if [ -n "$MISSING" ]; then
        JOINED=$(echo "$MISSING" | tr '\n' ',' | sed 's/,$//')
        echo "INVARIANT_FAIL: MISSING_SECTIONS:$JOINED"
        exit 0
      fi
      echo "INVARIANT_OK"
    evaluate:
      type: output_contains
      pattern: "INVARIANT_OK"
    on_yes: finalize
    on_no: finalize_aborted
    on_error: finalize_aborted

  finalize:
    # Overwrite the user's original source file in-place with the reassembled plan.
    # Pre-flight invariant has already passed in preflight_check. Before overwriting,
    # write a timestamped backup of the original to ${run_dir}/source-backup-<ISO>.md
    # so the user can recover if they don't like the rewrite. Honor --context
    # confirm_overwrite=true / dry_run=true to gate destructive behavior.
    action_type: shell
    action: |
      RUN_DIR="${captured.run_dir.output}"
      SOURCE=$(cat "$RUN_DIR/.source-path" 2>/dev/null || echo "")
      DRY_RUN="${context.dry_run:default=false}"
      CONFIRM="${context.confirm_overwrite:default=false}"
      if [ -z "$SOURCE" ] || [ ! -f "$RUN_DIR/plan.md" ]; then
        exit 0
      fi
      if [ "$DRY_RUN" = "true" ]; then
        echo "DRY_RUN: source left unchanged at $SOURCE"
        exit 0
      fi
      # Timestamp + 4-digit nanosecond suffix avoids same-second collisions in
      # rapid-fire re-runs; matches `integrate-sdk.yaml` ISO-timestamp convention.
      TS=$(date -u +%Y%m%dT%H%M%SZ)
      BACKUP="$RUN_DIR/source-backup-$TS.md"
      if [ "$CONFIRM" = "true" ]; then
        echo "CONFIRM_REQUIRED: set --context confirm_overwrite=true to overwrite $SOURCE"
        exit 0
      fi
      cp "$SOURCE" "$BACKUP"
      echo "BACKUP_PATH=$BACKUP"
      cp "$RUN_DIR/plan.md" "$SOURCE"
    next: report
    on_error: report

  finalize_aborted:
    # ENH-2418: safe-abort terminal for invariant violation. Mirrors
    # loop-composer-adaptive's `abort_composer` (terminal: true, JSON payload,
    # success: false). The user's source is left untouched; the .loops working
    # copy and the captured backup path are surfaced in the report.
    action_type: shell
    terminal: true
    action: |
      RUN_DIR="${captured.run_dir.output}"
      python3 -c "
      import json, os
      run_dir = os.environ.get('RUN_DIR', '')
      print(json.dumps({
          'success': False,
          'summary': 'rn-refine finalize aborted: diff-size invariant violated; source left unchanged.',
          'original_unchanged': True,
          'working_copy': os.path.join(run_dir, 'plan.md'),
          'backup_path': None,
      }, indent=2))
      "
      exit 1

  report:
    # Pre-terminal report — summarizes the decomposition tree and final scores, and
    # prints the diff hint. Separate state because the runner skips actions on
    # terminal states (it fires loop_complete on routing to a terminal).
    action_type: prompt
    action: |
      The rn-refine recursive refinement loop has completed.

      Output files (under ${captured.run_dir.output}):
      - plan.md          — the reassembled, refined plan (working copy)
      - plan-rubric.md   — final 9-dimension rubric scores
      - nodes/<id>/      — per-node sub-plans (plan.md/final.md) for the whole tree
      - edges.tsv        — the decomposition tree ("<parent>\t<child>\t<title>")

      Step 1: Read ${captured.run_dir.output}/plan-rubric.md and report the final
      dimension scores and aggregate verdict. If the file contains a
      "RECOVERY_NEEDED" line, surface it prominently — it means root integration
      never completed and the written-back plan is refined-but-not-integrated.

      Step 2: Summarize the decomposition tree from ${captured.run_dir.output}/edges.tsv
      and ${captured.run_dir.output}/depth_map.txt: how many nodes, the maximum depth
      reached, and how many leaves vs. decomposed vs. capped nodes
      (${captured.run_dir.output}/leaves.txt and capped.txt). Render the tree with
      indentation so the recursive structure is visible.

      Step 3: Read ${captured.run_dir.output}/.source-path to get the absolute path of
      the original file (call it SOURCE). Confirm SOURCE has been updated in-place with
      the reassembled plan.

      Step 4: Print the following block VERBATIM, replacing <SOURCE> with the absolute
      path from .source-path and <WORKING> with ${captured.run_dir.output}/plan.md. Use
      the actual absolute paths — do not leave the placeholders in.

      ```
      To review changes against the working copy:
        diff <SOURCE> <WORKING>

      The original file has already been updated. The working copy in .loops/ (plus the
      per-node tree under nodes/) is kept as a reference — you can delete it when satisfied.
      ```
    next: done

  done:
    # Terminal anchor — clean exit with no action (report runs in the preceding state
    # to work around the runner's terminal short-circuit).
    terminal: true

  diagnose:
    # Failure handler — reached when init cannot find/seed the source plan.
    fragment: loop_failure_diagnose
    with:
      loop_name: rn-refine
      extra_bullets: |
        - If ${captured.run_dir.output}/queue.txt exists, note how many nodes remained unprocessed.
        - If failure was in the init state, report whether the source plan file was found.

  failed:
    # Error terminal.
    terminal: true
