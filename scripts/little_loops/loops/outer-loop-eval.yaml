name: outer-loop-eval
category: evaluation
description: |
  Observe and improve a target loop by loading its YAML definition, executing it
  as a sub-loop, then performing structured analysis to identify structural problems,
  logic gaps, flow inefficiencies, and component improvement opportunities.
  Produces an actionable improvement report with suggested YAML changes.

  Note: run_sub_loop has a default timeout of 1800s. For loops with longer expected
  runtimes, pass --timeout <seconds> to the outer loop invocation.
initial: validate_input
max_iterations: 15
timeout: 14400
on_handoff: spawn
context:
  input: ""       # Required: target loop name (built-in or project-level)
  loop_input: ""  # Optional: input value passed to the sub-loop

states:

  validate_input:
    action_type: shell
    action: |
      test -n "${context.input}" \
        && echo "loop: ${context.input}" \
        || (echo "ERROR: target loop name is required. Pass as positional arg: ll-loop run outer-loop-eval <name>" >&2; exit 1)
    on_error: fail_missing_input
    next: load_definition

  fail_missing_input:
    action_type: shell
    action: "echo 'outer-loop-eval: missing required context variable input' >&2; exit 1"
    terminal: true

  load_definition:
    action_type: shell
    timeout: 60
    action: |
      ll-loop show "${context.input}" 2>&1
    capture: loop_definition
    on_error: analyze_definition
    next: analyze_definition

  analyze_definition:
    action_type: slash_command
    timeout: 600
    action: "/ll:debug-loop-run ${context.input} --auto"
    capture: definition_analysis
    on_blocked: $current
    on_error: run_sub_loop
    max_retries: 2
    on_retry_exhausted: run_sub_loop
    next: run_sub_loop

  run_sub_loop:
    loop: "${context.input}"
    timeout: 3600
    with:
      input: "${context.loop_input}"
    capture: sub_loop_output
    on_yes: analyze_execution
    on_no: handle_sub_loop_failed
    on_error: handle_sub_loop_error

  handle_sub_loop_failed:
    action_type: shell
    action: |
      echo "SUB_LOOP_FAILED: child loop reached non-done terminal state" >&2
      exit 0
    terminal: true

  handle_sub_loop_error:
    action_type: shell
    action: |
      echo "SUB_LOOP_ERROR: child loop terminated with error" >&2
      exit 0
    terminal: true

  analyze_execution:
    action_type: slash_command
    timeout: 600
    action: "/ll:debug-loop-run ${context.input} --auto"
    capture: execution_analysis
    on_blocked: $current
    on_error: generate_report
    max_retries: 2
    on_retry_exhausted: generate_report
    next: generate_report

  generate_report:
    action_type: slash_command
    timeout: 600
    action: "/ll:audit-loop-run ${context.input} --auto"
    capture: improvement_report
    on_blocked: $current
    on_error: refine_analysis
    max_retries: 2
    on_retry_exhausted: done
    evaluate:
      type: llm_structured
      source: "${captured.improvement_report.output}"
      prompt: >
        Does this improvement report contain at least one concrete finding
        (a specific issue, recommendation, or suggested change) rather than
        only "None identified." entries across all sections?
        Answer YES if it has at least one concrete finding.
        Answer NO if every section contains only "None identified."
      min_confidence: 0.7
    on_yes: done
    on_no: refine_analysis
    on_partial: refine_analysis
    on_error: refine_analysis

  refine_analysis:
    action_type: slash_command
    timeout: 600
    action: "/ll:audit-loop-run ${context.input} --auto"
    capture: improvement_report
    on_blocked: $current
    on_error: done
    max_retries: 2
    on_retry_exhausted: done
    next: generate_report

  done:
    terminal: true
