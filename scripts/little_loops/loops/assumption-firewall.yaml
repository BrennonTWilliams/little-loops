name: assumption-firewall
category: gate
description: Gates an issue against the Learning-Test Registry; extracts external-API assumptions (max 7) via LLM, classifies each as testable/untestable, records untestable claims via --assume flag, delegates testable claims to ready-to-implement-gate, routes done/blocked/no_external_deps.
initial: read_issue
max_iterations: 100
timeout: 7200
on_handoff: spawn
import:
  - lib/common.yaml

context:
  input: ""  # Issue ID (e.g., FEAT-2001); required

states:

  read_issue:
    action: cat "$(ll-issues path '${context.input}')"
    action_type: shell
    capture: issue_content
    on_error: blocked
    next: extract_assumptions

  extract_assumptions:
    action_type: prompt
    timeout: 300
    action: |
      You are an assumption extractor. Analyze the following issue and identify external-API assumptions.

      An "external-API assumption" is a claim about behavior of third-party services, SDKs, libraries,
      or language stdlib functions whose contract is non-obvious. Internal-codebase claims are OUT OF SCOPE.

      ISSUE CONTENT:
      ${captured.issue_content.output}

      Instructions:
      1. Identify all external-API assumptions made in this issue (in Summary, Motivation, Proposed Solution, etc.)
      2. Cap at 7 assumptions maximum. If more than 7 exist, select the highest-risk seven and note the rest in rationale.
      3. Phrase each assumption as a single concrete sentence suitable for "/ll:explore-api"
         (e.g., "Stripe webhook signature verification (Stripe-Signature header)").
      4. If you find zero external-API assumptions (e.g., the issue only touches internal code), return count: 0 and empty targets.

      Output a brief analysis, then on the LAST LINE output exactly:
      ASSUMPTIONS_JSON:{"targets": ["...", ...], "rationale": "<one paragraph>", "count": <N>}

      If no external-API assumptions exist:
      ASSUMPTIONS_JSON:{"targets": [], "rationale": "No external-API assumptions found.", "count": 0}
    capture: raw_extraction
    evaluate:
      type: llm_structured
      prompt: "Does the response end with an ASSUMPTIONS_JSON: line containing valid JSON with 'targets', 'rationale', and 'count' fields?"
      min_confidence: 0.5
    on_yes: parse_assumptions
    on_no: parse_assumptions
    on_partial: parse_assumptions

  parse_assumptions:
    fragment: parse_tagged_json
    action: |
      python3 << 'PYEOF'
      import json, sys
      output = """${captured.raw_extraction.output}"""
      found = None
      for line in reversed(output.split('\n')):
          line = line.strip()
          if line.startswith('ASSUMPTIONS_JSON:'):
              found = line[len('ASSUMPTIONS_JSON:'):]
              break
      if not found:
          print(json.dumps({"targets": [], "rationale": "Failed to parse extraction output.", "count": 0}))
          sys.exit(0)
      try:
          data = json.loads(found)
          targets = [t for t in data.get("targets", []) if t.strip()][:7]
          count = len(targets)
          print(json.dumps({"targets": targets, "rationale": data.get("rationale", ""), "count": count}))
      except (json.JSONDecodeError, ValueError) as e:
          print(json.dumps({"targets": [], "rationale": f"JSON parse error: {e}", "count": 0}))
      PYEOF
    capture: extracted
    evaluate:
      type: output_json
      path: ".count"
      operator: gt
      target: 0
    on_yes: classify_assumptions
    on_no: no_external_deps

  classify_assumptions:
    action_type: prompt
    timeout: 300
    action: |
      You are an assumption classifier. Classify each extracted API assumption as testable or untestable.

      A testable assumption CAN be proven with a local proof script using only public documentation,
      offline-available SDK behavior, or standard HTTP requests (no authentication required).
      An untestable assumption CANNOT be proven cheaply because it requires live API credentials,
      rate-limited endpoints, long-running behavior, vendor-only environments, or paid tier access.

      EXTRACTED ASSUMPTIONS:
      ${captured.extracted.output}

      Instructions:
      1. Review each target in the extracted list.
      2. Classify each as "testable" (can prove with local script) or "untestable" (needs live access).
      3. If all assumptions are untestable, testable list will be empty.
      4. Provide a brief rationale for each classification.

      Output your analysis, then on the LAST LINE output exactly:
      CLASSIFIED_JSON:{"testable": ["..."], "untestable": ["..."], "rationale": "<one paragraph>"}

      If no testable assumptions exist:
      CLASSIFIED_JSON:{"testable": [], "untestable": ["..."], "rationale": "..."}
    capture: raw_classified
    evaluate:
      type: output_contains
      pattern: "CLASSIFIED_JSON:"
    on_yes: record_untestable
    on_no: record_untestable

  record_untestable:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import json, subprocess, re

      output = """${captured.raw_classified.output}"""
      found = None
      for line in reversed(output.split('\n')):
          line = line.strip()
          if line.startswith('CLASSIFIED_JSON:'):
              found = line[len('CLASSIFIED_JSON:'):]
              break

      if not found:
          print(json.dumps({"recorded": [], "errors": ["Failed to parse classification output."]}))
      else:
          try:
              classified = json.loads(found)
              recorded = []
              errors = []
              for claim in classified.get("untestable", []):
                  try:
                      subprocess.run(
                          ["ll-action", "invoke", "explore-api",
                           "--args", f"{claim} --assume {claim!r}"],
                          check=False, capture_output=True, text=True
                      )
                      recorded.append(claim)
                  except Exception as e:
                      errors.append(f"Failed to record '{claim}': {e}")
              print(json.dumps({"recorded": recorded, "errors": errors}))
          except (json.JSONDecodeError, ValueError) as e:
              print(json.dumps({"recorded": [], "errors": [f"JSON parse error: {e}"]}))
      PYEOF
    capture: untestable_result
    on_error: flatten_testable
    next: flatten_testable

  flatten_testable:
    action_type: shell
    action: |
      python3 << 'PYEOF'
      import json, re

      classified_output = """${captured.raw_classified.output}"""
      found = None
      for line in reversed(classified_output.split('\n')):
          line = line.strip()
          if line.startswith('CLASSIFIED_JSON:'):
              found = line[len('CLASSIFIED_JSON:'):]
              break

      if not found:
          print("")
      else:
          try:
              data = json.loads(found)
              print(",".join(data.get("testable", [])))
          except (json.JSONDecodeError, ValueError):
              print("")
      PYEOF
    capture: targets
    evaluate:
      type: output_numeric
      path: output_length
      operator: eq
      target: 0
    on_yes: no_external_deps
    on_no: run_gate

  run_gate:
    loop: ready-to-implement-gate
    with:
      targets: "${captured.targets.output}"
      max_retries: "2"
    on_success: done
    on_failure: blocked
    on_error: blocked

  done:
    terminal: true

  blocked:
    terminal: true

  no_external_deps:
    terminal: true
