name: prompt-across-issues
category: issue-management
description: |
  Run an arbitrary prompt against every open/active issue, one at a time.
  Pass the prompt via the input parameter; use {issue_id} as a placeholder
  to inject each issue's ID. Issues are processed in priority order using a
  temp-file pending list to avoid infinite loops. No quality gates — use
  harness-multi-item if you need evaluation phases.
  Optionally constrain the sweep to a single issue type with --context type=<TYPE>
  (one of BUG, FEAT, ENH, EPIC). When omitted, all open issues are processed.
  Optionally scope the sweep to an epic's full subtree with --context parent=EPIC-NNN
  (transitive: grandchildren nested under an intermediate FEAT/ENH are included).
  Both filters may be combined: --context type=ENH --context parent=EPIC-1773.
  Optionally sweep a hand-picked comma-separated list with --context ids=ID1,ID2,...
  which overrides type/parent (whitespace-trimmed, empties dropped).

  Usage:
    ll-loop run prompt-across-issues "/ll:refine-issue {issue_id}"
    ll-loop run prompt-across-issues "/ll:normalize-issues {issue_id} --quick"
    ll-loop run prompt-across-issues "/ll:refine-issue {issue_id}" --context type=BUG
    ll-loop run prompt-across-issues "/ll:refine-issue {issue_id}" --context parent=EPIC-1773
    ll-loop run prompt-across-issues "/ll:refine-issue {issue_id}" --context ids=ENH-1,ENH-2,ENH-3

  Non-interactive skills:
    Skills auto-detect automation context via the LL_NON_INTERACTIVE env var that
    the FSM runner injects. For skills with only explicit --auto support, pass it:
    ll-loop run prompt-across-issues "/ll:format-issue {issue_id} --auto"
initial: init
max_steps: 500
timeout: 28800
# Per-instance lock scope: each run_dir is timestamped, so concurrent
# prompt-across-issues instances on disjoint run_dirs never conflict at the
# LockManager layer (ENH-2500).
scope:
  - "${context.run_dir}"
import:
  - lib/common.yaml

context:
  type: ""  # Optional: BUG, FEAT, ENH, or EPIC. When set, restricts the sweep
            # to open issues of that type. Empty (default) = all open issues.
  parent: ""  # Optional: EPIC-NNN. When set, restricts sweep to the parent's full
              # transitive subtree (grandchildren via done intermediates included).
  ids: ""  # Optional: comma-separated issue IDs (e.g. ENH-2463,ENH-2464).
           # When set, overrides type/parent and processes exactly these IDs
           # (whitespace-trimmed, empties dropped). Bypasses ll-issues list.

states:

  init:
    # Validate that the required input prompt was provided, then build a
    # pending-list temp file from all active issues sorted by priority.
    # Using a temp file (not live ll-issues list) prevents infinite loops:
    # if the same issue is always first in the list, the loop would never advance.
    action: |
      # Write context.input via a quoted heredoc so shell metacharacters in the
      # prompt (", $, `, \) are read literally, not paste-injected into bash
      # (BUG-2622). Never test ${context.input} as a bare token.
      cat > "${context.run_dir}/validate-input.txt" <<'LL_INPUT_EOF'
      ${context.input}
      LL_INPUT_EOF
      if ! grep -q '[^[:space:]]' "${context.run_dir}/validate-input.txt"; then
        echo "ERROR: input prompt is required. Usage: ll-loop run prompt-across-issues \"<prompt>\""
        exit 1
      fi
      if [ -n "${context.ids}" ]; then
        # Explicit ID list overrides type/parent filters (ENH-2658).
        echo "${context.ids}" | tr ',' '\n' \
          | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' \
          | grep -v '^$' > "${context.run_dir}/pending.txt"
      else
      TYPE_ARG=""
      if [ -n "${context.type}" ]; then
        TYPE_ARG="--type ${context.type}"
      fi
      PARENT_ARG=""
      if [ -n "${context.parent}" ]; then
        PARENT_ARG="--parent ${context.parent}"
      fi
      ll-issues list $TYPE_ARG $PARENT_ARG --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      for i in issues:
          print(i['id'])
      " > "${context.run_dir}/pending.txt"
      fi
      COUNT=$(wc -l < "${context.run_dir}/pending.txt" | tr -d ' ')
      echo "Found $${COUNT} issues to process"
    fragment: shell_exit
    on_yes: discover
    on_error: diagnose_error

  discover:
    # Read the next issue ID from the head of the pending list.
    # Exits 1 (→ done) if the file is empty or missing.
    action: |
      if [ ! -s "${context.run_dir}/pending.txt" ]; then
        exit 1
      fi
      head -1 "${context.run_dir}/pending.txt"
    fragment: shell_exit
    capture: current_item
    on_yes: prepare_prompt
    on_no: done
    on_error: done

  prepare_prompt:
    # Substitute {issue_id} with the captured issue ID using shell sed.
    # FSM interpolation only handles ${...} syntax, so single-brace {issue_id}
    # must be replaced here before the prompt is passed to execute.
    # Variables set and used within a single action (ISSUE_ID, PROMPT) do not
    # need the $$ escaping prefix — only shell vars referencing across FSM passes do.
    action: |
      ISSUE_ID="${captured.current_item.output}"
      PROMPT=${context.input:shell}
      echo "$PROMPT" | sed "s/{issue_id}/$ISSUE_ID/g"
    action_type: shell
    capture: final_prompt
    on_yes: execute
    on_no: advance
    on_error: advance

  execute:
    # Run the prepared prompt as a Claude Code instruction for this issue.
    # max_retries ensures a stuck or failing item is skipped rather than
    # exhausting the entire iteration budget.
    action: "${captured.final_prompt.output}"
    action_type: prompt
    max_retries: 3
    on_retry_exhausted: advance
    next: advance

  advance:
    # Remove the processed issue (first line) from the pending list and
    # loop back to discover the next one.
    # Using tail -n +2 instead of sed -i '' for cross-platform compatibility
    # (sed -i '' is macOS-only; Linux requires sed -i).
    action: |
      DIR="$(dirname "${context.run_dir}/pending.txt")"
      tail -n +2 "${context.run_dir}/pending.txt" > "$DIR/pending.tmp"
      mv "$DIR/pending.tmp" "${context.run_dir}/pending.txt"
      REMAINING=$(wc -l < "${context.run_dir}/pending.txt" | tr -d ' ')
      echo "Completed ${captured.current_item.output}"
      echo "Progress: $REMAINING items remaining"
    action_type: shell
    next: discover

  done:
    terminal: true

  diagnose_error:
    action_type: prompt
    action: |
      The prompt-across-issues loop has terminated with an unrecoverable error.

      Diagnose what happened:
      - If ${context.run_dir}/pending.txt exists, report its contents.
      - If failure was in the init state, report whether the prompt argument was provided and whether ll-issues list succeeded.
      - Identify the most likely failure cause.

      Write a one-paragraph diagnostic summary the operator can use to re-run with a valid prompt argument.
    next: error

  error:
    terminal: true
