name: sprint-build-and-validate
category: meta
description: |
  Create a sprint from open/active issues, recursively refine all issues to
  confidence threshold (via recursive-refine), run dependency mapping and
  conflict auditing, commit, then execute the sprint via ll-sprint in
  parallelized waves.
initial: create_sprint
context:
  max_issues: 8
import:
  - lib/common.yaml
states:
  create_sprint:
    action_type: prompt
    timeout: 300
    action: |
      Run `/ll:create-sprint --auto` to create a new sprint from open/active issues.
      Select up to ${context.max_issues} issues, prioritizing:
      1. P0-P1 issues first
      2. Issues with no blocking dependencies
      Respond with ONLY the sprint name on a single line (e.g. "sprint-1").
    capture: sprint_name
    next: route_create

  route_create:
    action: "ll-sprint list 2>/dev/null | grep -q ."
    fragment: shell_exit
    on_yes: extract_sprint_issues
    on_no: create_sprint
    on_error: create_sprint

  extract_sprint_issues:
    action: |
      SPRINT_FILE=".sprints/${captured.sprint_name.output}.yaml"
      if [ ! -f "$SPRINT_FILE" ]; then
        echo "Sprint file not found: $SPRINT_FILE" >&2
        exit 1
      fi
      ISSUES=$(grep '^ *-' "$SPRINT_FILE" | sed 's/^ *- *//' | tr '\n' ',' | sed 's/,$//')
      if [ -z "$ISSUES" ]; then
        exit 1
      fi
      echo "$ISSUES"
    action_type: shell
    timeout: 30
    capture: input
    on_yes: refine_issues
    on_no: map_dependencies
    on_error: map_dependencies

  refine_issues:
    loop: recursive-refine
    context_passthrough: true
    on_success: map_dependencies
    on_failure: map_dependencies
    on_error: map_dependencies

  map_dependencies:
    action_type: prompt
    timeout: 300
    action: |
      Read the sprint file .sprints/${captured.sprint_name.output}.yaml to get the issue list.
      Run `/ll:map-dependencies --auto` once for all sprint issues as a single grouped call.
    capture: dep_result
    next: audit_conflicts

  audit_conflicts:
    action_type: prompt
    timeout: 300
    action: |
      Read the sprint file .sprints/${captured.sprint_name.output}.yaml to get the issue list.
      Run `/ll:audit-issue-conflicts --auto` once for all sprint issues as a single grouped call.
    capture: conflict_result
    next: commit

  commit:
    action_type: prompt
    timeout: 120
    action: |
      Run `/ll:commit --auto` to commit the sprint definition and any issue file updates.
      Use commit message: "chore(sprint): create and validate sprint ${captured.sprint_name.output}"
    next: run_sprint

  run_sprint:
    action: "ll-sprint run ${captured.sprint_name.output}"
    fragment: shell_exit
    timeout: 21600
    on_yes: done
    on_no: extract_unresolved
    on_error: extract_unresolved

  extract_unresolved:
    action: |
      if [ ! -f .sprint-state.json ]; then
        exit 1
      fi
      ISSUES=$(jq -r '[(.failed_issues // {} | keys), (.skipped_blocked_issues // {} | keys)] | flatten | unique | join(",")' .sprint-state.json 2>/dev/null)
      if [ -z "$ISSUES" ]; then
        exit 1
      fi
      echo "$ISSUES"
    action_type: shell
    timeout: 30
    capture: input
    on_yes: refine_unresolved
    on_no: done
    on_error: done

  refine_unresolved:
    loop: recursive-refine
    context_passthrough: true
    on_yes: done
    on_no: done
    on_error: done

  done:
    terminal: true

max_iterations: 16
timeout: 25200
on_handoff: spawn
