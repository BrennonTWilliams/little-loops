name: hitl-compare
category: harness
labels: [hitl, comparison, html, interactive]
input_key: inputs
description: |
  Human-in-the-loop comparison harness — reads whitespace-separated inputs (file paths or raw text),
  extracts candidate review items (decisions, designs, requirement variants) with 2+ options each,
  prunes implementation-level micro-decisions, and generates a single self-contained interactive HTML
  page with toggle/select controls per surviving item and an "Export selections" affordance that yields
  a copy-pasteable markdown block for feeding chosen decisions back to the coding agent.
  Thin wrapper over oracles/generator-evaluator (ENH-1869).
initial: init
max_iterations: 20
timeout: 7200

# HARNESS: Context variables for input.
# inputs is populated from the CLI positional arg via input_key: inputs.
# Each whitespace-separated token is resolved as a file path (if it exists on disk)
# or treated as raw text content — this discrimination happens in the identify prompt.
context:
  inputs: ""              # whitespace-separated file paths or raw text; populated via input_key
  design_tokens_context: ""   # runner-injected; resolved semantic token values or empty

states:

  init:
    # HARNESS: Setup phase — captures the runner-injected run_dir as an absolute path
    # so all subsequent states write to the same isolated per-run directory.
    # Using $(pwd) ensures the captured path is valid for file:// URIs.
    action_type: shell
    action: |
      DIR="${context.run_dir}"
      mkdir -p "$DIR"
      echo "$(pwd)/$DIR"
    capture: run_dir
    next: identify

  identify:
    # HITL: Extraction phase — resolves each whitespace-separated input token (file path
    # or raw text), then scans all content for candidate review items: decisions, design
    # choices, requirement variants, document versions. Writes the full unfiltered candidate
    # list to items.md so prune can apply judgment about what truly needs human review.
    action_type: prompt
    action: |
      You are analyzing inputs to extract candidate review items for human comparison.

      Inputs: "${context.inputs}"

      For each whitespace-separated token in the inputs string above:
      - If the token looks like a file path and the file exists on disk, read the file and use its contents.
      - Otherwise treat the literal token string as raw text content.

      Extract every candidate review item — a decision, design choice, requirement variant,
      document version, or other option-bearing element — where there are 2 or more options
      a human might reasonably need to choose between.

      Write the full candidate list to ${captured.run_dir.output}/items.md using this format
      for each item:

      ```
      ## [Item Title]

      category: [decision | design | requirement | document-version | other]

      ### Option A
      source_path: /absolute/path/to/file.ext   ← include if this option came from a file on disk; omit for raw text
      [Short description or excerpt — 1-3 sentences max]
      Rationale: [Why this option exists or what trade-off it represents]

      ### Option B
      source_path: /absolute/path/to/file.ext   ← include if this option came from a file on disk; omit for raw text
      [Short description or excerpt — 1-3 sentences max]
      Rationale: [Why this option exists or what trade-off it represents]

      [### Option C ... if more options exist]
      ```

      IMPORTANT: For each option whose content came from a file on disk, the FIRST line of the
      option body must be `source_path: <absolute path>` — this lets the generate state embed
      the file visually in the HTML review page. Use the absolute path (not relative). Omit the
      source_path line entirely for options derived from raw text tokens.

      Include ALL candidate items, even implementation-level ones — the prune state filters them.
      If no candidate review items are found anywhere in the inputs, write exactly:
      "No review items found." to ${captured.run_dir.output}/items.md and proceed anyway;
      the prune state will report this cleanly.
    next: prune

  prune:
    # HITL: Pruning phase — filters the full candidate list down to only items that genuinely
    # require human judgment, taste, or strategic preference. Implementation-level details that
    # the normal planning pipeline (/ll:refine-issue, /ll:wire-issue, /ll:decide-issue) should
    # resolve are pruned here rather than surfaced to the human, avoiding decision-spam.
    action_type: prompt
    action: |
      Read ${captured.run_dir.output}/items.md — the full candidate review item list.

      Filter this list down to only items that genuinely require human judgment, taste, or
      strategic preference. Remove items that:
      - Are implementation-level details (naming, code structure, method signatures, file layout)
        that the normal planning pipeline (/ll:refine-issue, /ll:wire-issue, /ll:decide-issue) resolves
      - Have an obvious winner based on technical merit alone (one option is strictly better)
      - Are micro-decisions a developer can resolve autonomously without stakeholder input
      - Are already resolved or decided in the input material

      Keep items where a human's taste, judgment, strategic preference, or domain authority is
      the appropriate deciding signal: UX/design trade-offs, business priority calls, naming
      visible to end-users, architecture choices with genuine stakeholder impact.

      Write the surviving items to ${captured.run_dir.output}/review.md using the same per-item
      format as items.md. Prepend a summary block:

      ```
      # Review Items

      Total candidates: N
      Pruned (implementation-level or obvious winner): M
      Surviving for human review: K

      Pruned items and reasons:
      - [Item Title]: [one-line reason for pruning]
      ...

      ---
      ```

      If all items were pruned (K=0), write a "Nothing to review — all decisions are
      implementation-level or have obvious winners." note after the summary block and proceed
      to generate, which will produce a friendly "nothing to review" HTML page.
    next: run_gen_eval

  run_gen_eval:
    # HARNESS: Thin-wrapper delegation — runs generate → evaluate (Playwright screenshot) →
    # score (LLM rubric) inside oracles/generator-evaluator until ALL_PASS or max_iterations.
    # Routes to done on success; failed on error or exhausted retries (ENH-1869).
    loop: oracles/generator-evaluator
    with:
      run_dir: "${captured.run_dir.output}"
      generate_prompt: |
        Read ${captured.run_dir.output}/review.md for the surviving review items.

        If ${captured.run_dir.output}/critique.md exists, read it and address all issues listed
        in the "Issues to Address" section specifically and completely.

        ${context.design_tokens_context}

        Write a single self-contained HTML file to ${captured.run_dir.output}/index.html that:
        - Embeds ALL CSS and JavaScript inline (no external dependencies, no CDN links, no <link> tags)
        - Renders correctly under a file:// URL without an HTTP server
        - Has a clean header identifying this as a review page and showing the total item count

        If review.md indicates "nothing to review" (K=0):
        - Produce a simple, friendly page showing the pruning summary and confirming that all
          decisions are implementation-level — no human selections needed.

        Otherwise, for each surviving review item:
        - Show the item title and category label prominently
        - Display each option's content and rationale in a readable format (side-by-side on wide
          screens, stacked on narrow screens — pure CSS, no JS required for layout)
        - Provide a comparison control: radio buttons for binary choices (2 options), a labeled
          button group or cycle toggle for 3+ options
        - Visually highlight the currently selected option (border, background, or checkmark)
        - Below the last option for each item, include a subtle secondary affordance:
          a small "＋ Write custom option" trigger (font-size: 0.85em, color: #888, cursor: pointer,
          no border) that when clicked reveals a <textarea> (width: 100%, min-height: 60px,
          border: 1px solid #ccc, border-radius: 4px, padding: 8px, font-size: 0.9em) with
          placeholder "Describe your preferred option...". The write-in section is hidden on
          page load. Clicking anywhere inside the textarea deselects any radio button and marks
          the item as custom; clicking an extracted option radio re-collapses the textarea.
          Style it visually subordinate — smaller font, muted color — so it does not compete
          with the primary comparison controls.

        At the bottom of the page, include an "Export Selections" button that:
        - Uses JavaScript to read the current state of all selection controls
        - Builds a markdown block in this format:
          ```
          ## Review Selections — [ISO timestamp]

          - **[Item Title]**: [Chosen Option label, e.g. "Option A — [first few words of option]"]
          - **[Item Title]**: Custom — [first ~80 chars of textarea text]  ← for write-in items
          ...
          ```
          Items where the write-in textarea is active and non-empty emit "Custom — [text]";
          items where the write-in textarea is active but empty are treated as unselected
          (no line emitted for that item).
        - Displays the block in a visible <textarea> or <pre> element the user can copy
        - Includes a "Copy to clipboard" button that calls navigator.clipboard.writeText()

        Design: clean typography, generous whitespace, each item in its own card with a visible
        border, selected state unambiguous at a glance. Avoid external fonts.

        For images: Do NOT use relative or absolute file:// paths in <img src> — browsers block these
        under file://. Instead, for each option in review.md that has a `source_path:` line pointing
        to an image file (.jpg, .jpeg, .png, .gif, .webp, .svg), embed the image inline as a base64
        data URI. Use the Bash tool to convert each file:
          base64 < /path/to/image.png
        Then embed the result as:
          <img src="data:image/TYPE;base64,OUTPUT" style="max-width:100%;height:auto;border-radius:4px;display:block;margin-bottom:8px;">
        where TYPE matches the extension (use "jpeg" for .jpg, "svg+xml" for .svg, otherwise match
        the extension). Place the <img> above the text description inside the option card. If base64
        conversion fails or source_path is absent, render the card with text only — do not emit a
        broken <img> tag.
      rubric: |
        If ${captured.run_dir.output}/screenshot.png exists, read it to view the rendered review page.
        Otherwise read ${captured.run_dir.output}/index.html directly to evaluate the HTML source.
        Also read ${captured.run_dir.output}/review.md to recall what items should be present.

        Score the review page on each criterion from 1 to 10 and write the evaluation to
        ${captured.run_dir.output}/critique.md using this exact format:

        ```
        # Evaluation

        clarity: N/10 — [explanation: can a reviewer immediately understand each item and its options?
          Is each item title visible? Are options clearly labeled? Is the rationale readable?]
        scannability: N/10 — [explanation: can a reviewer scan all items quickly to see what needs
          a decision? Are items well-separated? Is the overall structure easy to navigate at a glance?]
        comparison_ergonomics: N/10 — [explanation: does the comparison control make it easy to
          toggle between options? Are options shown in a way that facilitates side-by-side comparison?
          Is the selected state visually unambiguous? Is there a subtle write-in affordance below
          the options that is clearly secondary (not a peer option)?]
        export_affordance: N/10 — [explanation: is the "Export selections" button visible and
          prominent? Does the exported markdown block clearly identify each item and its chosen option?
          Is the copy affordance obvious?]
        inline_constraint: N/10 — [explanation: does the page appear to render correctly under
          file://? All CSS/JS must be inline. Images, if present, must be embedded as base64 data
          URIs (src="data:image/...;base64,...") — NOT as file paths or relative URLs. A broken
          image icon or any external src= attribute is a constraint violation. Data URI images
          rendering correctly is a pass, not a violation.]

        ## Issues to Address
        [Specific, actionable critique for the generator. List each problem concisely so the
         generator can address it on the next pass. If all scores meet their thresholds, write
         "No issues — all criteria pass."]
        ```

        Thresholds (evaluate each criterion independently — do NOT average):
        - clarity: 7
        - scannability: 7
        - comparison_ergonomics: 7
        - export_affordance: 7
        - inline_constraint: 8

        If ALL five criterion scores meet their individual thresholds, output exactly: ALL_PASS
        Otherwise output: ITERATE
      pass_threshold: 7
    on_yes: done
    on_no: failed
    on_error: failed

  done:
    # HARNESS: Terminal state — reached when all criteria pass or max_iterations exhausted.
    # Reports all output file paths and explains how to feed selections back to the coding agent.
    action_type: prompt
    action: |
      The hitl-compare loop has completed successfully.

      Final output files:
      - ${captured.run_dir.output}/index.html     — the interactive review page (open in your browser)
      - ${captured.run_dir.output}/items.md       — all candidate review items extracted from inputs
      - ${captured.run_dir.output}/review.md      — surviving items after pruning (what's on the page)
      - ${captured.run_dir.output}/critique.md    — final evaluation scores and notes
      - ${captured.run_dir.output}/screenshot.png — the last Playwright-captured render (omitted if Playwright unavailable)

      To complete the review:
      1. Open ${captured.run_dir.output}/index.html in your browser (file:// URL works — no server needed).
      2. Toggle through the comparison controls and select your preferred option for each item.
      3. Click "Export Selections" at the bottom to generate the decisions markdown block.
      4. Copy the markdown block and paste it into your coding agent chat to update the relevant
         issues, plans, or specs with your chosen options (e.g. "Apply these review selections: [paste]").

      If the page shows "nothing to review", all decisions in the inputs were implementation-level
      or had obvious winners — the pruning step resolved them and no human input is needed.
    terminal: true

  failed:
    # HARNESS: Explicit failure terminal — reached when an unrecoverable error occurs
    # (e.g. LLM failure in score state). Provides a clear signal distinct from a
    # max_iterations timeout, making failure mode visible in ll-loop history.
    action_type: prompt
    action: |
      The hitl-compare loop has terminated with an unrecoverable error.

      Diagnose what failed:
      - If ${captured.run_dir.output}/critique.md exists, read it and summarize the last evaluation scores.
      - If ${captured.run_dir.output}/review.md exists, report how many items were identified for review.
      - Identify the most likely failure cause (most commonly: LLM error in the score state).

      Write a one-paragraph diagnostic summary so the operator can diagnose and re-run.
    terminal: true
