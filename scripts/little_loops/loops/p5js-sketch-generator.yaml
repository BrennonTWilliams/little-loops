description: |
  Generator-evaluator harness for p5.js creative coding sketches.
  Accepts a natural language sketch description via loop_input and iteratively
  generates and refines a single self-contained HTML file embedding a p5.js
  sketch. Unlike the html-website-generator (one screenshot per iteration), the
  evaluator captures multiple frames at deterministic frameCounts so motion
  itself can be judged — a static composition and a vibrantly-evolving system
  look identical at frame 0. Implements the GAN-style architecture from
  Anthropic's harness design article, adapted for time-based generative work.
  Delegates to generative-art base loop (ENH-2161).

