name: ready-to-implement-gate
category: gate
# Canonical built-in example of the `type: learning` FSM primitive (FEAT-1283).
description: Sub-loop that proves a list of external-API targets via ll-learning-tests; routes done if all proven, blocked if any refuted.
initial: prove
max_iterations: 50
timeout: 3600
on_handoff: spawn

context:
  targets: ""          # comma-separated; required
  max_retries: "2"     # per-target explore-api retries

states:
  prove:
    type: learning
    learning:
      targets_csv: "${context.targets}"           # resolved + CSV-split at runtime
      max_retries_expr: "${context.max_retries}"  # resolved to int at runtime
    on_yes: done
    on_blocked: blocked

  done:
    terminal: true

  blocked:
    terminal: true
