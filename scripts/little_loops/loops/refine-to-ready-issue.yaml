name: "refine-to-ready-issue"
category: issue-management
initial: resolve_issue
max_iterations: 20
on_handoff: spawn
context:
  readiness_threshold: 90   # canonical: commands.confidence_gate.readiness_threshold in ll-config.json
  outcome_threshold: 75     # canonical: commands.confidence_gate.outcome_threshold in ll-config.json
  max_refine_count: 5       # canonical: commands.max_refine_count in ll-config.json
import:
  - lib/common.yaml

states:
  resolve_issue:
    action: >-
      mkdir -p .loops/tmp &&
      printf '0' > .loops/tmp/refine-to-ready-refine-count &&
      printf '0' > .loops/tmp/refine-to-ready-wire-done &&
      { [ -n "${context.input}" ] && printf '%s' "${context.input}" ||
      ll-issues next-issue; } | tr -d '\n\r '
    action_type: shell
    capture: issue_id
    next: format_issue
    on_error: failed

  format_issue:
    action: "/ll:format-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: check_lifetime_limit
    on_error: failed

  check_lifetime_limit:
    action: |
      MAX_TOTAL=$(python3 << 'PYEOF'
      import json
      from pathlib import Path
      p = Path('.ll/ll-config.json')
      cfg = {}
      if p.exists():
          try:
              cfg = json.loads(p.read_text())
          except Exception:
              pass
      print(cfg.get('commands', {}).get('max_refine_count', ${context.max_refine_count}))
      PYEOF
      )
      [ -z "$MAX_TOTAL" ] && MAX_TOTAL=${context.max_refine_count}

      TOTAL_REFINES=$(ll-issues refine-status "${captured.issue_id.output}" --json 2>/dev/null \
        | python3 -c "
      import json, sys
      try:
          d = json.loads(sys.stdin.read())
          print(int(d.get('refine_count', 0)))
      except Exception:
          print(0)
      " 2>/dev/null || echo 0)

      if [ "$TOTAL_REFINES" -ge "$MAX_TOTAL" ]; then
        echo 1
      else
        echo 0
      fi
    action_type: shell
    # 0 = under lifetime cap → proceed; 1 = cap reached → invoke issue-size-review
    # Cap is commands.max_refine_count in ll-config.json (default: ${context.max_refine_count})
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: refine_issue
    on_no: breakdown_issue
    on_error: failed

  refine_issue:
    action: "/ll:refine-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: check_wire_done
    on_error: failed

  check_wire_done:
    action: |
      cat .loops/tmp/refine-to-ready-wire-done 2>/dev/null || echo 0
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: wire_issue      # 0 → not yet wired → run wire
    on_no: confidence_check # 1 → already wired → skip
    on_error: confidence_check

  wire_issue:
    action: "/ll:wire-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: mark_wire_done
    on_error: confidence_check  # wiring failure is non-fatal

  mark_wire_done:
    action: printf '1' > .loops/tmp/refine-to-ready-wire-done
    action_type: shell
    next: confidence_check
    on_error: confidence_check

  confidence_check:
    action: "/ll:confidence-check ${captured.issue_id.output}"
    action_type: slash_command
    next: check_scores

  check_scores:
    # Read scores written to issue frontmatter by the confidence_check skill.
    # Uses exit_code evaluator (not shell_exit fragment) to allow non-default routing fields.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness
                 and int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    action_type: shell
    evaluate:
      type: exit_code
    on_yes: done
    on_no: check_refine_limit
    on_error: check_scores_from_file

  check_refine_limit:
    action: |
      FILE=".loops/tmp/refine-to-ready-refine-count"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      echo "$N"
    action_type: shell
    # target: 2 → allows 1 loopback per run (2 total refines: 1 initial + 1 retry)
    # Increase target to allow more retries (e.g. target: 3 = 3 total refines per run)
    # Budget exhaustion routes to breakdown_issue; lifetime cap enforced by check_lifetime_limit
    evaluate:
      type: output_numeric
      operator: lt
      target: 2
    on_yes: refine_issue
    on_no: breakdown_issue
    on_error: failed

  check_scores_from_file:
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness
                 and int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    fragment: shell_exit
    on_yes: done
    on_no: failed
    on_error: failed

  breakdown_issue:
    action: "/ll:issue-size-review ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: done
    on_error: failed

  done:
    terminal: true

  failed:
    terminal: true
