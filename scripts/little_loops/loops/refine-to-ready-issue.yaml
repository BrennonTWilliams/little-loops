name: "refine-to-ready-issue"
description: "Drives a single issue from backlog to ready-state: refines it, wires integration points, runs confidence checks, and routes to issue-size-review if confidence thresholds cannot be met."
category: issue-management
# Routing summary:
#   resolve_issue → check_epic_id → (on_yes: EPIC id) breakdown_issue | (on_no: leaf) check_lifetime_limit
#   confidence_check (oracle: verify-confidence-scores) → (on_success) check_readiness → (on_yes) check_outcome → (on_yes) done
#                                                       → (on_failure) diagnose
#                      check_readiness         → (on_no)  check_refine_limit → refine_followup (additive --gap-analysis)
#                      check_outcome           → (on_no)  check_decision_needed → (on_yes) done
#                                                                               → (on_no)  breakdown_issue
#   check_scores_from_file (error fallback) → (on_yes) done | (on_no) breakdown_issue
initial: resolve_issue
max_steps: 20
on_handoff: spawn
context:
  readiness_threshold: 85   # canonical: commands.confidence_gate.readiness_threshold in ll-config.json
  outcome_threshold: 65     # canonical: commands.confidence_gate.outcome_threshold in ll-config.json
  max_refine_count: 5       # canonical: commands.max_refine_count in ll-config.json
import:
  - lib/common.yaml

# BUG-2685: fire a distinct terminated_by: "stall_detected" (instead of
# silently burning the full max_steps budget on a phantom-convergence loop,
# e.g. a sub-loop state like confidence_check retrying without observable
# state-level progress) before the max_steps guard would otherwise mask the
# stall behind a misleading final_state: "done" / terminated_by: "max_steps"
# combo. Mirrors general-task.yaml's circuit.repeated_failure config; window=3
# is safely above this loop's one legitimate retry cycle (check_refine_limit
# caps check_readiness retries at 1, so its triple repeats at most twice
# consecutively in normal operation).
circuit:
  repeated_failure:
    window: 3
    on_repeated_failure: diagnose

states:
  resolve_issue:
    action: >-
      mkdir -p ${context.run_dir} &&
      printf '0' > ${context.run_dir}/refine-to-ready-refine-count &&
      printf '0' > ${context.run_dir}/refine-to-ready-wire-done &&
      printf '0' > ${context.run_dir}/refine-broke-down &&
      { [ -n ${context.input:shell} ] && printf '%s' ${context.input:shell} ||
      ll-issues next-issue; } | tr -d '\n\r '
    action_type: shell
    capture: issue_id
    next: check_epic_id
    on_error: diagnose

  check_epic_id:
    # Defense-in-depth (BUG-2638): EPICs are umbrella containers, never
    # implementable leaves. `ll-issues next-issue` now filters EPIC ids out at
    # the source, but a stray EPIC id reaching this loop (explicit
    # context.input, an unfiltered caller) must be decomposed, not refined as a
    # leaf via /ll:refine-issue. Route EPIC ids to breakdown_issue.
    action: |
      case "${captured.issue_id.output}" in
        EPIC-*) exit 0 ;;
        *) exit 1 ;;
      esac
    action_type: shell
    # exit 0 (on_yes) = id is an EPIC → decompose; exit 1 (on_no) = leaf → proceed
    evaluate:
      type: exit_code
    on_yes: breakdown_issue
    on_no: check_lifetime_limit
    on_error: check_lifetime_limit

  check_lifetime_limit:
    action: |
      MAX_TOTAL=$(python3 << 'PYEOF'
      import json
      from pathlib import Path
      p = Path('.ll/ll-config.json')
      cfg = {}
      if p.exists():
          try:
              cfg = json.loads(p.read_text())
          except Exception:
              pass
      print(cfg.get('commands', {}).get('max_refine_count', ${context.max_refine_count}))
      PYEOF
      )
      [ -z "$MAX_TOTAL" ] && MAX_TOTAL=${context.max_refine_count}

      TOTAL_REFINES=$(ll-issues refine-status "${captured.issue_id.output}" --json 2>/dev/null \
        | python3 -c "
      import json, sys
      try:
          d = json.loads(sys.stdin.read())
          print(int(d.get('refine_count', 0)))
      except Exception:
          print(0)
      " 2>/dev/null || echo 0)

      if [ "$TOTAL_REFINES" -ge "$MAX_TOTAL" ]; then
        echo 1
      else
        echo 0
      fi
    action_type: shell
    # BUG-2726: capture so ${captured.check_lifetime_limit.stderr} carries the
    # real failure (e.g. a broken ll-issues refine-status) into the diagnose prompt.
    capture: check_lifetime_limit
    # 0 = under lifetime cap → proceed; 1 = cap reached → invoke issue-size-review
    # Cap is commands.max_refine_count in ll-config.json (default: ${context.max_refine_count})
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: refine_issue
    on_no: breakdown_issue
    on_error: diagnose

  refine_issue:
    # First-pass refine (entered from check_lifetime_limit). ENH-2247 pattern
    # (mirrors rn-remediate): the initial pass uses --auto (default mode), NOT the
    # legacy --full-rewrite. Full-rewrite is the heaviest, most destructive mode and
    # is not warranted on first touch — it bulldozes any existing content and inflates
    # the budget. --auto can still reshape wrong/sparse content; retries route to
    # refine_followup (additive --gap-analysis) so a second pass patches gaps instead
    # of re-bulldozing the first pass's improvements.
    action: "/ll:refine-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    # BUG-2726: capture so a killed refine (e.g. exit 143 SIGTERM) surfaces its
    # exit code / output tail via ${captured.refine_issue.*} in the diagnose prompt.
    capture: refine_issue
    next: check_decision_mid_refine
    on_error: diagnose

  refine_followup:
    # Retry refine (entered from check_refine_limit). ENH-2247: a refine pass already
    # ran this run, so patch remaining gaps additively (--auto --gap-analysis) instead
    # of re-running a destructive rewrite over the first pass. Gap-analysis is
    # additive-only (never removes content) and does not consume max_refine_count.
    action: "/ll:refine-issue ${captured.issue_id.output} --auto --gap-analysis"
    action_type: slash_command
    # BUG-2726: capture the retry refine's failure context for the diagnose prompt.
    capture: refine_followup
    next: check_decision_mid_refine
    on_error: diagnose

  check_decision_mid_refine:
    # Mid-chain gate after refine: if /ll:refine-issue set decision_needed: true,
    # skip the remaining wire + confidence_check invocations and exit via done so
    # the outer autodev loop's check_decision_after_refine (autodev.yaml:165) can
    # route to run_decide. Mirrors check_decision_needed (line 197) pattern; differs
    # only in placement (mid-chain, not end-of-chain). BUG-2528.
    action: "ll-issues check-flag ${captured.issue_id.output} decision_needed"
    fragment: shell_exit
    on_yes: done
    on_no: check_wire_done
    on_error: check_wire_done

  check_wire_done:
    action: |
      cat ${context.run_dir}/refine-to-ready-wire-done 2>/dev/null || echo 0
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: wire_issue      # 0 → not yet wired → run wire
    on_no: confidence_check # 1 → already wired → skip
    on_error: confidence_check

  wire_issue:
    action: "/ll:wire-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: mark_wire_done
    on_error: confidence_check  # wiring failure is non-fatal

  mark_wire_done:
    action: printf '1' > ${context.run_dir}/refine-to-ready-wire-done
    action_type: shell
    next: check_decision_mid_wire
    on_error: confidence_check

  check_decision_mid_wire:
    # Mid-chain gate after wire: if /ll:wire-issue set decision_needed: true, skip
    # the confidence_check invocation. Same exit-via-done contract as
    # check_decision_mid_refine; lets the outer autodev/recursive-refine loop's
    # post-return decision gate route to run_decide without the wasted LLM budget
    # of a confidence check the flag invalidates. BUG-2528.
    action: "ll-issues check-flag ${captured.issue_id.output} decision_needed"
    fragment: shell_exit
    on_yes: done
    on_no: confidence_check
    on_error: confidence_check

  confidence_check:
    loop: oracles/verify-confidence-scores
    with:
      issue_id: "${captured.issue_id.output}"
    # BUG-2726: capture the child event stream so the diagnose prompt has
    # evidence for a confidence_check failure. A `loop:` capture is shaped
    # {"output": <event-jsonl>, "exit_code": None} with NO `stderr` key
    # (executor._execute_sub_loop), so the diagnose prompt falls back to
    # ${captured.confidence_check.output} rather than a nonexistent `.stderr`.
    capture: confidence_check
    on_success: check_readiness
    on_failure: diagnose
    on_error: diagnose

  check_readiness:
    # Step 1 of 2: check only technical readiness (confidence_score vs readiness_threshold).
    # Readiness below threshold → retry refinement (refine-issue can fix technical gaps).
    # Readiness passes → proceed to check_outcome.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness else 1)
      PYEOF
    action_type: shell
    evaluate:
      type: exit_code
    on_yes: check_outcome
    on_no: check_refine_limit
    on_error: check_scores_from_file

  check_outcome:
    # Step 2 of 2: check outcome confidence (outcome_confidence vs outcome_threshold).
    # Outcome below threshold → check_decision_needed before falling through to breakdown_issue.
    # Outcome passes → done.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      # BUG-2726: surface the REAL inner ll-issues failure (not the heredoc
      # wrapper's own status) and exit 2 → verdict 'error' → on_error: diagnose.
      # A bare json.loads traceback would exit 1 → verdict 'no' →
      # check_decision_needed, misclassifying an infra failure as a low score.
      if r.returncode != 0:
          sys.stderr.write(r.stderr or 'll-issues show exited %d\n' % r.returncode)
          sys.exit(2)
      try:
          d = json.loads(r.stdout)
      except (json.JSONDecodeError, ValueError):
          sys.stderr.write(r.stderr or 'll-issues show returned unparseable JSON\n')
          sys.exit(2)
      sys.exit(0 if int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    action_type: shell
    # BUG-2726: capture so ${captured.check_outcome.stderr} carries the inner
    # ll-issues failure into the diagnose prompt.
    capture: check_outcome
    evaluate:
      type: exit_code
    on_yes: done
    on_no: check_decision_needed
    on_error: diagnose

  check_decision_needed:
    # Gate before size-review: if decision_needed=true the low outcome score is driven
    # by unresolved option ambiguity (0/25 ambiguity), not by scope being too large.
    # Exit via done so autodev's check_decision_after_refine can route to run_decide.
    # on_no falls through to check_missing_artifacts before breakdown_issue.
    action: "ll-issues check-flag ${captured.issue_id.output} decision_needed"
    fragment: shell_exit
    on_yes: done
    on_no: check_missing_artifacts
    on_error: check_missing_artifacts

  check_missing_artifacts:
    # Gate before size-review: if missing_artifacts=true the low outcome score is
    # caused by absent files/unwired components, not scope. Exit via done so the
    # outer loop's triage_outcome_failure → check_missing_artifacts → run_wire path
    # can handle the repair. Mirrors check_decision_needed above and autodev.yaml:419.
    action: "ll-issues check-flag ${captured.issue_id.output} missing_artifacts"
    fragment: shell_exit
    on_yes: done
    on_no: breakdown_issue
    on_error: breakdown_issue

  check_refine_limit:
    action: |
      FILE="${context.run_dir}/refine-to-ready-refine-count"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      echo "$N"
    action_type: shell
    # BUG-2726: capture so a counter-file failure surfaces via
    # ${captured.check_refine_limit.stderr} in the diagnose prompt.
    capture: check_refine_limit
    # target: 2 → allows 1 loopback per run (2 total refines: 1 initial + 1 retry)
    # Increase target to allow more retries (e.g. target: 3 = 3 total refines per run)
    # Budget exhaustion routes to breakdown_issue; lifetime cap enforced by check_lifetime_limit
    evaluate:
      type: output_numeric
      operator: lt
      target: 2
    on_yes: refine_followup
    on_no: breakdown_issue
    on_error: diagnose

  check_scores_from_file:
    # Error-recovery fallback: reached when check_readiness subprocess fails.
    # Reads both scores directly from frontmatter without Python eval.
    # on_no routes to breakdown_issue (not failed) — outcome-only failures here
    # should not stall the loop; scope reduction is the appropriate intervention.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      # BUG-2726: surface the REAL inner ll-issues failure (not the heredoc
      # wrapper's status) and exit 2 → verdict 'error' → on_error: diagnose,
      # so ${captured.check_scores_from_file.stderr} carries it forward.
      if r.returncode != 0:
          sys.stderr.write(r.stderr or 'll-issues show exited %d\n' % r.returncode)
          sys.exit(2)
      try:
          d = json.loads(r.stdout)
      except (json.JSONDecodeError, ValueError):
          sys.stderr.write(r.stderr or 'll-issues show returned unparseable JSON\n')
          sys.exit(2)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness
                 and int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    fragment: shell_exit
    # BUG-2726: capture so ${captured.check_scores_from_file.stderr} carries the
    # inner ll-issues failure into the diagnose prompt.
    capture: check_scores_from_file
    on_yes: done
    on_no: breakdown_issue
    on_error: diagnose

  breakdown_issue:
    action: "/ll:issue-size-review ${captured.issue_id.output} --auto"
    action_type: slash_command
    # BUG-2726: capture so a size-review failure surfaces via
    # ${captured.breakdown_issue.*} in the diagnose prompt.
    capture: breakdown_issue
    next: write_broke_down
    on_error: diagnose

  write_broke_down:
    action: printf '1' > ${context.run_dir}/refine-broke-down
    action_type: shell
    next: done
    on_error: done

  done:
    terminal: true

  diagnose:
    # BUG-2726: this prompt is reached via on_error/on_failure from 8+ states and
    # from circuit.repeated_failure. It MUST diagnose from this run's concrete
    # evidence — the failing state name, its exit code, its stderr/output — not
    # confabulate from an unrelated earlier run. Every ${captured.*} ref uses the
    # `?` nullable suffix because only the failing state's capture is populated on
    # any given run; the rest resolve to '' instead of raising InterpolationError.
    action_type: prompt
    action: |
      The refine-to-ready-issue loop terminated with an unrecoverable failure.
      Diagnose it using ONLY the concrete evidence from THIS run, captured below.
      Do NOT infer from, open, or analyze any earlier run under .loops/.history/ —
      confine your analysis to this run's run_dir.

      This run's evidence:
      - Issue being refined: ${captured.issue_id.output?}
      - This run's directory: ${context.run_dir}
      - Failing state: ${prev.state}
      - Failing state exit code: ${prev.exit_code}
      - Failing state output tail:
      ${prev.output?}

      Captured stderr by failure-source state (only the block for the failing
      state above is populated; the others are intentionally blank):
      - resolve_issue:          ${captured.issue_id.stderr?}
      - check_lifetime_limit:   ${captured.check_lifetime_limit.stderr?}
      - refine_issue:           ${captured.refine_issue.stderr?}
      - refine_followup:        ${captured.refine_followup.stderr?}
      - check_outcome:          ${captured.check_outcome.stderr?}
      - check_refine_limit:     ${captured.check_refine_limit.stderr?}
      - check_scores_from_file: ${captured.check_scores_from_file.stderr?}
      - breakdown_issue:        ${captured.breakdown_issue.stderr?}
      - confidence_check (sub-loop — no stderr channel; event stream instead):
      ${captured.confidence_check.output?}

      Using the exit code and the stderr/output block for the failing state:
      - A positive exit code such as 143 (128+15, SIGTERM) or 137 (128+9,
        SIGKILL/OOM) means the action was KILLED EXTERNALLY — it does NOT mean
        the state was never reached. Say so explicitly and quote the code.
      - If the issue file exists, read its current status and last session-log entry.
      - Name the most likely cause grounded in the evidence above (e.g. external
        timeout kill, issue not found, lifetime cap reached, size-review decomposition).

      Write a one-paragraph diagnostic summary, quoting the exit code and any
      stderr verbatim, that the operator can act on to re-run or inspect the issue.
    next: classify_terminal

  classify_terminal:
    # ENH-2727: emit a machine-readable termination-class sentinel for autodev's
    # skip path to consume. Reached only from diagnose — the sole route to the
    # `failed` terminal — so it always runs on the failed path and never on the
    # done path. Classifies THIS run's failure as `infra` when the failing state
    # was killed externally (exit 143/137/124 = SIGTERM/OOM/timeout, or a
    # negative signal code) — a re-runnable transient — else `quality` (a genuine
    # refine defect that needs human attention).
    #
    # The failing state's exit code survives in its OWN capture (BUG-2726 already
    # captures refine_issue/refine_followup/check_*), so this reads those rather
    # than ${prev.exit_code} — by now `prev` is diagnose itself (a prompt state
    # whose own exit code is 0). Reaching diagnose means the FIRST error/kill
    # routed here (each source state routes on_error → diagnose immediately), so a
    # 143/137/124 in any populated capture unambiguously marks the terminating
    # failure. The `?` nullable suffix leaves un-run states as '' (word-split away).
    #
    # Written to the shared run_dir (context_passthrough); autodev's skip_inflight
    # reads refine-terminal-class and routes infra kills to skip_inflight_infra.
    action: |
      CLASS=quality
      for c in ${captured.refine_issue.exit_code?} ${captured.refine_followup.exit_code?} ${captured.breakdown_issue.exit_code?} ${captured.check_outcome.exit_code?} ${captured.check_refine_limit.exit_code?} ${captured.check_scores_from_file.exit_code?} ${captured.issue_id.exit_code?} ${captured.check_lifetime_limit.exit_code?}; do
        case "$c" in
          143|137|124) CLASS=infra ;;
          -*) CLASS=infra ;;
        esac
      done
      printf '%s' "$CLASS" > ${context.run_dir}/refine-terminal-class
    action_type: shell
    next: failed
    on_error: failed

  failed:
    terminal: true
