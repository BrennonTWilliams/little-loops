name: "refine-to-ready-issue"
category: issue-management
initial: resolve_issue
max_iterations: 20
on_handoff: spawn
context:
  readiness_threshold: 90   # canonical: commands.confidence_gate.readiness_threshold in ll-config.json
  outcome_threshold: 75     # canonical: commands.confidence_gate.outcome_threshold in ll-config.json
import:
  - lib/common.yaml

states:
  resolve_issue:
    action: >-
      mkdir -p .loops/tmp &&
      printf '0' > .loops/tmp/refine-to-ready-refine-count &&
      { [ -n "${context.input}" ] && printf '%s' "${context.input}" ||
      ll-issues next-issue; } | tr -d '\n\r '
    action_type: shell
    capture: issue_id
    next: format_issue
    on_error: failed

  format_issue:
    action: "/ll:format-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: refine_issue
    on_error: failed

  refine_issue:
    action: "/ll:refine-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: confidence_check
    on_error: failed

  confidence_check:
    action: "/ll:confidence-check ${captured.issue_id.output}"
    action_type: slash_command
    evaluate:
      type: llm_structured
      prompt: >
        Review the confidence check output for issue
        ${captured.issue_id.output}. Answer YES only if BOTH
        thresholds are met: (1) Readiness Score > ${context.readiness_threshold}, and
        (2) Outcome Confidence Score > ${context.outcome_threshold}. Answer NO if
        either score does not meet its threshold.
    on_yes: verify_issue
    on_no: check_refine_limit
    on_error: check_scores_from_file

  check_refine_limit:
    action: |
      FILE=".loops/tmp/refine-to-ready-refine-count"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      echo "$N"
    action_type: shell
    # target: 2 → allows 1 loopback (2 total refines: 1 initial + 1 retry)
    # Increase target to allow more retries (e.g. target: 3 = 3 total refines)
    evaluate:
      type: output_numeric
      operator: lt
      target: 2
    on_yes: refine_issue
    on_no: failed
    on_error: failed

  check_scores_from_file:
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness
                 and int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    fragment: shell_exit
    on_yes: verify_issue
    on_no: failed
    on_error: failed

  verify_issue:
    action: "/ll:verify-issues ${captured.issue_id.output}"
    action_type: slash_command
    next: done
    on_error: failed

  done:
    terminal: true

  failed:
    terminal: true
