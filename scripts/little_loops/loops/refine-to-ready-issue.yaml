name: "refine-to-ready-issue"
description: "Drives a single issue from backlog to ready-state: refines it, wires integration points, runs confidence checks, and routes to issue-size-review if confidence thresholds cannot be met."
category: issue-management
# Routing summary:
#   resolve_issue → check_epic_id → (on_yes: EPIC id) breakdown_issue | (on_no: leaf) check_lifetime_limit
#   confidence_check (oracle: verify-confidence-scores) → (on_success) check_readiness → (on_yes) check_outcome → (on_yes) done
#                                                       → (on_failure) diagnose
#                      check_readiness         → (on_no)  check_refine_limit → refine_followup (additive --gap-analysis)
#                      check_outcome           → (on_no)  check_decision_needed → (on_yes) done
#                                                                               → (on_no)  breakdown_issue
#   check_scores_from_file (error fallback) → (on_yes) done | (on_no) breakdown_issue
initial: resolve_issue
max_steps: 20
on_handoff: spawn
context:
  readiness_threshold: 85   # canonical: commands.confidence_gate.readiness_threshold in ll-config.json
  outcome_threshold: 65     # canonical: commands.confidence_gate.outcome_threshold in ll-config.json
  max_refine_count: 5       # canonical: commands.max_refine_count in ll-config.json
import:
  - lib/common.yaml

states:
  resolve_issue:
    action: >-
      mkdir -p ${context.run_dir} &&
      printf '0' > ${context.run_dir}/refine-to-ready-refine-count &&
      printf '0' > ${context.run_dir}/refine-to-ready-wire-done &&
      printf '0' > ${context.run_dir}/refine-broke-down &&
      { [ -n ${context.input:shell} ] && printf '%s' ${context.input:shell} ||
      ll-issues next-issue; } | tr -d '\n\r '
    action_type: shell
    capture: issue_id
    next: check_epic_id
    on_error: diagnose

  check_epic_id:
    # Defense-in-depth (BUG-2638): EPICs are umbrella containers, never
    # implementable leaves. `ll-issues next-issue` now filters EPIC ids out at
    # the source, but a stray EPIC id reaching this loop (explicit
    # context.input, an unfiltered caller) must be decomposed, not refined as a
    # leaf via /ll:refine-issue. Route EPIC ids to breakdown_issue.
    action: |
      case "${captured.issue_id.output}" in
        EPIC-*) exit 0 ;;
        *) exit 1 ;;
      esac
    action_type: shell
    # exit 0 (on_yes) = id is an EPIC → decompose; exit 1 (on_no) = leaf → proceed
    evaluate:
      type: exit_code
    on_yes: breakdown_issue
    on_no: check_lifetime_limit
    on_error: check_lifetime_limit

  check_lifetime_limit:
    action: |
      MAX_TOTAL=$(python3 << 'PYEOF'
      import json
      from pathlib import Path
      p = Path('.ll/ll-config.json')
      cfg = {}
      if p.exists():
          try:
              cfg = json.loads(p.read_text())
          except Exception:
              pass
      print(cfg.get('commands', {}).get('max_refine_count', ${context.max_refine_count}))
      PYEOF
      )
      [ -z "$MAX_TOTAL" ] && MAX_TOTAL=${context.max_refine_count}

      TOTAL_REFINES=$(ll-issues refine-status "${captured.issue_id.output}" --json 2>/dev/null \
        | python3 -c "
      import json, sys
      try:
          d = json.loads(sys.stdin.read())
          print(int(d.get('refine_count', 0)))
      except Exception:
          print(0)
      " 2>/dev/null || echo 0)

      if [ "$TOTAL_REFINES" -ge "$MAX_TOTAL" ]; then
        echo 1
      else
        echo 0
      fi
    action_type: shell
    # 0 = under lifetime cap → proceed; 1 = cap reached → invoke issue-size-review
    # Cap is commands.max_refine_count in ll-config.json (default: ${context.max_refine_count})
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: refine_issue
    on_no: breakdown_issue
    on_error: diagnose

  refine_issue:
    # First-pass refine (entered from check_lifetime_limit). ENH-2247 pattern
    # (mirrors rn-remediate): the initial pass uses --auto (default mode), NOT the
    # legacy --full-rewrite. Full-rewrite is the heaviest, most destructive mode and
    # is not warranted on first touch — it bulldozes any existing content and inflates
    # the budget. --auto can still reshape wrong/sparse content; retries route to
    # refine_followup (additive --gap-analysis) so a second pass patches gaps instead
    # of re-bulldozing the first pass's improvements.
    action: "/ll:refine-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: check_decision_mid_refine
    on_error: diagnose

  refine_followup:
    # Retry refine (entered from check_refine_limit). ENH-2247: a refine pass already
    # ran this run, so patch remaining gaps additively (--auto --gap-analysis) instead
    # of re-running a destructive rewrite over the first pass. Gap-analysis is
    # additive-only (never removes content) and does not consume max_refine_count.
    action: "/ll:refine-issue ${captured.issue_id.output} --auto --gap-analysis"
    action_type: slash_command
    next: check_decision_mid_refine
    on_error: diagnose

  check_decision_mid_refine:
    # Mid-chain gate after refine: if /ll:refine-issue set decision_needed: true,
    # skip the remaining wire + confidence_check invocations and exit via done so
    # the outer autodev loop's check_decision_after_refine (autodev.yaml:165) can
    # route to run_decide. Mirrors check_decision_needed (line 197) pattern; differs
    # only in placement (mid-chain, not end-of-chain). BUG-2528.
    action: "ll-issues check-flag ${captured.issue_id.output} decision_needed"
    fragment: shell_exit
    on_yes: done
    on_no: check_wire_done
    on_error: check_wire_done

  check_wire_done:
    action: |
      cat ${context.run_dir}/refine-to-ready-wire-done 2>/dev/null || echo 0
    action_type: shell
    evaluate:
      type: output_numeric
      operator: lt
      target: 1
    on_yes: wire_issue      # 0 → not yet wired → run wire
    on_no: confidence_check # 1 → already wired → skip
    on_error: confidence_check

  wire_issue:
    action: "/ll:wire-issue ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: mark_wire_done
    on_error: confidence_check  # wiring failure is non-fatal

  mark_wire_done:
    action: printf '1' > ${context.run_dir}/refine-to-ready-wire-done
    action_type: shell
    next: check_decision_mid_wire
    on_error: confidence_check

  check_decision_mid_wire:
    # Mid-chain gate after wire: if /ll:wire-issue set decision_needed: true, skip
    # the confidence_check invocation. Same exit-via-done contract as
    # check_decision_mid_refine; lets the outer autodev/recursive-refine loop's
    # post-return decision gate route to run_decide without the wasted LLM budget
    # of a confidence check the flag invalidates. BUG-2528.
    action: "ll-issues check-flag ${captured.issue_id.output} decision_needed"
    fragment: shell_exit
    on_yes: done
    on_no: confidence_check
    on_error: confidence_check

  confidence_check:
    loop: oracles/verify-confidence-scores
    with:
      issue_id: "${captured.issue_id.output}"
    on_success: check_readiness
    on_failure: diagnose
    on_error: diagnose

  check_readiness:
    # Step 1 of 2: check only technical readiness (confidence_score vs readiness_threshold).
    # Readiness below threshold → retry refinement (refine-issue can fix technical gaps).
    # Readiness passes → proceed to check_outcome.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness else 1)
      PYEOF
    action_type: shell
    evaluate:
      type: exit_code
    on_yes: check_outcome
    on_no: check_refine_limit
    on_error: check_scores_from_file

  check_outcome:
    # Step 2 of 2: check outcome confidence (outcome_confidence vs outcome_threshold).
    # Outcome below threshold → check_decision_needed before falling through to breakdown_issue.
    # Outcome passes → done.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    action_type: shell
    evaluate:
      type: exit_code
    on_yes: done
    on_no: check_decision_needed
    on_error: diagnose

  check_decision_needed:
    # Gate before size-review: if decision_needed=true the low outcome score is driven
    # by unresolved option ambiguity (0/25 ambiguity), not by scope being too large.
    # Exit via done so autodev's check_decision_after_refine can route to run_decide.
    # on_no falls through to check_missing_artifacts before breakdown_issue.
    action: "ll-issues check-flag ${captured.issue_id.output} decision_needed"
    fragment: shell_exit
    on_yes: done
    on_no: check_missing_artifacts
    on_error: check_missing_artifacts

  check_missing_artifacts:
    # Gate before size-review: if missing_artifacts=true the low outcome score is
    # caused by absent files/unwired components, not scope. Exit via done so the
    # outer loop's triage_outcome_failure → check_missing_artifacts → run_wire path
    # can handle the repair. Mirrors check_decision_needed above and autodev.yaml:419.
    action: "ll-issues check-flag ${captured.issue_id.output} missing_artifacts"
    fragment: shell_exit
    on_yes: done
    on_no: breakdown_issue
    on_error: breakdown_issue

  check_refine_limit:
    action: |
      FILE="${context.run_dir}/refine-to-ready-refine-count"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      echo "$N"
    action_type: shell
    # target: 2 → allows 1 loopback per run (2 total refines: 1 initial + 1 retry)
    # Increase target to allow more retries (e.g. target: 3 = 3 total refines per run)
    # Budget exhaustion routes to breakdown_issue; lifetime cap enforced by check_lifetime_limit
    evaluate:
      type: output_numeric
      operator: lt
      target: 2
    on_yes: refine_followup
    on_no: breakdown_issue
    on_error: diagnose

  check_scores_from_file:
    # Error-recovery fallback: reached when check_readiness subprocess fails.
    # Reads both scores directly from frontmatter without Python eval.
    # on_no routes to breakdown_issue (not failed) — outcome-only failures here
    # should not stall the loop; scope reduction is the appropriate intervention.
    action: |
      python3 << 'PYEOF'
      import json, sys, subprocess
      from pathlib import Path

      p = Path('.ll/ll-config.json')
      cg = {}
      if p.exists():
          try:
              cg = json.loads(p.read_text()).get('commands', {}).get('confidence_gate', {})
          except Exception:
              pass
      readiness = cg.get('readiness_threshold', ${context.readiness_threshold})
      outcome = cg.get('outcome_threshold', ${context.outcome_threshold})

      r = subprocess.run(
          ['ll-issues', 'show', '${captured.issue_id.output}', '--json'],
          capture_output=True, text=True
      )
      d = json.loads(r.stdout)
      sys.exit(0 if int(d.get('confidence') or 0) >= readiness
                 and int(d.get('outcome') or 0) >= outcome else 1)
      PYEOF
    fragment: shell_exit
    on_yes: done
    on_no: breakdown_issue
    on_error: diagnose

  breakdown_issue:
    action: "/ll:issue-size-review ${captured.issue_id.output} --auto"
    action_type: slash_command
    next: write_broke_down
    on_error: diagnose

  write_broke_down:
    action: printf '1' > ${context.run_dir}/refine-broke-down
    action_type: shell
    next: done
    on_error: done

  done:
    terminal: true

  diagnose:
    action_type: prompt
    action: |
      The refine-to-ready-issue loop has terminated with an unrecoverable failure.

      Diagnose what happened:
      - Report the issue ID being refined: ${captured.issue_id.output}
      - Identify which state failed (resolve_issue, check_lifetime_limit, check_readiness, etc.).
      - If the issue file exists, read its current status and last session log entry.
      - Identify the most likely failure cause (e.g., issue not found, lifetime limit exceeded, size-review decomposed it).

      Write a one-paragraph diagnostic summary the operator can use to re-run or inspect the issue.
    next: failed

  failed:
    terminal: true
