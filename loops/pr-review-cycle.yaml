name: pr-review-cycle
description: |
  Full pre-PR pipeline: quality checks, test run, PR description generation,
  and PR creation. Ensures all checks pass before opening a PR, with
  auto-fix cycles for quality and test failures.
initial: check_branch
states:
  check_branch:
    action: |
      BRANCH=$(git branch --show-current)
      if [ "$BRANCH" = "main" ] || [ "$BRANCH" = "master" ]; then
        echo "ERROR: Cannot open PR from $BRANCH"
        exit 1
      fi
      echo "BRANCH: $BRANCH"
      DIFF_COUNT=$(git diff main...HEAD --stat | tail -1)
      echo "CHANGES: $DIFF_COUNT"
    action_type: shell
    capture: branch_info
    evaluate:
      type: exit_code
    on_success: quality_gate
    on_failure: done
    on_error: done
  quality_gate:
    action: "Run `/ll:check-code lint,format,types` and report all results."
    action_type: prompt
    capture: quality_result
    evaluate:
      type: llm_structured
      prompt: |
        Did ALL quality checks (lint, format, types) pass cleanly?
        Return "success" if all passed.
        Return "failure" if any check found errors.
    on_success: run_tests
    on_failure: fix_quality
    on_error: fix_quality
  fix_quality:
    action_type: prompt
    timeout: 600
    action: |
      Quality issues found:
      ${captured.quality_result.output}

      Run `/ll:check-code fix` for auto-fixable issues, then manually
      fix remaining type errors. Do not suppress with # type: ignore.
    next: quality_gate
  run_tests:
    action_type: shell
    timeout: 600
    action: |
      CMD=$(python3 -c "
      import json, pathlib
      p = pathlib.Path('.claude/ll-config.json')
      cfg = json.loads(p.read_text()) if p.exists() else {}
      print(cfg.get('project', {}).get('test_cmd', 'pytest'))
      ")
      set -o pipefail
      eval "$CMD" 2>&1 | tee /tmp/ll-pr-test-results.txt
    capture: test_result
    evaluate:
      type: exit_code
    on_success: describe_pr
    on_failure: fix_tests
    on_error: fix_tests
  fix_tests:
    action_type: prompt
    timeout: 600
    action: |
      Read /tmp/ll-pr-test-results.txt to see test failures.
      Diagnose each failure and fix the root cause.
      Never delete tests. Fix one at a time, re-verify.
    next: quality_gate
  describe_pr:
    action_type: prompt
    timeout: 300
    action: |
      Run `/ll:describe-pr` to generate a comprehensive PR description.
      Review the description for accuracy and completeness.
    capture: pr_description
    next: check_no_secrets
  check_no_secrets:
    action: |
      git diff main...HEAD | grep -ciE '(api[_-]?key|secret|password|token)\s*[=:]\s*["'"'"'][A-Za-z0-9+/]{16,}' || echo "0"
    action_type: shell
    evaluate:
      type: output_contains
      pattern: "0"
      negate: false
    on_success: open_pr
    on_failure: done
    on_error: open_pr
  open_pr:
    action_type: prompt
    timeout: 120
    action: |
      Run `/ll:open-pr` to create the pull request.
      Use the description generated in the previous step.
    next: done
  done:
    terminal: true
max_iterations: 15
timeout: 7200
on_handoff: spawn
