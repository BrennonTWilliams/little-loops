name: issue-throughput-monitor
description: |
  Track issue completion rate, analyze throughput trends, and identify
  bottlenecks. Counts completed and active issues, calculates velocity,
  and suggests improvements when throughput falls below target.
initial: count_completed
context:
  target_weekly_rate: 5
states:
  count_completed:
    action: |
      COMPLETED=$(ls .issues/completed/ 2>/dev/null | grep -c '\.md$' || echo 0)
      echo "$COMPLETED"
    action_type: shell
    capture: completed_count
    next: count_active
  count_active:
    action: |
      ACTIVE=$(find .issues -maxdepth 2 -name '*.md' -not -path '.issues/completed/*' -not -path '.issues/templates/*' 2>/dev/null | wc -l | tr -d ' ')
      echo "$ACTIVE"
    action_type: shell
    capture: active_count
    next: analyze_throughput
  analyze_throughput:
    action_type: prompt
    timeout: 300
    action: |
      Issue throughput analysis:
      - Completed issues: ${captured.completed_count.output}
      - Active issues: ${captured.active_count.output}
      - Target weekly rate: ${context.target_weekly_rate}

      Run `ll-history stats` to get recent completion velocity data.

      Analyze:
      1. Current completion rate vs target
      2. Ratio of active to completed issues (backlog health)
      3. Any patterns in what gets completed vs what lingers

      Provide a concise throughput summary.
    capture: throughput_analysis
    next: suggest_improvements
  suggest_improvements:
    action_type: prompt
    timeout: 300
    action: |
      Based on the throughput analysis:
      ${captured.throughput_analysis.output}

      Suggest concrete improvements to increase issue throughput:
      - Issues that could be quick wins (low effort, high value)
      - Issues that should be split (too large for one session)
      - Issues that should be closed (stale, low value, duplicate)
      - Process improvements (better prioritization, dependency ordering)

      Keep suggestions actionable and specific to the current backlog.
    next: done
  done:
    terminal: true
max_iterations: 3
timeout: 1200
