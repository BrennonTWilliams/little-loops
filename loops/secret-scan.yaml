name: secret-scan
description: |
  Scan for accidentally committed secrets and API keys, classify findings
  by severity, and remediate. Creates issues for any secrets that require
  key rotation. Terminates on handoff to prevent secrets from being
  exposed during session transfers.
initial: scan
states:
  scan:
    action: |
      echo "=== Scanning for secrets ==="
      grep -rn --include='*.py' --include='*.js' --include='*.ts' --include='*.yaml' --include='*.json' --include='*.env' \
        -E '(api[_-]?key|secret[_-]?key|password|token|credential)\s*[=:]\s*["'"'"'][A-Za-z0-9+/=]{16,}' \
        . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv 2>/dev/null | head -50 > /tmp/ll-secret-scan.txt
      FINDINGS=$(wc -l < /tmp/ll-secret-scan.txt | tr -d ' ')
      ENV_FILES=$(find . -name '.env' -not -path './.git/*' -not -path './.venv/*' 2>/dev/null | wc -l | tr -d ' ')
      FINDINGS=$((FINDINGS + ENV_FILES))
      echo "FINDINGS: $FINDINGS"
      cat /tmp/ll-secret-scan.txt
    action_type: shell
    capture: scan_results
    evaluate:
      type: output_contains
      pattern: "FINDINGS: 0"
    on_success: done
    on_failure: classify_findings
    on_error: done
  classify_findings:
    action_type: prompt
    timeout: 300
    action: |
      Secret scan results:
      ${captured.scan_results.output}

      For each finding, classify:
      1. TRUE POSITIVE: actual secret/key that should not be in code
      2. FALSE POSITIVE: test data, example values, or non-sensitive config

      Read each file to determine context. Report classification for each finding.
    capture: classification
    next: route_classification
  route_classification:
    evaluate:
      type: llm_structured
      source: "${captured.classification.output}"
      prompt: |
        Were all findings false positives with no real secrets?
        Return "success" if all findings are false positives (no action needed).
        Return "failure" if true positive secrets were found that need remediation.
    on_success: done
    on_failure: remediate
    on_error: done
  remediate:
    action_type: prompt
    timeout: 600
    action: |
      True positive secrets were found:
      ${captured.classification.output}

      For each true positive:
      1. Replace the hardcoded secret with an environment variable reference
      2. Add the variable name to .env.example (without the actual value)
      3. Ensure .env is in .gitignore

      Do NOT commit the actual secrets. Only commit the code changes
      that remove hardcoded secrets.
    next: create_issues
  create_issues:
    action_type: prompt
    timeout: 300
    action: |
      For any secrets that were found in git history (not just working tree),
      create a P0-BUG issue documenting the need for key rotation.

      Use `/ll:capture-issue` with details:
      - What secret was exposed
      - Which files contained it
      - Whether it's in git history
      - Required remediation (key rotation, credential revocation)
    next: verify_clean
  verify_clean:
    action: |
      GREP_COUNT=$(grep -rn --include='*.py' --include='*.js' --include='*.ts' --include='*.yaml' --include='*.json' --include='*.env' \
        -E '(api[_-]?key|secret[_-]?key|password|token|credential)\s*[=:]\s*["'"'"'][A-Za-z0-9+/=]{16,}' \
        . --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=.venv 2>/dev/null | wc -l | tr -d ' ')
      ENV_COUNT=$(find . -name '.env' -not -path './.git/*' -not -path './.venv/*' 2>/dev/null | wc -l | tr -d ' ')
      echo $((GREP_COUNT + ENV_COUNT))
    action_type: shell
    evaluate:
      type: output_numeric
      operator: eq
      target: 0
    on_success: done
    on_failure: scan
    on_error: done
  done:
    terminal: true
max_iterations: 15
timeout: 1800
on_handoff: terminate
