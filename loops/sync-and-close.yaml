name: sync-and-close
description: |
  Sync local issues to GitHub Issues, verify the sync succeeded, and close
  completed ones. Iterates until all local issues are synced and completed
  issues are closed on GitHub.
initial: check_sync
states:
  check_sync:
    action: "ll-sync status --json 2>/dev/null || echo '{\"unsynced\": 0, \"open_completed\": 0}'"
    action_type: shell
    capture: sync_status
    evaluate:
      type: output_contains
      pattern: "\"unsynced\": 0"
    on_success: check_completed
    on_failure: push_issues
    on_error: push_issues
  push_issues:
    action_type: prompt
    timeout: 300
    action: |
      Run `/ll:sync-issues` to push all unsynced local issues to GitHub Issues.
      Review any conflicts and resolve by preferring the local version.
    next: verify_push
  verify_push:
    action: "ll-sync status --json 2>/dev/null || echo '{\"unsynced\": -1}'"
    action_type: shell
    capture: verify_status
    evaluate:
      type: output_contains
      pattern: "\"unsynced\": 0"
    on_success: check_completed
    on_failure: check_sync
    on_error: check_sync
  check_completed:
    action_type: decision
    evaluate:
      type: output_contains
      source: "${captured.sync_status.output}"
      pattern: "\"open_completed\": 0"
    on_success: done
    on_failure: close_completed
  close_completed:
    action_type: prompt
    timeout: 300
    action: |
      Run `/ll:sync-issues` with the close flag to close all GitHub Issues
      whose corresponding local issues are in .issues/completed/.
    next: check_sync
  done:
    terminal: true
max_iterations: 10
timeout: 1800
