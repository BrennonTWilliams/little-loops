name: issue-refinement
description: |
  Progressively refine all active issues through format → score → refine pipeline.
  Routes each issue to the correct step using a deterministic shell classifier.
  Commits every 5 actions and continues until all issues meet quality thresholds.
initial: init
states:
  init:
    action: mkdir -p .loops/tmp && rm -f .loops/tmp/issue-refinement-commit-count
    action_type: shell
    next: evaluate
  evaluate:
    action: |
      ll-issues refine-status --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      issues.sort(key=lambda i: (int(i['priority'][1]), -int(i['id'].split('-')[1])))
      for issue in issues:
          cmds = issue.get('commands', [])
          has_verify = '/ll:verify-issues' in cmds
          if not issue.get('formatted', False):
              print(f'NEEDS_FORMAT {issue[\"id\"]}')
              sys.exit(1)
          if not has_verify:
              print(f'NEEDS_VERIFY {issue[\"id\"]}')
              sys.exit(1)
          cs = issue.get('confidence_score')
          oc = issue.get('outcome_confidence')
          if cs is None or oc is None:
              print(f'NEEDS_SCORE {issue[\"id\"]}')
              sys.exit(1)
          rc = issue.get('refine_count', 0)
          # Hard cap: graduate after 5 refinements regardless of score.
          # Prevents a stubborn issue from consuming the entire iteration budget.
          if rc >= 5:
              continue
          if cs < 85 or oc < 70:
              print(f'NEEDS_REFINE {issue[\"id\"]}')
              sys.exit(1)
      print('ALL_DONE')
      "
    action_type: shell
    capture: "classify"
    evaluate:
      type: exit_code
    on_yes: done
    on_no: parse_id
    on_error: done
  parse_id:
    action: echo "${captured.classify.output}" | awk 'NR==1{printf $2}'
    action_type: shell
    capture: "issue_id"
    evaluate:
      type: exit_code
    on_yes: route_format
    on_error: evaluate
  route_format:
    evaluate:
      type: output_contains
      source: "${captured.classify.output}"
      pattern: "NEEDS_FORMAT"
    on_yes: format_issues
    on_no: route_verify
    on_error: evaluate
  route_verify:
    evaluate:
      type: output_contains
      source: "${captured.classify.output}"
      pattern: "NEEDS_VERIFY"
    on_yes: verify_only
    on_no: route_score
    on_error: evaluate
  route_score:
    evaluate:
      type: output_contains
      source: "${captured.classify.output}"
      pattern: "NEEDS_SCORE"
    on_yes: score_issues
    on_no: refine_issues
    on_error: evaluate
  verify_only:
    action_type: prompt
    action: |
      Run this command for issue ${captured.issue_id.output}:
      /ll:verify-issues ${captured.issue_id.output} --auto
    next: check_commit
  format_issues:
    action_type: prompt
    on_error: check_commit
    action: |
      Run these commands in order for issue ${captured.issue_id.output}:
      1. /ll:format-issue ${captured.issue_id.output} --auto
      2. /ll:verify-issues ${captured.issue_id.output} --auto
    next: check_commit
  score_issues:
    action_type: prompt
    on_error: check_commit
    action: |
      Run this command for issue ${captured.issue_id.output}:
      /ll:confidence-check ${captured.issue_id.output} --auto
    next: check_commit
  refine_issues:
    action_type: prompt
    on_error: check_commit
    action: |
      Run these commands in order for issue ${captured.issue_id.output}:
      1. /ll:refine-issue ${captured.issue_id.output} --auto
      2. /ll:confidence-check ${captured.issue_id.output} --auto
    next: check_commit
  check_commit:
    action: |
      mkdir -p .loops/tmp
      FILE=".loops/tmp/issue-refinement-commit-count"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      if [ $((N % 5)) -eq 0 ]; then echo "COMMIT"; else echo "SKIP"; fi
    action_type: shell
    evaluate:
      type: output_contains
      pattern: "COMMIT"
    on_yes: commit
    on_no: evaluate
    on_error: evaluate
  commit:
    action_type: prompt
    action: /ll:commit
    next: evaluate
  done:
    terminal: true
max_iterations: 200
default_timeout: 3600
timeout: 86400
on_handoff: spawn
