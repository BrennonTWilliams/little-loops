paradigm: fsm
name: issue-refinement
description: |
  Progressively refine all active issues to ensure complete coverage.
  For each incomplete issue (starting from highest ID), runs all missing
  refinement commands (format, verify), scores with confidence-check,
  and iterates with refine-issue until both confidence scores meet
  thresholds (readiness>=85, outcome>=70).
  Repeats until all active issues are fully refined.
initial: evaluate
states:
  evaluate:
    action: "ll-issues refine-status --no-key"
    action_type: shell
    evaluate:
      type: llm_structured
      prompt: |
        Examine this ll-issues refine-status table output.
        Thresholds: readiness=85, outcome=70

        Return verdict "success" ONLY if every issue row satisfies ALL of the following:
          1. All boolean columns (fmt, verify) show ✓ (not — em-dash).
          2. Both the ready (readiness score) and confidence (outcome confidence) columns
             show integer values (not —) that meet or exceed thresholds (ready>=85, confidence>=70).
        Return "failure" if any issue still has — or ✗ in a fmt or verify column, or if any issue
        has unscored or below-threshold ready/confidence values.
        Return "partial" if the output is ambiguous or truncated.
    on_success: done
    on_failure: fix
    on_partial: evaluate
    on_error: evaluate
  fix:
    action_type: prompt
    timeout: 1200
    action: |
      Run `ll-issues refine-status` to see the current refinement state of all
      active issues. Thresholds: readiness=85, outcome=70.

      Find the highest-priority issue that still needs refinement work (lowest P number first,
      then highest Issue ID as tiebreaker), where:
      - Any boolean column shows — or ✗ for format or verify
      - OR the ready (confidence_score) column shows — or is below 85
      - OR the confidence (outcome_confidence) column shows — or is below 70

      For that issue, execute the following steps in sequence:

      Step A — Complete all missing refinement commands. For each command below, check
      whether it has been run for this issue (column present and showing ✓). If not, run it:
      - format incomplete (column shows —, ✗, or absent): /ll:format-issue [ISSUE_ID] --auto
      - verify incomplete (column shows —, ✗, or absent): /ll:verify-issues [ISSUE_ID] --auto

      Step B — Score if unscored:
      - If ready or confidence shows — (not yet scored): /ll:confidence-check [ISSUE_ID] --auto

      Step C — Refine until scores meet thresholds (maximum 5 refinements):
      - While (ready < 85 OR confidence < 70):
        1. /ll:refine-issue [ISSUE_ID] --auto
        2. /ll:confidence-check [ISSUE_ID] --auto
        3. Check updated scores; stop if both thresholds met (ready>=85, confidence>=70) or 5 refinements reached
      - Ceiling-acceptance: if 5 refinements have been reached and ready >= 85 (even if confidence < 70),
        treat the issue as refined-to-ceiling and move on — do not loop further on this issue.
    next: evaluate
  done:
    terminal: true
max_iterations: 100
timeout: 14400
on_handoff: spawn
