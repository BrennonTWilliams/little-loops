# Description: Progressively refine all active issues to ensure complete coverage.
# Uses a deterministic shell classifier to route each issue to the correct
# refinement step (format → score → refine), re-evaluating after every action
# so no state sees stale data. Zero-cost decision states handle multi-way
# routing without LLM calls.
name: issue-refinement
initial: evaluate
states:
  evaluate:
    action: |
      rm -f /tmp/issue-refinement-commit-count
      ll-issues refine-status --json | python3 -c "
      import json, sys
      issues = json.load(sys.stdin)
      issues.sort(key=lambda i: (int(i['priority'][1]), -int(i['id'].split('-')[1])))
      for issue in issues:
          cmds = issue.get('commands', [])
          has_verify = '/ll:verify-issues' in cmds
          if not issue.get('formatted', False) or not has_verify:
              print(f'NEEDS_FORMAT {issue[\"id\"]}')
              sys.exit(1)
          cs = issue.get('confidence_score')
          oc = issue.get('outcome_confidence')
          if cs is None or oc is None:
              print(f'NEEDS_SCORE {issue[\"id\"]}')
              sys.exit(1)
          if cs < 85 or oc < 70:
              print(f'NEEDS_REFINE {issue[\"id\"]}')
              sys.exit(1)
      print('ALL_DONE')
      "
    action_type: shell
    capture: "classify"
    evaluate:
      type: exit_code
    on_success: done
    on_failure: route_format
    on_error: evaluate
  route_format:
    evaluate:
      type: output_contains
      source: "${captured.classify.output}"
      pattern: "NEEDS_FORMAT"
    on_success: format_issues
    on_failure: route_score
  route_score:
    evaluate:
      type: output_contains
      source: "${captured.classify.output}"
      pattern: "NEEDS_SCORE"
    on_success: score_issues
    on_failure: refine_issues
  format_issues:
    action_type: prompt
    action: |
      The classifier output is:
      ${captured.classify.output}

      Extract the issue ID from that output line. Then execute these commands
      in order for that single issue:
      1. /ll:format-issue [ISSUE_ID] --auto
      2. /ll:verify-issues [ISSUE_ID] --auto

      Replace [ISSUE_ID] with the actual ID from the classifier output.
    next: evaluate
  score_issues:
    action_type: prompt
    action: |
      The classifier output is:
      ${captured.classify.output}

      Extract the issue ID from that output line. Then run:
      /ll:confidence-check [ISSUE_ID] --auto

      Replace [ISSUE_ID] with the actual ID from the classifier output.
    next: evaluate
  refine_issues:
    action_type: prompt
    timeout: 1200
    action: |
      The classifier output is:
      ${captured.classify.output}

      Extract the issue ID from that output line. Then run a refine loop
      (maximum 5 iterations) for that single issue:

      While (readiness < 85 OR outcome_confidence < 70) and iterations < 5:
        1. /ll:refine-issue [ISSUE_ID] --auto
        2. /ll:confidence-check [ISSUE_ID] --auto
        3. Check updated scores; stop if both thresholds met (readiness>=85, outcome_confidence>=70)

      Ceiling-acceptance: if 5 refinements reached and readiness >= 85
      (even if outcome_confidence < 70), treat the issue as refined-to-ceiling
      and move on.

      Replace [ISSUE_ID] with the actual ID from the classifier output.
    next: check_commit
  check_commit:
    action: |
      FILE="/tmp/issue-refinement-commit-count"
      N=$(cat "$FILE" 2>/dev/null || echo 0)
      N=$((N + 1))
      printf '%s' "$N" > "$FILE"
      if [ $((N % 5)) -eq 0 ]; then echo "COMMIT"; else echo "SKIP"; fi
    action_type: shell
    evaluate:
      type: output_contains
      pattern: "COMMIT"
    on_success: commit
    on_failure: evaluate
    on_error: evaluate
  commit:
    action_type: prompt
    action: /ll:commit
    next: evaluate
  done:
    terminal: true
max_iterations: 100
timeout: 14400
on_handoff: spawn
