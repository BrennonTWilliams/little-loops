name: plugin-health-check
description: |
  Audit plugin configuration: validate plugin.json, check command and skill
  counts match documentation, verify hooks are properly configured, and fix
  any discrepancies found.
initial: validate_plugin
scope:
  - ".claude-plugin/"
  - "hooks/"
states:
  validate_plugin:
    action: |
      python3 -c "
      import json, sys
      errors = 0
      for path, label in [
          ('.claude-plugin/plugin.json', 'plugin.json'),
          ('.claude/ll-config.json', 'll-config.json'),
          ('hooks/hooks.json', 'hooks.json'),
          ('config-schema.json', 'config-schema.json'),
      ]:
          try:
              data = json.load(open(path))
              print(f'{label}: VALID')
              if label == 'plugin.json':
                  print(f'  commands: {len(data.get(\"commands\", []))}')
                  print(f'  skills: {len(data.get(\"skills\", []))}')
          except FileNotFoundError:
              print(f'{label}: MISSING')
              errors += 1
          except Exception as e:
              print(f'{label}: INVALID: {e}')
              errors += 1
      if errors:
          sys.exit(1)
      "
    action_type: shell
    capture: plugin_state
    evaluate:
      type: exit_code
    on_success: count_assets
    on_failure: fix_config
    on_error: fix_config
  count_assets:
    action: |
      CMD_COUNT=$(ls commands/*.md 2>/dev/null | wc -l | tr -d ' ')
      SKILL_COUNT=$(ls skills/*/SKILL.md 2>/dev/null | wc -l | tr -d ' ')
      echo "ACTUAL_COMMANDS: $CMD_COUNT"
      echo "ACTUAL_SKILLS: $SKILL_COUNT"
    action_type: shell
    capture: asset_counts
    next: audit_counts
  audit_counts:
    action_type: prompt
    timeout: 180
    action: |
      Plugin state:
      ${captured.plugin_state.output}

      Asset counts: ${captured.asset_counts.output}

      Run `/ll:audit-claude-config` to check that plugin.json command list
      and skill list exactly match the actual files in commands/ and skills/.
      Report any missing entries or extra entries.
    capture: counts_result
    next: audit_refs
  audit_refs:
    action_type: prompt
    timeout: 180
    action: |
      Now check:
      - All files referenced in plugin.json actually exist on disk
      - No orphaned command/skill files exist without a plugin.json entry
      Report any issues found.
    capture: refs_result
    next: route_audit
  route_audit:
    evaluate:
      type: llm_structured
      source: "${captured.counts_result.output}\n${captured.refs_result.output}"
      prompt: |
        Based on both audit results, is the plugin configuration healthy?
        Return "success" if everything is healthy.
        Return "failure" if there are issues to fix.
    on_success: verify_hooks
    on_failure: fix_config
    on_partial: audit_counts
    on_error: verify_hooks
  fix_config:
    action_type: prompt
    timeout: 600
    action: |
      Plugin validation failed:
      ${captured.plugin_state.output}

      Fix all identified issues:
      - Update plugin.json to match actual command/skill files
      - Remove references to non-existent files
      - Add missing entries for new commands/skills
    next: audit_counts
    on_error: failed
  verify_hooks:
    action: |
      python3 -c "
      import json, os, sys
      try:
          hooks = json.load(open('hooks/hooks.json'))
          errors = 0
          for hook_name, hook_list in hooks.items():
              for hook in hook_list:
                  cmd = hook.get('command', '')
                  if cmd.startswith('./') or cmd.startswith('/'):
                      script = cmd.split()[0]
                      if not os.path.exists(script):
                          print(f'MISSING: {script} (hook: {hook_name})')
                          errors += 1
                  prompt_file = hook.get('prompt_file', '')
                  if prompt_file and not os.path.exists(prompt_file):
                      print(f'MISSING: {prompt_file} (hook: {hook_name})')
                      errors += 1
          if errors:
              sys.exit(1)
          print('ALL_HOOKS_VALID')
      except Exception as e:
          print(f'ERROR: {e}')
          sys.exit(1)
      "
    action_type: shell
    evaluate:
      type: exit_code
    on_success: commit
    on_failure: fix_hooks
    on_error: commit
  fix_hooks:
    action_type: prompt
    timeout: 300
    action: |
      Hook verification found issues. Fix missing scripts or prompt files
      referenced by hooks.json. Either create the missing files or update
      hooks.json to remove broken references.
    next: verify_hooks
    on_error: failed
  commit:
    action_type: prompt
    action: |
      Run `/ll:commit` to commit any plugin configuration fixes.
      Use message: "fix(plugin): resolve plugin health check issues"
    next: done
  done:
    terminal: true
  failed:
    terminal: true
max_iterations: 15
on_handoff: spawn
timeout: 2400
