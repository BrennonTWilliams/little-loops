name: test-coverage-climber
description: |
  Measure test coverage, identify lowest-covered files, and generate tests
  to climb toward a coverage target. Uses convergence evaluator to detect
  when coverage plateaus, preventing wasted effort on hard-to-test code.
initial: measure_coverage
context:
  target_pct: 80
states:
  measure_coverage:
    action: |
      python -m pytest scripts/tests/ --cov=scripts/little_loops --cov-report=json:/tmp/ll-coverage.json --cov-report=term 2>&1 | tail -20
      COVERAGE=$(python3 -c "
      import json
      try:
          data = json.load(open('/tmp/ll-coverage.json'))
          print(int(data['totals']['percent_covered']))
      except Exception:
          print(0)
      ")
      echo "COVERAGE_PCT: $COVERAGE"
    action_type: shell
    capture: coverage_result
    evaluate:
      type: convergence
      target: "${context.target_pct}"
      direction: maximize
      tolerance: 2
    on_success: done
    on_failure: find_uncovered
    on_error: find_uncovered
  find_uncovered:
    action: |
      python3 -c "
      import json
      try:
          data = json.load(open('/tmp/ll-coverage.json'))
          files = []
          for fname, fdata in data.get('files', {}).items():
              pct = fdata['summary']['percent_covered']
              missing = len(fdata['missing_lines'])
              if pct < 80 and missing > 0:
                  files.append((pct, missing, fname))
          files.sort()
          for pct, missing, fname in files[:5]:
              print(f'{pct:5.1f}% ({missing} missing) {fname}')
      except Exception as e:
          print(f'Error: {e}')
      "
    action_type: shell
    capture: uncovered_files
    next: generate_tests
  generate_tests:
    action_type: prompt
    timeout: 900
    action: |
      Lowest-covered files:
      ${captured.uncovered_files.output}

      For the file with the lowest coverage:
      1. Read the source file and understand what it does
      2. Read the existing tests (if any) to understand test patterns
      3. Write new tests targeting the uncovered lines
      4. Follow existing test conventions (fixtures, naming, organization)

      Generate tests for the most impactful uncovered paths first.
      Aim for meaningful tests, not just coverage padding.
    next: run_tests
  run_tests:
    action_type: shell
    timeout: 600
    action: |
      CMD=$(python3 -c "
      import json, pathlib
      p = pathlib.Path('.claude/ll-config.json')
      cfg = json.loads(p.read_text()) if p.exists() else {}
      print(cfg.get('project', {}).get('test_cmd', 'pytest'))
      ")
      set -o pipefail
      eval "$CMD" 2>&1 | tee /tmp/ll-coverage-tests.txt
    evaluate:
      type: exit_code
    on_success: commit
    on_failure: fix_tests
    on_error: fix_tests
  fix_tests:
    action_type: prompt
    timeout: 600
    action: |
      New tests failed. Read /tmp/ll-coverage-tests.txt for details.

      Fix the failing tests — ensure they test real behavior, not just
      reach coverage targets. If a test is fundamentally wrong, rewrite it.
    next: run_tests
  commit:
    action_type: prompt
    action: |
      Run `/ll:commit` to commit the new tests.
      Use message: "test: add tests to improve coverage"
    next: measure_coverage
  done:
    terminal: true
max_iterations: 20
timeout: 7200
