  enforcement: advisory
  issue: ENH-2168
- id: ARCH-020
  type: rule
  timestamp: '2026-06-15T15:44:38Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: write_step_failed incremented replan count unconditionally before reassess
    decided anything, so CONTINUE decisions still burned quota. Consuming a finite
    resource before confirming consumption is warranted is a logic error with one-directional
    consequences.
  rule: Increment budget/quota only after the decision to consume has been made, not
    before.
  enforcement: advisory
  issue: ENH-2168
- id: OTHE-021
  type: rule
  timestamp: '2026-06-15T15:44:38Z'
  category: other
  labels:
  - extracted
  - global
  rationale: check_replan_budget used count < max_replans (2), so count=2 aborted
    — only 1 replan ever executed. Off-by-one in quota checks silently halve (or otherwise
    reduce) effective capacity.
  rule: Use >= (not >) when comparing a counter against a max limit to get exactly
    max attempts.
  enforcement: advisory
  issue: ENH-2168
- id: ARCH-022
  type: rule
  timestamp: '2026-06-15T15:44:38Z'
