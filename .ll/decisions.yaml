- id: ARCHITECTURE-065
  type: decision
  timestamp: '2026-06-26T22:37:02Z'
  category: architecture
  labels:
  - epic
  - issue-management
  - parent-child
  rationale: 'EPIC membership is currently recorded in three unsynchronized channels
    (child parent:, EPIC relates_to:, EPIC body ## Children). epic-progress counts
    parent: only (per BUG-2029) while review-epic counts parent: union relates_to,
    so the two readers disagree whenever relates_to holds a non-child cross-ref. Designating
    parent: as the single source of truth removes the ambiguity, lets ## Children
    be mechanically reconciled, and frees relates_to for genuine cross-references.
    Audit (2026-06-26) found 18/32 EPICs drifting under the current model.'
  rule: 'parent: is the single source of truth for EPIC membership. The EPIC body
    ## Children section is a derived/reconciled view of the parent: backref set. relates_to:
    is reserved for non-membership cross-references (siblings, prerequisites, sub-epics)
    and must NOT be counted as child membership by any reader.'
  scope: project
  alternatives_rejected: 'Union model (membership = parent: union relates_to everywhere,
    reverting BUG-2029) — re-introduces the sibling/prereq inflation BUG-2029 fixed.
    Keeping divergent readers as-is — leaves epic-progress and review-epic permanently
    inconsistent.'
