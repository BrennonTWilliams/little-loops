  - global
  rationale: An unbounded gate (check → retry → check → retry…) can loop indefinitely
    if the condition is never met. Bounding the detour count (at most one refine +
    one wire) gives a provable termination guarantee.
  rule: 'Any new mandatory enforcement gate must be bounded: it may insert at most
    N detours, then proceed unconditionally.'
  enforcement: advisory
  issue: ENH-2163
