  - global
  rationale: Evaluator errors (e.g., output_numeric failing to parse) surface as FSM
    errors, not just bad verdicts. Without on_error the loop halts rather than falling
    back to a safe state.
  rule: States with numeric or structured evaluators must include an `on_error` route
    to prevent silent FSM termination.
  enforcement: advisory
