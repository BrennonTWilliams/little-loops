  - global
  rationale: The headline failed count should represent genuine implementation failures
    only; mixing in infrastructure/tooling errors causes operators to misread run
    health and take wrong remediation actions.
  rule: 'Subtract all non-failure diagnostic categories (SUB_LOOP_CRASHES, SCORES_MISSING,
    SIZE_REVIEW_FAILED) from the headline '
  enforcement: advisory
  issue: ENH-2250
- id: ARCH-053
  type: rule
