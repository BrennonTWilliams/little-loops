- id: ARCH-006
  type: rule
  timestamp: '2026-06-14T23:18:29Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: Targeting a single PID leaves grandchildren alive. pgrep -P follows parent-PID
    relationships and crosses process group boundaries that os.killpg misses.
  rule: When stopping a subprocess, traverse the full descendant tree (via pgrep -P)
    rather than signaling only the root PID.
  enforcement: advisory
  issue: BUG-2147
- id: ARCH-007
  type: rule
  timestamp: '2026-06-14T23:18:29Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: If the root receives SIGTERM first and forks before dying, new children
    escape the kill wave. Leaves-first ordering prevents this race.
  rule: Send SIGTERM/SIGKILL to descendant processes before the root so the root cannot
    respawn children after receiving the sig
  enforcement: advisory
  issue: BUG-2147
- id: ARCH-008
  type: rule
  timestamp: '2026-06-14T23:18:29Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: start_new_session=True makes the child a new session leader in PG2; os.killpg
    on PG1 never reaches PG2 or its children.
  rule: Any subprocess launched with start_new_session=True lives in its own process
    group; use PID-ancestry traversal, not os.k
  enforcement: advisory
  issue: BUG-2147
- id: OTHE-009
  type: rule
  timestamp: '2026-06-14T23:18:29Z'
  category: other
  labels:
  - extracted
  - global
  rationale: _kill_process_group correctly solved the group-kill problem but was only
    reachable from internal timeout handling, not from cmd_stop, leaving the user-facing
    stop path broken.
  rule: When a utility function solves a general problem, audit every code path that
    needs it and wire them all up at implementa
  enforcement: advisory
  issue: BUG-2147
- id: ARCH-010
  type: rule
  timestamp: '2026-06-14T23:18:29Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: os.killpg is scoped to a single process group. pgrep -P follows parent-PID
    relationships and is not bounded by group membership, making it the correct tool
    for heterogeneous subprocess trees.
  rule: Prefer pgrep -P over os.killpg for process cleanup when subprocesses may span
    multiple process groups.
  enforcement: advisory
  issue: BUG-2147
