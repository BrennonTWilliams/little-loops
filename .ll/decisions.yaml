  category: architecture
  labels:
  - extracted
  - global
  rationale: A scoring-read error or size-review timeout warrants a different operator
    response than a failed ll-auto run; routing them identically destroys that signal
    before it can be acted on.
  rule: 'Distinguish infrastructure/tooling errors from semantic implementation failures
    at the loop routing level, not post-hoc '
  enforcement: advisory
  issue: ENH-2250
