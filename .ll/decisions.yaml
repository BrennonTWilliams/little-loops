  - global
  rationale: 'Without on_error, an LLM or evaluator failure halts the FSM with no
    recovery path. Simulation confirmed this gap: saturation_gate errored and terminated
    the loop because no on_error route existed.'
  rule: LLM-executed prompt states must include `on_error` routing to a terminal state
    (e.g., `failed`).
