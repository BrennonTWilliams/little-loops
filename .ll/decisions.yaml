    initial plan. Bypassing validation on updates creates a gap that grows as the
    validation logic evolves.
  rule: Replan and update paths must pass through the same validation as the initial
    creation path.
  enforcement: advisory
  issue: ENH-2168
- id: ARCH-023
  type: rule
  timestamp: '2026-06-15T15:44:38Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: apply_replan wrote topo-order in raw array order rather than running
    Kahn sort on the full updated graph, silently violating the depends_on constraints
