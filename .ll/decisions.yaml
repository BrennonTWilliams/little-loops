- id: ARCHITECTURE-017
  type: decision
  timestamp: '2026-06-06T04:47:05Z'
  category: architecture
  labels:
  - eval
  - ll-logs
  - design
  - eval-export
  rationale: 'Unblocks FEAT-1969/1970/1971 with a confirmed fixture contract before
    any code is written. Resolves the issue false-premise that ll-harness loads fixtures:
    cli/harness.py:32 (_build_harness_parser) is argument-only with no fixture-loading
    dataclass. Reuses existing utilities (pii.redact_pii at pii.py:39, logs._ABS_PATH_RE
    at logs.py:867, history_reader.lookup_session_metadata) instead of inventing new
    extraction. The execution-outcome taxonomy is chosen because session logs expose
    only execution signals (corrections, errors), never an output-quality judgment.'
  rule: 'EvalFixture v1 schema (ll-logs eval-export -> ll-harness): one YAML record
    per reconstructed ll-harness invocation. ll-harness has NO fixture loader; fixtures
    are an EXPORT artifact replayed by serializing fields back into `ll-harness <runner>
    <target> [runner_args...] [--exit-code N] [--semantic TEXT] [--timeout S]`. FIELDS
    — runner (required; one of skill|cmd|mcp|prompt), target (required str), runner_args
    (optional list[str], default []), exit_code (optional int, null=unchecked), semantic
    (optional str, null=unchecked), timeout (int seconds, default 120); PROVENANCE
    — session_id (required), timestamp (required ISO8601), input_context (optional,
    redacted user-message text), issue_id (optional, regex [A-Z]+-\d+ from input_context),
    skill_name (optional; == target when runner==skill), outcome (required enum),
    pii_detected (bool, default false). Required set = {runner, target, session_id,
    timestamp, outcome}. OUTCOME taxonomy is EXECUTION not QUALITY (logs carry no
    output-quality signal): accepted (has_corrections=False and no error), corrected
    (has_corrections=True), failed (a tool_result with is_error or a traceback present
    in the session), unknown (lookup_session_metadata returned {}); precedence failed
    > corrected > accepted. Source outcome from history_reader.lookup_session_metadata(session_id)
    (DB-backed: has_corrections, issue_outcome, tool_count, files_modified), NOT by
    re-parsing JSONL. INPUT CONTEXT = the raw user-message text (message.content[].text)
    of the user-type JSONL record that _extract_tool_name() matched (cli/logs.py:291),
    after redaction. REDACTION is best-effort and NON-BLOCKING: apply pii.redact_pii()
    (email/phone/SSN) then logs._ABS_PATH_RE.sub("<path>", text) for absolute paths;
    set pii_detected=true if either fires; never skip a session for unredactable content.'
  scope: project
  alternatives_rejected: '(1) Quality-outcome labels (was the skill output good?)
    — rejected: logs carry no quality signal, only execution evidence. (2) Re-parsing
    JSONL to derive outcome — rejected in favor of DB-backed lookup_session_metadata()
    to avoid double-parsing and signal drift. (3) Blocking redaction that skips sessions
    with unredactable PII — rejected for MVP; best-effort regex + pii_detected flag
    avoids silent data loss. (4) Adding a --fixture FILE input mode to ll-harness
    — rejected/out-of-scope: fixtures replay by serializing into the existing CLI
    arg surface.'
  issue: FEAT-1968
