- id: ARCH-092
  type: rule
  timestamp: '2026-06-26T01:38:56Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: len() counts Unicode code points; wide glyphs (CJK, emoji) occupy two
    terminal columns. Using len() causes text to overflow its allocated box width
    whenever wide characters appear.
  rule: Use display width (wcwidth) not len() when computing layout positions, truncation,
    or padding in terminal renderers.
  enforcement: advisory
  issue: BUG-2303
- id: ARCH-093
  type: rule
  timestamp: '2026-06-26T01:38:56Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: A character grid initialised to single-space cells retains those spaces
    under a batched string. On join, each surviving space inflates the row by one
    column, shifting all subsequent content and borders out of alignment.
  rule: When writing a multi-character string into a single cell of a character grid,
    explicitly clear every cell the string vis
  enforcement: advisory
  issue: BUG-2303
