  rationale: An unrestricted `Edit` tool allows the LLM to edit any file in the repo.
    When research surfaces a small, implementable gap, the LLM will use the available
    tool to close it — even when the command's intent is documentation-only. A path
    glob is the hard gate that prevents this regardless of instruction quality.
  rule: Restrict `Edit` in `allowed-tools` to the directory glob the command is authorized
    to modify (e.g., `Edit(.issues/**)`).
  enforcement: advisory
  issue: BUG-2224
- id: ARCH-029
  type: rule
  timestamp: '2026-06-19T00:05:39Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: BUG-2224 was fixed with both `Edit(.issues/**)` (hard gate) and a prose
    prohibition ('do not implement code'). The tool restriction stops doomed calls;
    the instruction prevents the LLM from attempting them in the first place and reduces
    confusion when the tool is later widened.
  rule: Pair tool-level path restrictions with an explicit scope-boundary instruction
    stating what the command must NOT do.
  enforcement: advisory
  issue: BUG-2224
- id: ARCH-030
  type: rule
  timestamp: '2026-06-19T00:05:39Z'
  category: architecture
  labels:
  - extracted
  - global
  rationale: When a research command surfaces an exact, small implementation gap,
    the LLM will pivot from 'document this' to 'implement this' unless explicitly
    prohibited. The command's purpose is knowledge capture, not code change — conflating
    the two breaks the refine→implement pipeline.
  rule: Research and refine commands must document gaps discovered in code; they must
    never implement them.
  enforcement: advisory
