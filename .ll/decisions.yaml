- id: ARCHITECTURE-047
  type: decision
  timestamp: '2026-06-24T17:43:23Z'
  category: architecture
  labels:
  - host-compat
  - multi-host
  - gemini
  - pi
  - omp
  rationale: 'Per-host code assessment (thoughts/audits/2026-06-24-host-generalization-planning-assessment.md
    + code scout) found 5 of 6 existing Codex children are cleanly parameterizable:
    host-specific logic is confined to a few lines that belong in a lookup table,
    not a forked file. Evidence: HostRunner Protocol + _HOST_RUNNER_REGISTRY (host_runner.py:773,153)
    is already the runner seam; _config_candidates special-cases only ''.codex'' at
    config/core.py:92; adapt_skills/agents_for_codex are ~95% generic with Codex-specificity
    isolated to one serializer (adapt_skills_for_codex.py:113, adapt_agents_for_codex.py:75-92);
    FEAT-1716 conformance design already specifies LL_HOST_CLI override + skipif;
    codex vs claude-code bash hook adapters differ by ONE line (export LL_HOOK_HOST=codex).
    Hybrid (keep hook adapters bespoke ''because lifecycle events differ most'') fails
    on evidence: bash hook adapters are near-identical and templatable; real divergence
    is integration model, and the only SDK-native host (OpenCode) already exists and
    never needs the shared abstraction. Collapses ~6-8 duplicated children across
    EPIC-2178/1622/1713 + FEAT-1850. Keep parameterization declarative (registry of
    host->config), NOT a generic serializer engine -- serializers genuinely differ
    (openai.yaml vs TOML vs Gemini .toml commands) and are the YAGNI line.'
  rule: 'Build the shared per-host children (conformance suite, skill adapter, command/agent
    adapter, config probe, init flag, bash hook adapter) as ONE generic, host-parameterized
    implementation driven by a declarative host registry, not N bespoke copies per
    epic. New hosts register as a data entry (host -> {config_dir, manifest_format/schema_fn,
    detection_fn, install_fn, LL_HOOK_HOST marker}) consumed by a shared _HOST_REGISTRY
    at every seam: init/cli.py _detect_hosts/_dispatch_host_adapters, config/core.py
    _config_candidates (_HOST_CONFIG_DIRS table), the skill/agent adapters (swappable
    serializer per host), the conformance suite (LL_HOST_CLI override + skipif guards),
    and bash hook adapters (one template with LL_HOOK_HOST substitution). Carve-out
    is by INTEGRATION MODEL, not lifecycle: subprocess/bash hosts (Codex, Gemini,
    Pi, omp) ride the generic path; SDK-native hosts (OpenCode TypeScript) stay bespoke.
    Gemini/Pi/omp epics reference this decision instead of each re-deriving the same
    ~6-8 children; omp lands as a thin PiRunner subclass.'
  scope: project
  alternatives_rejected: 'Hybrid (generic conformance+skill/command, bespoke hook
    adapters) -- rejected: premise that ''hook adapters differ most'' is false; bash
    adapters differ by one env var and the integration-model carve-out already isolates
    the only divergent host (OpenCode). Bespoke per host (status quo) -- rejected:
    each of 4 epics independently re-derives the same children, ~6-8x duplication,
    drift risk, and no single owner for host priority order. Deep generic serializer
    engine -- rejected as YAGNI: per-host manifest formats genuinely differ; keep
    the swap point as a small data entry, not an abstraction.'
