- id: ARCHITECTURE-034
  type: decision
  timestamp: '2026-06-15T05:49:14Z'
  category: architecture
  labels:
  - loops
  - fsm
  - routing
  - decision-table
  rationale: The decision-list routing pattern is reimplemented ad-hoc across rn-remediate,
    loop-router, and rn-plan-apo as bespoke shell if/elif fanned into fragile output_contains
    cascades. A shared engine makes routing declarative, diffable, unit-testable,
    and health-checkable. Follows the EPIC-1663 playbook (prove -> document -> codify
    as validate rule + wizard branch) so the pattern propagates to new loops by construction
    rather than aspirationally. Kept provisional to avoid standardizing an unproven
    abstraction (the SHOR/meta-loop premature-standardization failure mode).
  rule: 'Standardize converge/refine/score-and-route loop routing on the policy-based
    router + decision-table pattern (classify evaluator + route: table over a declarative,
    priority-ordered, conjunctive rule table), with deterministic shell/Python routing
    over LLM-or-shell-written per-dimension scores. PROVISIONAL — pending validation
    by ENH-2166 (rn-remediate migration); promote to an advisory rule + create-loop
    default + ll-loop validate nudge in EPIC-2167 Phase 3.'
  scope: project
  alternatives_rejected: Lone P5 backlog issue (rots/pruned, can't track multi-loop
    adoption); 3-layer split with a separate lib/decision-router fragment (speculative,
    YAGNI — folded engine into ENH-2164 instead); mandating the pattern fleet-wide
    before validation (rejected — prove on rn-remediate first)
  issue: EPIC-2167
