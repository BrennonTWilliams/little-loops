  - global
  rationale: JSONL/LLM output embedded in Python triple-quoted string literals breaks
    on embedded quotes, backslashes, or newlines. The fix (read from disk) already
    existed in lib/composer.yaml but was never propagated to states that reused the
    same pattern.
  rule: Never interpolate captured/external output directly into code or string literals;
    read from disk or escape properly.
  enforcement: advisory
